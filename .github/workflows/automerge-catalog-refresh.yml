name: Auto-merge catalog refresh PR

# Scoped auto-merge that ONLY applies to the nightly catalog refresh PR
# (branch pattern `auto/refresh-uip-catalog-*`, label `automated`). Deliberately
# does NOT use GitHub's repo-wide `Allow auto-merge` setting — that would let
# any PR opt into auto-merge by clicking the button. The branch-name filter
# below is the only thing that gets merged.
#
# Fires whenever any check suite completes on the repo, finds open refresh
# PRs, and merges each one whose status checks are all green. Refresh PRs
# with red checks stay open with the gate annotations attached, surfacing
# real CLI drift for a human sweep.

on:
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to evaluate (optional; otherwise scans all open refresh PRs)
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge eligible refresh PRs
        env:
          # PAT so the merge commit triggers downstream workflows (e.g. any
          # post-merge job that depends on the new catalog landing on main).
          # Same PAT used elsewhere — see activation-gate.yml.
          GH_TOKEN: ${{ secrets.GH_PAT }}
          MANUAL_PR: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail

          if [ -n "${MANUAL_PR:-}" ]; then
            CANDIDATES="$MANUAL_PR"
          else
            CANDIDATES=$(gh pr list \
              --state open \
              --label automated \
              --json number,headRefName \
              --jq '[.[] | select(.headRefName | startswith("auto/refresh-uip-catalog-"))] | .[].number')
          fi

          if [ -z "$CANDIDATES" ]; then
            echo "No open refresh PRs."
            exit 0
          fi

          for PR in $CANDIDATES; do
            echo "::group::PR #$PR"

            # Defense in depth: re-verify branch pattern even if the list
            # filter already matched (or workflow_dispatch was used).
            HEAD=$(gh pr view "$PR" --json headRefName --jq .headRefName)
            case "$HEAD" in
              auto/refresh-uip-catalog-*) ;;
              *)
                echo "Skipping: head $HEAD is not a refresh branch."
                echo "::endgroup::"
                continue
                ;;
            esac

            ROLLUP=$(gh pr view "$PR" --json statusCheckRollup --jq .statusCheckRollup)
            UNFINISHED=$(echo "$ROLLUP" | jq '[.[] | select(.status != null and .status != "COMPLETED")] | length')
            FAILED=$(echo "$ROLLUP" | jq '[.[] | select(.conclusion != null and (.conclusion | IN("SUCCESS","SKIPPED","NEUTRAL") | not))] | length')

            if [ "$UNFINISHED" -gt 0 ]; then
              echo "Skipping: $UNFINISHED checks still running."
              echo "::endgroup::"
              continue
            fi
            if [ "$FAILED" -gt 0 ]; then
              echo "Skipping: $FAILED checks failed — leaving open for human review."
              echo "::endgroup::"
              continue
            fi

            echo "All checks green — squashing."
            gh pr merge "$PR" --squash --delete-branch
            echo "::endgroup::"
          done
