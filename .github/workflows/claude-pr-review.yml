name: Claude PR Review

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

# Dedupe runs per PR, but keep event types in separate groups so the tracking
# comment posted by `track_progress` (an issue_comment event) cannot cancel the
# in-progress pull_request review run. Within a group, newer runs still cancel
# older ones (e.g. repeated @claude mentions).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only run on non-fork PRs (secrets required), or on @claude mentions
    if: |
      (github.event_name == 'pull_request' && !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && github.event.pull_request.head.repo.full_name == github.repository)

    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Action
        id: claude_review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          track_progress: true
          claude_args: "--model claude-opus-4-6"
          prompt: |
            You are reviewing a PR for a Claude Code plugin repository that contains
            markdown skill definitions, YAML frontmatter, shell hooks, and coder_eval
            test tasks. There is NO source code, build system, or runtime — only
            documentation that teaches AI agents how to build UiPath automations.

            ## Review steps

            1. Read `.github/code_review.md` for the full review criteria and output format.
            2. Read `CLAUDE.md` for project conventions.
            3. Read `.claude/rules/skill-review.md` for the skill scoring framework.
            4. Run `git diff origin/${{ github.base_ref }}...HEAD` to see the full diff.
            5. Run `gh pr view ${{ github.event.pull_request.number || github.event.issue.number }} --comments` to read existing PR conversation — do not repeat resolved issues.
            6. For each changed file, read the FULL file (not just the diff) for surrounding context.

            ## Skill-specific checks

            7. If the PR adds a new skill folder under `skills/`:
               a. Check that `tests/tasks/<skill-name>/` exists with at least one `.yaml` task file.
                  If missing, flag as **Medium** (most skills are not yet test-compliant).
               b. If tests exist, verify:
                  - At least one task tagged `smoke` and at least one tagged `e2e` (both required).
                  - Each task's `tags` uses only valid test types: `smoke`, `integration`, or `e2e`.
                  - Each task's `tags` includes the skill directory name (e.g., `uipath-maestro-flow`) as the first tag.
                  - `task_id` matches `skill-<domain>-<capability>`.
                  - `success_criteria` has at least one check.
                  If smoke or e2e coverage is missing, flag as **Medium**.

            8. Check that `CODEOWNERS` includes an entry for any new skill path.

            9. Verify all relative links in changed markdown files resolve to files that
                actually exist in the repo (use `ls` or `cat` to confirm).

            10. Check for cross-skill references — skills under `skills/` must be fully
                self-contained with no imports or links to other skill folders.

            11. Verify no secrets, tokens, API keys, or personal filesystem paths appear
                in any changed file.

            ## Output

            Follow the output format specified in `.github/code_review.md`.
            Always include the "What's Missing" section, even if empty.

      # The review step runs with continue-on-error so a transient Anthropic
      # API usage-limit (HTTP 400) does not block the merge. This guard passes
      # the job ONLY for that specific error and re-fails for any other failure,
      # so genuine review problems still surface.
      - name: Tolerate Anthropic API usage-limit (HTTP 400)
        if: steps.claude_review.outcome == 'failure'
        run: |
          OUTPUT_FILE="${{ runner.temp }}/claude-execution-output.json"
          if grep -qiE "workspace API usage limit|API Error: 400" "$OUTPUT_FILE" 2>/dev/null; then
            echo "::warning title=Claude Code Review skipped::Anthropic workspace API usage limit reached (HTTP 400). Review treated as non-blocking until the limit resets."
            exit 0
          fi
          echo "::error title=Claude Code Review failed::The review step failed for a reason other than the API usage limit. See the step log above."
          exit 1
