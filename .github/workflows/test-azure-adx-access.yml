name: Test Azure Blob Access (OIDC)

# Throwaway diagnostic. Verifies that the repo's Azure OIDC service principal
# can authenticate from a GitHub-hosted runner and read/write the blob
# container via RBAC (--auth-mode login, no account key). Does NOT touch the
# Slack webhook. Delete once we have the answer.
#
# OIDC token subject is `repo:UiPath/skills:pull_request` on PRs, matching the
# federated credential on the app registration. The real scheduled nightly run
# (on the default branch) is covered by a separate `ref:refs/heads/main` cred.

on:
  pull_request:
    paths:
      - '.github/workflows/test-azure-adx-access.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  azure-blob:
    name: Azure Blob (OIDC + RBAC)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: List + write + delete via RBAC
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          AZURE_BLOB_CONTAINER: ${{ secrets.AZURE_BLOB_CONTAINER }}
        run: |
          set -euo pipefail

          common=(--account-name "$AZURE_STORAGE_ACCOUNT"
                  --container-name "$AZURE_BLOB_CONTAINER"
                  --auth-mode login)

          echo "== list (read) =="
          az storage blob list "${common[@]}" --num-results 5 --query "[].name" -o tsv | head -20

          echo "== upload (write) =="
          name="ci-access-test/$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_RUN_ID}.txt"
          echo "access probe $(date -u)" > probe.txt
          az storage blob upload "${common[@]}" --name "$name" --file probe.txt --overwrite >/dev/null
          echo "UPLOAD OK: $name"

          echo "== delete (cleanup) =="
          az storage blob delete "${common[@]}" --name "$name" >/dev/null
          echo "DELETE OK"

          echo "BLOB ACCESS: SUCCESS (read + write + delete via OIDC + RBAC)" >> "$GITHUB_STEP_SUMMARY"
