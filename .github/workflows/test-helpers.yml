name: Test Helpers

on:
  pull_request:
    paths:
      - 'tests/tasks/uipath-maestro-flow/**'
      - 'tests/tasks/uipath-maestro-case/**'
      - 'tests/scripts/**'
      - 'scripts/**'  # guarded scripts (e.g. build-uip-catalog.py) must trigger their tests
      - 'hooks/**'    # telemetry hook has a contract guard in tests/scripts/
      - '.github/workflows/test-helpers.yml'
  workflow_dispatch:

jobs:
  pytest-flow-check:
    runs-on: ubuntu-latest
    name: maestro-flow checker unit tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pytest
        run: pip install pytest

      - name: Run pytest
        run: pytest tests/tasks/uipath-maestro-flow/ -v

  pytest-case-check:
    runs-on: ubuntu-latest
    name: maestro-case checker unit tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pytest
        run: pip install pytest

      - name: Run pytest
        run: pytest tests/tasks/uipath-maestro-case/ -v

  runtime-payload-casing-guard:
    runs-on: ubuntu-latest
    name: runtime-payload key-casing contract guard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pytest
        run: pip install pytest

      # Fails if any checker reads a runtime-only debug key (finalStatus /
      # elementExecutions) by a hard-coded lowercase .get() instead of the
      # case-insensitive _get_ci accessor — the CLI #2266 PascalCase break.
      - name: Run contract guard
        run: pytest tests/scripts/test_runtime_payload_key_casing.py -v

  catalog-build-guards:
    runs-on: ubuntu-latest
    name: catalog build integrity guards
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pytest
        run: pip install pytest

      # Guards the verb-count floor / max-drop logic that stops a broken
      # refresh from overwriting the catalog with a base-CLI-only snapshot
      # (see #1203).
      - name: Run catalog guard tests
        run: pytest tests/scripts/test_catalog_build_guards.py -v

  telemetry-hook-tests:
    runs-on: ubuntu-latest
    name: telemetry hook contract guard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pytest
        run: pip install pytest

      # Runs hooks/send-telemetry.sh with a stubbed uip and asserts the
      # eventName mapping (session-start/-end/completion/tool-use), lifecycle
      # fields, and drop paths.
      - name: Run telemetry hook tests
        run: pytest tests/scripts/test_send_telemetry_hook.py -v
