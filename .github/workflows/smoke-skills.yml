name: Smoke Skill Tests

concurrency:
  group: smoke-skills-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  # No `paths:` filter on purpose. This workflow is a required status
  # check; if `paths:` excluded a PR the workflow wouldn't run, no
  # check would be reported, and merge would block forever. Instead we
  # always trigger and let the `detect` job short-circuit via
  # `skip=true` — the gated job is then reported as skipped, which
  # GitHub counts as a pass for required checks.
  pull_request:
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    name: Detect changed skills
    outputs:
      task_globs: ${{ steps.detect.outputs.task_globs }}
      skip: ${{ steps.detect.outputs.skip }}
      untested_skills: ${{ steps.detect.outputs.untested_skills }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed skills and map to test tasks
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # RPA skill (modern + legacy) runs on the Windows workflow
          # (smoke-rpa-skills.yml). Helm/Studio only exists there, and
          # the full lifecycle (`uip rpa` / `uip rpa-legacy` CLI) is
          # what's being exercised — so we skip those tasks here.
          WINDOWS_SKILLS="uipath-rpa"

          # Opt-in benchmarks live alongside skill tests but are NOT smoke
          # tests — they're large/expensive and run via the dashboard
          # (`dashboard run --suite <name>`). Skip here so smoke stays cheap.
          BENCHMARK_DIRS="activation"

          # Single source of truth for "skill dirs not smoke-eligible".
          # Used by both the test-infra fan-out and the per-skill loop below.
          is_excluded_path() {
            local dir="$1"
            for skill in $WINDOWS_SKILLS $BENCHMARK_DIRS; do
              [[ "$dir" == "tests/tasks/$skill/"* ]] && return 0
            done
            return 1
          }

          # If test infrastructure changed, run all smoke tests except
          # the Windows-only ones and opt-in benchmarks.
          #
          # We only fan out for the smoke config (default_smoke.yaml) — other
          # experiment files (integration.yaml, e2e.yaml, activation.yaml,
          # ...) drive their own jobs/dashboards and don't change smoke
          # behavior, so editing them shouldn't trigger a 30-min full-suite
          # run on every PR.
          if echo "$CHANGED" | grep -qE '^tests/experiments/default_smoke\.yaml$|^tests/_shared/|^tests/[^/]+\.(py|yaml|toml)$|^\.github/workflows/smoke-skills\.yml$'; then
            shopt -s globstar nullglob
            GLOBS=""
            for f in tests/tasks/**/*.yaml; do
              is_excluded_path "$f" && continue
              GLOBS="$GLOBS ${f#tests/}"
            done
            GLOBS=$(echo "$GLOBS" | xargs)
            if [ -z "$GLOBS" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "No non-Windows smoke tasks to run."
            else
              echo "task_globs=$GLOBS" >> "$GITHUB_OUTPUT"
              echo "Running all non-Windows smoke tests (test infrastructure changed)"
            fi
            exit 0
          fi

          # Extract unique skill names from changed paths
          SKILLS=$(echo "$CHANGED" | grep '^skills/' | sed 's|skills/\([^/]*\)/.*|\1|' | sort -u)

          # Also include skills whose test tasks changed
          TEST_SKILLS=$(echo "$CHANGED" | grep '^tests/tasks/' | sed 's|tests/tasks/\([^/]*\)/.*|\1|' | sort -u)
          SKILLS=$(printf '%s\n%s' "$SKILLS" "$TEST_SKILLS" | sort -u | grep -v '^$' || true)

          if [ -z "$SKILLS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No skill changes detected — skipping smoke tests"
            exit 0
          fi

          # Build task glob pattern for changed skills that have tests.
          # Skip the Windows-only RPA skills — they run on smoke-rpa-skills.yml.
          GLOBS=""
          UNTESTED=""
          for skill in $SKILLS; do
            if echo "$WINDOWS_SKILLS" | grep -qw "$skill"; then
              echo "Skipping $skill (runs on Windows — see smoke-rpa-skills.yml)"
              continue
            fi
            if echo "$BENCHMARK_DIRS" | grep -qw "$skill"; then
              echo "Skipping $skill (opt-in benchmark — runs via dashboard --suite $skill)"
              continue
            fi
            if [ -d "tests/tasks/$skill" ]; then
              if [ -n "$GLOBS" ]; then
                GLOBS="$GLOBS tasks/$skill/**/*.yaml"
              else
                GLOBS="tasks/$skill/**/*.yaml"
              fi
              echo "Will test: $skill"
            else
              if [ -n "$UNTESTED" ]; then
                UNTESTED="$UNTESTED, $skill"
              else
                UNTESTED="$skill"
              fi
              echo "No tests for: $skill (skipping)"
            fi
          done

          if [ -n "$UNTESTED" ]; then
            echo "untested_skills=$UNTESTED" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$GLOBS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Changed skills have no smoke tests: $UNTESTED"
          else
            echo "task_globs=$GLOBS" >> "$GITHUB_OUTPUT"
          fi

  warn-untested:
    needs: detect
    if: needs.detect.outputs.untested_skills != ''
    runs-on: ubuntu-latest
    name: Warn about untested skills
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const skills = '${{ needs.detect.outputs.untested_skills }}';
            const body = `⚠️ **Smoke test coverage gap** — the following changed skills have no tests under \`tests/tasks/\`:\n\n${skills.split(', ').map(s => '- `' + s + '`').join('\n')}\n\nConsider adding smoke tests before merging.`;

            // Avoid duplicate comments on repeated pushes
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Smoke test coverage gap'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  e2e:
    needs: detect
    if: needs.detect.outputs.skip != 'true'
    runs-on: ubuntu-latest
    # 18+ smoke tasks at ~1–2 min each + env setup. 60 min was getting
    # cancelled when the matrix grew + LLM reviewer was retrying on quota
    # exhaustion. 120 min covers worst-case reviewer-retry storms without
    # masking real hangs.
    timeout-minutes: 120
    name: Run skill smoke tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: UiPath/coder_eval
          token: ${{ secrets.GH_PAT }}
          path: .coder_eval

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Docker is available
        run: docker info > /dev/null

      - name: Install coder-eval
        working-directory: .coder_eval
        env:
          UV_EXTRA_INDEX_URL: "https://${{ secrets.UV_INDEX_UIPATH_USERNAME }}:${{ secrets.UV_INDEX_UIPATH_PASSWORD }}@uipath.pkgs.visualstudio.com/_packaging/ml-packages/pypi/simple/"
        run: uv pip install --system .

      - name: Build coder-eval Docker image
        working-directory: .coder_eval
        env:
          UV_INDEX_UIPATH_USERNAME: ${{ secrets.UV_INDEX_UIPATH_USERNAME }}
          UV_INDEX_UIPATH_PASSWORD: ${{ secrets.UV_INDEX_UIPATH_PASSWORD }}
        run: make docker-image

      # Build custom smoke image extending coder-eval-agent with @uipath/cli
      # and @uipath/admin-tool from GitHub Packages @alpha.
      # Every merge to `cli/main` publishes a `-alpha.<date>.<run>` prerelease;
      # smoke tracks this so changes in task YAMLs/skills are tested against main,
      # not stale `latest` from public npm (which lags by days).
      - name: Build skills smoke Docker image
        run: |
          docker build \
            --build-arg CODER_EVAL_IMAGE=coder-eval-agent:latest \
            --build-arg NPM_AUTH_TOKEN="${{ secrets.GH_PAT }}" \
            -t skills-image:latest \
            -f .github/docker/Dockerfile.smoke \
            .

      # Pre-auth uip via the CLI's documented env-var bypass so non-RPA
      # smoke tasks (orchestrator / integration-service / data-fabric / ...)
      # have a logged-in CLI without the agent ever calling `uip login`.
      # See smoke-rpa-skills.yml for the chain rationale; this Linux job
      # doesn't go through Helm, but the same UIPATH_CLI_* env vars
      # satisfy the JS CLI's general auth state too.
      - name: Mint UiPath service-account token + enable env-auth
        env:
          UIPATH_CLIENT_ID:     ${{ secrets.UIPATH_CLIENT_ID }}
          UIPATH_CLIENT_SECRET: ${{ secrets.UIPATH_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          TOKEN=$(curl -fsS -X POST \
            "https://alpha.uipath.com/identity_/connect/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials" \
            -d "client_id=$UIPATH_CLIENT_ID" \
            -d "client_secret=$UIPATH_CLIENT_SECRET" \
            -d "scope=OR.Default OR.Execution OR.Robots OR.Machines.Read TM.Projects TM.TestCases TM.TestSets TM.TestExecutions TM.Requirements TM.ObjectLabels TM.Attachments" \
            | python -c "import sys,json;print(json.load(sys.stdin)['access_token'])")
          echo "::add-mask::$TOKEN"
          {
            echo "UIPATH_CLI_ENABLE_ENV_AUTH=true"
            echo "UIPATH_CLI_AUTH_TOKEN=$TOKEN"
            echo "UIPATH_CLI_ORGANIZATION_NAME=${{ secrets.UIPATH_ORG_NAME }}"
            echo "UIPATH_CLI_ORGANIZATION_ID=${{ secrets.UIPATH_ORG_ID }}"
            echo "UIPATH_CLI_TENANT_NAME=${{ secrets.UIPATH_TENANT_NAME }}"
            echo "UIPATH_CLI_TENANT_ID=${{ secrets.UIPATH_TENANT_ID }}"
            echo "TRACES_SMOKE_PROCESS_KEY=${{ secrets.TRACES_SMOKE_PROCESS_KEY }}"
          } >> "$GITHUB_ENV"
          mkdir ~/.uipath

      - name: Run smoke tests
        env:
          SKILLS_REPO_PATH: ${{ github.workspace }}
          # Route the agent through AWS Bedrock. The Anthropic workspace
          # hit its API usage limit (resets 2026-05-01), so DirectRoute
          # is blocked. Bedrock has a separate quota.
          #
          # ANTHROPIC_API_KEY stays set for the LLM reviewer (lightweight
          # token spend — coder_eval's reviewer only supports Anthropic
          # direct or UiPath LLM Gateway, not Bedrock). If the shared
          # workspace quota is still drained when the reviewer fires,
          # orchestrator._run_final_llm_review swallows the error and
          # the task still records its deterministic criteria result.
          API_BACKEND: bedrock
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          BEDROCK_MODEL: ${{ secrets.BEDROCK_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TASK_PARALLELISM: ${{ vars.TASK_PARALLELISM || '1' }}
        working-directory: tests
        id: smoke
        run: |
          echo "Running: coder-eval run ${{ needs.detect.outputs.task_globs }} --tags smoke -j $TASK_PARALLELISM"
          coder-eval run ${{ needs.detect.outputs.task_globs }} \
            -e experiments/default_smoke.yaml \
            -j "$TASK_PARALLELISM" -v \
            --run-dir /tmp/runs \
            --tags smoke
        continue-on-error: true

      - name: Fix permissions on /tmp/runs
        if: always()
        run: sudo chown -R $(id -u):$(id -g) /tmp/runs && sudo chmod -R 755 /tmp/runs 2>/dev/null || true

      - name: Summarize results
        if: always()
        run: |
          # Find the most recent run directory (tests may not have produced
          # one on catastrophic install failures).
          run_dir=$(ls -td /tmp/runs/*/ 2>/dev/null | head -n 1)
          if [ -z "$run_dir" ]; then
            echo "::warning::No run directory found — nothing to summarize"
            exit 0
          fi
          echo "Run directory: $run_dir"
          echo ""
          echo "## Task results"
          python - <<'PY'
          import json
          import pathlib
          run_dir = sorted(pathlib.Path('/tmp/runs').glob('*/'))[-1]
          rows = []
          for p in sorted(run_dir.rglob('task.json')):
              d = json.loads(p.read_text(encoding='utf-8'))
              lr = d.get('llm_review') or {}
              rows.append((
                  d.get('task_id', '?'),
                  d.get('final_status', '?'),
                  d.get('weighted_score'),
                  lr.get('score'),
              ))
          if not rows:
              print('  (no task.json files found)')
          width = max((len(r[0]) for r in rows), default=4)
          for task_id, status, score, llm_score in rows:
              score_s = f"{score:.2f}" if isinstance(score, (int, float)) else '   —'
              llm_s = f"{llm_score:.2f}" if isinstance(llm_score, (int, float)) else '   —'
              print(f"  {task_id:<{width}}  status={status:<8}  score={score_s}  llm={llm_s}")
          PY
          echo ""
          echo "HTML report artifact: eval-report-${{ github.run_id }}"
          echo "Download under the workflow run's Artifacts section and open experiment.html."

      - name: Clean up artifacts (remove .venv and node_modules)
        if: always()
        run: |
          find /tmp/runs -type d \( -name .venv -o -name node_modules \) -path "*/artifacts/*" -exec rm -rf {} + || true

      - name: Upload HTML / JSON eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          # Use ** so the pattern still matches the replicate-index segment
          # that coder_eval adds to per-task run dirs (/tmp/runs/<ts>/<variant>/<task>/<NN>/).
          path: |
            /tmp/runs/*/experiment.html
            /tmp/runs/*/experiment.md
            /tmp/runs/*/experiment.json
            /tmp/runs/*/experiment.log
            /tmp/runs/*/*/variant.html
            /tmp/runs/*/*/variant.md
            /tmp/runs/*/*/variant.json
            /tmp/runs/**/task.html
            /tmp/runs/**/task.json
            /tmp/runs/**/task.log
            /tmp/runs/**/artifacts
          if-no-files-found: warn
          retention-days: 14

      # Quality gate: fail the job if any task's LLM reviewer score is
      # below 0.7, independent of deterministic criteria. The reviewer
      # catches skill-adherence regressions that file-exists /
      # file-contains checks miss (e.g. agent called the wrong subcommand
      # but still produced the right output shape). 0.7 (not 0.8) gives
      # the qualitative verdict room to dock for minor process issues the
      # agent already recovered from without false-failing correct runs.
      - name: Enforce LLM reviewer score threshold (>= 0.7)
        if: always()
        env:
          REVIEWER_THRESHOLD: "0.7"
        # Single-quoted heredoc keeps Python literals intact. Threshold
        # is read from the env so we don't have to escape dollar signs.
        run: |
          python - <<'PY'
          import json, os, pathlib, sys
          threshold = float(os.environ.get('REVIEWER_THRESHOLD', '0.8'))
          run_dirs = sorted(pathlib.Path('/tmp/runs').glob('*/'))
          if not run_dirs:
              print('::warning::No run directory — skipping reviewer threshold check')
              sys.exit(0)
          run_dir = run_dirs[-1]
          task_jsons = sorted(run_dir.rglob('task.json'))
          failures = []
          missing = []
          for p in task_jsons:
              d = json.loads(p.read_text(encoding='utf-8'))
              lr = d.get('llm_review') or {}
              score = lr.get('score')
              tid = d.get('task_id', p.parent.name)
              if not isinstance(score, (int, float)):
                  missing.append(tid)
                  continue
              if score < threshold:
                  issues = (lr.get('issues') or '').splitlines()[0][:120]
                  failures.append((tid, score, issues))
          for tid in missing:
              print(f'::warning::{tid}: no llm_review (reviewer skipped or errored)')
          if failures:
              for tid, score, issues in failures:
                  print(f'::error::{tid}: llm_review score {score:.2f} < {threshold} — {issues}')
              print(f'::error::{len(failures)} task(s) below LLM reviewer threshold {threshold}')
              sys.exit(1)
          print(f'All {len(task_jsons)} task(s) passed llm_review >= {threshold}')
          PY

      # Hard gate: fail the job if fewer than PASS_RATE_THRESHOLD of tasks
      # passed deterministic criteria. Lets a small number of flakes /
      # known-broken tasks through without blocking every PR, while still
      # catching systemic regressions. Cancellation (120m timeout) is
      # always a fail since a truncated run has no meaningful rate.
      - name: Enforce pass-rate threshold (>= 95%)
        if: always()
        env:
          PASS_RATE_THRESHOLD: "0.95"
        run: |
          if [ "${{ steps.smoke.outcome }}" = "cancelled" ]; then
            echo "::error::Smoke step cancelled (timeout) — failing without rate check"
            exit 1
          fi
          python - <<'PY'
          import json, os, pathlib, sys
          threshold = float(os.environ['PASS_RATE_THRESHOLD'])
          tasks = sorted(pathlib.Path('/tmp/runs').rglob('task.json'))
          results = [json.loads(p.read_text(encoding='utf-8')) for p in tasks]
          passed = sum(1 for d in results if d.get('final_status') == 'SUCCESS')
          n = len(results)
          if n == 0:
              print('No smoke-tagged tasks matched — skipping rate check')
              sys.exit(0)
          rate = passed / n
          for d in results:
              s = d.get('final_status')
              if s != 'SUCCESS':
                  print(f"::warning::{d.get('task_id')}: status={s}")
          print(f'Pass rate: {rate:.1%} ({passed}/{n})')
          if rate < threshold:
              print(f'::error::Pass rate {rate:.1%} < threshold {threshold:.0%}')
              sys.exit(1)
          PY
