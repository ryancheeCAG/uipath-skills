# skip:true, tenant-gated. CONFIRMED available in API Workflow (2026-06-15).
# Covers all 9 execution/results activities. skip:true: agent-reliability-gated (multi-activity build + run flakes
# on turns/rate-limits). The codereval TM connection now exists.
task_id: skill-api-workflow-testmanager-execution-results
description: >
  Coverage (API Workflow connector): agent authors an API Workflow using every
  UiPath Test Manager connector activity for executions and results — Get / Delete
  Test Execution, Get Test Case Logs of Test Execution, Get Test Case Log, Get
  Robot Logs, Get Assertions, Download Assertion, Get Test Steps, Get Test Step
  Logs. Drives registry resolve → connection ping → stub per activity → validate.
tags: [uipath-api-workflow, e2e, mode:build, lifecycle:generate, connector]
skip: true

run_limits:
  task_timeout: 3000
  max_turns: 60
  turn_timeout: 1200

initial_prompt: |
  Build a UiPath API Workflow — in a project named `TMExecResults` (its workflow file will be `TMExecResults/Workflow.json`) — that uses the UiPath Test Manager Integration Service connector to exercise the full operation set — perform each of these:

  - Get a test execution
  - Delete a test execution
  - Get the test case logs of a test execution
  - Get a test case log
  - Get robot logs
  - Get assertions
  - Download an assertion
  - Get test steps
  - Get test step logs

  The task is not complete until validation passed for the workflow.

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.

success_criteria:
  - type: command_executed
    description: "Agent loaded the uipath-api-workflow skill"
    tool_name: "Skill"
    command_pattern: "uipath-api-workflow"
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Discovered connector activities via the registry"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+registry\s+resolve\s'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed or pinged the testmanager connection"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+is\s+connections\s+(list[\s\S]{0,200}?uipath-uipath-testmanager|ping)'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Stubbed each execution/results activity (9) with a real connection id"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+registry\s+stub[\s\S]+?--connection-id'
    min_count: 9
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Validated the workflow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "A Workflow.json exists inside a project folder (not a bare root file)"
    command: 'WF=$(find . -name Workflow.json -not -path "./Workflow.json" -not -path "*/node_modules/*" | head -1); test -n "$WF"'
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Workflow uses the testmanager IntSvc connector"
    command: 'WF=$(find . -name Workflow.json -not -path "./Workflow.json" -not -path "*/node_modules/*" | head -1); grep -q "uipath-uipath-testmanager" "$WF" && grep -q "UiPath.IntSvc" "$WF" && ! grep -q "<REPLACE_WITH_" "$WF"'
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
