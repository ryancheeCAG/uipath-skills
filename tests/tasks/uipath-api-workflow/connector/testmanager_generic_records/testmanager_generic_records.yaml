# skip:true, tenant-gated. CONFIRMED available in API Workflow (2026-06-15).
# Covers the 5 generic record activities (Insert/Get/Update/Delete/List Record).
# skip:true: agent-reliability-gated (multi-activity build + run flakes on turns/rate-limits). The codereval TM connection now exists.
task_id: skill-api-workflow-testmanager-generic-records
description: >
  Coverage (API Workflow connector): agent authors an API Workflow using the
  UiPath Test Manager connector's generic record activities — Insert Record, Get
  Record, Update Record, Delete Record, List Records. Drives registry resolve →
  connection ping → stub per activity → validate for `uipath-uipath-testmanager`.
tags: [uipath-api-workflow, e2e, mode:build, lifecycle:generate, connector]
skip: true

run_limits:
  task_timeout: 2400
  max_turns: 60
  turn_timeout: 1200

initial_prompt: |
  Build a UiPath API Workflow — in a project named `TMRecords` (its workflow file will be `TMRecords/Workflow.json`) — that uses the UiPath Test Manager Integration Service connector to exercise the full operation set — perform each of these:

  - Insert a record
  - Get a record
  - Update a record
  - Delete a record
  - List records

  The task is not complete until validation passed for the workflow.

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.

success_criteria:
  - type: command_executed
    description: "Agent loaded the uipath-api-workflow skill"
    tool_name: "Skill"
    command_pattern: "uipath-api-workflow"
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Discovered connector activities via the registry"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+registry\s+resolve\s'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed or pinged the testmanager connection"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+is\s+connections\s+(list[\s\S]{0,200}?uipath-uipath-testmanager|ping)'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Stubbed each generic record activity (5) with a real connection id"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+registry\s+stub[\s\S]+?--connection-id'
    min_count: 5
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Validated the workflow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+api-workflow\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "A Workflow.json exists inside a project folder (not a bare root file)"
    command: 'WF=$(find . -name Workflow.json -not -path "./Workflow.json" -not -path "*/node_modules/*" | head -1); test -n "$WF"'
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Workflow uses the testmanager IntSvc connector"
    command: 'WF=$(find . -name Workflow.json -not -path "./Workflow.json" -not -path "*/node_modules/*" | head -1); grep -q "uipath-uipath-testmanager" "$WF" && grep -q "UiPath.IntSvc" "$WF" && ! grep -q "<REPLACE_WITH_" "$WF"'
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
