task_id: skill-test-read-testcase-detail
description: >
  P&E GA-validation scenario 2.2 (test cases read).
  Read a HEALTH test case's detail/steps. Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, smoke, mode:operate, lifecycle:discover, feature:testcases-get]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  Pick a test case from the HEALTH project in Test Manager and talk me through what it actually does, step by step, and what each step is supposed to produce.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Read a HEALTH test case's detail/steps"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH)(?=.*--output\s+json)uip\s+tm\s+testcases\s+(?:get|list-steps|list-result-history)\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
