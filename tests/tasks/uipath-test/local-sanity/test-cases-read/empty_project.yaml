task_id: skill-test-empty-project
description: >
  P&E GA-validation scenario 2.5 (test cases read).
  Listed a likely-empty project (graceful empty-state). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, integration, mode:operate, lifecycle:discover, feature:testcases-list]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  Can you check what test cases are sitting in the HEALTH-SANDBOX project in Test Manager right now?

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed a likely-empty project (graceful empty-state)"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH-SANDBOX)(?=.*--output\s+json)uip\s+tm\s+(?:testcases\s+list|project\s+list)\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
