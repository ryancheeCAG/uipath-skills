task_id: skill-test-integration-unavailable
description: >
  P&E GA-validation scenario 13.3 (jira integration).
  Pulled the Jira-origin requirements in HEALTH; if the integration is unavailable the call degrades gracefully (requirements list --changed-since). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, integration, mode:operate, lifecycle:setup, feature:requirements-list]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  In Test Manager, pull up the Jira-linked requirements in the HEALTH project that changed lately. Heads up, the Jira connection has been flaky, so let me know if it can't reach them.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Pulled Jira-origin requirements; degrades gracefully if unavailable (requirements list --changed-since)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--output\s+json)uip\s+tm\s+requirements\s+list\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
