task_id: skill-test-insufficient-permissions
description: >
  P&E GA-validation scenario 14.3 (authentication and permissions).
  Write attempt by a read-only user (403, no partial write); create a test case in HEALTH. Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, integration, mode:operate, lifecycle:setup, feature:testcases-create]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  Add a new test case to the HEALTH project in Test Manager for me. I think I've only got read access on this one, so if you can't, just tell me straight.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Write attempt by a read-only user (403, no partial write); create a test case in HEALTH"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH)(?=.*--output\s+json)uip\s+tm\s+testcases\s+create\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
