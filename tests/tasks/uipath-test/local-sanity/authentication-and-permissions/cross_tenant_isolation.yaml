task_id: skill-test-cross-tenant-isolation
description: >
  P&E GA-validation scenario 14.4 (authentication and permissions).
  Cross-tenant read denied (403/404; no data leak). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, integration, mode:operate, lifecycle:discover, feature:testcases-list]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  In Test Manager, pull up the test cases in the EXTERNAL-999 project. That project lives in another tenant, so I shouldn't have any visibility into it. Let me know if you actually can't reach it.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Cross-tenant read denied (403/404; no data leak)"
    tool_name: "Bash"
    command_pattern: '(?=.*EXTERNAL-999)(?=.*--output\s+json)uip\s+tm\s+(?:testcases?\s+list|project)\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
