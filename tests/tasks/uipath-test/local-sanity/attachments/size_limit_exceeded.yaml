task_id: skill-test-size-limit-exceeded
description: >
  P&E GA-validation scenario 9.3 (attachments).
  Oversize upload rejected cleanly (413). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, integration, mode:operate, lifecycle:setup, feature:attachment-upload]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  In Test Manager, create a ~500MB file and try to attach it to the latest
  HEALTH project execution result. It's over the attachment size limit, so it
  should get rejected — tell me if it does.


success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Oversize upload rejected cleanly (413)"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH)(?=.*--output\s+json)uip\s+tm\s+attachment\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
