task_id: skill-test-create-testset
description: >
  P&E GA-validation scenario 5.2 (test sets).
  Created a HEALTH test set (testsets create --name). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, integration, mode:operate, lifecycle:setup, feature:testsets-create]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  I want a new 'PE Regression' test set in the HEALTH project in Test Manager. Put a couple of the existing cases in there to start.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Created a HEALTH test set (testsets create --name)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--name)(?=.*--output\s+json)uip\s+tm\s+testsets\s+create\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
