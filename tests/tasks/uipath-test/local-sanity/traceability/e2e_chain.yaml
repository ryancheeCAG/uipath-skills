task_id: skill-test-e2e-chain
description: >
  P&E GA-validation scenario 11.1 (traceability).
  Walked requirement -> case -> execution chain from a HEALTH requirement. Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, integration, mode:diagnose, lifecycle:discover, feature:traceability]

skip: true

run_limits:
  expected_turns: 16
  max_turns: 50

initial_prompt: |
  In Test Manager, pick a requirement from the HEALTH project and walk me through the full trace: the test cases that cover it, how
  those cases did on their last run, and whether any of them are tagged as open defects.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Walked requirement -> case -> execution chain from a HEALTH requirement"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH)(?=.*--output\s+json)uip\s+tm\s+requirements?\s+(?:get|list)\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
