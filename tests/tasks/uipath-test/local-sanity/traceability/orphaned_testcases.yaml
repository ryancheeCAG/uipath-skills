task_id: skill-test-orphaned-testcases
description: >
  P&E GA-validation scenario 11.3 (traceability).
  Found orphaned (unlinked) HEALTH test cases. Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, gating:must-pass, mode:diagnose, feature:traceability]

skip: true

run_limits:
  expected_turns: 16
  max_turns: 50

initial_prompt: |
  We probably have some orphaned tests in the HEALTH project in Test Manager. Can you figure out which test cases aren't tied
  to a single requirement? Compare what each requirement links against the full case list.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Found orphaned (unlinked) HEALTH test cases"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--output\s+json)uip\s+tm\s+testcases?\s+list\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
