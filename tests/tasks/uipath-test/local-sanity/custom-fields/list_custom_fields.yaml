task_id: skill-test-list-custom-fields
description: >
  P&E GA-validation scenario 10.1 (custom fields).
  Listed HEALTH custom-field definitions (customfield list). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, smoke, mode:operate, lifecycle:discover, feature:customfield-list]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  New on this team. In Test Manager, which custom fields does the HEALTH project have configured?

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed HEALTH custom-field definitions (customfield list)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--output\s+json)uip\s+tm\s+customfield\s+list\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
