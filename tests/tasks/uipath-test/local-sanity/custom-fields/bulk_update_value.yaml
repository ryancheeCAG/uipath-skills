task_id: skill-test-bulk-update-value
description: >
  P&E GA-validation scenario 10.5 (custom fields).
  Bulk-updated a custom field across HEALTH cases. Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, gating:must-pass, mode:operate, feature:customfield-value-update]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  Sprint-12 wrapped up. In Test Manager, roll all those cases in the HEALTH project forward to Sprint-13.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Bulk-updated a custom field across HEALTH cases (customfield value update)"
    tool_name: "Bash"
    command_pattern: '(?=.*--object-type\s+TestCase)(?=.*--name)(?=.*--value)(?=.*--output\s+json)uip\s+tm\s+customfield\s+value\s+(?:update|create)\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
