task_id: skill-test-read-coverage
description: >
  P&E GA-validation scenario 4.2 (requirements).
  Read coverage for a HEALTH requirement (requirements get/list). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, smoke, mode:operate, lifecycle:discover, feature:requirements-list]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  In Test Manager, grab any requirement from the HEALTH project and tell me which test cases are covering it.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Read coverage for a HEALTH requirement (requirements get/list)"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH)(?=.*--output\s+json)uip\s+tm\s+requirements?\s+(?:get|list)\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
