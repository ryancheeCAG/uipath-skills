task_id: skill-test-integration-tester-uat-blocker-analysis
description: >
  Integration test: agent analyzes blocked / failed UAT executions and
  classifies them by the failure-cause keywords surfaced in testcase
  step logs. Agent summarises non-passing test cases, groups them by
  business process, and identifies which areas are at risk. Asserts
  agent (a) checks auth, (b) discovers CLAIM project, (c) lists test
  sets and test cases, (d) lists blocked / failed executions, (e)
  classifies failure causes from step-log content, (f) generates UAT
  blocker report. The `uip tm` CLI has no defect surface today, so
  failure-cause classification is driven from log content (auth,
  payout-API, validation), not from a defect-tracker integration.
tags: [uipath-test, integration, mode:diagnose, lifecycle:validate, feature:test-case]

# Project Reference
# Use CLAIM project (Claims Processing) for this test.
# Fixture: 10 test cases; 2 test sets (UAT Smoke, UAT Full);
# 3 test cases in Blocked / Failed / Restricted state with step-log
# content mentioning failure-cause keywords (auth, payout-API,
# validation); 2-3 executions per suite.

agent:
  type: claude-code

run_limits:
  max_turns: 60

sandbox:
  python: {}
  node:
    env_packages:
      - "@uipath/test-manager-tool"

initial_prompt: |
  Before starting, load the uipath-test skill and follow its workflow.

  **Project Context: CLAIM (Claims Processing)** — use this specific
  project for all queries.

  I'm a UAT tester for our insurance claims platform. We're in the final
  UAT week before the Q2 release of the claims-processing module, and
  I have 4 testers under me running parallel tracks. The release covers
  three core business processes: **claim submission**, **claim approval
  routing**, and **claim payout**.

  My problem: too many of our UAT test cases are in non-passing terminal
  states (Failed, Blocked, Restricted) and I need to triage them from
  Test Manager directly, since `uip tm` doesn't have a defect-tracker
  surface. I want one consolidated escalation report instead of clicking
  through every testcase log.

  Please query the **CLAIM** project in Test Manager and:

  - Discover the project and enumerate its test sets (`UAT Smoke Suite`
    and `UAT Full Suite`)
  - Pull the latest execution for each test set and inspect every
    testcase log
  - List every test case currently in a non-passing terminal state
    (Failed, Blocked, or Restricted) with its scenario name
  - For each non-passing test case, classify the failure cause from
    the step-log content. If logs mention "auth", "payout API", or
    "validation", surface that as the cause category.
  - Group findings by business process — claim submission, claim
    approval routing, claim payout — and call out which process has
    the most exposure today
  - Recommend whether each business area is **Go**, **At Risk**, or
    **No-Go** for the release given current non-passing test cases

  Save the escalation report as `uat-blocker-report.md` in the current
  working directory.

success_criteria:
  - type: command_executed
    description: "Agent checked login status with `--output json` (Critical Rule #1 + #2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent discovered Claims Processing project (`project list --filter` + `--output json`)"
    tool_name: "Bash"
    command_pattern: '(?i)uip\s+tm\s+project\s+list\s+.*--filter\s+\S*claim.*--output\s+json|uip\s+tm\s+project\s+list\s+.*--output\s+json.*--filter\s+\S*claim'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed test sets in the project to discover the UAT suites (`testsets list --project-key` + `--output json`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+testsets\s+list\s+.*--project-key.*--output\s+json|uip\s+tm\s+testsets\s+list\s+.*--output\s+json.*--project-key'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed test cases (`testcases list --project-key` + `--output json`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+testcases\s+list\s+.*--project-key.*--output\s+json|uip\s+tm\s+testcases\s+list\s+.*--output\s+json.*--project-key'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent retrieved execution history (`executions list --project-key` + `--output json`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+executions\s+list\s+.*--project-key.*--output\s+json|uip\s+tm\s+executions\s+list\s+.*--output\s+json.*--project-key'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed test case logs from executions (`executions testcaselogs list --execution-id --project-key` + `--output json` — all three flags required)"
    tool_name: "Bash"
    command_pattern: '(?=.*--execution-id)(?=.*--project-key)(?=.*--output\s+json)uip\s+tm\s+executions\s+testcaselogs\s+list\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "UAT blocker report cites real fixture data (CLAIM:N test case keys, UUIDs from API responses) AND classifies non-passing tests by step-log failure-cause keyword AND assesses business-process risk"
    command: |
      python3 -c "
      import re, sys
      try:
          body = open('uat-blocker-report.md', encoding='utf-8', errors='replace').read()
      except FileNotFoundError:
          sys.stderr.write('uat-blocker-report.md not found' + chr(10))
          sys.exit(2)
      lower = body.lower()
      checks = {
          'non-passing terminal state mentioned': any(t in lower for t in ['blocked', 'block', 'blocker', 'fail', 'restricted']),
          'failure-cause keyword surfaced from step-log content': any(t in lower for t in ['auth', 'payout', 'validation', 'token', 'api']),
          'business-process risk framing': any(t in lower for t in ['claim', 'process', 'risk', 'impact', 'approval', 'payout', 'submission']),
          # Data-grounded signals — agent must have actually fetched fixture data,
          # not invented prose from the prompt alone.
          'cites at least one CLAIM:N test case or test set key': re.search(r'\\bCLAIM:\\d+\\b', body) is not None,
          'cites at least one UUID (execution / test case / test set id)': re.search(r'\\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\\b', body, re.IGNORECASE) is not None,
      }
      missing = [k for k, ok in checks.items() if not ok]
      if missing:
          sys.stderr.write('missing: ' + ', '.join(missing) + chr(10))
          sys.exit(1)
      sys.exit(0)
      "
    timeout: 5
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0
