task_id: skill-test-testcase-crud-smoke
description: >
  Smoke test: agent uses the uipath-test skill to drive a test case through
  its full lifecycle — create, discover its key by listing, rename, then
  delete. Self-seeding and deterministic: it creates its own test case with a
  fixed name in the HEALTH project, so it depends on no pre-existing data and
  cleans up after itself. Asserts auth-first ordering (`uip login status`),
  then the create → list → update → delete chain on `uip tm testcases`,
  validating the complete command (project key, the exact name, the
  `--test-case-key` discovered from `list`, and `--output json`) at each step.
  Covers the testcase create/update/delete verbs not exercised by the existing
  smoke suite (which only reads via list/run).
tags: [uipath-test, smoke, mode:operate, lifecycle:manage, feature:test-case]

run_limits:
  expected_turns: 16
  max_turns: 40

initial_prompt: |
  I'm in the HEALTH project in Test Manager. Can you create a test case
  called "Eval CRUD - PHI access check" with the description "Verifies PHI
  access is logged"? Once it's in, list the test cases so I can confirm its
  key, then rename it to "Eval CRUD - PHI access check (v2)". When that's
  done, delete it again — no point leaving test data lying around.

success_criteria:
  - type: command_executed
    description: "Agent checked login status (`uip login status --output json`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete create command: `uip tm testcases create --project-key HEALTH --name \"Eval CRUD - PHI access check\" --description ... --output json`"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--name\s+["\x27]?Eval CRUD - PHI access check)(?=.*--output\s+json)uip\s+tm\s+testcases?\s+create\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete list command used to discover the new key: `uip tm testcases list --project-key HEALTH ... --output json`"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--output\s+json)uip\s+tm\s+testcases?\s+list\s'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete rename command: `uip tm testcases update --project-key HEALTH --test-case-key <key> --name \"Eval CRUD - PHI access check (v2)\" --output json`"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--test-case-key\s+\S+)(?=.*--name\s+["\x27]?Eval CRUD - PHI access check \(v2\))(?=.*--output\s+json)uip\s+tm\s+testcases?\s+update\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete delete command: `uip tm testcases delete --project-key HEALTH --test-case-key <key> --output json`"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--test-case-key\s+\S+)(?=.*--output\s+json)uip\s+tm\s+testcases?\s+delete\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0
