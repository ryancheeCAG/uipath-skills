task_id: skill-test-integration-release-manager-billing-failures
description: >
  Integration test: agent investigates production duplicate-invoice
  failures and traces them back to QA/UAT testing phases. Agent analyzes
  billing-related executions across release cycles, identifies whether
  similar failures appeared earlier, correlates with linked defects,
  and identifies failures that were never tracked as defects.
  Asserts agent (a) checks auth, (b) discovers BILL project,
  (c) lists executions across release cycles, (d) analyzes failure
  patterns and defect correlation, (e) identifies untracked failures,
  (f) generates production-risk assessment.
tags: [uipath-test, integration, mode:diagnose, lifecycle:validate, feature:test-case, feature:compliance]

# Project Reference
# Use BILL project (Billing & Invoicing) for this test.
# Fixture: 12 test cases; 2 test sets (Billing Regression, Invoice Processing);
# 3 executions (QA pass, UAT with 2 failures, Production failure);
# 2 failures have linked defects, 1 failure untracked; recurring failure pattern
# across QA→UAT→Production showing escalation.

agent:
  type: claude-code
  max_turns: 50

sandbox:
  python: {}
  node:
    env_packages:
      - "@uipath/test-manager-tool"

initial_prompt: |
  Before starting, load the uipath-test skill and follow its workflow.

  **Project Context: BILL (Billing & Invoicing)** — use this specific
  project for all queries.

  I'm the release manager for the SaaS billing platform. Two hours ago
  three enterprise customers (Acme, Globex, Initech) opened P1 tickets
  reporting **duplicate invoices** generated by today's 02:00 UTC billing
  release. Customer Success is escalating; we have a war-room call in
  90 minutes and the exec team wants a decision: **proceed with the
  release, hotfix, or rollback?**

  Before that call, I need a clear forensic trail from Test Manager. The
  **BILL** project in Test Manager owns this product. Please:

  - Discover the BILL project and its two test sets:
    `Billing Regression Suite` (full-coverage suite that runs QA and UAT)
    and `Invoice Processing Suite` (the focused smoke suite)
  - Pull every execution from the last few release cycles and gather
    testcase logs so we can see actual results, not just summaries
  - For each execution, classify the result: Passed, Failed, Restricted
    (intentionally skipped), None (never ran)
  - Hunt for failures whose test-case name or step output mentions
    "duplicate invoice", "double-bill", or "idempotency". If a failure
    like that appeared in an earlier QA or UAT execution, that's the
    smoking gun.
  - For every failure found, check whether a defect was linked or whether
    it was silently ignored. **Untracked failures** in a billing system
    are the most damaging — call them out separately.
  - Produce a risk verdict with one of three recommendations:
    **Rollback now**, **Hotfix and continue**, or **Investigate before
    deciding** — and the evidence behind it.

  Save the assessment as `billing-production-risk-assessment.md` in the
  current working directory.

success_criteria:
  - type: command_executed
    description: "Agent checked login status with `--output json` (Critical Rule #1 + #2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent discovered Billing project (`project list --filter` + `--output json`)"
    tool_name: "Bash"
    command_pattern: '(?i)uip\s+tm\s+project\s+list\s+.*--filter\s+\S*bill.*--output\s+json|uip\s+tm\s+project\s+list\s+.*--output\s+json.*--filter\s+\S*bill'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed test sets (`testsets list --project-key` + `--output json`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+testsets\s+list\s+.*--project-key.*--output\s+json|uip\s+tm\s+testsets\s+list\s+.*--output\s+json.*--project-key'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent retrieved execution history (`executions list --project-key` + `--output json`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+executions\s+list\s+.*--project-key.*--output\s+json|uip\s+tm\s+executions\s+list\s+.*--output\s+json.*--project-key'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed test case logs across multiple executions (`executions testcaselogs list --execution-id --project-key` + `--output json` — all three flags required)"
    tool_name: "Bash"
    command_pattern: '(?=.*--execution-id)(?=.*--project-key)(?=.*--output\s+json)uip\s+tm\s+executions\s+testcaselogs\s+list\b'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Production-risk assessment report cites real fixture data (BILL:N test case keys, UUIDs from API responses) AND covers required sections (failure history, duplicate-invoice pattern, defect correlation, risk verdict)"
    command: |
      python3 -c "
      import re, sys
      try:
          body = open('billing-production-risk-assessment.md', encoding='utf-8', errors='replace').read()
      except FileNotFoundError:
          sys.stderr.write('billing-production-risk-assessment.md not found' + chr(10))
          sys.exit(2)
      lower = body.lower()
      checks = {
          'failure history (failure/failed/qa/uat/production/history keyword)': any(t in lower for t in ['failure', 'failed', 'qa', 'uat', 'production', 'history']),
          'duplicate-invoice / idempotency mention': any(t in lower for t in ['duplicate', 'recurring', 'pattern', 'repeated', 'invoice', 'idempoten']),
          'defect / tracked-vs-untracked analysis': any(t in lower for t in ['defect', 'tracked', 'linked', 'untracked', 'gap']),
          'risk verdict (rollback/hotfix/recommend/critical)': any(t in lower for t in ['risk', 'rollback', 'assessment', 'recommend', 'critical', 'hotfix']),
          # Data-grounded signals — the agent must have actually retrieved fixture data,
          # not just produced plausible prose from the prompt alone.
          'cites at least one BILL:N test case or test set key': re.search(r'\\bBILL:\\d+\\b', body) is not None,
          'cites at least one UUID (execution / test case / test set id)': re.search(r'\\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\\b', body, re.IGNORECASE) is not None,
      }
      missing = [k for k, ok in checks.items() if not ok]
      if missing:
          sys.stderr.write('missing: ' + ', '.join(missing) + chr(10))
          sys.exit(1)
      sys.exit(0)
      "
    timeout: 5
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
