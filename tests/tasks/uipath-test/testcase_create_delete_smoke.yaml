task_id: skill-test-testcase-create-delete-smoke
description: >
  Smoke test: agent uses the uipath-test skill to create a test case, discover
  its key by listing, then delete it. Self-seeding and deterministic — it
  creates its own test case with a fixed name in the HEALTH project, depends on
  no pre-existing data, and cleans up after itself. Asserts auth-first ordering
  (`uip login status`), then the create → list → delete chain on
  `uip tm testcases`, validating the complete command (project key, exact name,
  the `--test-case-key` discovered from `list`, and `--output json`) at each
  step. Covers the testcase create/delete verbs the existing smoke suite does
  not exercise (it only reads via list/run). The `testcases update` verb is
  intentionally excluded: it is broken in the current CLI
  (test-manager-tool v1.196.0-alpha — `testCasesApi.testCasesPatch is not a
  function`); update coverage is deferred until that bug is fixed.
tags: [uipath-test, smoke, mode:operate, lifecycle:manage, feature:test-case]

run_limits:
  expected_turns: 12
  max_turns: 40

initial_prompt: |
  I'm in the HEALTH project in Test Manager. Can you create a test case
  called "Eval CRD - PHI access check" with the description "Verifies PHI
  access is logged"? Once it's in, list the test cases so I can confirm its
  key. Then delete it again — no point leaving test data lying around.

success_criteria:
  - type: command_executed
    description: "Agent checked login status (`uip login status --output json`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete create command: `uip tm testcases create --project-key HEALTH --name \"Eval CRD - PHI access check\" --description ... --output json`"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--name\s+["\x27]?Eval CRD - PHI access check)(?=.*--output\s+json)uip\s+tm\s+testcases?\s+create\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete list command used to discover the new key: `uip tm testcases list --project-key HEALTH ... --output json`"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--output\s+json)uip\s+tm\s+testcases?\s+list\s'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete delete command: `uip tm testcases delete --project-key HEALTH --test-case-key <key> --output json`"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--test-case-key\s+\S+)(?=.*--output\s+json)uip\s+tm\s+testcases?\s+delete\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0
