task_id: skill-test-customfield-population-integration
description: >
  Integration test: agent uses the uipath-test skill to populate custom
  field *rows* on a specific, named test case after defining the fields.
  The distinction the skill must teach: top-level `customfield` manages
  definitions, while the nested `value` (Text) and `label` (Label)
  subgroups fill in per-object rows. The prompt references the target by
  its human-readable key and description (HEALTH:11 "PHI Masking - SSN in
  Patient Search Results") and the agent resolves it to an id live. It
  defines two TestCase-scoped fields, writes a Text value on HEALTH:11
  (create then update), tags HEALTH:11 with Label values, and reads the
  label rows back. Assertions validate the complete command shape with the
  exact field names and the case-sensitive `--object-type TestCase`.
  The "Eval Reviewer"/"Eval Risk" field definitions are deleted in `pre_run`
  (clean slate so the `customfield create` step always runs) and again in
  `post_run` (leaves no state), keeping the task deterministic on the shared
  HEALTH project across runs.
tags: [uipath-test, integration, mode:operate, lifecycle:manage, feature:customfield]

run_limits:
  expected_turns: 22
  max_turns: 55

# Delete the field definitions this task creates BEFORE the run so the agent
# always starts from a clean slate and must re-create them. Without this, a
# prior passing run leaves the fields behind, the agent (correctly) skips
# `customfield create`, and the create criterion fails (0/2). `|| true` keeps
# the run green when the fields are already absent.
pre_run:
  - command: |
      uip tm customfield delete --project-key HEALTH --name "Eval Reviewer" --object-type TestCase --yes --output json || true
      uip tm customfield delete --project-key HEALTH --name "Eval Risk" --object-type TestCase --yes --output json || true
    timeout: 60

initial_prompt: |
  I'm working in the HEALTH project in Test Manager. I'd like to add some
  governance metadata to the test case "PHI Masking - SSN in Patient
  Search Results" (HEALTH:11) — you'll need to find its id first.

  First, define two new custom field definitions on test cases (create
  each field definition): a free-text field called "Eval Reviewer" for who
  signed off, and a tag/label field called "Eval Risk" for risk flags.
  Both fields must exist before you fill anything in.

  Then, on that PHI Masking test case, set its Eval Reviewer value to
  "qa-team-lead" (create the value entry for that field on the test case),
  and tag it under Eval Risk with "high" and "regression". When that's
  done, show me the Eval Risk tags on it so I can confirm they stuck.

# Safety net: delete the field definitions again after the run so this task
# never leaves persistent state on the shared HEALTH project.
post_run:
  - command: |
      uip tm customfield delete --project-key HEALTH --name "Eval Reviewer" --object-type TestCase --yes --output json || true
      uip tm customfield delete --project-key HEALTH --name "Eval Risk" --object-type TestCase --yes --output json || true
    timeout: 60

success_criteria:
  - type: command_executed
    description: "Agent checked login status (`uip login status`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Resolved HEALTH:11's id (`uip tm testcases list --project-key HEALTH`)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)uip\s+tm\s+testcases?\s+list\s'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete create commands defining fields scoped TestCase: `uip tm customfield create --project-key HEALTH --name <name> --data-type <Text|Label> --object-type TestCase` (x2)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--object-type\s+TestCase)(?=.*--data-type\s+(Text|Label))uip\s+tm\s+customfield\s+create'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete value row command on the Text field: `uip tm customfield value (create|update) --project-key HEALTH --object-type TestCase ...`"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--object-type\s+TestCase)uip\s+tm\s+customfield\s+value\s+(create|update)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete label tag command — either form: `uip tm customfield label add --project-key HEALTH --object-type TestCase --custom-field-name \"Eval Risk\" --object-ids <uuid> --values high regression --output json`, or `label create ... --values '{\"Eval Risk\":[\"high\",\"regression\"]}'`"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--object-type\s+TestCase)(?=.*Eval Risk)(?=.*--values)uip\s+tm\s+customfield\s+label\s+(add|create)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Complete read-back command: `uip tm customfield label list --project-key HEALTH --object-type TestCase`"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--object-type\s+TestCase)uip\s+tm\s+customfield\s+label\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0
