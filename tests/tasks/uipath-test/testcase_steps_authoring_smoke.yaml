task_id: skill-test-testcase-steps-authoring-smoke
description: >
  Smoke test: a manual QA author drafts the by-hand steps for a test case using
  the new `uip tm testcases steps` command family (TMHUB-32134). The agent
  self-seeds a uniquely-named test case in the existing CLAIM project, adds two
  manual steps via flag mode (`steps add --description`; asserted with
  min_count 1 — see the criterion note on why a 2-count is non-deterministic),
  lists them back (`steps list --test-case-id`), and reads a single step by UUID
  (`steps get --step-id`), then deletes the seeded case (post_run safety net) so
  the shared tenant stays clean. The prompt carries no skill-load hint — skill
  activation, the `--test-case-id` vs `--step-id` flag shapes, and `--output
  json` are all left to the skill, not spelled out.
tags: [uipath-test, smoke, mode:operate, lifecycle:setup, feature:test-case]

run_limits:
  expected_turns: 14
  max_turns: 40
  # ~6 live TM calls (create case → 2 step adds → list → get → cleanup delete).
  # Under Test Manager latency a single turn can approach the smoke default
  # (900s); give headroom so the gate doesn't false-fail (task_timeout > turn).
  turn_timeout: 1200
  task_timeout: 1500

post_run:
  - command: |
      if [ -f testcase-key.txt ]; then
        KEY=$(tr -d '[:space:]' < testcase-key.txt)
        if [ -n "$KEY" ]; then
          uip tm testcases delete --project-key CLAIM --test-case-key "$KEY" --yes --output json || true
        fi
      fi
    timeout: 60

initial_prompt: |
  We're writing manual test cases for the Claims Processing work in Test Manager
  (project CLAIM) and I need one set up. Create a new manual test case — give it
  a clear, unique name so it doesn't clash with anything already there — and
  write two steps for it, added one at a time: the first is "Open the payments
  screen" and the tester should see the payments form; the second is "Submit a
  valid payment" and they should get the confirmation banner.

  Once both are in, list the steps back so I can sanity-check the order, and show
  me the full detail of that first step. Save the new test case's key to
  testcase-key.txt so we can find it, and when you're done delete the test case
  so we're not leaving junk in the tenant. Just run it through — no need to
  check in with me.

success_criteria:
  - type: command_executed
    description: "Agent checked login status with --output json (Critical Rule #1)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the seed test case (`testcases create --project-key CLAIM`)"
    tool_name: "Bash"
    command_pattern: '(?=[\s\S]*--project-key\s+\S)(?=[\s\S]*--output\s+json)uip\s+tm\s+testcases?\s+create\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # min_count is 1 (not 2) on purpose: the agent may legitimately add the two
  # steps as two flag-mode calls OR batch them into one `--step` call, so a
  # 2-count is non-deterministic across agent runs. Assert the verb works once.
  - type: command_executed
    description: "Agent added a manual step via flag mode (`steps add --test-case-id <UUID> --description`)"
    tool_name: "Bash"
    command_pattern: '(?=[\s\S]*--project-key\s+\S)(?=[\s\S]*--test-case-id\s+\S)(?=[\s\S]*--description\s+\S)(?=[\s\S]*--output\s+json)uip\s+tm\s+testcases?\s+steps\s+add\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed the steps with --test-case-id + --output json (`steps list`)"
    tool_name: "Bash"
    command_pattern: '(?=[\s\S]*--project-key\s+\S)(?=[\s\S]*--test-case-id\s+\S)(?=[\s\S]*--output\s+json)uip\s+tm\s+testcases?\s+(steps\s+list|list-steps)\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched a single step by UUID (`steps get --step-id <UUID>`)"
    tool_name: "Bash"
    command_pattern: '(?=[\s\S]*--project-key\s+\S)(?=[\s\S]*--step-id\s+\S)(?=[\s\S]*--output\s+json)uip\s+tm\s+testcases?\s+steps\s+get\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Cleanup is graded: the agent must delete the seeded case itself (not rely on
  # the post_run safety net), so a passing run never leaves junk in the shared
  # CLAIM tenant. Delete is project-scoped, needs --yes (Critical Rule #6) and
  # --output json (Critical Rule #3).
  - type: command_executed
    description: "Agent deleted the seeded test case for cleanup (`testcases delete --test-case-key ... --yes --output json`)"
    tool_name: "Bash"
    command_pattern: '(?=[\s\S]*--project-key\s+\S)(?=[\s\S]*--test-case-key\s+\S)(?=[\s\S]*(--yes|-y)\b)(?=[\s\S]*--output\s+json)uip\s+tm\s+testcases?\s+delete\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
