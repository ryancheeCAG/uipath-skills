task_id: skill-test-pe-4-4-jira-sync-changed
description: >
  P&E GA-validation scenario 4.4 (requirements).
  Listed Jira-synced HEALTH requirements changed in a window (--changed-since). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, pe-validation, gating:must-pass, mode:operate, feature:requirement]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  In Test Manager, our HEALTH project requirements that originate from Jira carry an external reference back to the ticket.
  I need to see which of those Jira-linked ones have been touched in the past week.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed Jira-synced HEALTH requirements changed in a window (--changed-since)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--output\s+json)uip\s+tm\s+requirements?\s+list\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
