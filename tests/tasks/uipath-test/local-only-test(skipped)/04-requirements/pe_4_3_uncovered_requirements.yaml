task_id: skill-test-pe-4-3-uncovered-requirements
description: >
  P&E GA-validation scenario 4.3 (requirements).
  Identified uncovered HEALTH requirements. Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, pe-validation, gating:must-pass, mode:operate, feature:requirement]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  I want to find gaps in the HEALTH project in Test Manager. Are there any requirements that don't have a single test case against them?

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Identified uncovered HEALTH requirements"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--output\s+json)uip\s+tm\s+requirements?\s+list\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
