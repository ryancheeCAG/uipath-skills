task_id: skill-test-pe-15-3-rate-limit-backoff
description: >
  P&E GA-validation scenario 15.3 (cli skill invocation and error handling).
  Bulk op handles 429 with backoff (no data loss). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, pe-validation, gating:edge-case, mode:operate, feature:cli]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  We've got a pile of old test cases in the HEALTH project in Test Manager I want tagged 'archived'. It's a big batch, so don't choke if the API starts throttling. Ping me once everything's tagged.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Bulk op handles 429 with backoff (no data loss)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--output\s+json)uip\s+tm\s+(?:objectlabel\s+add|testcases?\s+list)\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
