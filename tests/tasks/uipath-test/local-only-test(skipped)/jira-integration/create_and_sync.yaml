task_id: skill-test-create-and-sync
description: >
  P&E GA-validation scenario 13.1 (jira integration).
  Flagged the failing HEALTH case as a bug (objectlabel add) and surfaced the Jira-origin requirements it ties to. Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, gating:must-pass, mode:operate, feature:objectlabel-add, feature:requirements-list]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  In Test Manager, flag the failing PDF case in the HEALTH project as a bug, and remind me which Jira-tracked requirements it's tied to.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Flagged the failing HEALTH case as a bug (objectlabel add)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--object-type\s+TestCase)(?=.*--labels)(?=.*(?i:defect|bug))(?=.*--output\s+json)uip\s+tm\s+objectlabel\s+add\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Surfaced the Jira-origin requirements (requirements list --changed-since)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--output\s+json)uip\s+tm\s+requirements\s+list\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
