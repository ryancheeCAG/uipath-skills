task_id: skill-test-pe-14-2-expired-token
description: >
  P&E GA-validation scenario 14.2 (authentication and permissions).
  Detected expired session via login status (prompts re-auth). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, pe-validation, gating:edge-case, mode:operate, feature:auth]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  Before I dig into Test Manager, can you make sure my session's still good? If it's timed out, nudge me to log in again.

success_criteria:
  - type: command_executed
    description: "Detected expired session via login status (prompts re-auth)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
