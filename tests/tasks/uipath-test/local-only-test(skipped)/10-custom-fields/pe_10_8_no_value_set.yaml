task_id: skill-test-pe-10-8-no-value-set
description: >
  P&E GA-validation scenario 10.8 (custom fields).
  Handled an unset custom field gracefully (null). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, pe-validation, gating:edge-case, mode:operate, feature:customfield]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  In Test Manager, check the Deployment Version on a case in the HEALTH project that hasn't been through a release yet. What does it come back as?

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Handled an unset custom field gracefully (null)"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH)(?=.*--output\s+json)uip\s+tm\s+testcases?\s+(?:get|list)\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
