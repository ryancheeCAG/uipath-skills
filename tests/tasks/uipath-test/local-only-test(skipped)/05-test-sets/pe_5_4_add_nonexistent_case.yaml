task_id: skill-test-pe-5-4-add-nonexistent-case
description: >
  P&E GA-validation scenario 5.4 (test sets).
  Attempted to add a non-existent case (404, no partial update). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, pe-validation, gating:edge-case, mode:operate, feature:test-set]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  In Test Manager, add case TC-DOESNOTEXIST-9999 to the 'PE Regression' set in the HEALTH project.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Attempted to add a non-existent case (testcases add --test-set-key; 404, no partial update)"
    tool_name: "Bash"
    command_pattern: '(?=.*TC-DOESNOTEXIST-9999)(?=.*--test-set-key)(?=.*--output\s+json)uip\s+tm\s+testcases\s+add\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
