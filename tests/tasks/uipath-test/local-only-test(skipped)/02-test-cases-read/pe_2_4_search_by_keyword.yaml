task_id: skill-test-pe-2-4-search-by-keyword
description: >
  P&E GA-validation scenario 2.4 (test cases read).
  Searched HEALTH test cases by keyword (--filter). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, pe-validation, gating:must-pass, mode:operate, feature:test-case]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  We've been reworking the login flow and I want to make sure the tests still cover it. Are there any test cases in the HEALTH project in Test Manager that deal with login?

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Searched HEALTH test cases by keyword (--filter)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--filter)(?=.*--output\s+json)uip\s+tm\s+testcases\s+list\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
