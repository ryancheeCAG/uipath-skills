task_id: skill-test-list-testsets
description: >
  P&E GA-validation scenario 5.1 (test sets).
  Listed HEALTH test sets (testsets list --project-key HEALTH). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, gating:must-pass, mode:operate, feature:testsets-list]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  Need the test sets in the HEALTH project in Test Manager.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed HEALTH test sets (testsets list --project-key HEALTH)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--output\s+json)uip\s+tm\s+testsets\s+list\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
