task_id: skill-test-pe-1-3-invalid-project-id
description: >
  P&E GA-validation scenario 1.3 (project and configuration).
  Attempted an unknown project key (clean 404). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, pe-validation, gating:edge-case, mode:operate, feature:project]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  Open up the project HEALTH-NOPE-999 in Test Manager and show me its details.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Attempted an unknown project key (clean 404)"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH-NOPE-999)(?=.*--output\s+json)uip\s+tm\s+project\s+(?:get|list)\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
