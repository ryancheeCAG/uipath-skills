task_id: skill-test-pe-6-2-monitor-status
description: >
  P&E GA-validation scenario 6.2 (test execution).
  Read live execution status (executions get-stats/list). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, pe-validation, gating:must-pass, mode:operate, feature:execution]

skip: true

run_limits:
  expected_turns: 16
  max_turns: 50

initial_prompt: |
  How's the 'Healthcare Compliance Suite - 20260513.2035' run in the HEALTH project in Test Manager doing? Where's it at?

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Read live execution status (executions get-stats/list)"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH)(?=.*--output\s+json)uip\s+tm\s+executions\s+(?:get-stats|list)\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
