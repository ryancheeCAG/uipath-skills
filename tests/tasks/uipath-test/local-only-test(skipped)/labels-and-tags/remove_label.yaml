task_id: skill-test-remove-label
description: >
  P&E GA-validation scenario 8.3 (labels and tags).
  Removed the flaky label in HEALTH (objectlabel remove). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, gating:must-pass, mode:operate, feature:objectlabel-remove]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  Good news, that case in the HEALTH project is stable again. Drop the 'flaky' tag off it in Test Manager.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Removed the flaky label in HEALTH (objectlabel remove)"
    tool_name: "Bash"
    command_pattern: '(?=.*--project-key\s+HEALTH)(?=.*--object-type\s+TestCase)(?=.*--labels)(?=.*--output\s+json)uip\s+tm\s+objectlabel\s+remove\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
