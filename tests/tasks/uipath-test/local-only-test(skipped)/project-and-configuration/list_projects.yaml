task_id: skill-test-list-projects
description: >
  P&E GA-validation scenario 1.1 (project and configuration).
  Listed projects (project list + --output json). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, gating:must-pass, mode:operate, feature:project-list]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  What projects can I get to in Test Manager?

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Listed projects (project list + --output json)"
    tool_name: "Bash"
    command_pattern: '(?=.*--output\s+json)uip\s+tm\s+project\s+list\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
