task_id: skill-test-pe-12-2-robot-fallback
description: >
  P&E GA-validation scenario 12.2 (orchestrator integration).
  Ran the HEALTH suite, picking an available robot for fallback (uip tm executions run). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, pe-validation, gating:must-pass, mode:operate, feature:orchestrator]

skip: true

run_limits:
  expected_turns: 16
  max_turns: 50

initial_prompt: |
  In Test Manager, kick off an automated run of a HEALTH project test set on
  the serverless robot. If that one's busy, just grab whatever robot's free and
  tell me which you ended up using.


success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Ran the HEALTH suite, picking an available robot for fallback (uip tm executions run)"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH)(?=.*--output\s+json)uip\s+tm\s+(?:executions\s+run|testsets?\s+run|testcases?\s+run)\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
