task_id: skill-test-attach-screenshot-to-defect
description: >
  P&E GA-validation scenario 9.2 (attachments).
  Uploaded a screenshot attachment in HEALTH (uip tm attachment). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, gating:must-pass, mode:operate, feature:attachment-upload]

skip: true

run_limits:
  expected_turns: 10
  max_turns: 35

initial_prompt: |
  In Test Manager, I've got a screenshot of the PDF export bug. Make a small
  placeholder image file and attach it to the failing PDF test case in the
  HEALTH project so there's proof on the ticket.


success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Uploaded a screenshot attachment in HEALTH (uip tm attachment)"
    tool_name: "Bash"
    command_pattern: '(?=.*HEALTH)(?=.*--output\s+json)uip\s+tm\s+attachment\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

sandbox:
  driver: tempdir
