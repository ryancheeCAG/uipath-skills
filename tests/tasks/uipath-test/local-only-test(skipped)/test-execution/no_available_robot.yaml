task_id: skill-test-no-available-robot
description: >
  P&E GA-validation scenario 6.7 (test execution).
  No robot available (no ghost job; clear error). Runs against the live HEALTH project. Maps to the Confluence
  P&E Evaluation Scenarios matrix.
tags: [uipath-test, gating:edge-case, mode:operate, feature:testsets-run]

skip: true

run_limits:
  expected_turns: 16
  max_turns: 50

initial_prompt: |
  In Test Manager, run 'PE Regression' in the HEALTH project on the staging robot. I haven't checked if anything's actually online though.

success_criteria:
  - type: command_executed
    description: "Checked login status (uip login status --output json)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Checked for an available robot/machine before running (or machines/sessions list)"
    tool_name: "Bash"
    command_pattern: 'uip\s+(?:or|orchestrator)\s+(?:machines|sessions)\s+list\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

sandbox:
  driver: tempdir
