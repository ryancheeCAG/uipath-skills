task_id: skill-test-testset-hierarchy-discovery
description: >
  Smoke test: agent uses the uipath-test skill to traverse the Test Manager
  discovery chain — project → testset → testcases. Asserts the correct
  `uip tm` list commands for project (with `--output json`), testset list
  (with `--project-key` + `--output json`), and testset list-testcases
  (with `--test-set-key` + `--output json`). The prompt steers the agent
  toward a project that has test sets, so the chain runs against
  non-empty data without prescribing how to search. The skill — not the
  prompt — must teach the chain commands and the `--output json` flag.
tags: [uipath-test, smoke, mode:operate, lifecycle:discover, feature:test-case]

agent:
  type: claude-code

run_limits:
  max_turns: 30

sandbox:
  driver: docker
  python: {}
  node:
    env_packages:
      - "@uipath/test-manager-tool"

initial_prompt: |
  Before starting, load the uipath-test skill and follow its workflow.

  Walk me through the structure of one of my UiPath Test Manager projects.
  Find a project that actually has test sets, list its test sets, and for
  the first test set show me the test cases inside.

success_criteria:
  - type: command_executed
    description: "Agent looked up Test Manager projects with `--output json` (Critical Rule #2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+project\s+list.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed test sets scoped to a project (`testsets list --project-key` + `--output json`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+testsets\s+list\s+.*--project-key.*--output\s+json|uip\s+tm\s+testsets\s+list\s+.*--output\s+json.*--project-key'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed test cases in a test set (`testsets list-testcases --test-set-key` + `--output json`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tm\s+testsets\s+list-testcases\s+.*--test-set-key.*--output\s+json|uip\s+tm\s+testsets\s+list-testcases\s+.*--output\s+json.*--test-set-key'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Project list returns a non-empty Data array (validates the tenant actually has projects, not just that the agent ran the command)"
    command: |
      uip tm project list --output json | python3 -c "
      import json, sys
      d = json.load(sys.stdin)
      assert d.get('Result') == 'Success', f'expected Success, got {d.get(\"Result\")}'
      data = d.get('Data', [])
      assert isinstance(data, list) and len(data) > 0, f'expected non-empty list, got {data!r}'
      "
    timeout: 30
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0
