task_id: skill-ixp-create-project-suggest-taxonomy-smoke
description: >
  Smoke: agent creates a project and lets IXP auto-suggest the taxonomy from
  the documents. Trap: don't pass --skip-taxonomy or hand-author/import a
  taxonomy — IXP suggests it.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 5

sandbox:
  driver: tempdir
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  Create an IXP project named ap-invoices from the invoices in ./invoices/,
  and let IXP suggest the taxonomy.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant in
    this environment. Commands will fail with auth errors — that is expected.
    Run each command once and move on. Do NOT retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent created ap-invoices via `projects create` from ./invoices/"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+projects\s+create\b(?=.*ap-invoices).*'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  # Autopilot path: let IXP suggest the taxonomy. --skip-taxonomy or a manual
  # import would defeat the test.
  - type: command_not_executed
    description: "Agent did NOT skip or hand-import the taxonomy (autopilot suggests it)"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+projects\s+(create\b.*--skip-taxonomy|import-taxonomy)\b'
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
