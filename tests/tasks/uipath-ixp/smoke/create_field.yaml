task_id: skill-ixp-create-field-smoke
description: >
  Smoke: agent adds a single field to an existing group.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 5

sandbox:
  driver: tempdir
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  In the IXP project my_invoices-f1afa9ef-ixp, add a new field named "email"
  to the "Subscriber information" group.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant in
    this environment. Commands will fail with auth errors — that is expected.
    Run each command once and move on. Do NOT retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent added field \"email\" to \"Subscriber information\" via `fields add`"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+fields\s+add\b(?=.*my_invoices-f1afa9ef-ixp)(?=.*--group\s+["'']?Subscriber information)(?=.*--field\s+["'']?email).*'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
