task_id: skill-ixp-update-prompts-heredoc-smoke
description: >
  Smoke: agent improves a per-field instruction by writing the
  JSON to `/tmp/ixp/<project-name>/prompts/` via heredoc (Rule 4
  working dir), then passing it via `"$(cat <file>)"` to
  `fields update-prompts --updates` (Rule 5). Anti-pattern:
  inlining the JSON on the command line — breaks shell quoting
  on non-trivial payloads.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, lifecycle:edit]

run_limits:
  expected_turns: 8

initial_prompt: |
  The InvoiceNumber field on IXP project `my_invoices-f1afa9ef-ixp` is
  scoring poorly. Validation shows the model is confusing the Purchase
  Order (PO) number with the Invoice Number. Update the field instruction
  to clarify:

    "Extract the unique invoice identifier from the document header.
    Do NOT use the Purchase Order (PO) number, even if it is the most
    visually prominent number on the page."

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant
    in this environment. Commands will fail with auth errors — that is
    expected. Run each command once and move on. Do NOT retry or attempt
    to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent wrote the --updates payload to a file under /tmp/ixp/<project>/prompts/ via heredoc"
    tool_name: "Bash"
    command_pattern: 'cat\s*>\s*/tmp/ixp/my_invoices-f1afa9ef-ixp/prompts/[^\s]+\.json\s*<<\s*[''"]?[A-Z][A-Z0-9_]*[''"]?'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent invoked `uip ixp fields update-prompts <project> --updates` reading the heredoc file via $(cat ...)"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+fields\s+update-prompts\s+["'']?my_invoices-f1afa9ef-ixp["'']?\s+.*--updates\s+["'']?\$\(cat\s+/tmp/ixp/'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
