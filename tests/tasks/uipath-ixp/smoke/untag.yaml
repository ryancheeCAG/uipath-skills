task_id: skill-ixp-untag-smoke
description: >
  Smoke: agent removes the tag from a model version with
  `uip ixp projects untag <Name> --model-version <N>`. The version stays
  published, so the agent must NOT reach for `unpublish` or `delete`.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp, smoke, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 5

sandbox:
  driver: tempdir
  mock_path_dirs: [mocks]
  template_sources:
    - {type: template_dir, path: ../_shared/mock_template}

initial_prompt: |
  In the IXP project `my_invoices-f1afa9ef-ixp`, remove the tag from model
  version 27.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant
    in this environment. Commands will fail with auth errors — that is
    expected. Run each command once and move on. Do NOT retry or attempt
    to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent cleared the tag via `projects untag <Name> --model-version 27`"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+projects\s+untag\b(?=.*my_invoices-f1afa9ef-ixp)(?=.*(--model-version|-m)\s+27\b).*'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  # Anti-pattern guard: removing a tag is NOT unpublishing or deleting.
  - type: command_not_executed
    description: "Agent did NOT unpublish or delete (untag must not unpublish or destroy the version)"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+(projects\s+unpublish|projects\s+delete)\b'
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
