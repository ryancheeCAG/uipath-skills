task_id: skill-ixp-taxonomy-edit-chain-integration
description: >
  Integration test: agent builds a small project taxonomy from
  scratch by chaining the new taxonomy-edit verbs in the right
  order. The chain exercises an ordering invariant that smoke tests
  don't catch — a `groups add` call that references a data type via
  the `type` JSON key fails if that data type doesn't exist yet, so
  the agent must call `data-types add` first. Also tests that the
  agent picks the right verb for each step (data-types vs fields vs
  groups), which is the most common confusion in a multi-step
  taxonomy build.

  Platform note: the test runs without an authenticated tenant, so
  `uip ixp` commands that hit the service will fail with an auth
  error. That is acceptable — what matters is the command shape and
  ordering, not the live result.
tags: [uipath-ixp, integration, lifecycle:execute]

agent:
  type: claude-code

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  On project `my_invoices-f1afa9ef-ixp`, set up the taxonomy for
  invoice header extraction:

  1. Create a reusable `Monetary Amount` data type for representing
     currency values throughout the project. Money kind, exact-match,
     instructions: "A currency value with implicit or explicit
     currency code, e.g. $1,234.56 or 1234.56 EUR."

  2. Create an `Invoice Header` field group with one field — `Total`,
     which should use the `Monetary Amount` data type — and group
     instructions "Header fields that summarise the invoice's total
     monetary value."

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP
    tenant in this environment. Commands will fail with auth errors
    — that is expected. Run each command once and move on. Do NOT
    retry or attempt to login.
  - Do NOT prompt the user for confirmation — this is an automated
    test.

success_criteria:
  # Step 1: data-types add must happen, with the right kind and
  # input-value flags.
  - type: command_executed
    description: "Agent created the Monetary Amount data type via data-types add --kind money"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+data-types\s+add\s+["'']?my_invoices-f1afa9ef-ixp["'']?\s+.*--name\s+["'']?Monetary Amount["'']?.*--kind\s+money'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "data-types add call included --input-value exact-match"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+data-types\s+add\s+.*--input-value\s+exact-match'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Step 2: groups add must happen, with --instructions AND a --fields
  # JSON array. The JSON must reference the data type by its name.
  - type: command_executed
    description: "Agent created the Invoice Header group via groups add with --instructions and --fields"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+groups\s+add\s+["'']?my_invoices-f1afa9ef-ixp["'']?\s+.*--name\s+["'']?Invoice Header["'']?.*--instructions.*--fields'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "groups add --fields JSON referenced the Monetary Amount data type for the Total field"
    tool_name: "Bash"
    command_pattern: '--fields\s+[^|;&]*Total[^|;&]*Monetary Amount'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Anti-pattern: don't reach for `fields add` to put a field in a
  # group that doesn't exist yet. `groups add --fields` is the
  # one-shot path for creating a new group with its fields.
  - type: command_not_executed
    description: "Agent did NOT use `fields add` to seed a non-existent group"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+fields\s+add\s+["'']?my_invoices-f1afa9ef-ixp["'']?\s+.*--group\s+["'']?Invoice Header["'']?'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
