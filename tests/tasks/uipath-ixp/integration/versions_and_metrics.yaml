task_id: skill-ixp-integration-versions-and-metrics
description: >
  Integration: model-versioning lifecycle on a live project. The agent sets up a
  project and lets it train into an initial version, then improves one field's
  extraction instruction — which triggers a retrain into a second version — and
  captures each version's metrics.
  Verifies a real second version was produced (ModelVersion advanced) and that
  per-version metrics carry real per-field scores: outcomes a command-shape smoke
  cannot reach.
tags: [uipath-ixp, integration, mode:operate]

run_limits:
  max_turns: 72
  task_timeout: 3000
  turn_timeout: 1200

sandbox:
  # driver: docker (NOT tempdir) so `uip ixp` resolves the migrated in-image
  # ixp-tool, not the BYOS host's stale pre-migration plugin.
  driver: docker
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/fixtures

initial_prompt: |
  I want to improve an invoice extraction model and end up with two trained
  versions to compare. Use the tenant I'm already signed into (check I'm logged
  in; don't re-authenticate): start a project from the files in `./fixtures/` —
  give it a unique title `ixp-it-versions-<random-suffix>` so concurrent runs don't
  collide — import the taxonomy, upload one of the invoices — and let it train.
  Work only on the project you create; other runs share this tenant, so never
  list, read, or modify any other project.

  Training takes a few minutes (you'll wait through it twice). Each time, poll
  the project's training status on a fixed interval — wait 2 min between checks,
  up to 5 checks. Do NOT use a single long sleep or escalating waits. Move on
  only once training has completed; if it's still training after 5 checks, stop
  and report rather than waiting longer.

  Once it's trained, confirm the predictions on the document so there's some
  ground truth to score against. Pull that version's metrics and save them to
  `metrics_v1.json` exactly as the command returns them — the full JSON output,
  not a summary or reshaped subset.

  Then improve it: the "Total Amount" field sometimes picks up the subtotal or an
  amount-paid line instead of the final total due — sharpen that field's
  instruction so it only captures the grand total payable. Once it has retrained,
  pull the new version's metrics the same way into `metrics_v2.json`.

  Delete the project when you're done — even if a step above failed.

success_criteria:
  - type: command_executed
    description: "Confirmed predictions to establish ground truth (so metrics exist)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+labellings\s+confirm'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Improved a field's extraction instruction (the change that produces v2)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+fields\s+update-prompts\b.*--updates'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Pulled metrics for each version (--output json)"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+get-metrics\b.*--output\s+json'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Deleted the project as cleanup"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+ixp\s+projects\s+delete\b(?=.*(--yes|-y))'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # --- Outcome verification: real per-version metrics were captured ---
  - type: json_check
    description: "Version 1 metrics captured with real per-field scores"
    path: "metrics_v1.json"
    assertions:
      # `Data || @`: accept either save shape. We don't control how the agent
      # writes the file — it may store the full CLI response (root has `Data`)
      # or just the unwrapped payload (root IS the data). `@` is the JMESPath
      # current node, so this resolves `Fields` whichever way it was saved.
      - expression: "length((Data || @).Fields)"
        operator: gte
        expected: 1
    weight: 2.0
    pass_threshold: 1.0

  # Proves the instruction change actually produced a NEW trained version, not a
  # re-read of the same one. `d.get('Data', d)` accepts either save shape (wrapper
  # kept vs trimmed to Data), mirroring the json_checks' `(Data || @)`.
  - type: run_command
    description: "A real second version was produced: metrics_v2 ModelVersion > metrics_v1"
    command: "python3 -c \"import json; g=lambda f:(lambda d: d.get('Data', d))(json.load(open(f))); v1=g('metrics_v1.json')['ModelVersion']; v2=g('metrics_v2.json')['ModelVersion']; print('v1',v1,'v2',v2); exit(0 if v2 > v1 else 1)\""
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "Version 2 metrics captured with real per-field scores"
    path: "metrics_v2.json"
    assertions:
      # `Data || @`: accept either save shape. We don't control how the agent
      # writes the file — it may store the full CLI response (root has `Data`)
      # or just the unwrapped payload (root IS the data). `@` is the JMESPath
      # current node, so this resolves `Fields` whichever way it was saved.
      - expression: "length((Data || @).Fields)"
        operator: gte
        expected: 1
    weight: 2.0
    pass_threshold: 1.0
