task_id: skill-review-rpa-project
description: >
  Skill-guided evaluation: agent uses the uipath-review skill to perform
  a read-only review of a minimal RPA project and produce a structured
  review report. Tests whether the skill teaches the correct
  discover→validate→report workflow, severity classification, and
  read-only discipline (no file edits).

  Platform note: Some validation commands may not execute on Linux CI
  (legacy RPA is Windows-only, some UiPath backends require Windows),
  but the skill's discovery, structural review, and reporting logic
  is platform-independent. Criteria focus on what the skill guides the
  agent to produce, not on CLI runtime success.
tags: [uipath-review, smoke]

run_limits:
  expected_turns: 24

initial_prompt: |
  A small UiPath RPA project needs a quality review.

  Step 1 — Create a minimal RPA project at ./MyProject/ with:
  - project.json (name "MyProject", targetFramework "Windows",
    expressionLanguage "VisualBasic", dependency on
    UiPath.System.Activities, outputType "Process", main "Main.xaml")
  - Main.xaml — a minimal Sequence containing a single LogMessage
    activity with text "Hello"

  Step 2 — Review the MyProject/ directory using the uipath-review skill.
  Do NOT modify any files in MyProject/ during the review (the skill is
  read-only). Produce a review report at ./review_report.md.

  The report must contain:
  - A "## Findings" section with at least one finding
  - Severity markers for each finding (Critical, Warning, or Info)
  - A "## Summary" section at the end

  Important:
  - The `uip` CLI is already available in the environment.
  - Do not run `uip rpa debug` or any execution commands.
  - The skill forbids file edits in the reviewed project — only read and analyze.

success_criteria:
  - type: file_exists
    description: "Review report was produced"
    path: "review_report.md"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "The project under review was created (project.json)"
    path: "MyProject/project.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "The project under review was created (Main.xaml)"
    path: "MyProject/Main.xaml"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Report uses severity classification"
    path: "review_report.md"
    includes:
      - "Findings"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Report contains at least one severity marker"
    path: "review_report.md"
    includes:
      - "Summary"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent invoked a uip validation command"
    tool_name: "Bash"
    command_pattern: 'uip\s+\w+\s+(get-errors|validate)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

