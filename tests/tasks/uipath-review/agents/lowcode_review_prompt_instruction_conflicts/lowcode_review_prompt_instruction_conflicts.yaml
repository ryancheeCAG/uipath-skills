task_id: skill-review-agents-lowcode-prompt-instruction-conflicts
description: >
  Judgment test for uipath-review on a low-code agent whose system prompt
  contains two mutually exclusive output instructions (JSON-only vs.
  plain-text-paragraph-never-JSON). pre_run scaffolds a minimal agent then
  rewrites the system message. The reviewer must run the review CLI first
  (Step 2.5a), then apply the judgment catalog and cite
  `LC_PROMPT_INSTRUCTION_CONFLICTS` (general category) — a contradiction a
  regex cannot detect, so it is the skill's responsibility.
tags: [uipath-review, smoke, mode:diagnose, lifecycle:discover]

run_limits:
  turn_timeout: 1200
  task_timeout: 1500
  max_turns: 40

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-review/agents/lowcode_review_prompt_instruction_conflicts/inject_prompt_instruction_conflicts.py"
    timeout: 30

initial_prompt: |
  A low-code UiPath agent project exists at `ReviewSol/SampleAgent` inside the
  solution `ReviewSol`. Review the agent project for issues and save your review
  report to `./_review_report.md` at the sandbox root.

  This is a read-only review — do not modify anything inside `ReviewSol/`.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-review skill"
    skill_name: "uipath-review"
    expected_skill: "uipath-review"
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Write inside ReviewSol/ (Critical Rule 1)"
    tool_name: "Write"
    command_pattern: '"file_path":\s*"[^"]*ReviewSol'
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Edit inside ReviewSol/ (Critical Rule 1)"
    tool_name: "Edit"
    command_pattern: '"file_path":\s*"[^"]*ReviewSol'
    weight: 3.0

  - type: command_executed
    description: "Mandatory validation: uip agent validate ran (Critical Rule 2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Review report applies the judgment catalog: cites LC_PROMPT_INSTRUCTION_CONFLICTS"
    command: "python3 $TASK_DIR/check_lowcode_review_prompt_instruction_conflicts.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
