task_id: skill-review-agents-lowcode-tool-overlap
description: >
  Judgment test for uipath-review on a low-code agent with two tools whose
  descriptions are interchangeable (lookup_customer / find_customer both
  "look up a customer by email and return their profile"). pre_run scaffolds
  a minimal agent then writes the two tool resources. The reviewer must run
  the review CLI first (Step 2.5a), then apply the judgment catalog and cite
  `LC_TOOL_OVERLAP` (tools category) — a tool-selection-ambiguity read a
  regex cannot make, so it is the skill's responsibility.
tags: [uipath-review, smoke, mode:diagnose, lifecycle:discover]

run_limits:
  turn_timeout: 1200
  task_timeout: 1500
  max_turns: 40

sandbox:
  driver: tempdir
  python: {}

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-review/agents/lowcode_review_tool_overlap/inject_tool_overlap.py"
    timeout: 30

initial_prompt: |
  A low-code UiPath agent project exists at `ReviewSol/SampleAgent`
  inside the solution `ReviewSol`. Review the agent project and produce
  a structured review report with Critical / Warning / Info findings.

  Before doing anything else, load the `uipath-review` skill and follow
  its review workflow (discover, classify, run validation, apply the
  rule catalog, produce the report).

  This is a read-only review. Do NOT modify, create, or delete any
  files inside `ReviewSol/`. Do NOT scaffold a new project. Do NOT
  ask for approval, confirmation, or feedback.

  Important — produce the review in TWO places, identical content:

  1. As the chat output (the normal review surface), AND
  2. Save the SAME report to a file at `./_review_report.md` at the
     sandbox root (NOT inside `ReviewSol/`).

  Writing the file copy first, before producing the chat report, is
  encouraged — that way the file persists even if the chat response is
  cut off. The file is the source of truth the test harness will check.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-review skill"
    skill_name: "uipath-review"
    expected_skill: "uipath-review"
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Write inside ReviewSol/ (Critical Rule 1)"
    tool_name: "Write"
    command_pattern: '"file_path":\s*"[^"]*ReviewSol'
    weight: 3.0

  - type: command_not_executed
    description: "Read-only contract: no Edit inside ReviewSol/ (Critical Rule 1)"
    tool_name: "Edit"
    command_pattern: '"file_path":\s*"[^"]*ReviewSol'
    weight: 3.0

  - type: command_executed
    description: "Mandatory validation: uip agent validate ran (Critical Rule 2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent consulted the low-code judgment catalog (agents-lowcode-rules.md)"
    tool_name: "Read"
    command_pattern: 'agents-lowcode-rules\.md'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent consulted the common agent judgment catalog (agents-common-rules.md)"
    tool_name: "Read"
    command_pattern: 'agents-common-rules\.md'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Review report applies the judgment catalog: cites LC_TOOL_OVERLAP for find_customer"
    command: "python3 $TASK_DIR/check_lowcode_review_tool_overlap.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
