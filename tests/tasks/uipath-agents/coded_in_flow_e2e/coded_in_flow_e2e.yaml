task_id: skill-agent-coded-in-flow-e2e
description: >
  End-to-end test for the in-solution coded-agent + Flow pattern. Builds
  a UiPath solution containing a Flow project and a sibling LangGraph
  coded agent that calls an LLM. Verifies both projects register in the
  .uipx, the coded agent has a local resource file under
  `resources/solution_folder/process/agent/`, and the Flow contains a
  `uipath.core.agent.<resourceKey>` node with a matching top-level
  `bindings[]` entry — no duplicates per
  `(resourceKey, propertyAttribute)` pair.
tags: [uipath-agents, e2e, mode:build, lifecycle:generate, shape:single-node, resource]
max_iterations: 1

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Use the `uipath-agents` skill to build the following end-to-end in a
  single continuous pass — do not stop after any individual step:

    1. Create solution "GreeterSol" with a Flow project "GreeterFlow" inside it.
    2. Scaffold a sibling LangGraph coded agent "InputProcessor" (Python, gateway
       model `gpt-4o-mini-2024-07-18`, `temperature=0`). Keep LLM construction
       inside a node body — no module-level instantiation.
    3. Register "InputProcessor" in the solution with `uip solution project add`.
    4. Discover it with `uip maestro flow registry list --local --output json`.
    5. Wire "InputProcessor" as an agent node in GreeterFlow: `userInput` in,
       `summary` out.
    6. Validate the flow with `uip maestro flow validate`.

  Do NOT publish, upload, or deploy. Do NOT call `uip login`. Do NOT
  ask for approval, confirmation, or feedback. Complete all 6 steps.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution new"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+new'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the coded agent project with uip codedagent new"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+new'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip codedagent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent registered the coded agent in the solution"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+project\s+add'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent confirmed in-solution discovery via the local registry"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+(list|get)\s+.*--local'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Coded agent project exists (main.py)"
    path: "GreeterSol/InputProcessor/main.py"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Coded agent has langgraph.json (LangGraph framework marker)"
    path: "GreeterSol/InputProcessor/langgraph.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Local resource file for the coded agent"
    path: "GreeterSol/resources/solution_folder/process/agent/InputProcessor.json"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "GreeterSol/GreeterFlow/GreeterFlow.flow"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "Solution registers both projects (flow + coded agent)"
    path: "GreeterSol/GreeterSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Flow wires the coded agent as a `uipath.core.agent.<resourceKey>` node; bindings[] is deduplicated per (resourceKey, propertyAttribute); coded agent uses lazy LLM init"
    command: "python3 $TASK_DIR/check_coded_in_flow_e2e.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
