task_id: skill-agent-init-validate
description: >
  Skill-guided evaluation: agent uses the uipath-agents skill to scaffold
  a new low-code agent inside a solution and validate it. Tests whether
  the skill teaches the correct solution-first workflow and CLI usage.
tags: [uipath-agents, smoke, low-code]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  max_turns: 30
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath solution "EchoSol" containing a low-code agent
  "EchoAgent" and make sure it validates successfully.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution new"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+new'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "EchoSol/EchoSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "EchoAgent/agent.json was created"
    path: "EchoSol/EchoAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "entry-points.json was created inside the agent project"
    path: "EchoSol/EchoAgent/entry-points.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "flow-layout.json was created inside the agent project"
    path: "EchoSol/EchoAgent/flow-layout.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "project.uiproj was created inside the agent project"
    path: "EchoSol/EchoAgent/project.uiproj"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Default evaluation set scaffolded (evaluation-set-default.json)"
    path: "EchoSol/EchoAgent/evals/eval-sets/evaluation-set-default.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Default evaluator scaffolded (evaluator-default.json)"
    path: "EchoSol/EchoAgent/evals/evaluators/evaluator-default.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Default trajectory evaluator scaffolded (evaluator-default-trajectory.json)"
    path: "EchoSol/EchoAgent/evals/evaluators/evaluator-default-trajectory.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "features/ directory exists and is empty"
    command: "test -d EchoSol/EchoAgent/features && [ -z \"$(ls -A EchoSol/EchoAgent/features)\" ]"
    timeout: 5
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "resources/ directory exists and is empty"
    command: "test -d EchoSol/EchoAgent/resources && [ -z \"$(ls -A EchoSol/EchoAgent/resources)\" ]"
    timeout: 5
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "EchoSol/EchoAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/bindings.json generated by uip agent validate"
    path: "EchoSol/EchoAgent/.agent-builder/bindings.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/entry-points.json generated by uip agent validate"
    path: "EchoSol/EchoAgent/.agent-builder/entry-points.json"
    weight: 1.5
    pass_threshold: 1.0
