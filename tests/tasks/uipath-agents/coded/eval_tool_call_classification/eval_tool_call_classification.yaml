task_id: skill-agent-coded-eval-tool-call-classification
description: >
  Coded-agent eval authoring coverage for evaluator types not exercised by
  existing eval tasks: strict JSON, trajectory simulation, tool-call order,
  tool-call args, tool-call count, tool-call output, binary classification,
  and multiclass classification. This is a local artifact test, not a cloud
  reporting run.
tags: [uipath-agents, integration, mode:build, lifecycle:generate, feature:eval]

run_limits:
  expected_turns: 30
  max_turns: 70
  turn_timeout: 1200

initial_prompt: |
  Use the `uipath-agents` coded-agent evaluation guidance to create a coded
  agent project named `eval-matrix` and an evaluation harness for a
  ticket-routing agent.

  The important output is the evaluation harness:
  - `entry-points.json` should be generated with `uip codedagent init`.
  - Create evaluator JSON configs under `evaluations/evaluators/` for:
      strict JSON similarity, trajectory simulation, tool-call order,
      tool-call args, tool-call count, tool-call output, binary
      classification, and multiclass classification.
  - Create one eval set under `evaluations/eval-sets/` that references all of
    those evaluators.
  - Each test case should key `evaluationCriterias` by evaluator id and include
    the expected criteria shape for that evaluator type.

  Do NOT publish, upload, deploy, or call `uip login`. Do NOT run a cloud
  report. This task is complete when the evaluator files and eval-set JSON are
  coherent on disk.

success_criteria:
  - type: command_executed
    description: "Agent initialized the coded agent entry point"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "entry-points.json exists"
    path: "eval-matrix/entry-points.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Evaluator matrix JSON covers strict, trajectory-simulation, tool-call, and classification evaluator types"
    command: "python3 $TASK_DIR/check_eval_tool_call_classification.py"
    timeout: 20
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
