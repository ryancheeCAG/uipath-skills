task_id: skill-agent-guardrail-coded-validate
description: >
  Coded guardrail diagnose-and-fix flow. The agent is handed a LangGraph
  customer-support agent that already has a user-prompt-attacks guardrail
  wired to the wrong place — @guardrail(UserPromptAttacksValidator()) sits
  above @tool def lookup_account_info, but user_prompt_attacks is LLM-scope
  only. The skill must lead the agent to recognise the misplacement (against
  the catalog/SDK docs) and move the guardrail onto the LLM factory. Verifies
  the catalog/list/SDK docs were consulted, the misuse is gone, the
  user_prompt_attacks guardrail now decorates the LLM factory, and graph.py
  still parses. Neither the diagnosis nor the fix is stated in the prompt.
tags: [uipath-agents, e2e, coded, mode:diagnose, lifecycle:edit, guardrail]

agent:
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "WebFetch"]

sandbox:
  template_sources:
    - type: template_dir
      path: ../_fixtures/MisplacedPromptAttacksAgent

initial_prompt: |
  I have a uipath coded agent in graph.py. I added a guardrail recently but
  I'm not sure I put it in the right place. Can you make sure it's configured
  correctly and fix it if it isn't?

  Do NOT publish, upload, or deploy. Complete the task end-to-end. Only stop
  if there is a critical blocker you cannot resolve.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-agents skill (not claude-api or another skill)"
    skill_name: "uipath-agents"
    expected_skill: "uipath-agents"
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the guardrail catalog"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+catalog'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the guardrails list"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the UiPath Python SDK guardrail docs"
    tool_name: "WebFetch"
    command_pattern: 'uipath\.github\.io/uipath-python/.*guardrails'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "user_prompt_attacks guardrail moved off @tool and onto LLM factory; graph.py parses"
    command: "python3 $TASK_DIR/check_validate.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

run_limits:
  task_timeout: 1800
  max_turns: 40
  turn_timeout: 1200
