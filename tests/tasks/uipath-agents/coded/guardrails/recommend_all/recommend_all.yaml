task_id: skill-agent-guardrail-coded-recommend-all
description: >
  Guardrail recommendation for a coded agent (all scopes): a SimpleCodedAgent
  LangGraph customer-support agent (with a `lookup_account_info` tool and
  `create_llm()` factory) is seeded with no guardrails. Use the skill to fetch
  the catalog and recommend + add appropriate guardrails. Verifies that the
  catalog, guardrails list, and SDK docs were consulted, at least 2 guardrails
  are added, an LLM-scoped adversarial-input guardrail is present, and a
  PII/harmful-content guardrail is present. graph.py must remain syntactically
  valid.
tags: [uipath-agents, e2e, coded, mode:build, guardrail]

agent:
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "WebFetch"]

sandbox:
  template_sources:
    - type: template_dir
      path: ../_fixtures/SimpleCodedAgent

initial_prompt: |
  I have a coded LangGraph agent in graph.py. It handles customer-support
  questions and uses a lookup_account_info tool. It has no guardrails. Check
  the guardrail catalog and add the ones that make sense for this agent. Make
  sure graph.py still parses as Python when you're done.

  Do NOT publish, upload, or deploy. Do NOT ask for approval, confirmation, or
  feedback. Do NOT pause between planning and implementation. Complete the
  entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent fetched the guardrail catalog"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+catalog'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the guardrails list"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the UiPath Python SDK guardrail docs"
    tool_name: "WebFetch"
    command_pattern: 'uipath\.github\.io/uipath-python/.*guardrails'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "At least 2 guardrails added including LLM-scoped and content-safety guardrails; graph.py parses"
    command: "python3 $TASK_DIR/check_recommend_all.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

run_limits:
  task_timeout: 1800
  max_turns: 40
  turn_timeout: 1200
