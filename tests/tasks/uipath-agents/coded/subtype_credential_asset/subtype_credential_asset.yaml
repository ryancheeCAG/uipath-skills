task_id: skill-agent-subtype-credential-asset
description: >
  Coded-agent bindings sync — verifies the agent emits
  `SubType: "credentialAsset"` in bindings.json metadata for an
  asset binding produced from an `sdk.assets.retrieve_credential_async`
  call. Exercises the SubType inference rule (high-confidence,
  method-name-definitive path) added to bindings-reference.md, which
  is required so `uipath push` creates a credential-asset virtual
  placeholder (not a string asset) when the asset doesn't yet exist
  in Orchestrator.
tags: [uipath-agents, e2e, coded, bindings]

run_limits:
  expected_turns: 13
  task_timeout: 900
  turn_timeout: 1200
  max_turns: 30

initial_prompt: |
  Create a minimal UiPath coded-agent project (no `uip codedagent
  new` — author the files directly): a `pyproject.toml`, a
  `uipath.json`, an `entry-points.json` with one entrypoint, and a
  `main.py` with exactly one bindable SDK call:

  ```python
  from uipath.platform import UiPath

  async def main(input):
      sdk = UiPath()
      api_key = await sdk.assets.retrieve_credential_async(
          "billing_api_key", folder_path="Finance"
      )
      return {"ok": True}
  ```

  Then sync `bindings.json` so the credential asset binding carries
  the correct type annotation.

  Do NOT scaffold via CLI. Do NOT publish, upload, or deploy. Do NOT
  ask for approval, confirmation, or feedback. Do NOT pause between
  planning and implementation. Complete the entire task end-to-end in
  a single pass.

success_criteria:
  - type: file_exists
    description: "main.py was created with the credential SDK call"
    path: "main.py"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "bindings.json was created"
    path: "bindings.json"
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "bindings.json emits SubType=credentialAsset for the retrieve_credential_async call"
    command: "python3 $TASK_DIR/check_subtype_credential_asset.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
