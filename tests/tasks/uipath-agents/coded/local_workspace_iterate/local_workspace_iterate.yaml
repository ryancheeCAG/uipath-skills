task_id: skill-agent-coded-local-workspace-iterate
description: >
  Iterating on a UiPath coded agent that lives inside a Studio Web
  Local Workspace. The project is seeded on disk as a real Local
  Workspace (path marker, folder lock, project.uiproj, and a pre-built
  LangGraph agent with no venv yet). The user just asks for a small
  behavior change, so this checks the skill recognizes the Local
  Workspace setup and edits in place: prep the venv, regenerate the
  schema, run locally, without scaffolding a fresh project, pushing by
  hand, or deleting project.uiproj.
tags: [uipath-agents, e2e, mode:build, coded, lifecycle:edit, feature:framework-langgraph, feature:local-workspace]
max_iterations: 1

pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/coded/local_workspace_iterate/_fixtures/GateSol ."
    timeout: 10

initial_prompt: |
  I've got a UiPath coded agent in `GateSol/gate-agent/` that I set up
  through Studio Web. Right now it only tells me a `size`, but I also
  want it to tell me a `category`: "tiny" when the value is under 5,
  "huge" when it's over 100, and otherwise just the size it already
  gives.

  Make that change and run it on 2 and on 150 to check both ends work,
  then save the results to `GateSol/gate-agent/outputs.json`.

  Don't publish, upload, or deploy. Just work through it to the end in
  one go — only stop if you hit a real blocker.

success_criteria:
  - type: skill_triggered
    description: "Agent consulted the uipath-agents skill"
    skill_name: "uipath-agents"
    expected_skill: "uipath-agents"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent regenerated the schema after editing main.py"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent executed the modified agent locally"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+run\s+agent'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "GateSol/gate-agent/outputs.json captured both edge-case runs"
    path: "GateSol/gate-agent/outputs.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Must NOT scaffold a new project — Studio Web already set up the Local Workspace"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+new\b'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Must NOT manually push — Studio Web auto-syncs Local Workspace"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+push\b'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Must NOT publish or deploy — local iteration only"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+(publish|deploy)\b'
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Local Workspace invariants preserved + edit shape + both branch outputs"
    command: "python3 $TASK_DIR/check_local_workspace_iterate.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0

run_limits:
  expected_turns: 31
  turn_timeout: 1200
