task_id: skill-agents-coded-is-smoke
description: >
  Smoke test for the coded Integration Service capability. The agent
  hand-authors a coded-Python agent that invokes a Slack IS activity
  via `sdk.connections.invoke_activity`. Validates the artefact shape
  WITHOUT a live tenant — Critical Rule checks: ActivityMetadata
  literal is inline (not a JSON sidecar), no module-level `UiPath()`,
  bindings.json carries a `connection` resource with the documented
  Connection Service envelope, and no `resources/<Tool>/resource.json`
  sidecar (that path is lowcode-only and ignored in coded agents).
tags: [uipath-agents, smoke, coded, mode:build, lifecycle:generate, feature:integration-service]

run_limits:
  expected_turns: 20
  max_turns: 30

sandbox:
  template_sources:
    - type: template_dir
      path: fixtures

initial_prompt: |
  Build a UiPath coded Python agent under `./slack-notifier/` that posts
  a message to a Slack channel through Integration Service — use Slack's
  `send_message_to_channel_v2` operation, and bind it to the Slack
  connection under the key `slack-notifier`. The agent takes a `channel`
  and a `message` and reports back whether the post succeeded as `ok`.

  I don't have a live tenant wired up right now, so set the project up
  by hand instead of scaffolding against the platform, and don't try to
  run it. I've already captured the operation's `uip is resources
  describe` output for you at `./slack_send_message_describe.json` —
  treat that as the source of truth for the operation's shape rather
  than copying field names from examples. Follow the platform's
  documented Integration Service workflow for wiring up the call, not
  just the basic coded-agent steps.

  Work straight through in a single pass — no need to pause for
  approval.

success_criteria:
  - type: command_executed
    description: "Agent loaded the uipath-agents skill"
    tool_name: "Skill"
    command_pattern: "uipath-agents"
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Loaded the platform IS discovery reference into context (the capability doc requires reading agent-workflow.md before authoring an invoke_activity call, not just following the coded doc)"
    tool_name: "Read"
    command_pattern: 'uipath-platform/references/integration-service/agent-workflow\.md'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "slack-notifier project root exists"
    path: "slack-notifier/pyproject.toml"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Project shape: bindings.json connection envelope + ActivityMetadata mapped from describe fixture + lazy SDK init + no lowcode sidecar"
    command: "python3 $TASK_DIR/check_is_smoke.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0
