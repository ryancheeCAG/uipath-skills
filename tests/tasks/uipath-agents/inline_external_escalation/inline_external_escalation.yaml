task_id: skill-agent-inline-external-escalation-tool
description: >
  Escalation app tools (external resource) for flow inline agents.
  End-to-end test: scaffold a flow project with an inline low-code
  agent that escalates uncertain cases to an EXTERNAL ActionCenter app
  already deployed to Orchestrator (not inside this solution).
  Verifies the escalation resource.json under the inline agent's UUID
  subdirectory + a `uipath.agent.resource.escalation` flow node wired
  to the autonomous agent node's `escalation` handle.
tags: [uipath-agents, e2e, low-code, inline-flow]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath solution "FraudFlowSol" containing a flow project
  "FraudFlow". The flow should use an inline low-code agent that
  triages transactions and escalates uncertain cases to an EXISTING
  EXTERNAL ActionCenter app named "FraudEscalationQueue" already
  deployed to the Orchestrator "Shared" folder (not inside this
  solution). Wire the escalation as a resource on the inline agent.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "FraudFlowSol/FraudFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added a flow node"
    tool_name: "Bash"
    command_pattern: 'uip\s+(maestro\s+)?flow\s+node\s+add'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "FraudFlowSol/FraudFlow/FraudFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow project descriptor was created"
    path: "FraudFlowSol/FraudFlow/project.uiproj"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Inline external escalation: resource.json shape + escalation flow node + escalation-handle edge"
    command: "python3 $TASK_DIR/check_inline_external_escalation.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
