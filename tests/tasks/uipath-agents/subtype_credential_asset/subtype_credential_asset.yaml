task_id: skill-agent-subtype-credential-asset
description: >
  Coded-agent bindings sync — verifies the agent emits
  `SubType: "credentialAsset"` in bindings.json metadata for an
  asset binding produced from an `sdk.assets.retrieve_credential_async`
  call. Exercises the SubType inference rule (high-confidence,
  method-name-definitive path) added to bindings-reference.md, which
  is required so `uipath push` creates a credential-asset virtual
  placeholder (not a string asset) when the asset doesn't yet exist
  in Orchestrator.
tags: [uipath-agents, e2e, coded, bindings]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  max_turns: 30
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Inside the working directory, create a minimal UiPath coded-agent
  project layout (no `uip codedagent new` — author the files directly):

  - `pyproject.toml` with a `[project]` section (name "billing-agent",
    version "0.1.0"). Do NOT include a `[build-system]` section.
  - `uipath.json` with `{"entryPoints": []}` (empty is fine — bindings
    sync doesn't depend on entry-point linking for this test).
  - `entry-points.json` with one entrypoint named `main` and `filePath`
    `main.py`.
  - `main.py` containing exactly one bindable SDK call:

    ```python
    from uipath.platform import UiPath

    async def main(input):
        sdk = UiPath()
        api_key = await sdk.assets.retrieve_credential_async(
            "billing_api_key", folder_path="Finance"
        )
        return {"ok": True}
    ```

  Then generate `bindings.json` by following the bindings sync
  workflow in the uipath-agents skill (consult
  `references/coded/lifecycle/bindings-reference.md` if needed).
  The output must include the credential asset binding with
  `metadata.SubType` set correctly.

  Do NOT scaffold via CLI. Do NOT publish, upload, or deploy. Do NOT
  ask for approval, confirmation, or feedback. Do NOT pause between
  planning and implementation. Complete the entire task end-to-end in
  a single pass.

success_criteria:
  - type: file_exists
    description: "main.py was created with the credential SDK call"
    path: "main.py"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "bindings.json was created"
    path: "bindings.json"
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "bindings.json emits SubType=credentialAsset for the retrieve_credential_async call"
    command: "python3 $TASK_DIR/check_subtype_credential_asset.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
