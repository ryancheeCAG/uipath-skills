task_id: skill-agent-inline-builtin-tool
description: >
  Add built-in tools for flow inline agents. End-to-end test: scaffold
  a flow project with an inline low-code agent that enables a built-in
  tool (e.g. "Analyze Files") from the static built-in-tools registry.
  Verifies the tool resource.json under the inline agent's UUID
  subdirectory uses `type: "internal"`, `referenceKey: null`, and
  `properties.toolType` set to one of the four documented built-in
  tool keys. Verifies a `uipath.agent.resource.tool.*` flow node is
  wired to the autonomous agent node's `tool` handle.
tags: [uipath-agents, e2e, low-code, inline-flow]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath solution "DocsFlowSol" containing a flow project
  "DocsFlow". The flow should use an inline low-code agent that helps
  users understand uploaded documents. Enable the built-in "Analyze
  Files" tool on the inline agent so it can analyze PDF and image
  attachments, and wire that tool in the flow.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution new"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+new'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "DocsFlowSol/DocsFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added a flow node"
    tool_name: "Bash"
    command_pattern: 'uip\s+(maestro\s+)?flow\s+node\s+add'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "DocsFlowSol/DocsFlow/DocsFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow project descriptor was created"
    path: "DocsFlowSol/DocsFlow/project.uiproj"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Inline built-in tool: resource.json shape (type=internal, toolType) + flow node + tool-handle edge"
    command: "python3 $TASK_DIR/check_inline_builtin_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
