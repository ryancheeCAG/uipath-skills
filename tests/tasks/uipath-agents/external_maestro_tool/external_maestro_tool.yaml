task_id: skill-agent-external-maestro-tool
description: >
  Add Maestro tool (external resource). End-to-end test:
  scaffold a standalone low-code agent that calls a Maestro flow
  living OUTSIDE this solution (already deployed to Orchestrator).
  Verifies the tool resource.json uses `type: "processOrchestration"`,
  `location: "external"`, and a real `folderPath` (not
  "solution_folder").
tags: [uipath-agents, e2e, low-code]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath solution "ClaimsSol" containing a low-code agent
  "ClaimsAgent". The agent should call an EXTERNAL Maestro flow
  called "ProcessClaim" that is already deployed to the Orchestrator
  "Shared" folder — not inside this solution. Expose it to the agent
  as a tool resource.

  When writing the tool resource.json, set the `properties.folderPath`
  field to the literal string "Shared" (the live Orchestrator folder
  where ProcessClaim is deployed). Do NOT use placeholder values such
  as "solution_folder" — those are reserved for `location=="solution"`.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "ClaimsSol/ClaimsSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "ClaimsAgent/agent.json was created"
    path: "ClaimsSol/ClaimsAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "ProcessClaim external Maestro tool resource.json was created"
    path: "ClaimsSol/ClaimsAgent/resources/ProcessClaim/resource.json"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "ClaimsSol/ClaimsAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "External Maestro tool resource shape (type, location, folderPath)"
    command: "python3 $TASK_DIR/check_external_maestro_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
