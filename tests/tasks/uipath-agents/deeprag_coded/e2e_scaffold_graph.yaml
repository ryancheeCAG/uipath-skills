task_id: skill-agents-deeprag-coded-e2e-scaffold-graph
description: >
  E2E: scaffold a Python coded agent that runs DeepRAG on a PDF
  attachment. Verifies the agent scaffolds with `uip codedagent init`
  and emits a graph module that imports CreateDeepRag /
  WaitEphemeralIndex from uipath.platform.common, EphemeralIndexUsage
  from uipath.platform.context_grounding, uses plain interrupt() from
  langgraph.types — passes is_ephemeral_index=True on CreateDeepRag,
  and does NOT instantiate UiPath() at module top level.
tags: [uipath-agents, e2e, coded, lifecycle:generate, context-grounding, mode:build]
max_iterations: 1

initial_prompt: |
  I want a coded agent named `deep-rag-agent` that takes a PDF file
  uploaded as an attachment and returns a grounded summary with
  citations.

  Take the agent through scaffold → init. Do NOT run, publish, upload,
  or deploy. Do NOT pause between planning and implementation. Complete
  end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent ran uip codedagent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Graph imports CreateDeepRag / WaitEphemeralIndex / EphemeralIndexUsage; uses interrupt(); passes is_ephemeral_index=True; no module-level UiPath()"
    command: "python3 $TASK_DIR/check_deep_rag_graph.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0

run_limits:
  expected_turns: 46
  turn_timeout: 1200
