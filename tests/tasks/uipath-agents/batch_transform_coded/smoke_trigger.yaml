task_id: skill-agents-batch-transform-coded-smoke-trigger
description: >
  Smoke test: agent should trigger the uipath-agents skill when the
  user asks to add LLM-filled columns to a CSV from a Python coded
  agent (LangGraph). Verifies the skill fires for the
  Python-coded-agent + CSV signal pair.
tags: [uipath-agents, smoke, coded, lifecycle:discover, context-grounding]

sandbox: {}

run_limits:
  max_turns: 50

initial_prompt: |
  I want it to read a CSV of ~1000 vendor rows and add two LLM-filled columns: a 4-digit MCC code
  and a confidence label.

  How can I do this with a coded agent. Do not scaffold, tell me the plan first.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-agents skill"
    expected_skill: "uipath-agents"
    skill_name: "uipath-agents"
    weight: 3.0
    pass_threshold: 1.0
