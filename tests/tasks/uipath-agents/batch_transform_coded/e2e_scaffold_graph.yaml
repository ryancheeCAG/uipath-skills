task_id: skill-agents-batch-transform-coded-e2e-scaffold-graph
description: >
  E2E: scaffold a Python coded agent that runs BatchTransform on a CSV
  attachment. Verifies the agent scaffolds with `uip codedagent init`
  and emits a graph module that imports CreateBatchTransform /
  WaitEphemeralIndex from uipath.platform.common,
  BatchTransformOutputColumn / EphemeralIndexUsage from
  uipath.platform.context_grounding, uses plain interrupt() from
  langgraph.types — and does NOT instantiate UiPath() at module top
  level.
tags: [uipath-agents, e2e, coded, lifecycle:generate, context-grounding, mode:build]
max_iterations: 1

initial_prompt: |
  I want a coded agent named `batch-transform-agent` that performs batch BatchTransform
  on a CSV file uploaded as an attachment. at the end return destination_path of the modified file.
  the batch transform should and adds two LLM-filled
  columns: a 4-digit MCC code and a confidence label (HIGH / MEDIUM /
  LOW).

  Take the agent through scaffold → init. Do NOT run, publish, upload,
  or deploy. Do NOT pause between planning and implementation. Complete
  end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent ran uip codedagent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedagent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Graph imports CreateBatchTransform / WaitEphemeralIndex / BatchTransformOutputColumn; uses interrupt(); passes is_ephemeral_index=True; no module-level UiPath()"
    command: "python3 $TASK_DIR/check_batch_transform_graph.py"
    timeout: 30
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0

run_limits:
  expected_turns: 51
  turn_timeout: 1200
