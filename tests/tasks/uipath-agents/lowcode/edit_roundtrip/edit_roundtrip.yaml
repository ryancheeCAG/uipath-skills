task_id: skill-agent-edit-roundtrip
description: >
  Skill-guided evaluation: scaffold a low-code agent, configure it,
  refresh and validate, then EDIT it — add a second input field, update
  the user message template + contentTokens, re-sync entry-points.json,
  and re-validate. Exercises Critical Rules 2 (refresh+validate after
  edits), 4 (schema sync), 5 (`{{input.X}}` syntax), and 6
  (contentTokens in sync) on incremental edits — none of which are
  covered by create-from-scratch tests.
tags: [uipath-agents, smoke, mode:build, low-code]

run_limits:
  expected_turns: 19
  max_turns: 60
  turn_timeout: 1200

initial_prompt: |
  Create a low-code agent "GreeterAgent" that takes a required `name` (string)
  and returns a `greeting` (string). The solution should be named "GreetSol".

  Then update the agent so it also takes a required `language` (string), and
  have its greeting to the user use both the name and the language.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent ran uip agent refresh at least twice (initial + after edit)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip agent validate at least twice (initial + after edit)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "GreeterAgent/agent.json was created"
    path: "GreetSol/GreeterAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Final state: both inputs in schema, schema synced, user message inlines both placeholders with matching contentTokens"
    command: "python3 $TASK_DIR/check_edit_roundtrip.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
