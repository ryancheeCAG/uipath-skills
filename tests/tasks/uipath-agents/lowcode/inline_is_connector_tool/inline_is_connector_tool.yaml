task_id: skill-agent-inline-is-connector-tool
description: >
  Integration Service (IS) tools for flow inline agents. End-to-end
  test: scaffold a flow project containing an inline low-code agent
  that exposes an IS connector activity (Web Search) as a tool. The
  agent under test discovers the connector via `uip is`, adds a
  `uipath.agent.resource.tool.connector` node to the flow and
  configures it with `uip maestro flow node configure`, wires it to the
  `uipath.agent.autonomous` node's `tool` handle, then runs
  `uip agent refresh --inline-in-flow` — which GENERATES the tool's
  `type: "integration"` resource.json (no hand-authoring) by fetching
  the connector's IS metadata and joining it with the node's configured
  values, plus `bindings_v2.json`, then `uip solution resources refresh`
  to materialize the solution-level connection resource.
  `uip agent validate --inline-in-flow` then checks it. Verifies the
  generated design-time artifacts only (no runtime connector
  invocation). Cloud auth required — depends on the staging tenant
  having the `uipath-uipath-airdk` (GenAI Activities) connector
  available.
tags: [uipath-agents, e2e, mode:build, low-code, inline-flow]

run_limits:
  expected_turns: 56
  turn_timeout: 1200

initial_prompt: |
  I want to build an automation that can look things up on the web for me.
  Set it up as a flow with an AI agent inside it, and give the agent a way to
  search the web on its own whenever it needs to. Call the flow "ResearchFlow"
  and the solution "ResearchFlowSol".

  Build it locally, start to finish — no need to publish or deploy it, and
  don't stop to check in with me along the way.

success_criteria:
  - type: command_executed
    description: "Agent discovered connectors via `uip is`"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added the connector tool node to the flow with uip maestro flow node add"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+node\s+add\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent configured the connector tool node with uip maestro flow node configure (populates inputs.detail that refresh reads)"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+node\s+configure\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "ResearchFlowSol/ResearchFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed solution resources to materialize the connection resource"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources\s+refresh'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Advisory: agent used --output json on uip commands (informational, non-gating)"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 0.0

  - type: file_exists
    description: "Flow file was created"
    path: "ResearchFlowSol/ResearchFlow/ResearchFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline agent IS tool resource, bindings_v2.json, connection resource, and flow wiring (tool.connector node + edge to agent's tool handle)"
    command: "python3 $TASK_DIR/check_inline_is_connector_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
