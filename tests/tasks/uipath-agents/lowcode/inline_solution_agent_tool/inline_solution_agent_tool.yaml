task_id: skill-agent-inline-solution-agent-tool
description: >
  Add an inline-agent agent-as-tool inside an existing solution
  (brownfield). The fixture ships an `OrchestratorFlowSol` solution that
  already contains a registered low-code `ToolAgent` project. The agent
  must add a NEW `OrchestratorFlow` Flow project whose inline low-code
  agent delegates to the pre-existing `ToolAgent` as a tool — reusing it,
  NOT re-creating it and NOT re-initializing the solution. Verifies the
  tool resource.json under the inline agent's UUID subdirectory uses
  `type: "agent"`, `location: "solution"`, `folderPath: "solution_folder"`,
  and that a `uipath.agent.resource.tool.agent.<process-key>` flow node is
  wired to the autonomous agent node's `tool` handle.
tags: [uipath-agents, e2e, mode:build, low-code, inline-flow]

run_limits:
  expected_turns: 80
  turn_timeout: 1200

pre_run:
  # Brownfield fixture: an OrchestratorFlowSol solution that already
  # contains a registered ToolAgent (mirrors solution_agent_tool's fixture).
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/lowcode/inline_solution_agent_tool/_fixtures/OrchestratorFlowSol ."
    timeout: 10

initial_prompt: |
  Create a new UiPath Flow project named "OrchestratorFlow" inside the existing
  "OrchestratorFlowSol" solution (in the current directory). Its inline low-code
  agent should get its work done by handing off to the existing "ToolAgent"
  that's already in the solution, rather than doing it itself.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  # Brownfield: the solution already exists in the fixture. Re-running
  # `uip solution init` would clobber it — the agent must NOT. The
  # exclude_pattern lets a read-only `uip solution init --help` verb-probe
  # through (agents commonly confirm the post-rename verb exists).
  - type: command_not_executed
    description: "Agent did NOT re-initialize the pre-existing solution"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    exclude_pattern: '--help'
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Brownfield: ToolAgent ships in the fixture. The agent must reuse it,
  # not scaffold a fresh standalone copy over it.
  - type: command_not_executed
    description: "Agent did NOT re-create the existing ToolAgent project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+["'']?ToolAgent'
    weight: 1.5
    pass_threshold: 1.0

  # Informational discovery criteria: the agent may use file reads instead of
  # CLI discovery. pass_threshold:0 means these never block the run.
  - type: command_executed
    description: "Agent discovered the existing ToolAgent via solution resources list (informational)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources?\s+list\b.*--source\s+local'
    min_count: 1
    weight: 0.5
    pass_threshold: 0.0

  # Informational, NOT enforced: pass_threshold:0 means score (0 when the
  # agent skips `resource get`) always clears the bar, so this criterion can
  # never fail the run — the task PASS/FAIL gate is all-criteria-pass. weight
  # must be > 0 (schema forbids 0); kept at the 0.5 floor so it barely moves
  # the reported weighted_score. The `resource list` discovery above is the
  # enforced signal; `get` is an acceptable-but-optional follow-up.
  - type: command_executed
    description: "Agent fetched the ToolAgent configuration with uip solution resources get (informational)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources?\s+get\b'
    min_count: 1
    weight: 0.5
    pass_threshold: 0.0

  # Local-registry discovery: informational. The agent may discover node types
  # via file reads or resources list output instead of registry search/list.
  - type: command_executed
    description: "Agent searched or listed the local flow registry for the agent-as-tool manifest (informational)"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+(search|list)\b.*--local'
    min_count: 1
    weight: 0.5
    pass_threshold: 0.0

  - type: command_executed
    description: "Agent fetched the solution (local) agent-as-tool node manifest from the flow registry"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+get\s+.*uipath\.agent\.resource\.tool\.agent\..*--local'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the inline autonomous agent node manifest from the flow registry"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+get\s+.*uipath\.agent\.autonomous'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check: the fixture .uipx starts with ToolAgent registered;
  # auto-registration of the new Flow project (via init or the
  # `uip solution project add` fallback) must bring Projects[] to 2.
  - type: json_check
    description: "OrchestratorFlow is registered alongside ToolAgent in the parent solution .uipx"
    path: "OrchestratorFlowSol/OrchestratorFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "OrchestratorFlowSol/OrchestratorFlow/OrchestratorFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline solution agent tool: resource.json shape + flow node (tool.agent.*) + tool-handle edge"
    command: "python3 $TASK_DIR/check_inline_solution_agent_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
