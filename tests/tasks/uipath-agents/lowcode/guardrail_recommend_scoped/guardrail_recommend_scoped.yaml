task_id: skill-agent-guardrail-recommend-scoped
description: >
  Tool-scoped deterministic guardrail: a pre-built Web Research Briefing Agent is seeded
  with no guardrails. Add a custom (deterministic) guardrail for the "Send message to
  channel" (Slack) tool that blocks posts containing forbidden terms before they are sent.
  Verifies that the catalog is fetched, a custom guardrail is written with Tool scope and
  matchNames targeting "Send message to channel", and the guardrail has valid rules.
tags: [uipath-agents, e2e, low-code, guardrail]
max_iterations: 1

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  max_turns: 40
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../../../../../skills/uipath-agents/fixtures/WebResearchBriefingSolution

initial_prompt: |
  I have a web research agent at WebResearchBriefingSolution/WebResearchBriefingAgent
  that posts research briefings to Slack. I'm worried it might accidentally publish
  CONFIDENTIAL content. What guardrail(s) should I add to prevent that, and can you
  set them up? Validate when done.
  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent fetched the guardrail catalog"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+catalog'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the guardrails list"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the agent"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Custom guardrail targets Send message to channel with valid rules"
    command: "python3 $TASK_DIR/check_guardrail_recommend_scoped.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
