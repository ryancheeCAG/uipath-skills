task_id: skill-agent-inline-memory-space
description: >
  End-to-end test: scaffold a flow project with an inline low-code
  agent that attaches an existing UiPath Memory Space with
  `uip agent memory`. Verifies that memory spaces are modeled as
  feature files under the inline agent directory and that
  `uip agent migrate --inline-in-flow --bindings-target` propagates the
  generated memorySpace binding to the parent flow project.
tags: [uipath-agents, e2e, "mode:build", low-code, "lifecycle:generate", inline-flow]

run_limits:
  expected_turns: 76
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "MemoryFlowSol" containing a flow project
  "MemoryFlow" with an inline low-code agent. The agent accepts a
  required `userQuestion` string and returns an `answer` string.

  Attach the existing UiPath memory space named
  "UiPathAgentsSupportMemory" from the Orchestrator folder
  "Shared/uipath-agents" as an inline agent memory feature named
  `SupportRecall`. Enable dynamic few-shot retrieval with hybrid
  search, threshold 0.25, result count 5, and field weighting
  `userQuestion=1`.

  Use the full low-code memory CLI workflow for memory features:
  discover the memory space before attaching it and refresh solution
  resources after migration, even though the memory name and folder
  are provided. Memory spaces must live under the inline agent's
  `features/` directory, not under `resources/`. After the flow graph
  edits are complete, run inline validation and inline migration with
  a bindings target so the memorySpace binding is propagated into the
  parent flow project's `bindings_v2.json`.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent discovered the memory space with uip solution resource list --kind MemorySpace"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+list\b.*--kind\s+MemorySpace'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent attached the memory space to the inline agent using uip agent memory add"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+memory\s+add\s+SupportRecall\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent migrated the inline agent with --bindings-target"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+migrate\b(?=.*--inline-in-flow)(?=.*--bindings-target\s+\S*bindings_v2\.json)'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed solution resources after memory binding propagation"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must not hand-author memory feature JSON with shell redirection"
    tool_name: "Bash"
    command_pattern: '(?:\btee\b\s+[^;&|]*features/[^;&|]*/feature\.json|(?:>|>>)\s*["'']?[^"''\s;&|]*features/[^"''\s;&|]*/feature\.json|\bpython3?\b[\s\S]*(?:open\([^)]*features/[^)]*/feature\.json[^)]*["'']w["'']|write_text\([^)]*features/[^)]*/feature\.json)|\bnode\b[\s\S]*(?:writeFileSync|writeFile)\([^)]*features/[^)]*/feature\.json)'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must not hand-author memory feature JSON with the Write tool"
    tool_name: "Write"
    command_pattern: 'features/.*/feature\.json'
    weight: 1.5
    pass_threshold: 1.0

  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "MemoryFlowSol/MemoryFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "MemoryFlowSol/MemoryFlow/MemoryFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Parent flow project bindings_v2.json was created"
    path: "MemoryFlowSol/MemoryFlow/bindings_v2.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline memory feature shape and propagated parent memorySpace binding"
    command: "python3 $TASK_DIR/check_inline_memory_space.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
