task_id: skill-agent-inline-memory-space
description: >
  End-to-end test: scaffold a flow project with an inline low-code
  agent that attaches an existing UiPath Memory Space with
  `uip agent memory`. Verifies that memory spaces are modeled as
  feature files under the inline agent directory and that
  `uip agent refresh --inline-in-flow --bindings-target` propagates the
  generated memorySpace binding to the parent flow project.
tags: [uipath-agents, e2e, mode:build, low-code, lifecycle:generate, inline-flow]

run_limits:
  expected_turns: 76
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "MemoryFlowSol" with a flow project "MemoryFlow"
  that runs an inline low-code agent. The agent takes a required
  `userQuestion` (string) and returns an `answer` (string).

  The agent should get better over time by recalling past support cases. Give
  it a memory called "SupportRecall" backed by our existing
  "UiPathAgentsSupportMemory" memory space, which lives in our
  "Shared/uipath-agents" Orchestrator folder. When the agent answers, it
  should use hybrid search over the `userQuestion` field to pull back the 5
  closest past cases, with a similarity threshold of 0.25.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Advisory: agent discovered the memory space with uip solution resources list --kind MemorySpace (informational, non-gating — the memory name + folder are given in the prompt)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources\s+list\b.*--kind\s+MemorySpace'
    min_count: 1
    weight: 1.5
    pass_threshold: 0.0

  - type: command_executed
    description: "Agent attached the memory space to the inline agent using uip agent memory add"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+memory\s+add\s+SupportRecall\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the inline agent with --inline-in-flow (binding propagation to the parent flow is verified by the run_command; --bindings-target is auto-detected, so it isn't required explicitly)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Advisory: agent refreshed solution resources (informational, non-gating — inline binding propagation happens via uip agent refresh --bindings-target, not solution resources refresh)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 0.0

  - type: command_not_executed
    description: "Agent must not hand-author memory feature JSON with shell redirection"
    tool_name: "Bash"
    command_pattern: '(?:\btee\b\s+[^;&|]*features/[^;&|]*/feature\.json|(?:>|>>)\s*["'']?[^"''\s;&|]*features/[^"''\s;&|]*/feature\.json|\bpython3?\b[\s\S]*(?:open\([^)]*features/[^)]*/feature\.json[^)]*["'']w["'']|write_text\([^)]*features/[^)]*/feature\.json)|\bnode\b[\s\S]*(?:writeFileSync|writeFile)\([^)]*features/[^)]*/feature\.json)'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must not hand-author memory feature JSON with the Write tool"
    tool_name: "Write"
    command_pattern: 'features/.*/feature\.json'
    weight: 1.5
    pass_threshold: 1.0

  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "MemoryFlowSol/MemoryFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "MemoryFlowSol/MemoryFlow/MemoryFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Parent flow project bindings_v2.json was created"
    path: "MemoryFlowSol/MemoryFlow/bindings_v2.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline memory feature shape and propagated parent memorySpace binding"
    command: "python3 $TASK_DIR/check_inline_memory_space.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
