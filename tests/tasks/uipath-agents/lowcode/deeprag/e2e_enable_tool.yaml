task_id: skill-agents-deeprag-lowcode-e2e-enable-tool
description: >
  E2E: scaffold a low-code agent that enables the built-in deep-rag
  tool. Verifies that the agent runs the canonical CLI flow (uip
  solution init, uip agent init, uip agent refresh, uip agent
  validate) and that resource.json uses the exact built-in shape
  (type=internal, referenceKey=null, properties.toolType=deep-rag).
tags: [uipath-agents, e2e, low-code, lifecycle:generate, context-grounding]

run_limits:
  expected_turns: 36
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath low-code agent "DeepAgent" that synthesizes answers across
  multiple PDF or TXT attachments uploaded in chat. Enable the
  built-in "deep-rag" tool so the agent can run an iterative
  research-and-synthesis pass over the attachments. The solution
  should be named "DeepSol".

  Use the `uip` CLI to scaffold the solution and agent — do NOT
  hand-author the solution `.uipx`, `agent.json`, `project.uiproj`,
  or `entry-points.json` files.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip agent init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "DeepSol/DeepSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the project to regenerate derived files"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "DeepAgent/agent.json was created"
    path: "DeepSol/DeepAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "deep-rag built-in tool resource shape (type=internal, referenceKey=null, toolType=deep-rag)"
    command: "python3 $TASK_DIR/check_deep_rag_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
