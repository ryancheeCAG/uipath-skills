task_id: skill-agent-inline-external-agent-tool
description: >
  Add agent tool (inline agent, external resource). End-to-end test:
  scaffold a flow project with an inline low-code agent that calls
  another agent already deployed to Orchestrator (not inside this
  solution). Verifies the tool resource.json under the inline agent's
  UUID subdirectory uses `type: "agent"`, `location: "external"`, real
  `folderPath`, and that a
  `uipath.agent.resource.tool.agent.<process-key>` flow node is wired
  to the autonomous agent node's `tool` handle.
tags: [uipath-agents, e2e, mode:build, low-code, inline-flow]

run_limits:
  expected_turns: 46
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath Flow project "OutreachFlow" that runs an inline low-code
  agent which takes a required `subject` (string) and returns a string
  `content`. The agent shouldn't write the email itself — the draft should
  come from our existing "EmailDrafter" agent, which is already deployed in our
  tenant. Wire it into the flow. The solution should be named "OutreachFlowSol".

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 0.0  # advisory: init auto-scaffolds the parent solution (CLI #2470)

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent discovered the EmailDrafter identity with uip solution resources list"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources\s+list\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the EmailDrafter configuration with uip solution resources get"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources\s+get\b'
    min_count: 1
    weight: 0.5
    pass_threshold: 0.0

  - type: command_executed
    description: "Agent searched the flow registry for the external agent-as-tool manifest"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+search\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the external agent-as-tool node manifest from the flow registry"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+get\s+.*uipath\.agent\.resource\.tool\.agent\.'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the inline autonomous agent node manifest from the flow registry"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+get\s+.*uipath\.agent\.autonomous'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "OutreachFlowSol/OutreachFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "OutreachFlowSol/OutreachFlow/OutreachFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline external agent tool: resource.json shape (location=external) + flow node (tool.agent.*) + tool-handle edge"
    command: "python3 $TASK_DIR/check_inline_external_agent_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
