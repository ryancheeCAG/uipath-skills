task_id: skill-agent-external-maestro-tool
description: >
  Add Maestro tool (external resource). End-to-end test: scaffold a
  standalone low-code agent that calls a Maestro / agentic process
  living OUTSIDE this solution (already deployed to Orchestrator as
  "ProcurementProcess" in the
  "Shared/uipath-agents/ProcurementProcess" folder). Verifies the
  tool resource.json uses `type: "processOrchestration"`,
  `location: "external"`, the deployed `folderPath`, and a UUID-
  shaped `referenceKey` fetched via `uip solution resource list`.
  Also verifies that `uip agent validate` emits a
  `resource: "process"` binding (Maestro tools share the process
  binding kind) pinned to the deployed name + folder.
tags: [uipath-agents, e2e, low-code]

run_limits:
  expected_turns: 29
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "ProcurementSol" containing a single
  low-code agent "ProcurementAgent". The agent accepts a required
  `productId` (number) and returns a boolean `status`. It must
  determine the status by delegating to an Agentic process
  named "ProcurementProcess" that is already deployed in the
  tenant — not by reasoning about the answer itself.

  Use the real folder and process name from the tenant — do not
  hard-code or guess these values. Name the agent's tool resource
  `ProcurementProcess` (matching the deployed process).

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent discovered the Maestro process identity with uip solution resource list --kind Process"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+list\b.*--kind\s+Process'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the Maestro process configuration with uip solution resource get"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+get\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "ProcurementSol/ProcurementSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed solution resources with uip solution resource refresh"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "ProcurementAgent/agent.json was created"
    path: "ProcurementSol/ProcurementAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "ProcurementProcess external Maestro tool resource.json was created"
    path: "ProcurementSol/ProcurementAgent/resources/ProcurementProcess/resource.json"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "ProcurementSol/ProcurementAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "External Maestro tool resource shape, deployed folderPath/referenceKey, and bindings sync"
    command: "python3 $TASK_DIR/check_external_maestro_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
