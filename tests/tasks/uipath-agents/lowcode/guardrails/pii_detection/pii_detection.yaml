task_id: skill-agent-guardrail-pii-detection
description: >
  Built-in PII detection guardrail. End-to-end test: scaffold a
  standalone low-code agent and add a builtInValidator guardrail for
  pii_detection that blocks Email and PhoneNumber entities. Verifies
  correct $guardrailType, validatorType, $parameterType discriminators,
  PascalCase entity names, enum-list and map-enum parameter types, and
  PascalCase scope values.
tags: [uipath-agents, e2e, low-code, guardrail]
initial_prompt: |
  Create a UiPath low-code agent "PiiSafeAgent" that answers user questions
  about their accounts. Add a built-in PII detection guardrail that
  blocks Email and PhoneNumber entities in agent-level output. Use a
  block action with reason "PII detected in output." The solution
  should be named "PiiGuardSol".

  Include entity thresholds of 0.5 for both Email and PhoneNumber.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "PiiGuardSol/PiiGuardSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the project to regenerate derived files"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "PiiSafeAgent/agent.json was created"
    path: "PiiGuardSol/PiiSafeAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0


  - type: run_command
    description: "PII detection guardrail shape (builtInValidator, pii_detection, parameters, PascalCase)"
    command: "python3 $TASK_DIR/check_pii_detection.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

run_limits:
  expected_turns: 15
  max_turns: 30
  turn_timeout: 1200
