task_id: skill-agent-inline-mcp-server-tool
description: >
  MCP server tools for flow inline agents. End-to-end test: scaffold
  a flow project with an inline low-code agent that declares an MCP
  (Model Context Protocol) server as a resource. Verifies the
  resource.json under the inline agent's UUID subdirectory uses
  `$resourceType: "mcp"` (distinct from `$resourceType: "tool"`) with
  the documented sparse shape, and that a `uipath.agent.resource.mcp.*`
  flow node is wired to the autonomous agent node's `tool` handle.
tags: [uipath-agents, e2e, low-code, inline-flow]

run_limits:
  expected_turns: 77
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "DevToolsFlowSol" containing a flow project
  "DevToolsFlow". The flow should use an inline low-code agent that
  connects to an MCP server named "GitHubMcp" exposing GitHub-related
  tools. Declare the MCP server as a resource on the inline agent and
  wire it into the flow.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "DevToolsFlowSol/DevToolsFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "DevToolsFlowSol/DevToolsFlow/DevToolsFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline MCP server: resource.json shape ($resourceType=mcp) + mcp flow node + tool-handle edge"
    command: "python3 $TASK_DIR/check_inline_mcp_server_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
