task_id: skill-agent-inline-solution-rpa-tool
description: >
  Add an inline-agent RPA tool inside an existing solution (brownfield).
  The fixture ships a `PayrollFlowSol` solution that already contains a
  registered `CalculatePay` RPA process project. The agent must add a
  NEW `PayrollFlow` Flow project whose inline low-code agent delegates
  to the pre-existing `CalculatePay` as a tool — reusing it, NOT
  re-creating it and NOT re-initializing the solution. Verifies the tool
  resource.json under the inline agent's UUID subdirectory uses
  `type: "process"`, `location: "solution"`,
  `folderPath: "solution_folder"`, and that a
  `uipath.agent.resource.tool.process.<uuid>` flow node is wired to the
  autonomous agent node's `tool` handle.
tags: [uipath-agents, e2e, mode:build, low-code, inline-flow]

run_limits:
  expected_turns: 63
  turn_timeout: 1200

pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/lowcode/inline_solution_rpa_tool/_fixtures/PayrollFlowSol ."
    timeout: 10

initial_prompt: |
  Create a new UiPath Flow project named "PayrollFlow" inside the existing
  "PayrollFlowSol" solution (in the current directory). Its inline low-code
  agent should compute pay using the existing "CalculatePay" RPA process that's
  already in the solution, rather than working it out itself.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  # Brownfield: the solution already exists in the fixture.
  - type: command_not_executed
    description: "Agent did NOT re-initialize the pre-existing solution"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    exclude_pattern: '--help'
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Informational discovery criteria: the agent may use file reads instead of
  # CLI discovery. pass_threshold:0 means these never block the run.
  - type: command_executed
    description: "Agent discovered the existing CalculatePay via solution resources list (informational)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources?\s+list\b.*--source\s+local'
    min_count: 1
    weight: 0.5
    pass_threshold: 0.0

  # Informational, NOT enforced: pass_threshold:0 means score (0 when the
  # agent skips `resources get`) always clears the bar. The `resources list`
  # discovery above is the enforced signal; `get` is an acceptable-but-optional
  # follow-up.
  - type: command_executed
    description: "Agent fetched the CalculatePay configuration with uip solution resources get (informational)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources?\s+get\b'
    min_count: 1
    weight: 0.5
    pass_threshold: 0.0

  # Local-registry discovery: informational. The agent may discover node types
  # via file reads or resources list output instead of registry search/list.
  - type: command_executed
    description: "Agent searched or listed the local flow registry for the RPA tool manifest (informational)"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+(search|list)\b.*--local'
    min_count: 1
    weight: 0.5
    pass_threshold: 0.0

  # Outcome-based check: the fixture .uipx starts with CalculatePay
  # registered; auto-registration of the new Flow project must bring
  # Projects[] to 2.
  - type: json_check
    description: "PayrollFlow is registered alongside CalculatePay in the parent solution .uipx"
    path: "PayrollFlowSol/PayrollFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "PayrollFlowSol/PayrollFlow/PayrollFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline solution RPA tool: resource.json shape + flow node + tool-handle edge"
    command: "python3 $TASK_DIR/check_inline_solution_rpa_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
