task_id: skill-agent-guardrail-escalation-app
description: >
  Built-in PII detection guardrail with escalate action. End-to-end test:
  scaffold a standalone low-code agent and add a builtInValidator guardrail
  for pii_detection that escalates Email and PhoneNumber violations to an
  Action Center app instead of blocking. Verifies the skill uses
  `uip agent guardrails list` to discover validators, uses
  `uip solution resource list` to look up the escalation app, and
  correctly authors the escalate action with $actionType, app.name,
  app.version, app.folderName, and a recipient.
tags: [uipath-agents, e2e, low-code, guardrail]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
  max_turns: 40
  turn_timeout: 1200

task_timeout: 1800

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath solution "EscalateSol" with an agent "ComplianceAgent" for
  handling user requests about financial data. Add a guardrail that detects PII
  — specifically email addresses and phone numbers — and instead of blocking,
  escalates violations to a human reviewer via the
  "Tool.Guardrail.Escalation.Action.App" app, notifying reviewer@example.com.
  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "EscalateSol/EscalateSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip agent guardrails list to discover validators"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+guardrails\s+list'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip solution resource list to look up the escalation app"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+list'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the app's action schema via the Apps API"
    tool_name: "Bash"
    command_pattern: 'action-schema|action-apps'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "ComplianceAgent/agent.json was created"
    path: "EscalateSol/ComplianceAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "EscalateSol/ComplianceAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "PII escalation guardrail shape (builtInValidator, pii_detection, escalate action, app fields, recipient)"
    command: "python3 $TASK_DIR/check_guardrail_escalation_app.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
