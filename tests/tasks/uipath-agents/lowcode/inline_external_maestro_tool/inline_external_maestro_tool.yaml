task_id: skill-agent-inline-external-maestro-tool
description: >
  Add Maestro tool (inline agent, external resource). End-to-end test:
  scaffold a flow project with an inline low-code agent that calls an
  EXTERNAL Maestro flow deployed to Orchestrator (not inside this
  solution). Verifies the tool resource.json under the inline agent's
  UUID subdirectory uses `type: "processOrchestration"`, `location:
  "external"`, real `folderPath`, and that a
  `uipath.agent.resource.tool.*` flow node is wired to the autonomous
  agent node's `tool` handle.
tags: [uipath-agents, e2e, low-code, inline-flow]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "ProcurementFlowSol" containing a flow
  project "ProcurementFlow" with an inline low-code agent. The agent
  accepts a required `productId` (number) and returns a boolean
  `status`. It must determine the status by delegating to an Agentic
  process named "ProcurementProcess" that is already deployed in the
  tenant — not by reasoning about the answer itself.

  Use the real folder and process name from the tenant — do not
  hard-code or guess these values. Name the agent's tool resource
  `ProcurementProcess` (matching the deployed process).

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent discovered the Maestro process identity with uip solution resource list --kind Process"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+list\b.*--kind\s+Process'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the Maestro process configuration with uip solution resource get"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+get\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent searched the flow registry for the external Maestro tool manifest"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+search\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the external Maestro tool node manifest from the flow registry"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+get\s+.*uipath\.agent\.resource\.tool\.processorchestration\.'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the inline autonomous agent node manifest from the flow registry"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+get\s+.*uipath\.agent\.autonomous'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "ProcurementFlowSol/ProcurementFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "ProcurementFlowSol/ProcurementFlow/ProcurementFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline external Maestro tool: resource.json shape (location=external) + flow node + tool-handle edge"
    command: "python3 $TASK_DIR/check_inline_external_maestro_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
