task_id: skill-agent-resolution-drafter
description: >
  End-to-end test: scaffold a standalone low-code agent that composes a
  customer-facing billing-dispute resolution email. Inputs: customer,
  invoice, adjustment, disputeAnalysis. Outputs: subject and body.
  The system prompt must cover the three adjustment-type variations
  (credit memo, revised invoice, both). Verifies schema sync,
  input/output field presence, contentTokens for every input, and uses
  an LLM judge to score the system prompt's three-way adjustment
  coverage.
tags: [uipath-agents, e2e, low-code]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "ResolutionSol" containing a single low-code
  agent "ResolutionDrafterAgent".

  The agent composes a professional customer-facing resolution email
  after a billing dispute has been adjusted.

  Inputs (all required objects):
    - customer         — { name, email, tier }
    - invoice          — { invoiceNumber }
    - adjustment       — { adjustmentId, adjustmentType, creditAmount,
                           adjustedInvoiceBalance }
                         where adjustmentType is an enum with exactly
                         the values "credit_memo", "revised_invoice",
                         and "both"
    - disputeAnalysis  — { rootCause, rootCauseDetail,
                           customerFacingExplanation }

  Outputs (both required strings):
    - subject — the email subject line
    - body    — the email body

  The system prompt MUST explicitly cover the three adjustment-type
  variations:
    - credit memo (reference the credit memo number, credit amount,
      adjusted balance)
    - revised invoice (explain the original invoice was cancelled and a
      corrected invoice issued so the customer can claim ITC)
    - both (cover the credit memo AND the revised invoice)

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "ResolutionSol/ResolutionSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "ResolutionDrafterAgent/agent.json was created"
    path: "ResolutionSol/ResolutionDrafterAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "ResolutionDrafterAgent/entry-points.json was created"
    path: "ResolutionSol/ResolutionDrafterAgent/entry-points.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "ResolutionSol/ResolutionDrafterAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Schema sync, input/output field presence, and contentTokens for all 4 inputs"
    command: "python3 $TASK_DIR/check_resolution_drafter_agent.py"
    timeout: 30
    expected_exit_code: 0
    weight: 4.0
    pass_threshold: 1.0

  - type: llm_judge
    description: "LLM judge: system prompt covers all three adjustment-type variations (credit memo, revised invoice, both)"
    files: ["ResolutionSol/ResolutionDrafterAgent/agent.json"]
    weight: 1.0
    pass_threshold: 0.8
    prompt: |
      You are grading the `messages[]` entry with `role == "system"` inside
      `ResolutionSol/ResolutionDrafterAgent/agent.json`. Ignore every other
      field (schemas, projectId, tools, the user message). Only the system
      prompt's `content` string is under review.

      Score the system prompt on three rubric items, each worth 1/3 of
      the final score:

        R1. Credit memo variation — does it tell the drafter how to
            handle the `credit_memo` adjustment type? Clear coverage
            references the credit memo (id/number), the credit amount,
            and the adjusted invoice balance. Paraphrase is fine;
            literal field names are not required if the meaning is
            clear.

        R2. Revised invoice variation — does it tell the drafter how to
            handle the `revised_invoice` adjustment type? Clear coverage
            explains that the original invoice was cancelled and a
            corrected invoice issued (so the customer can claim ITC or
            equivalent tax-input-credit reasoning).

        R3. Combined variation — does it tell the drafter how to handle
            the `both` adjustment type (credit memo AND revised
            invoice)? The prompt must address the combined case
            explicitly, not only the two single-type cases.

      Award 1.0 for clear and specific coverage of an item, 0.5 for
      partial/ambiguous coverage, 0.0 for missing. The final `score` is
      the average of R1, R2, R3 rounded to two decimals. If `agent.json`
      is missing or has no system message, score 0.0.
