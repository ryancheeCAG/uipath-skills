task_id: skill-agent-solution-maestro-tool
description: >
  Add Maestro tool (solution resource). End-to-end test:
  scaffold a standalone low-code agent that calls a Maestro flow
  living inside the same solution. Verifies the tool resource.json
  uses `type: "processOrchestration"`, `location: "solution"`, and
  `folderPath: "solution_folder"`.
tags: [uipath-agents, e2e, low-code]

run_limits:
  expected_turns: 72
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "OnboardingSol" containing a low-code agent
  "OnboardingAgent". The agent should call an Agentic process called
  "EmployeeOnboarding" that lives INSIDE this same solution as a
  separate project. Expose it to the agent as a tool resource.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "OnboardingSol/OnboardingSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "OnboardingAgent/agent.json was created"
    path: "OnboardingSol/OnboardingAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "EmployeeOnboarding Maestro tool resource.json was created"
    path: "OnboardingSol/OnboardingAgent/resources/EmployeeOnboarding/resource.json"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "OnboardingSol/OnboardingAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Solution Maestro tool resource shape (type, location, folderPath)"
    command: "python3 $TASK_DIR/check_solution_maestro_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
