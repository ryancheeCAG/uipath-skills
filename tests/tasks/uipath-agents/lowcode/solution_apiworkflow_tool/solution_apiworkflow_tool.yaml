task_id: skill-agent-solution-apiworkflow-tool
description: >
  Add API workflow tool (solution resource). End-to-end test:
  scaffold a standalone low-code agent that calls an API workflow
  living inside the same solution. Verifies the tool resource.json
  uses `type: "api"`, `location: "solution"`, and
  `folderPath: "solution_folder"`.
tags: [uipath-agents, e2e, low-code]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "ShippingSol" containing a low-code agent
  "ShippingAgent". The agent should call an API workflow called
  "CalculateShippingRate" that lives INSIDE this same solution as a
  separate project. Expose it to the agent as a tool resource.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "ShippingSol/ShippingSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "ShippingAgent/agent.json was created"
    path: "ShippingSol/ShippingAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "CalculateShippingRate API workflow tool resource.json was created"
    path: "ShippingSol/ShippingAgent/resources/CalculateShippingRate/resource.json"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "ShippingSol/ShippingAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Solution API workflow tool resource shape (type, location, folderPath)"
    command: "python3 $TASK_DIR/check_solution_apiworkflow_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
