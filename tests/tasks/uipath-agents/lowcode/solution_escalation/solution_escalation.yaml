task_id: skill-agent-solution-escalation-tool
description: >
  Add escalation app tools (solution resource). End-to-end test:
  scaffold a standalone low-code agent that escalates uncertain cases
  to a human reviewer via an ActionCenter app provisioned inside this
  same solution. Verifies the `$resourceType: "escalation"`
  resource.json format, the ActionCenter channel wiring, and that
  `uip agent validate` accepts the escalation after refresh regenerates
  derived files. Distinct from `external_escalation` which targets
  an ActionCenter app that lives externally in Orchestrator.
tags: [uipath-agents, e2e, low-code]

run_limits:
  expected_turns: 19
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath low-code agent "ModerationAgent" that accepts a required
  `content` (string) and returns a `decision` (string). When the agent
  is uncertain, it must be able to escalate to a human reviewer via
  UiPath ActionCenter — model this as an escalation resource called
  "HumanReview" on the agent. The solution should be named "ReviewSol".

  When writing the escalation resource.json, set `isEnabled` to true so
  the escalation is active for the agent.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "ReviewSol/ReviewSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the project to regenerate derived files"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "ModerationAgent/agent.json was created"
    path: "ReviewSol/ModerationAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "HumanReview escalation resource.json was created"
    path: "ReviewSol/ModerationAgent/resources/HumanReview/resource.json"
    weight: 2.5
    pass_threshold: 1.0


  - type: run_command
    description: "Escalation resource shape and ActionCenter channel wiring"
    command: "python3 $TASK_DIR/check_solution_escalation.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
