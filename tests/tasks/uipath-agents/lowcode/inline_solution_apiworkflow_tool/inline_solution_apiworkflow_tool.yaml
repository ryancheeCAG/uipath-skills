task_id: skill-agent-inline-solution-apiworkflow-tool
description: >
  Add API workflow tool (inline agent, solution resource). End-to-end
  test: scaffold a flow project with an inline low-code agent that
  calls an API workflow living inside the same solution. Verifies the
  tool resource.json under the inline agent's UUID subdirectory uses
  `type: "api"`, `location: "solution"`, `folderPath:
  "solution_folder"`, and that a `uipath.agent.resource.tool.*` flow
  node is wired to the autonomous agent node's `tool` handle.
tags: [uipath-agents, e2e, low-code, inline-flow]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "ShippingFlowSol" containing a flow project
  "ShippingFlow". The flow should use an inline low-code agent that
  calls an API workflow called "CalculateShippingRate" living inside
  this same solution as a separate project. Wire the API workflow as
  a tool on the inline agent.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "ShippingFlowSol/ShippingFlowSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "ShippingFlowSol/ShippingFlow/ShippingFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Inline solution API workflow tool: resource.json shape + flow node + tool-handle edge"
    command: "python3 $TASK_DIR/check_inline_solution_apiworkflow_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
