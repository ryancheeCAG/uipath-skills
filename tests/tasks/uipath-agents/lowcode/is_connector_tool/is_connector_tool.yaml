task_id: skill-agent-is-connector-tool
description: >
  Integration Service (IS) tools. End-to-end test: scaffold a
  standalone low-code agent that exposes an IS connector activity as
  a tool. The agent under test must discover the connector via
  `uip is`, author a `type: "integration"` resource.json, create a
  `bindings_v2.json` with the connection binding, and run
  `uip solution resource refresh` so the solution provisions the
  connection resource. Verifies design-time artifacts only (no
  runtime connector invocation). Cloud auth required — depends on
  the staging tenant having the `uipath-uipath-airdk` (GenAI
  Activities) connector available.
tags: [uipath-agents, e2e, low-code]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "ResearchSol" containing a single low-code
  agent "ResearchAgent". The agent should be able to search the web
  using the "WebSearch" activity from the UiPath GenAI Activities
  Integration Service connector (connector key
  `uipath-uipath-airdk`). Expose the activity to the agent as an
  Integration Service tool. Update the agent's bindings and refresh
  the solution so the connection resource is provisioned. Validate
  the agent project.

  Do NOT invoke the connector at runtime.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent discovered connectors via `uip is`"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "ResearchSol/ResearchSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed solution resources"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+refresh'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "ResearchAgent/agent.json was created"
    path: "ResearchSol/ResearchAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "ResearchSol/ResearchAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "IS tool resource.json shape (type=integration), bindings_v2.json authored, connection resource provisioned"
    command: "python3 $TASK_DIR/check_is_connector_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
