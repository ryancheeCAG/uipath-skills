task_id: skill-agents-batch-transform-lowcode-e2e-enable-tool
description: >
  E2E: scaffold a low-code agent that enables the built-in
  batch-transform tool. Verifies the canonical CLI flow (uip solution
  init, uip agent init, uip agent validate) registers the project in
  the parent .uipx and that resource.json uses the exact built-in shape
  (type=internal, referenceKey=null, properties.toolType=batch-transform).
tags: [uipath-agents, e2e, low-code, lifecycle:generate, context-grounding]

run_limits:
  expected_turns: 21
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "BatchSol" containing a low-code agent
  "BatchAgent" that takes a CSV upload and adds two LLM-filled columns:
  a 4-digit MCC code and a confidence label. Enable the built-in
  "batch-transform" tool so the agent can produce one augmented row per
  input row.

  Use the `uip` CLI to scaffold the solution and agent — do NOT
  hand-author the solution `.uipx`, `agent.json`, `project.uiproj`,
  or `entry-points.json` files.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip agent init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "BatchSol/BatchSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "BatchAgent/agent.json was created"
    path: "BatchSol/BatchAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "BatchSol/BatchAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "batch-transform built-in tool resource shape (type=internal, referenceKey=null, toolType=batch-transform)"
    command: "python3 $TASK_DIR/check_batch_transform_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
