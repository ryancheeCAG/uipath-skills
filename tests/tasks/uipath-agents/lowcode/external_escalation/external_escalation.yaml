task_id: skill-agent-external-escalation-tool
description: >
  Escalation app tools (external resource). End-to-end test:
  scaffold a standalone low-code agent that escalates uncertain cases
  to an EXTERNAL ActionCenter app that is already deployed to
  Orchestrator (not inside this solution). Verifies the escalation
  resource.json shape and the ActionCenter channel wiring. Distinct
  from `solution_escalation` which targets a solution-internal
  ActionCenter app.
tags: [uipath-agents, e2e, mode:build, low-code]

run_limits:
  expected_turns: 24
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath low-code agent "FraudTriageAgent" that reviews a
  `transaction` (object) and returns a `verdict` (string). When it isn't
  confident, it should escalate the case to a human reviewer through our
  existing "FraudEscalation" Action Center app, which is already running in
  Orchestrator (it isn't part of this solution). The solution should be named
  "FraudSol".

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 0.0  # advisory: init auto-scaffolds the parent solution (CLI #2470)

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Enforced discovery criteria: the app is EXTERNAL (deployed in Orchestrator,
  # not in this solution and not in any fixture), so discovering its identity and
  # action schema via the CLI is mandatory — there is no alternative lookup path.
  # `resources list --kind App` yields the resourceKey/appName/folder; `resources
  # get` yields the action schema needed to author the channel.
  - type: command_executed
    description: "Agent discovered the FraudEscalation app via uip solution resources list --kind App"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources\s+list\b.*--kind\s+App'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the app action schema with uip solution resources get"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources?\s+get\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "FraudSol/FraudSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the project to regenerate derived files"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "FraudTriageAgent/agent.json was created"
    path: "FraudSol/FraudTriageAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "External escalation resource shape (escalation resource located by content + ActionCenter channel bound to the FraudEscalation app; folder name agnostic)"
    command: "python3 $TASK_DIR/check_external_escalation.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
