task_id: skill-agent-external-escalation-tool
description: >
  Escalation app tools (external resource). End-to-end test:
  scaffold a standalone low-code agent that escalates uncertain cases
  to an EXTERNAL ActionCenter app that is already deployed to
  Orchestrator (not inside this solution). Verifies the escalation
  resource.json shape and the ActionCenter channel wiring. Distinct
  from `solution_escalation` which targets a solution-internal
  ActionCenter app.
tags: [uipath-agents, e2e, low-code]

run_limits:
  expected_turns: 24
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "FraudSol" containing a low-code agent
  "FraudTriageAgent". The agent accepts a required `transaction`
  (object) and returns a `verdict` (string). When the agent is
  uncertain, it must escalate to a human reviewer via an EXISTING
  EXTERNAL ActionCenter app named "FraudEscalationQueue" that is
  already deployed to the Orchestrator "Shared" folder (not inside
  this solution). Model this as an escalation resource on the agent.

  When writing the escalation resource.json, set `isEnabled` to true so
  the escalation is active for the agent. Set `properties.folderPath`
  to the literal string "Shared" (the live Orchestrator folder where
  FraudEscalationQueue is deployed) — never use placeholder values
  like "solution_folder".

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "FraudSol/FraudSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "FraudTriageAgent/agent.json was created"
    path: "FraudSol/FraudTriageAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "FraudEscalationQueue external escalation resource.json was created"
    path: "FraudSol/FraudTriageAgent/resources/FraudEscalationQueue/resource.json"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "FraudSol/FraudTriageAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "External escalation resource shape (ActionCenter channel, external target)"
    command: "python3 $TASK_DIR/check_external_escalation.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
