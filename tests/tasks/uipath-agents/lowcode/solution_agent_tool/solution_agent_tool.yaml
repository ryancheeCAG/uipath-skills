task_id: skill-agent-solution-agent-tool
description: >
  Add agent tool (solution resource). End-to-end test: scaffold a
  standalone low-code agent that calls another agent living inside
  the same solution as a separate project. Verifies the tool
  resource.json uses `type: "agent"`, `location: "solution"`, and
  `folderPath: "solution_folder"`. Exercises the resource.json tool
  format, location/folderPath conventions, referenceKey resolution,
  and distinct projectId UUIDs across agents.
tags: [uipath-agents, e2e, low-code]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "OrchestratorSol" with two low-code
  agents, "ParentAgent" and "ToolAgent". ToolAgent echoes back the
  string it receives. ParentAgent should use ToolAgent as a tool.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "OrchestratorSol/OrchestratorSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "ParentAgent/agent.json was created"
    path: "OrchestratorSol/ParentAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "ToolAgent/agent.json was created"
    path: "OrchestratorSol/ToolAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "ToolAgent solution agent tool resource.json was created"
    path: "OrchestratorSol/ParentAgent/resources/ToolAgent/resource.json"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "OrchestratorSol/ParentAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "resource.json wires ToolAgent correctly (type, location, properties, schemas) and UUIDs are distinct"
    command: "python3 $TASK_DIR/check_solution_agent_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
