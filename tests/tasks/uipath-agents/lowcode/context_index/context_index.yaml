task_id: skill-agent-context-index
description: >
  End-to-end test: scaffold a standalone low-code agent that uses a
  semantic index as a context (RAG) resource. Verifies that the
  `$resourceType: "context"` + `contextType: "index"` resource.json
  format is authored correctly, that `settings.retrievalMode` is a
  valid value, and that `uip agent validate` accepts the resource and
  regenerates `.agent-builder/`.
tags: [uipath-agents, e2e, low-code]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "KnowledgeSol" containing a single low-code
  agent "ProductSupportAgent". The agent accepts a required `question`
  (string) and returns a string `answer`. It must ground its answers
  in the existing semantic index named "UiPathAgentsProductKnowledge"
  that is already deployed in the tenant.

  Use the real folder, index name, and backing storage bucket from
  the tenant — do not hard-code or guess these values. Name the
  agent's context resource `UiPathAgentsProductKnowledge` (matching
  the index).

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent discovered the index identity with uip solution resource list --kind Index"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+list\b.*--kind\s+Index'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the index configuration with uip solution resource get"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+get\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "KnowledgeSol/KnowledgeSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed solution resources with uip solution resource refresh"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "ProductSupportAgent/agent.json was created"
    path: "KnowledgeSol/ProductSupportAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "UiPathAgentsProductKnowledge context resource.json was created"
    path: "KnowledgeSol/ProductSupportAgent/resources/UiPathAgentsProductKnowledge/resource.json"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "KnowledgeSol/ProductSupportAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Context resource shape, retrievalMode, and schema sync"
    command: "python3 $TASK_DIR/check_context_index.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
