task_id: skill-agent-mcp-server-tool
description: >
  MCP server tools. End-to-end test: scaffold a standalone
  low-code agent that declares an MCP (Model Context Protocol) server
  as a resource. Verifies the resource.json uses `$resourceType:
  "mcp"` (distinct from `$resourceType: "tool"`) and the documented
  MCP shape (id, name, description, isEnabled, tools).
tags: [uipath-agents, e2e, low-code]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "DevToolsSol" containing a low-code agent
  "DevAssistantAgent". The agent should connect to an MCP server
  named "GitHubMcp" that exposes GitHub-related tools. Declare the
  MCP server as a resource on the agent.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "DevToolsSol/DevToolsSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "DevAssistantAgent/agent.json was created"
    path: "DevToolsSol/DevAssistantAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "GitHubMcp MCP resource.json was created"
    path: "DevToolsSol/DevAssistantAgent/resources/GitHubMcp/resource.json"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "DevToolsSol/DevAssistantAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "MCP server resource shape ($resourceType=mcp, id, name, isEnabled, tools)"
    command: "python3 $TASK_DIR/check_mcp_server_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
