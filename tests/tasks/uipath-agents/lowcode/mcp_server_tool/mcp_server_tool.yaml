task_id: skill-agent-mcp-server-tool
description: >
  MCP server tools. End-to-end test: scaffold a standalone
  low-code agent that declares the UiPath Orchestrator MCP server
  as a resource. Verifies the resource.json uses `$resourceType:
  "mcp"` (distinct from `$resourceType: "tool"`) and the documented
  reference shape (id, name, description, slug, folderPath,
  availableTools, solutionProperties.resourceKey).
tags: [uipath-agents, e2e, mode:build, low-code, lifecycle:generate]

run_limits:
  expected_turns: 17
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath low-code agent "DevAssistantAgent" that can manage Orchestrator
  jobs — start, list, inspect, stop, restart — through our UiPath Orchestrator
  MCP server. Connect the agent to that server and give it the job-related
  tools. The solution should be named "DevToolsSol".

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "DevToolsSol/DevToolsSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the project to regenerate derived files"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "DevAssistantAgent/agent.json was created"
    path: "DevToolsSol/DevAssistantAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "bindings_v2.json was generated by refresh (carries the mcpServer binding)"
    path: "DevToolsSol/DevAssistantAgent/bindings_v2.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "MCP server resource shape ($resourceType=mcp, id, name, slug, folderPath, availableTools, solutionProperties.resourceKey)"
    command: "python3 $TASK_DIR/check_mcp_server_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
