task_id: skill-agent-inline-in-flow
description: >
  End-to-end test: given a goal-only prompt to build a flow that uses
  a low-code agent, the agent must derive from the skill that the
  right architecture is the inline-in-flow pattern. Verifies the agent
  uses `uip agent init --inline-in-flow` and the full validate →
  migrate split with `--inline-in-flow`, and produces the UUID-named
  subdirectory layout (no entry-points.json, no project.uiproj,
  empty flow-layout.json) wired into the flow with the correct
  `uipath.agent.autonomous` node and edges.
tags: [uipath-agents, e2e, low-code, inline-flow]

run_limits:
  expected_turns: 31
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath solution "GreetingSol" containing a flow project
  "GreetingFlow". The flow uses a single low-code agent embedded
  inside the flow project to generate a greeting.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the inline agent with --inline-in-flow"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init\s+.*--inline-in-flow'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "GreetingSol/GreetingSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the inline agent with --inline-in-flow (read-only check)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent migrated the inline agent with --inline-in-flow (writes .agent-builder/*)"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+migrate\s+.*--inline-in-flow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "GreetingSol/GreetingFlow/GreetingFlow.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow project descriptor was created"
    path: "GreetingSol/GreetingFlow/project.uiproj"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Inline agent layout + flow wiring (autonomous node, source dir, edges)"
    command: "python3 $TASK_DIR/check_inline_in_flow.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
