task_id: skill-agent-solution-rpa-tool
description: >
  Add an RPA tool inside an existing solution (brownfield). The fixture
  ships a `PayrollSol` solution that already contains a registered
  `CalculatePay` RPA process project. The agent must add a NEW
  `PayrollAgent` project and wire the pre-existing `CalculatePay` in as
  a tool — reusing it, NOT re-creating it and NOT re-initializing the
  solution. Verifies the tool resource.json uses `type: "process"`,
  `location: "solution"`, and `folderPath: "solution_folder"`.
tags: [uipath-agents, e2e, mode:build, low-code]

run_limits:
  expected_turns: 40
  turn_timeout: 1200

pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-agents/lowcode/solution_rpa_tool/_fixtures/PayrollSol ."
    timeout: 10

initial_prompt: |
  Create a new UiPath low-code agent named "PayrollAgent" inside the existing
  "PayrollSol" solution (in the current directory). PayrollAgent should compute
  pay using the existing "CalculatePay" RPA process that's already in the
  solution, rather than working it out itself.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  # Brownfield: the solution already exists in the fixture.
  - type: command_not_executed
    description: "Agent did NOT re-initialize the pre-existing solution"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    exclude_pattern: '--help'
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the new PayrollAgent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Informational discovery criteria: the agent may use file reads instead of
  # CLI discovery. pass_threshold:0 means these never block the run.
  - type: command_executed
    description: "Agent discovered the existing CalculatePay via solution resources list (informational)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources?\s+list\b.*--source\s+local'
    min_count: 1
    weight: 0.5
    pass_threshold: 0.0

  # Informational, NOT enforced: pass_threshold:0 means score (0 when the
  # agent skips `resources get`) always clears the bar. The `resources list`
  # discovery above is the enforced signal; `get` is an acceptable-but-optional
  # follow-up.
  - type: command_executed
    description: "Agent fetched the CalculatePay configuration with uip solution resources get (informational)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources?\s+get\b'
    min_count: 1
    weight: 0.5
    pass_threshold: 0.0

  # Outcome-based check: the fixture .uipx starts with CalculatePay
  # registered; auto-registration via `uip agent init` must add
  # PayrollAgent, bringing Projects[] to 2.
  - type: json_check
    description: "PayrollAgent is registered alongside CalculatePay in the parent solution .uipx"
    path: "PayrollSol/PayrollSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the project to regenerate derived files"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "PayrollAgent/agent.json was created"
    path: "PayrollSol/PayrollAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "CalculatePay RPA tool resource.json was created"
    path: "PayrollSol/PayrollAgent/resources/CalculatePay/resource.json"
    weight: 2.5
    pass_threshold: 1.0

  - type: run_command
    description: "Solution RPA tool resource shape (type, location, folderPath)"
    command: "python3 $TASK_DIR/check_solution_rpa_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
