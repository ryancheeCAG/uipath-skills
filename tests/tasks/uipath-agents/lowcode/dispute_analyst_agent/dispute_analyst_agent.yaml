task_id: skill-agent-dispute-analyst
description: >
  End-to-end test: scaffold a standalone low-code agent that analyzes a
  billing dispute. The agent must declare a 5-field inputSchema
  (invoice, erpInvoice, customerContext, discrepancies, dispute) and an
  outputSchema exposing validity, rootCause, rootCauseDetail,
  recommendedResolution, recommendedCreditAmount, confidenceScore,
  rationale, customerFacingExplanation, and flags. Validates schema
  sync, field presence, contentTokens for every input, and uses an LLM
  judge to score the system prompt for dispute-domain coverage.
tags: [uipath-agents, e2e, low-code]

run_limits:
  expected_turns: 15
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath low-code agent "DisputeAnalystAgent" that analyzes a billing
  dispute by synthesizing data from four systems and producing a
  structured analysis. The solution should be named "DisputeSol".

  Inputs (all required objects):
    - invoice           — extracted invoice fields
    - erpInvoice        — ERP contract, pricing, and payment history
    - customerContext   — CRM tier, health score, prior disputes
    - discrepancies     — computed discrepancy report
    - dispute           — customer-submitted dispute (description, etc.)

  Output: a single object disputeAnalysis with these fields:
    - validity                  — enum: "invalid", "valid_low", "valid_high"
    - rootCause                 — enum: "pricing_mismatch", "tax_rate_error",
                                  "tax_type_error", "duplicate_charge",
                                  "missing_discount", "quantity_mismatch",
                                  "no_discrepancy_found", "multiple"
    - rootCauseDetail           — string
    - recommendedResolution     — enum: "full_credit", "partial_credit",
                                  "revised_invoice",
                                  "credit_and_revised_invoice",
                                  "reject_with_explanation"
    - recommendedCreditAmount   — number
    - confidenceScore           — number (0.0 to 1.0)
    - rationale                 — string
    - customerFacingExplanation — string
    - flags                     — array of strings

  The system prompt must explicitly cover: the meaning of each validity
  value, the confidence threshold convention (below 0.80 never
  auto-approves), and how the agent chooses a root cause and
  recommended resolution.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "DisputeSol/DisputeSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent refreshed the project to regenerate derived files"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+refresh'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "DisputeAnalystAgent/agent.json was created"
    path: "DisputeSol/DisputeAnalystAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "DisputeAnalystAgent/entry-points.json was created"
    path: "DisputeSol/DisputeAnalystAgent/entry-points.json"
    weight: 1.0
    pass_threshold: 1.0


  - type: run_command
    description: "Schema sync, input/output field presence, and contentTokens for all 5 inputs"
    command: "python3 $TASK_DIR/check_dispute_analyst_agent.py"
    timeout: 30
    expected_exit_code: 0
    weight: 4.0
    pass_threshold: 1.0

  - type: llm_judge
    description: "LLM judge: system prompt covers validity semantics, confidence threshold, and root-cause/resolution decision logic"
    files: ["DisputeSol/DisputeAnalystAgent/agent.json"]
    weight: 1.0
    pass_threshold: 0.8
    prompt: |
      You are grading the `messages[]` entry with `role == "system"` inside
      `DisputeSol/DisputeAnalystAgent/agent.json`. Ignore every other field
      (schemas, projectId, tools, the user message). Only the system
      prompt's `content` string is under review.

      Score the system prompt on three rubric items, each worth 1/3 of
      the final score:

        R1. Validity enum semantics — does it explain what each of
            `invalid`, `valid_low`, and `valid_high` means? All three
            names must be addressed (paraphrase is fine; literal labels
            are not required if the meaning is clear).

        R2. Confidence threshold — does it state that confidence scores
            below 0.80 never auto-approve (or equivalent: require human
            review / escalate / no autonomous action)?

        R3. Decision logic — does it describe how the agent picks a
            `rootCause` AND a `recommendedResolution`? Both must be
            addressed (criteria, mapping, or signals — not just listing
            the enum values).

      Award 1.0 for clear and specific coverage of an item, 0.5 for
      partial/ambiguous coverage, 0.0 for missing. The final `score` is
      the average of R1, R2, R3 rounded to two decimals. If `agent.json`
      is missing or has no system message, score 0.0.
