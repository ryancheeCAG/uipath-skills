task_id: skill-agent-builtin-tool
description: >
  Add built-in tools. End-to-end test: scaffold a standalone
  low-code agent that enables a built-in tool (e.g., "Analyze Files")
  from the static built-in-tools registry. Verifies the tool
  resource.json uses `type: "internal"`, `referenceKey: null`, and
  `properties.toolType` set to one of the four documented built-in
  tool keys (analyze-attachments, load-attachments, deep-rag,
  batch-transform).
tags: [uipath-agents, e2e, low-code]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath solution "DocsSol" containing a low-code agent
  "DocAnalystAgent" that helps users understand uploaded documents.
  Enable the built-in "Analyze Files" tool so the agent can analyze
  PDF and image attachments.

  Do NOT publish, upload, or deploy. Do NOT ask for approval,
  confirmation, or feedback. Do NOT pause between planning and
  implementation. Complete the entire task end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution new"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+new'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the agent project with uip agent init"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+init'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Outcome-based check (auto-registration via `uip <kind> init` OR explicit
  # `uip solution project add` both populate Projects[] in the .uipx).
  - type: json_check
    description: "Project is registered in the parent solution .uipx"
    path: "DocsSol/DocsSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+agent\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "DocAnalystAgent/agent.json was created"
    path: "DocsSol/DocAnalystAgent/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: ".agent-builder/agent.json was regenerated by validate"
    path: "DocsSol/DocAnalystAgent/.agent-builder/agent.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Built-in tool resource shape (type=internal, referenceKey=null, toolType in registry)"
    command: "python3 $TASK_DIR/check_builtin_tool.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
