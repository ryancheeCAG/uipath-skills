task_id: skill-bpmn-script-jint-guidance
description: >
  Script task eval: agent authors a BPMN script task that follows the Jint
  runtime boundary instead of Node.js, browser, filesystem, or network APIs.
tags: [uipath-maestro-bpmn, smoke, lifecycle:generate, shape:single-node, node:script]

agent:
  type: claude-code
  permission_mode: acceptEdits
  max_turns: 60
  turn_timeout: 900

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Load and follow the uipath-maestro-bpmn skill.

  Create a local BPMN project named "RiskScoreScriptBpmn".
  The process should manually start with `amount` and `daysOverdue` inputs,
  calculate a risk score in a BPMN script task, and end with a `riskScore`
  output.

  Requirements:
  - Use `bpmn:scriptTask` with `scriptFormat="JavaScript"`.
  - Include the UiPath script version metadata and prefer version `v3`.
  - Write script content that is compatible with the Jint runtime. Do not use
    Node.js modules, filesystem APIs, network APIs, browser globals, packages,
    timers, or long-running async behavior.
  - Include BPMN DI for every visible node and sequence flow.
  - Do not upload, publish, deploy, debug, or run the process.

success_criteria:
  - type: file_exists
    description: "BPMN source was created"
    path: "RiskScoreScriptBpmn/RiskScoreScriptBpmn.bpmn"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Script task follows Jint-compatible BPMN guidance"
    command: "python3 $TASK_DIR/check_script_jint_guidance.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
