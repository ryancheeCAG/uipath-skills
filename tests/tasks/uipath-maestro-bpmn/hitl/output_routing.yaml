task_id: skill-bpmn-hitl-output-routing
description: >
  Author a Maestro BPMN where a HITL approval task's outcome drives an exclusive
  gateway into two wired branches (approve -> provision, reject -> notify).
  Exercises HITL node authoring whose output feeds downstream decision routing —
  beyond bare wrapper placement.
tags: [uipath-maestro-bpmn, integration, "mode:build", "lifecycle:generate", "shape:multi-node", "node:hitl", "node:decision"]

run_limits:
  expected_turns: 18
  max_turns: 80

sandbox:
  template_sources:
    - type: template_dir
      path: ../../../../skills/uipath-maestro-bpmn

initial_prompt: |
  Load and follow the uipath-maestro-bpmn skill.

  Author a single Maestro BPMN file `ApprovalRouting.bpmn` for this process:
    - a start event,
    - a human-in-the-loop approval task,
    - an exclusive gateway that routes on the approval outcome into two branches:
        - approved -> a task that provisions,
        - otherwise -> a task that notifies the requester,
    - both branches reach an end event.

  Requirements:
  - Model the approval as a `bpmn:userTask` using a documented `Actions.HITL`
    `uipath:activity` shell. Pull the extension template from the registry; do
    not hand-author the `uipath:*` payload from prose.
  - The gateway must sit downstream of the HITL task (HITL -> gateway), have a
    default branch and at least one conditioned branch, and both branches must be
    wired to an end.
  - Use synthetic placeholder resource names only — no tenant URLs, folder keys,
    connection IDs, or real user names.
  - Include a `bpmndi:BPMNDiagram` with a BPMNShape for every node and a
    BPMNEdge for every sequence flow.
  - Validate the file with an explicit Bash command before finishing — a
    well-formed-XML parse, e.g.:
    `python3 -c "import xml.etree.ElementTree as ET; ET.parse('ApprovalRouting.bpmn')"`.

  Do NOT upload, publish, deploy, debug, run, or pack anything. Do NOT ask for
  approval, confirmation, or feedback. Do NOT pause between planning and
  implementation. Author the complete file end-to-end in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent ran an explicit well-formed-XML validation on the authored BPMN"
    tool_name: "Bash"
    command_pattern: 'python3?\s+-c\s+[\s\S]*ET\.parse\([\s\S]*ApprovalRouting\.bpmn'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "BPMN source was authored"
    path: "ApprovalRouting.bpmn"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "BPMN file carries a HITL wrapper and an exclusive gateway"
    path: "ApprovalRouting.bpmn"
    includes:
      - "Actions.HITL"
      - "exclusiveGateway"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "HITL task routes through a downstream exclusive gateway with two wired branches; diagram integral"
    command: "python3 $TASK_DIR/check_output_routing.py"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
