task_id: skill-bpmn-move-node
description: >
  Move the flagForReview task off the conditioned branch of the OrderTriage
  gateway onto the default branch so it runs after autoApprove, and route the
  conditioned branch straight to the end event. Exercises relocating an existing
  node between branches — rewiring its edges and the freed branch without
  changing the node set or the diagram's completeness.
tags: [uipath-maestro-bpmn, integration, "mode:build", "lifecycle:edit", "shape:multi-node", "node:decision"]

run_limits:
  expected_turns: 12
  max_turns: 25

sandbox:
  template_sources:
    - type: template_dir
      path: ../../../../../skills/uipath-maestro-bpmn
    - type: template_dir
      path: ../templates/initial_bpmn

initial_prompt: |
  Load and follow the uipath-maestro-bpmn skill.

  `OrderTriage.bpmn` is an existing Maestro BPMN process. Move `flagForReview` so
  it runs on the default branch after `autoApprove` instead of on the high-risk
  branch; the high-risk branch should then end the process directly. Keep the
  same `flagForReview` node.

  Validate the file parses as well-formed XML before finishing, e.g.:
  `python3 -c "import xml.etree.ElementTree as ET; ET.parse('OrderTriage.bpmn')"`.
  Do NOT upload, publish, deploy, debug, run, or pack anything, and do not ask for
  approval or feedback — make the edit in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent ran an explicit well-formed-XML validation on the edited BPMN"
    tool_name: "Bash"
    command_pattern: 'python3?\s+-c\s+[\s\S]*ET\.parse\([\s\S]*OrderTriage\.bpmn'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Edited BPMN source is present"
    path: "OrderTriage.bpmn"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "flagForReview relocated to the default branch, conditioned branch routed to end, node set and diagram intact"
    command: "python3 $TASK_DIR/check_move_node.py"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
