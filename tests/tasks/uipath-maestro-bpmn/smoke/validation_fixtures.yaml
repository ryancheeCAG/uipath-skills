task_id: skill-bpmn-validation-fixtures
description: >
  Skill-guided smoke test: agent uses the uipath-maestro-bpmn skill to inspect
  the synthetic validation fixture corpus and run the local fixture checker.
  This verifies the skill's validation guidance, generated package metadata
  expectations, Integration Service enrichment boundary, and public-safety
  requirements without cloud-side effects.
tags: [uipath-maestro-bpmn, smoke, "mode:build", "lifecycle:validate", connector, "feature:connections"]

run_limits:
  expected_turns: 10
  max_turns: 20

sandbox:
  template_sources:
    - type: template_dir
      path: ../../../../skills/uipath-maestro-bpmn

initial_prompt: |
  Load and follow the uipath-maestro-bpmn skill.

  Inspect the validation fixtures under:
  fixtures/validation

  Inspect the supported element map and task recipes under:
  references/author/references/supported-elements.md
  references/author/references/task-recipes

  Run the local fixture validation command:
  bash .maintenance/check-validation-fixtures.sh

  Report whether the fixtures pass. Do not upload, publish, deploy, debug,
  run a process, ask for approval, or call cloud-side UiPath commands.

success_criteria:
  - type: file_exists
    description: "Supported element map is available"
    path: "references/author/references/supported-elements.md"
    weight: 0.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Task recipe index is available"
    path: "references/author/references/task-recipes/README.md"
    weight: 0.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Supported element map captures BPMN-first resource wrappers"
    path: "references/author/references/supported-elements.md"
    includes:
      - "Orchestrator.StartJob"
      - "bpmn:serviceTask"
      - "Orchestrator.CreateQueueItem"
      - "bpmn:sendTask"
      - "Actions.HITL"
      - "bpmn:userTask"
      - "Jint"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Task recipes distinguish service, send, user, business rule, and call activity wrappers"
    path: "references/author/references/task-recipes/README.md"
    includes:
      - "bpmn:serviceTask"
      - "bpmn:sendTask"
      - "bpmn:userTask"
      - "bpmn:businessRuleTask"
      - "bpmn:callActivity"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Linear BPMN fixture is available"
    path: "fixtures/validation/linear-process/linear-process.bpmn"
    weight: 0.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Imported brownfield preservation BPMN fixture is available"
    path: "fixtures/validation/imported-brownfield-preservation/imported-brownfield-preservation.bpmn"
    weight: 0.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Integration Service package bindings fixture is available"
    path: "fixtures/validation/integration-service-enriched/bindings_v2.json"
    weight: 0.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Boundary error BPMN fixture is available"
    path: "fixtures/validation/gateway-boundary-error/gateway-boundary-error.bpmn"
    weight: 0.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Subprocess multi-instance BPMN fixture is available"
    path: "fixtures/validation/subprocess-multi-instance/subprocess-multi-instance.bpmn"
    weight: 0.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Contract variants BPMN fixture is available"
    path: "fixtures/validation/contract-variants/contract-variants.bpmn"
    weight: 0.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Wrapper family contract BPMN fixture is available"
    path: "fixtures/validation/wrapper-family-contract/wrapper-family-contract.bpmn"
    weight: 0.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Contract variants fixture covers public-safe XML contract wrappers"
    path: "fixtures/validation/contract-variants/contract-variants.bpmn"
    includes:
      - "Orchestrator.StartAgentJob"
      - "A2A.AgentExecution"
      - "Orchestrator.ExecuteApiWorkflowAsync"
      - "Orchestrator.BusinessRules"
      - "Orchestrator.CreateQueueItem"
      - "Orchestrator.CreateAndWaitForQueueItem"
      - "Orchestrator.StartAgenticProcess"
      - "Orchestrator.StartAgenticProcessAsync"
      - "Orchestrator.StartCaseMgmtProcess"
      - "Orchestrator.StartCaseMgmtProcessAsync"
      - "Maestro.SendMessageEvent"
      - "Maestro.CasePlanScheduler"
      - "Maestro.CaseManagerGuardrails"
      - "Maestro.CaseRulesEvaluator"
      - "Intsvc.WaitForEvent"
      - "uipath:caseManagement"
      - "uipath:Activity"
      - "scriptVersion value=\"v2\""
      - "migrationVersion version=\"11.5\""
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Wrapper family contract fixture covers Maestro BPMN wrapper and enrichment families"
    path: "fixtures/validation/wrapper-family-contract/wrapper-family-contract.bpmn"
    includes:
      - "Orchestrator.StartAgentJob"
      - "Orchestrator.ExecuteApiWorkflowAsync"
      - "Orchestrator.BusinessRules"
      - "Orchestrator.CreateAndWaitForQueueItem"
      - "Orchestrator.StartCaseMgmtProcess"
      - "Intsvc.WaitForEvent"
      - "<bpmn:businessRuleTask"
      - "<bpmn:callActivity"
      - "<bpmn:receiveTask"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Agent invocation BPMN fixture is available"
    path: "fixtures/validation/agent-invocation/agent-invocation.bpmn"
    weight: 0.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Agent invocation fixture uses the StartAgentJob binding-pair shape"
    path: "fixtures/validation/agent-invocation/agent-invocation.bpmn"
    includes:
      - "Orchestrator.StartAgentJob"
      - "=bindings.Binding_AgentName"
      - "=bindings.Binding_AgentFolderPath"
      - 'propertyAttribute="name"'
      - 'propertyAttribute="folderPath"'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Fixture README includes public-safety rules"
    path: "fixtures/validation/README.md"
    includes:
      - "Do not copy raw exported BPMN"
      - "Keep IDs readable and synthetic"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran the local validation fixture checker"
    tool_name: "Bash"
    command_pattern: 'bash\s+\.maintenance/check-validation-fixtures\.sh'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Fixture checker passes in the scored workspace"
    command: "bash .maintenance/check-validation-fixtures.sh"
    timeout: 20
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
