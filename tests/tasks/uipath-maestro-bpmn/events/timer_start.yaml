task_id: skill-bpmn-timer-start
description: >
  Author a Maestro BPMN whose process is started by a timer start event that
  recurs every hour, then runs a task to an end event. Exercises authoring a
  bpmn:startEvent carrying a bpmn:timerEventDefinition with a recurring timeCycle
  — the BPMN equivalent of a scheduled trigger.
tags: [uipath-maestro-bpmn, integration, "mode:build", "lifecycle:generate", "shape:single-node", "node:scheduled-trigger", "feature:trigger"]

run_limits:
  expected_turns: 16
  max_turns: 30

sandbox:
  template_sources:
    - type: template_dir
      path: ../../../../skills/uipath-maestro-bpmn

initial_prompt: |
  Load and follow the uipath-maestro-bpmn skill.

  Author a Maestro BPMN file `ScheduledReport.bpmn` for a process that starts
  automatically on a recurring schedule — every hour — then runs one task and
  ends.

  Validate the file parses as well-formed XML before finishing, e.g.:
  `python3 -c "import xml.etree.ElementTree as ET; ET.parse('ScheduledReport.bpmn')"`.
  Do NOT upload, publish, deploy, debug, run, or pack anything, and do not ask for
  approval or feedback — author it in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent ran an explicit well-formed-XML validation on the authored BPMN"
    tool_name: "Bash"
    command_pattern: 'python3?\s+-c\s+[\s\S]*ET\.parse\([\s\S]*ScheduledReport\.bpmn'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "BPMN source was authored"
    path: "ScheduledReport.bpmn"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "BPMN file carries a timer start event definition"
    path: "ScheduledReport.bpmn"
    includes:
      - "timerEventDefinition"
      - "timeCycle"
      - "bpmndi:BPMNDiagram"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Single start event carries a timer definition; diagram fully shaped and integral"
    command: "python3 $TASK_DIR/check_timer_start.py"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
