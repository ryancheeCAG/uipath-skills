task_id: skill-rpa-uia-google-search
description: >
  Skill-guided evaluation: agent uses the uipath-rpa skill to build a standard
  (XAML, VB.NET) UiPath project that drives a web browser — opening google.com,
  typing a query, and clicking the search button via Use Application/Browser,
  Type Into, and Click UIA activities with pre-known selectors. Validates the
  full XAML surface the skill teaches: project.json with VisualBasic expression
  language, ApplicationCard / TypeInto / Click activity XML, and the
  `uip rpa validate` compile gate.
tags: [uipath-rpa, smoke, uia, xaml]

# Standard XAML + UIA activities. First `uip rpa` call restores packages
# (incl. UIAutomation) + spins up Helm — 60–90s cold start. `validate`
# on a XAML workflow with UIA activities can run another ~45s. Budget
# accordingly.
agent:
  type: claude-code
  # Bumped from 60 → 80: evalboard runs on Linux atm so some turns are
  # wasted since the UiPath project targets Windows.

run_limits:
  task_timeout: 1800
  max_turns: 80
  turn_timeout: 1200

sandbox:
  driver: docker
  python: {}
initial_prompt: |
  Build a standard UiPath RPA project named "GoogleSearch" (XAML
  workflow, VisualBasic expression language) under ./GoogleSearch
  that automates a simple Google search:

    * Open https://www.google.com in Chrome
    * Type the query "UiPath automation" into the search box
    * Click the search button

  Selectors (use these directly — Studio is not running interactively
  so `uip rpa indicate` is not available):

    App:    html app='chrome.exe' url='https://www.google.com'
    Input:  webctrl tag='textarea' name='q'
    Button: webctrl tag='input' name='btnK' type='submit'

  Use the modern `UiPath.UIAutomation.Activities` Nx activities
  (`NApplicationCard` + `NTypeInto` + `NClick`) to open the browser,
  type the query, and click search. Do NOT pivot to classic
  activities; update the package if the Nx classes are missing.
  Author the XAML directly with the selectors above; do NOT engage
  the multi-phase `uia-configure-target` / Object Repository
  pipeline — Studio is not running interactively in CI, so its OR
  registration steps can't complete and will time out.

  Follow the uipath-rpa skill's normal flow for everything else
  (project scaffolding, validation). The `uip` CLI is authenticated
  against the sandbox tenant, so Helm-backed commands
  (`init`, `activities get-default-xaml`, `validate`)
  work as documented in the skill.

  Use `--output json` on any uip commands you run.

success_criteria:
  - type: file_exists
    description: "project.json was created"
    path: "GoogleSearch/project.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json targets VisualBasic"
    path: "GoogleSearch/project.json"
    includes:
      - "VisualBasic"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml workflow was created"
    path: "GoogleSearch/Main.xaml"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml contains NTypeInto + NClick Nx UIA activities"
    path: "GoogleSearch/Main.xaml"
    includes:
      - "TypeInto"
      - "Click"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml targets google.com with the expected query and selectors"
    path: "GoogleSearch/Main.xaml"
    includes:
      - "google.com"
      - "UiPath automation"
      - "btnK"
    weight: 1.5
    pass_threshold: 1.0

  # Skill-fidelity signal: the skill teaches `uip rpa validate` as
  # the canonical validation step. We don't gate on its exit code —
  # the actual compile gate is the `uip rpa build` run_command below.
  - type: command_executed
    description: "Agent ran uip rpa validate on Main.xaml (skill-canonical validation)"
    tool_name: "Bash"
    command_pattern: 'uip\s+rpa\s+validate.*Main\.xaml'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  # Programmatic compile gate: harness invokes `uip rpa build` against
  # the agent's project directly and gates on exit code 0. Replaces
  # the old "did the agent call build" telemetry check — what matters
  # is that the project actually compiles.
  #
  # Path note: `uip rpa build` requires an absolute project directory.
  # A relative positional arg trips the @uipath/rpa-tool wrapper's
  # double-resolve bug (chdir's into the project, re-resolves the arg
  # from inside → `<sandbox>/GoogleSearch/GoogleSearch`, DirectoryNotFound).
  # Even `.` after `cd GoogleSearch` fails — WorkflowCompiler's JIT step
  # builds paths relative to projectDir and feeds them to
  # `AssemblyLoadContext.LoadFromAssemblyPath`, which rejects any
  # non-absolute path with `ArgumentException`. Shell-specific cwd
  # variables (`%CD%` on cmd.exe, `$PWD` on /bin/sh) don't expand on
  # the other shell, and coder_eval's `run_command` runs through
  # `subprocess(shell=True)` → cmd.exe on Windows, /bin/sh on Linux.
  # The Python wrapper below resolves the absolute path via
  # `os.path.abspath` (cross-platform) and the `uip` shim via
  # `shutil.which` (handles Windows' `uip.cmd` PATHEXT resolution).
  - type: run_command
    description: "uip rpa build exits 0 against the agent's GoogleSearch project"
    command: |-
      python3 -c "import subprocess, os, sys, shutil; uip = shutil.which('uip') or 'uip'; sys.exit(subprocess.call([uip, 'rpa', 'build', os.path.abspath('GoogleSearch'), '--output', 'json']))"
    expected_exit_code: 0
    timeout: 180
    weight: 2.0
    pass_threshold: 1.0
