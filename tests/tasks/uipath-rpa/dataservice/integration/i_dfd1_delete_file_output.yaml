task_id: skill-rpa-ds-i-dfd1-delete-file-output
description: >
  Integration I-DFD1 (Confluence §2.11, merges I53) — agent authors a single
  uda:DeleteFileFromRecordField on CodingAgentsEvalFileEntity, deleting the
  Attachment field's contents and binding OutputEntity to capture the
  post-deletion entity state. Distinct from DeleteEntityRecord — this activity
  returns the entity.

tags: [uipath-rpa, windows, integration, dataservice]

run_limits:
  expected_turns: 30
  max_turns: 60
  task_timeout: 1800
  turn_timeout: 1800

sandbox:
  template_sources:
    - type: template_dir
      path: ../templates/local-feed
      mount_point: "."

initial_prompt: |
  Build an RPA automation that deletes the file from the `Attachment` field of
  a pre-existing record in Data Service entity `CodingAgentsEvalFileEntity`,
  and returns the updated entity state from the activity for use later in the
  workflow.

  Sandbox setup (already in place — do not modify):
    - `./NuGet.Config` declares a local NuGet source at `./local-feed/`
    - `./local-feed/` hosts `UiPath.DataService.Activities` version `23.1.4-dev`,
      which is the version you must pin in your project dependencies (this
      package version is not available on any public feed)

  Place the project inside a `DataServiceEval/` subdirectory so the parent
  `NuGet.Config` is inherited.

  Both `CodingAgentsEvalEntity` and `CodingAgentsEvalFileEntity` exist on the
  connected Data Service tenant — install both into the project.

  Not complete until `uip rpa validate` returns no diagnostics. Use
  `--output json` on uip commands whose output you parse.

success_criteria:
  - type: file_exists
    description: "Project was scaffolded via uip rpa init"
    path: DataServiceEval/project.json
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml exists in the scaffolded project"
    path: DataServiceEval/Main.xaml
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip rpa init"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+init\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent installed entities from the live tenant"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+data-fabric-entities\s+install\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran validate with --output json"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+validate\s+.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json pins the local-feed DataService package version"
    path: DataServiceEval/project.json
    includes:
      - 'UiPath.DataService.Activities'
      - '23.1.4-dev'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml references DeleteFileFromRecordField on CodingAgentsEvalFileEntity"
    path: DataServiceEval/Main.xaml
    includes:
      - 'uda:DeleteFileFromRecordField'
      - 'local:CodingAgentsEvalFileEntity'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "OutputEntity bound (distinct from DeleteEntityRecord)"
    path: DataServiceEval/Main.xaml
    includes:
      - 'OutputEntity'
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "DeleteFileFromRecordField sets Field=Attachment"
    command: 'python "$TASK_DIR/check_i_dfd1.py" DataServiceEval/Main.xaml'
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip rpa validate exits clean against the authored Main.xaml"
    command: 'uip rpa validate --file-path Main.xaml --project-dir DataServiceEval --output json'
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
