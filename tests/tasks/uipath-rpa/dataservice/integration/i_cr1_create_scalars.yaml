task_id: skill-rpa-ds-i-cr1-create-scalars
description: >
  Integration I-CR1 (Confluence §2.1, merges I1+I2+I3) — agent authors a single
  uda:CreateEntityRecord on CodingAgentsEvalEntity covering all scalar SqlTypes
  with required+optional differentiation. Asserts RecordState has 7
  DynamicEntityField entries with correct IsRequired flags and the
  InputEntityInFieldView VB expression uses the right typed literals
  (x:Decimal for DECIMAL fields, x:Boolean for BIT, x:String ISO 8601 for
  DATE/DATETIMEOFFSET) per the tenant entity schema.

tags: [uipath-rpa, windows, integration, dataservice]

run_limits:
  expected_turns: 30
  max_turns: 60
  task_timeout: 1800
  turn_timeout: 1800

sandbox:
  template_sources:
    - type: template_dir
      path: ../templates/local-feed
      mount_point: "."

initial_prompt: |
  Build an RPA automation that creates a single record in Data Service entity
  `CodingAgentsEvalEntity` with these field values:

    - `Title` = `'TypeTest'`
    - `Notes` = `'Some notes'`
    - `Score` = `42`
    - `Price` = `9.99`
    - `IsActive` = `true`
    - `EventDate` = `'2026-04-18'`
    - `ScheduledAt` = `'2026-04-18T09:00:00+05:30'`

  Only `Title` is the required field on the entity — the other six are
  optional. The workflow must use a single `CreateEntityRecord` activity that
  populates all seven fields.

  Sandbox setup (already in place — do not modify):
    - `./NuGet.Config` declares a local NuGet source at `./local-feed/`
    - `./local-feed/` hosts `UiPath.DataService.Activities` version `23.1.4-dev`,
      which is the version you must pin in your project dependencies (this
      package version is not available on any public feed)

  Place the project inside a `DataServiceEval/` subdirectory so the parent
  `NuGet.Config` is inherited.

  Both `CodingAgentsEvalEntity` and `CodingAgentsEvalFileEntity` exist on the
  connected Data Service tenant — install both into the project.

  Not complete until `uip rpa validate` returns no diagnostics. Use
  `--output json` on uip commands whose output you parse.

success_criteria:
  - type: file_exists
    description: "Project was scaffolded via uip rpa init"
    path: DataServiceEval/project.json
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml exists in the scaffolded project"
    path: DataServiceEval/Main.xaml
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip rpa init"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+init\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent installed entities from the live tenant"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+data-fabric-entities\s+install\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran validate with --output json"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+validate\s+.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json pins the local-feed DataService package version"
    path: DataServiceEval/project.json
    includes:
      - 'UiPath.DataService.Activities'
      - '23.1.4-dev'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml references CreateEntityRecord on CodingAgentsEvalEntity"
    path: DataServiceEval/Main.xaml
    includes:
      - 'uda:CreateEntityRecord'
      - 'local:CodingAgentsEvalEntity'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Typed scalar literals present (DECIMAL for Score+Price, BIT for IsActive)"
    path: DataServiceEval/Main.xaml
    includes:
      - 'x:Decimal'
      - 'x:Boolean'
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "CreateEntityRecord has correct RecordState shape (Title required + 6 optional)"
    command: 'python "$TASK_DIR/check_i_cr1.py" DataServiceEval/Main.xaml'
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip rpa validate exits clean against the authored Main.xaml"
    command: 'uip rpa validate --file-path Main.xaml --project-dir DataServiceEval --output json'
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
