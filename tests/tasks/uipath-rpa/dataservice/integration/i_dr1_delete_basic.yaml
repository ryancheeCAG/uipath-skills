task_id: skill-rpa-ds-i-dr1-delete-basic
description: >
  Integration I-DR1 (Confluence §2.4, merges I16) — agent authors a single
  uda:DeleteEntityRecord on CodingAgentsEvalEntity with default config.
  Asserts no read-mode or write-mode property bleed (no RecordState,
  no IsInRecordView, no InputEntityInFieldView, no OutputEntity).

tags: [uipath-rpa, windows, integration, dataservice]

run_limits:
  expected_turns: 30
  max_turns: 120
  task_timeout: 1800
  turn_timeout: 1800

sandbox:
  template_sources:
    - type: template_dir
      path: ../templates/local-feed
      mount_point: "."

initial_prompt: |
  Build a UiPath RPA project named `DataServiceEval` under `./DataServiceEval`
  (i.e. run `uip rpa init --name "DataServiceEval" --location "."`) that
  deletes a pre-existing record from Data Service entity
  `CodingAgentsEvalEntity` by its ID.

  Sandbox setup (already in place — do not modify):
    - `./NuGet.Config` declares a local NuGet source at `./local-feed/`
    - `./local-feed/` hosts `UiPath.DataService.Activities` version `23.1.4-dev`,
      which is the version you must pin in your project dependencies (this
      package version is not available on any public feed)

  Both `CodingAgentsEvalEntity` and `CodingAgentsEvalFileEntity` exist on the
  connected Data Service tenant — install both into the project.

  Entity install: do NOT use `uip rpa data-fabric-entities install`. Use the
  rpa-tool source directly via `bun`:

      bun C:\Users\suphalathlur\Studio\RpaTool\rpa-tool\src\index.ts install-data-fabric-entities --add SystemUser,CodingAgentsEvalEntity,CodingAgentsEvalFileEntity --project-dir DataServiceEval --verbose --format json

  Notes for this command:
    - Verb is `install-data-fabric-entities` (single hyphenated verb, not
      `data-fabric-entities install`).
    - `--add` takes a single comma-separated list of entity names, NOT
      repeated `--add X --add Y` flags.
    - Use `--format json` (not `--output json`) for machine-readable output.

  All other steps continue to use the standard `uip rpa` CLI (`uip rpa init`,
  `uip rpa validate`, etc.).

  Not complete until `uip rpa validate` returns no diagnostics. Use
  `--output json` on uip commands whose output you parse.

success_criteria:
  - type: file_exists
    description: "Project was scaffolded via uip rpa init under DataServiceEval/"
    path: DataServiceEval/project.json
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml exists in the DataServiceEval project"
    path: DataServiceEval/Main.xaml
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip rpa init"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+init\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent installed entities via bun rpa-tool install-data-fabric-entities"
    tool_name: Bash
    command_pattern: 'bun\s+.*install-data-fabric-entities\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran validate with --output json"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+validate\s+.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json pins the local-feed DataService package version"
    path: DataServiceEval/project.json
    includes:
      - 'UiPath.DataService.Activities'
      - '23.1.4-dev'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml references DeleteEntityRecord on CodingAgentsEvalEntity"
    path: DataServiceEval/Main.xaml
    includes:
      - 'uda:DeleteEntityRecord'
      - 'local:CodingAgentsEvalEntity'
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "DeleteEntityRecord has no read-mode or write-mode property bleed"
    command: 'python "%TASK_DIR%/check_i_dr1.py" DataServiceEval/Main.xaml'
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip rpa validate finds zero errors against the authored Main.xaml"
    command: 'cd DataServiceEval && uip rpa validate --output json'
    timeout: 120
    expected_exit_code: 0
    expected_stdout: '\A(?!.*\[error\])'
    stdout_match: regex
    weight: 5.0
    pass_threshold: 1.0
