task_id: skill-rpa-ds-i-uf1-upload-filepath
description: >
  Integration I-UF1 (Confluence §2.9, merges I47+I49) — agent authors a single
  uda:UploadFileToRecordField on CodingAgentsEvalFileEntity uploading a local
  file (FilePath mode) to the camelCase field `attachmentFile`. Asserts the
  field name is case-sensitive (exactly `attachmentFile`, not `AttachmentFile`
  or `attachment_file`) and that FileResource is not set when FilePath is used.

tags: [uipath-rpa, windows, integration, dataservice]

run_limits:
  expected_turns: 30
  max_turns: 60
  task_timeout: 1800
  turn_timeout: 1800

sandbox:
  template_sources:
    - type: template_dir
      path: ../templates/local-feed
      mount_point: "."

initial_prompt: |
  Build an RPA automation that uploads the local file `'C:\docs\report.pdf'`
  to the field named `attachmentFile` (camelCase) on a pre-existing record in
  Data Service entity `CodingAgentsEvalFileEntity`.

  Note: `attachmentFile` is the exact field name on the entity — the case
  matters. Do not rename it to `AttachmentFile` or `attachment_file`.

  Sandbox setup (already in place — do not modify):
    - `./NuGet.Config` declares a local NuGet source at `./local-feed/`
    - `./local-feed/` hosts `UiPath.DataService.Activities` version `23.1.4-dev`,
      which is the version you must pin in your project dependencies (this
      package version is not available on any public feed)

  Place the project inside a `DataServiceEval/` subdirectory so the parent
  `NuGet.Config` is inherited.

  Both `CodingAgentsEvalEntity` and `CodingAgentsEvalFileEntity` exist on the
  connected Data Service tenant — install both into the project.

  Not complete until `uip rpa validate` returns no diagnostics. Use
  `--output json` on uip commands whose output you parse.

success_criteria:
  - type: file_exists
    description: "Project was scaffolded via uip rpa init"
    path: DataServiceEval/project.json
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml exists in the scaffolded project"
    path: DataServiceEval/Main.xaml
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip rpa init"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+init\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent installed entities from the live tenant"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+data-fabric-entities\s+install\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran validate with --output json"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+validate\s+.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json pins the local-feed DataService package version"
    path: DataServiceEval/project.json
    includes:
      - 'UiPath.DataService.Activities'
      - '23.1.4-dev'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml references UploadFileToRecordField on CodingAgentsEvalFileEntity"
    path: DataServiceEval/Main.xaml
    includes:
      - 'uda:UploadFileToRecordField'
      - 'local:CodingAgentsEvalFileEntity'
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Upload uses FilePath mode with case-exact attachmentFile field name"
    command: 'python "$TASK_DIR/check_i_uf1.py" DataServiceEval/Main.xaml'
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip rpa validate exits clean against the authored Main.xaml"
    command: 'uip rpa validate --file-path Main.xaml --project-dir DataServiceEval --output json'
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
