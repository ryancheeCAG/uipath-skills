task_id: skill-rpa-ds-s3-file
description: >
  Smoke S3 from eval-scenarios.md — agent scaffolds a greenfield UiPath RPA
  project, installs the DataService Activities package from a sandbox-supplied
  local NuGet feed, installs the eval entities from the live tenant, and adds
  all three file activities (Upload, Download, Delete) to Main.xaml on
  CodingAgentsEvalFileEntity. Validates activity selection + namespace/
  TypeArguments shape + uip rpa validate exits clean. No property-level
  assertions.

tags: [uipath-rpa, windows, smoke, dataservice]

run_limits:
  expected_turns: 30
  max_turns: 60
  task_timeout: 1800
  turn_timeout: 1800

sandbox:
  template_sources:
    - type: template_dir
      path: ../templates/local-feed
      mount_point: "."

initial_prompt: |
  Build a UiPath RPA workflow on Data Service entity `CodingAgentsEvalFileEntity`
  that performs these three independent file operations:

    1. Upload `'C:\temp\test.txt'` to the `Attachment` field of an existing record
    2. Download the file from the `Report` field of another existing record
    3. Delete the file from the `Contract` field of another existing record

  Sandbox setup (already in place — do not modify):
    - `./NuGet.Config` declares a local NuGet source at `./local-feed/`
    - `./local-feed/` hosts `UiPath.DataService.Activities` version `23.1.4-dev`,
      which is the version you must pin in your project dependencies (this
      package version is not available on any public feed)

  Place the project inside a `DataServiceEval/` subdirectory so the parent
  `NuGet.Config` is inherited.

  Both `CodingAgentsEvalEntity` and `CodingAgentsEvalFileEntity` exist on the
  connected Data Service tenant — install both into the project.

  Not complete until `uip rpa validate` returns no diagnostics. Use
  `--output json` on uip commands whose output you parse.

success_criteria:
  - type: file_exists
    description: "Project was scaffolded via uip rpa init"
    path: DataServiceEval/project.json
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml exists in the scaffolded project"
    path: DataServiceEval/Main.xaml
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip rpa init"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+init\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent installed entities from the live tenant"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+data-fabric-entities\s+install\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran validate with --output json"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+validate\s+.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json pins the local-feed DataService package version"
    path: DataServiceEval/project.json
    includes:
      - 'UiPath.DataService.Activities'
      - '23.1.4-dev'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml references all 3 file activities"
    path: DataServiceEval/Main.xaml
    includes:
      - 'uda:UploadFileToRecordField'
      - 'uda:DownloadFileFromRecordField'
      - 'uda:DeleteFileFromRecordField'
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "All 3 file activities present with x:TypeArguments=local:CodingAgentsEvalFileEntity"
    command: 'python "$TASK_DIR/check_s3_file.py" DataServiceEval/Main.xaml'
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip rpa validate exits clean against the authored Main.xaml"
    command: 'uip rpa validate --file-path Main.xaml --project-dir DataServiceEval --output json'
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
