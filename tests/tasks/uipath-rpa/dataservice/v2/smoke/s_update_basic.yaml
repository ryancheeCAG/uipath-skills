task_id: skill-rpa-ds-v2-s-update-basic
description: >
  v2 Smoke (UpdateEntityRecord) — agent authors a single uda:UpdateEntityRecord
  on CodingAgentsEvalEntity that updates only the Title field of a pre-existing
  record. Asserts the activity is configured for partial update:
  RecordState.SelectedFields contains exactly Title, RecordId is bound,
  build passes.

tags: [uipath-rpa, windows, smoke, dataservice]

run_limits:
  expected_turns: 25
  max_turns: 90
  task_timeout: 1800
  turn_timeout: 1800

initial_prompt: |
  Build a UiPath RPA project named `DataServiceEval` in the current working
  directory that updates a pre-existing record in Data Service entity
  `CodingAgentsEvalEntity`, changing only the `Title` field by record ID.
  Leave every other field on the record unchanged.

success_criteria:
  - type: file_exists
    description: "Project was scaffolded via uip rpa init under DataServiceEval/"
    path: DataServiceEval/project.json
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml exists in the DataServiceEval project"
    path: DataServiceEval/Main.xaml
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip rpa init"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+init\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent installed entities via bun rpa-tool install-data-fabric-entities"
    tool_name: Bash
    command_pattern: 'bun\s+.*install-data-fabric-entities\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json pins the local-feed DataService package version"
    path: DataServiceEval/project.json
    includes:
      - 'UiPath.DataService.Activities'
      - '23.1.4-dev'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml references UpdateEntityRecord on CodingAgentsEvalEntity"
    path: DataServiceEval/Main.xaml
    includes:
      - 'UpdateEntityRecord'
      - 'CodingAgentsEvalEntity'
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Main.xaml binds UpdateEntityRecord with a namespace alias for UiPath.DataService.Activities"
    command: 'python -c "import re,sys; t=open(''DataServiceEval/Main.xaml'',encoding=''utf-8'').read(); sys.exit(0 if re.search(r''<[A-Za-z_][A-Za-z0-9_]*:UpdateEntityRecord\b'', t) else 1)"'
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Entity install compiled CodingAgentsEvalEntity into the generated DLL"
    command: 'python -c "import glob,sys; dlls=glob.glob(''DataServiceEval/.local/.entities/*/DataService.DataServiceEval.dll''); sys.exit(0 if dlls and b''CodingAgentsEvalEntity'' in open(dlls[0],''rb'').read() else 1)"'
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "UpdateEntityRecord has RecordState with Title only, RecordId bound"
    command: 'python "%TASK_DIR%/check_s_update_basic.py" DataServiceEval/Main.xaml'
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip rpa validate finds zero errors against the authored Main.xaml"
    command: 'cd DataServiceEval && uip rpa validate --output json'
    timeout: 120
    expected_exit_code: 0
    expected_stdout: '\A(?!.*\[error\])'
    stdout_match: regex
    weight: 5.0
    pass_threshold: 1.0
