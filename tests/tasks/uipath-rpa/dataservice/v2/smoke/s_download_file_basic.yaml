task_id: skill-rpa-ds-v2-s-download-file-basic
description: >
  v2 Smoke (DownloadFileFromRecordField) — agent authors a single
  uda:DownloadFileFromRecordField on CodingAgentsEvalFileEntity that downloads
  the file from the `Attachment` field by record ID. Asserts the activity is
  shaped for a file read: RecordId bound, Field set by name, no RecordState,
  no IsInRecordView, no ExpansionDepth, DownloadedFileResource is bound;
  build passes.

tags: [uipath-rpa, windows, smoke, dataservice]

run_limits:
  expected_turns: 25
  max_turns: 90
  task_timeout: 1800
  turn_timeout: 1800

initial_prompt: |
  Build a UiPath RPA project named `DataServiceEval` in the current working
  directory that downloads the file from the `Attachment` field of a
  pre-existing record in Data Service entity `CodingAgentsEvalFileEntity`
  by its record ID, and binds the downloaded file resource to a workflow
  variable.

success_criteria:
  - type: file_exists
    description: "Project was scaffolded via uip rpa init under DataServiceEval/"
    path: DataServiceEval/project.json
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml exists in the DataServiceEval project"
    path: DataServiceEval/Main.xaml
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip rpa init"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+init\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent installed entities via bun rpa-tool install-data-fabric-entities"
    tool_name: Bash
    command_pattern: 'bun\s+.*install-data-fabric-entities\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json pins the local-feed DataService package version"
    path: DataServiceEval/project.json
    includes:
      - 'UiPath.DataService.Activities'
      - '23.1.4-dev'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml references DownloadFileFromRecordField on CodingAgentsEvalFileEntity"
    path: DataServiceEval/Main.xaml
    includes:
      - 'DownloadFileFromRecordField'
      - 'CodingAgentsEvalFileEntity'
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Main.xaml binds DownloadFileFromRecordField with a namespace alias for UiPath.DataService.Activities"
    command: 'python -c "import re,sys; t=open(''DataServiceEval/Main.xaml'',encoding=''utf-8'').read(); sys.exit(0 if re.search(r''<[A-Za-z_][A-Za-z0-9_]*:DownloadFileFromRecordField\b'', t) else 1)"'
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Entity install compiled CodingAgentsEvalFileEntity into the generated DLL"
    command: 'python -c "import glob,sys; dlls=glob.glob(''DataServiceEval/.local/.entities/*/DataService.DataServiceEval.dll''); sys.exit(0 if dlls and b''CodingAgentsEvalFileEntity'' in open(dlls[0],''rb'').read() else 1)"'
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "DownloadFileFromRecordField targets Attachment with RecordId bound and no write-mode bleed"
    command: 'python "%TASK_DIR%/check_s_download_file_basic.py" DataServiceEval/Main.xaml'
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip rpa validate finds zero errors against the authored Main.xaml"
    command: 'cd DataServiceEval && uip rpa validate --output json'
    timeout: 120
    expected_exit_code: 0
    expected_stdout: '\A(?!.*\[error\])'
    stdout_match: regex
    weight: 5.0
    pass_threshold: 1.0
