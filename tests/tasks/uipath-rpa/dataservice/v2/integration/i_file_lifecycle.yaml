task_id: skill-rpa-ds-v2-i-file-lifecycle
description: >
  v2 Integration (single-record file lifecycle) â€” agent authors a workflow
  that Creates a record on CodingAgentsEvalFileEntity, Uploads a file to the
  Contract field, Updates the record's Title, Reads it back, Downloads the
  Contract file (with .LocalPath access downstream), and Deletes the Contract
  file. createdRecord.Id flows through every step. Folds in v1 I47+I50+I52+I53+I54
  + quality E5.

tags: [uipath-rpa, windows, integration, dataservice]

run_limits:
  expected_turns: 45
  max_turns: 150
  task_timeout: 2400
  turn_timeout: 1800

sandbox:
  template_sources:
    - type: template_dir
      path: ../../templates/local-feed
      mount_point: "."

initial_prompt: |
  Build a UiPath RPA project named `DataServiceEval` in the current working
  directory that executes a single-record file lifecycle on Data Service
  entity `CodingAgentsEvalFileEntity`. The workflow must contain these
  activities in order:

    1. Create a new record with `Title` set to `'Contract Doc'`. Bind the
       created record to a workflow variable (e.g. `createdRecord`).

    2. Upload the file at `'C:\contracts\final.pdf'` to the `Contract` field
       of the newly-created record by `createdRecord.Id`. Use the file-path
       upload mode (pass the path string, not a file resource object).

    3. Update the same record by `createdRecord.Id`, setting only the
       `Title` field to `'Signed Contract'`. Leave every other field on the
       record unchanged.

    4. Fetch the record back by `createdRecord.Id`. Bind the fetched record
       to a separate workflow variable (e.g. `fetchedRecord`).

    5. Download the file from the `Contract` field of the same record by
       `createdRecord.Id`. Save it to `'C:\contracts\downloaded.pdf'` AND
       also bind the downloaded resource to a workflow variable (e.g.
       `downloadedResource`). After the download, log the resource's
       `.LocalPath` to the output.

    6. Delete the file from the `Contract` field of the same record by
       `createdRecord.Id`. Bind the updated entity state to a variable (e.g.
       `finalState`). Set the activity to continue on error.

  The output of step 1 must flow into steps 2, 3, 4, 5, and 6 as the record
  ID â€” do not re-derive the ID from any other source.

  Sandbox setup (already in place â€” do not modify):
    - `./NuGet.Config` declares a local NuGet source at `./local-feed/`
    - `./local-feed/` hosts `UiPath.DataService.Activities` version `23.1.4-dev`,
      which is the version you must pin in your project dependencies (this
      package version is not available on any public feed)

  Both `CodingAgentsEvalEntity` and `CodingAgentsEvalFileEntity` exist on the
  connected Data Service tenant â€” install both into the project.

  For the entity install step â€” equivalent of `uip rpa data-fabric-entities
  install` in the skill docs â€” run the rpa-tool source directly:

      bun C:\Users\suphalathlur\Studio\RpaTool\rpa-tool\src\index.ts install-data-fabric-entities --add SystemUser,CodingAgentsEvalEntity,CodingAgentsEvalFileEntity --project-dir "<PROJECT_DIR>" --helm-version 0.2.3 --verbose --format json

  All other commands use the standard `uip rpa` CLI as documented in the skill.

success_criteria:
  - type: file_exists
    description: "Project was scaffolded via uip rpa init under DataServiceEval/"
    path: DataServiceEval/project.json
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml exists in the DataServiceEval project"
    path: DataServiceEval/Main.xaml
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip rpa init"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+init\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent installed entities via bun rpa-tool install-data-fabric-entities"
    tool_name: Bash
    command_pattern: 'bun\s+.*install-data-fabric-entities\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json pins the local-feed DataService package version"
    path: DataServiceEval/project.json
    includes:
      - 'UiPath.DataService.Activities'
      - '23.1.4-dev'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml references all six lifecycle activities on FileEntity"
    path: DataServiceEval/Main.xaml
    includes:
      - 'CreateEntityRecord'
      - 'UploadFileToRecordField'
      - 'UpdateEntityRecord'
      - 'GetEntityRecordById'
      - 'DownloadFileFromRecordField'
      - 'DeleteFileFromRecordField'
      - 'CodingAgentsEvalFileEntity'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Downloaded resource's .LocalPath is accessed downstream"
    path: DataServiceEval/Main.xaml
    includes:
      - '.LocalPath'
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "Main.xaml binds each activity with a namespace alias for UiPath.DataService.Activities"
    command: 'python -c "import re,sys; t=open(''DataServiceEval/Main.xaml'',encoding=''utf-8'').read(); names=[''CreateEntityRecord'',''UploadFileToRecordField'',''UpdateEntityRecord'',''GetEntityRecordById'',''DownloadFileFromRecordField'',''DeleteFileFromRecordField'']; sys.exit(0 if all(re.search(r''<[A-Za-z_][A-Za-z0-9_]*:''+n+r''\b'', t) for n in names) else 1)"'
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Entity install compiled CodingAgentsEvalFileEntity into the generated DLL"
    command: 'python -c "import glob,sys; dlls=glob.glob(''DataServiceEval/.local/.entities/*/DataService.DataServiceEval.dll''); sys.exit(0 if dlls and b''CodingAgentsEvalFileEntity'' in open(dlls[0],''rb'').read() else 1)"'
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "File lifecycle composition: 6 activities, RecordId chained, Contract field on all file ops"
    command: 'python "%TASK_DIR%/check_i_file_lifecycle.py" DataServiceEval/Main.xaml'
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip rpa validate finds zero errors against the authored Main.xaml"
    command: 'cd DataServiceEval && uip rpa validate --output json'
    timeout: 120
    expected_exit_code: 0
    expected_stdout: '\A(?!.*\[error\])'
    stdout_match: regex
    weight: 5.0
    pass_threshold: 1.0
