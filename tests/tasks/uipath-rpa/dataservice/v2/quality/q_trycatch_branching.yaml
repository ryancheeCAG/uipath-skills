task_id: skill-rpa-ds-v2-q-trycatch-branching
description: >
  v2 Quality (TryCatch branching around DataService activities) — agent
  authors a Create → TryCatch[Update + Query in Try; log + Delete in Catch]
  workflow on CodingAgentsEvalEntity. RecordId chains from createdRecord.Id
  across both branches. Verifies TryCatch structure with typed Catch entry,
  Update inside Try, Delete inside Catch, and a Score-equality verification
  query inside Try. Folds in v1 E6 (only control-flow scenario in suite).

tags: [uipath-rpa, windows, integration, dataservice]

run_limits:
  expected_turns: 45
  max_turns: 150
  task_timeout: 2400
  turn_timeout: 1800

sandbox:
  template_sources:
    - type: template_dir
      path: ../../templates/local-feed
      mount_point: "."

initial_prompt: |
  Build a UiPath RPA project named `DataServiceEval` in the current working
  directory that combines Data Service activities with TryCatch branching on
  entity `CodingAgentsEvalEntity`. The workflow must contain these activities
  in order:

    1. Create a new record with `Title` set to `'Risky Op'` and `Score` set
       to `50`. Bind the created record to a workflow variable (e.g.
       `createdRecord`).

    2. Wrap the next steps in a `TryCatch` activity:

       Try block (runs if no exception is thrown by step 2a):
         a. Update the record by `createdRecord.Id`, setting `Score` to `999`.
            Do NOT set ContinueOnError — failures must propagate to the
            Catch block.
         b. After the update succeeds, query all records in the entity where
            `Score` equals `999`. Bind the matching records to a workflow
            variable.

       Catch block (runs only if step 2a throws):
         - Catch a typed `System.Exception` (or more specific exception
           type). Inside the catch block, log the error message and then
           delete the original record by `createdRecord.Id` as cleanup.
         - The Delete activity in the Catch block must NOT set
           ContinueOnError — failures here are unrelated to the rolled-back
           transaction.

  The output of step 1 must flow into step 2a's `RecordId` and step 2c's
  Delete `RecordId` — do not re-derive the ID from any other source.

  Sandbox setup (already in place — do not modify):
    - `./NuGet.Config` declares a local NuGet source at `./local-feed/`
    - `./local-feed/` hosts `UiPath.DataService.Activities` version `23.1.4-dev`,
      which is the version you must pin in your project dependencies (this
      package version is not available on any public feed)

  Both `CodingAgentsEvalEntity` and `CodingAgentsEvalFileEntity` exist on the
  connected Data Service tenant — install both into the project.

  For the entity install step — equivalent of `uip rpa data-fabric-entities
  install` in the skill docs — run the rpa-tool source directly:

      bun C:\Users\suphalathlur\Studio\RpaTool\rpa-tool\src\index.ts install-data-fabric-entities --add SystemUser,CodingAgentsEvalEntity,CodingAgentsEvalFileEntity --project-dir "<PROJECT_DIR>" --helm-version 0.2.3 --verbose --format json

  All other commands use the standard `uip rpa` CLI as documented in the skill.

success_criteria:
  - type: file_exists
    description: "Project was scaffolded via uip rpa init under DataServiceEval/"
    path: DataServiceEval/project.json
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Main.xaml exists in the DataServiceEval project"
    path: DataServiceEval/Main.xaml
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip rpa init"
    tool_name: Bash
    command_pattern: 'uip\s+rpa\s+init\b'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent installed entities via bun rpa-tool install-data-fabric-entities"
    tool_name: Bash
    command_pattern: 'bun\s+.*install-data-fabric-entities\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json pins the local-feed DataService package version"
    path: DataServiceEval/project.json
    includes:
      - 'UiPath.DataService.Activities'
      - '23.1.4-dev'
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Main.xaml references Create + TryCatch + Update + Query + Delete"
    path: DataServiceEval/Main.xaml
    includes:
      - 'CreateEntityRecord'
      - 'UpdateEntityRecord'
      - 'QueryEntityRecords'
      - 'DeleteEntityRecord'
      - 'TryCatch'
      - 'CodingAgentsEvalEntity'
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Main.xaml binds each DS activity with a namespace alias for UiPath.DataService.Activities"
    command: 'python -c "import re,sys; t=open(''DataServiceEval/Main.xaml'',encoding=''utf-8'').read(); names=[''CreateEntityRecord'',''UpdateEntityRecord'',''QueryEntityRecords'',''DeleteEntityRecord'']; sys.exit(0 if all(re.search(r''<[A-Za-z_][A-Za-z0-9_]*:''+n+r''\b'', t) for n in names) else 1)"'
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Entity install compiled CodingAgentsEvalEntity into the generated DLL"
    command: 'python -c "import glob,sys; dlls=glob.glob(''DataServiceEval/.local/.entities/*/DataService.DataServiceEval.dll''); sys.exit(0 if dlls and b''CodingAgentsEvalEntity'' in open(dlls[0],''rb'').read() else 1)"'
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "TryCatch structure: Update inside Try, Delete inside Catch, both chained from createdRecord.Id"
    command: 'python "%TASK_DIR%/check_q_trycatch_branching.py" DataServiceEval/Main.xaml'
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip rpa validate finds zero errors against the authored Main.xaml"
    command: 'cd DataServiceEval && uip rpa validate --output json'
    timeout: 120
    expected_exit_code: 0
    expected_stdout: '\A(?!.*\[error\])'
    stdout_match: regex
    weight: 5.0
    pass_threshold: 1.0
