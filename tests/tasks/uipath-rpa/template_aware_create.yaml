task_id: skill-rpa-template-aware-create
description: >
  Skill-guided evaluation: when the user asks for a REFramework project,
  the agent should run `uip rpa templates search` and create the project
  with `--template-package-id UiPath.Template.REFramework`, not with
  `--template-id BlankTemplate`. Tests whether the skill teaches the
  template-detection decision before `init`.
tags: [uipath-rpa, windows, smoke, lifecycle:generate]

run_limits:
  expected_turns: 4
  max_turns: 40
  turn_timeout: 900
  task_timeout: 900

initial_prompt: |
  I want to create a new UiPath automation called "InvoiceREF" in the
  current directory, as a REFramework project.

  Studio Desktop is NOT available in this sandbox — DO NOT actually run
  `uip rpa init`. Instead, decide which template-related flags
  you would pass and write a report.

  Note: the user said "REFramework" (no "Enhanced"/"Lite" qualifier) — so the
  selection rule should auto-pick the single Official match.

  Save your decision to report.json with this exact shape:
    {
      "template_strategy": "<'template_package' or 'template_id'>",
      "template_package_id": "<packageId from templates search, or null>",
      "template_package_version": "<version, or null>",
      "template_id": "<BlankTemplate / LibraryProcessTemplate / TestAutomationProjectTemplate, or null>",
      "search_templates_query": "<the exact --query value passed to templates search, or null>",
      "create_project_command": "<the full uip rpa init command you would run>"
    }

  Important:
  - Use `--output json` on any uip commands you run.
  - Do NOT invoke `uip rpa init` itself in this sandbox.

success_criteria:
  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent picked template_package strategy (not BlankTemplate) for REFramework"
    path: "report.json"
    assertions:
      - expression: "template_strategy"
        operator: equals
        expected: "template_package"
      - expression: "template_package_id"
        operator: equals
        expected: "UiPath.Template.REFramework"
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent ran templates search with a REFramework query before creating"
    path: "report.json"
    assertions:
      - expression: "search_templates_query"
        operator: contains
        expected: "REFramework"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "create_project command uses --template-package-id, not --template-id BlankTemplate"
    path: "report.json"
    includes:
      - "--template-package-id"
      - "UiPath.Template.REFramework"
    weight: 1.5
    pass_threshold: 1.0
