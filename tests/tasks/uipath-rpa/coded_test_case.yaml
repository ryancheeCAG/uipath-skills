task_id: skill-rpa-coded-test-case
description: >
  Skill-guided evaluation: agent uses the uipath-rpa skill to set up a coded
  test project end-to-end — shared partial-class CodedWorkflow Before/After
  hooks plus a coded test case with Given-When-Then structure, testing-service
  assertions, and a project.json fileInfoCollection entry. Covers both the
  hooks pattern and the coded test case workflow in one task.
tags: [uipath-rpa, smoke, coded, hooks, test-case]

run_limits:
  expected_turns: 22
  max_turns: 70
  task_timeout: 400
  turn_timeout: 400

initial_prompt: |
  I have a UiPath coded test project called "LoginTests" that exercises a
  browser login flow. I need shared setup/teardown for every test case AND
  a first coded test case that uses them.

  The working directory starts empty. Scaffold the project with
  `uip rpa init --name "LoginTests" --location "." --template-id TestAutomationProjectTemplate`.
  Studio Desktop is NOT available — skip any CLI commands that require
  --use-studio. Focus on generating the correct files and project.json updates.

  Use `UiPath.Testing.Activities` version `[25.4.1]` (newer 25.10.x
  releases synthesize a bootloader that breaks the build on this
  runner). Pin it in project.json before adding source files.

  Requirements:
  - Set up shared Before/After hooks that apply to ALL test cases:
      * File: `LoginTests/CodedWorkflowHooks.cs`.
      * Class: `partial class CodedWorkflow` implementing `IBeforeAfterRun`
        (the partial-class pattern from the skill — NOT a base class, NOT
        a separate `CodedWorkflowHooks` class). The file extends the
        existing `CodedWorkflow` partial declared by the project.
      * `Before(...)` and `After(...)` may contain stub bodies — a
        `Log(...)` call or a comment describing the intended browser
        open/close is fine. Do NOT install
        `UiPath.UIAutomation.Activities` or chase the `uiAutomation`
        service in coded mode for this task; the test scaffold has no
        Object Repository targets configured, and the rubric validates
        the partial-class hook *shape*, not real browser automation.
  - Create one coded test case `LoginTests/TestLoginSuccess.cs`:
      * Class `TestLoginSuccess : CodedWorkflow` with the `[TestCase]`
        attribute on the `Execute` method.
      * Follows Given-When-Then (Arrange-Act-Assert) structure.
      * Uses the testing service for assertions (`testing.VerifyExpression`
        / `testing.VerifyAreEqual` / etc.).
  - Update project.json so the test case shows up in fileInfoCollection
    with the correct testCaseType entry.

  Write a `report.json` IMMEDIATELY after scaffolding the project (with
  placeholder values) and update it as you complete each piece. Do not
  leave it as the last step — previous runs got distracted by build
  errors and never wrote it. Final shape:
    {
      "hooks_file": "CodedWorkflowHooks.cs",
      "hooks_pattern": "partial_class",
      "hooks_class_declaration": "<the class declaration line>",
      "test_case_file": "TestLoginSuccess.cs",
      "test_case_class": "TestLoginSuccess",
      "base_class": "CodedWorkflow",
      "assertions_used": ["<list of testing.Verify* methods used>"]
    }

  Important:
  - The `uip` CLI is already available in the environment.
  - Use `--output json` on any uip commands you run.

success_criteria:
  - type: file_exists
    description: "Hooks file was created in the project"
    path: "LoginTests/CodedWorkflowHooks.cs"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Hooks file uses partial class CodedWorkflow with IBeforeAfterRun"
    path: "LoginTests/CodedWorkflowHooks.cs"
    includes:
      - "partial class CodedWorkflow"
      - "IBeforeAfterRun"
      - "Before("
      - "After("
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Test case .cs file was created"
    path: "LoginTests/TestLoginSuccess.cs"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Test case has [TestCase] attribute and uses CodedWorkflow"
    path: "LoginTests/TestLoginSuccess.cs"
    includes:
      - "[TestCase]"
      - "CodedWorkflow"
      - "void Execute"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Test case uses testing-service assertions (Given-When-Then / AAA)"
    path: "LoginTests/TestLoginSuccess.cs"
    includes:
      - "testing.Verify"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "project.json has test case entry in fileInfoCollection"
    path: "LoginTests/project.json"
    includes:
      - "TestLoginSuccess"
      - "testCaseType"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json confirms partial-class hooks + CodedWorkflow base class"
    path: "report.json"
    assertions:
      - expression: "hooks_pattern"
        operator: equals
        expected: "partial_class"
      - expression: "hooks_class_declaration"
        operator: contains
        expected: "partial class CodedWorkflow"
      - expression: "base_class"
        operator: contains
        expected: "CodedWorkflow"
    weight: 2.0
    pass_threshold: 1.0
