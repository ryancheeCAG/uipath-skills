task_id: skill-solution-project-list
description: >
  Smoke test: agent uses the uipath-solution skill to create a solution and
  list its registered projects via `uip solution project list`. Runs entirely
  in the sandbox tempdir — no tenant interaction.
tags: [uipath-solution, smoke, mode:build, lifecycle:discover]

sandbox:
  driver: docker
  python: {}

initial_prompt: |
  Create a new UiPath solution called "ProjectListDemo" and then show me the
  list of projects registered in its manifest.

success_criteria:
  - type: command_executed
    description: "Agent created a solution via uip solution init (or pre-rename `new`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+(init|new)\s+.*ProjectListDemo'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Solution manifest was created on disk"
    path: "ProjectListDemo/ProjectListDemo.uipx"
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed projects via uip solution project list"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+project\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

