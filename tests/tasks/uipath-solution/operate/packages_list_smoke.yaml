task_id: skill-solution-packages-list
description: >
  Smoke test: agent uses the uipath-solution skill to list published solution
  packages in the tenant via `uip solution packages list --output json`.
  Auth errors or empty results are acceptable outcomes — the goal is correct
  command shape, not tenant state.
tags: [uipath-solution, smoke, mode:operate, lifecycle:discover]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  List the published solution packages available in the current UiPath tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed solution packages via uip solution packages list"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+packages\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

