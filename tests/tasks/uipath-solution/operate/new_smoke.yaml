task_id: skill-solution-new-init
description: >
  Smoke test: agent uses the uipath-solution skill to scaffold a new UiPath
  solution via `uip solution init` (post-rename of the old `solution new`).
  Verifies the agent runs the scaffold command AND the resulting `.uipx`
  manifest is present on disk (`file_exists` on the expected path). Runs
  entirely in the sandbox tempdir — no tenant interaction.
tags: [uipath-solution, smoke, mode:build, lifecycle:generate]

sandbox: {}

initial_prompt: |
  Create a new empty UiPath solution called "MySolution" in the current
  directory.

success_criteria:
  - type: command_executed
    description: "Agent created a solution via uip solution init (or pre-rename `new`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+(init|new)\s+.*MySolution'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Solution manifest was created"
    path: "MySolution/MySolution.uipx"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
