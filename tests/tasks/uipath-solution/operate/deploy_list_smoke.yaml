task_id: skill-solution-deploy-list
description: >
  Smoke test: agent uses the uipath-solution skill to list active solution
  deployments in the tenant via `uip solution deploy list --output json`.
  Auth errors or empty results are acceptable outcomes — the goal is correct
  command shape, not tenant state.
tags: [uipath-solution, smoke, mode:operate, lifecycle:discover]

run_limits:
  expected_turns: 6

initial_prompt: |
  List the active solution deployments in the current UiPath tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed deployments via uip solution deploy list"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+deploy\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

