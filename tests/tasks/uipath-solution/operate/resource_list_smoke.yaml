task_id: skill-solution-resource-list
description: >
  Smoke test: agent uses the uipath-solution skill to create a solution and
  list its solution-folder resources via `uip solution resource list`. Runs
  entirely in the sandbox tempdir — no tenant interaction.
tags: [uipath-solution, smoke, mode:build, lifecycle:discover]

sandbox:
  driver: docker
  python: {}

initial_prompt: |
  Create a new UiPath solution called "ResourceListDemo" and then list the
  solution-level resources auto-registered for it.

success_criteria:
  - type: command_executed
    description: "Agent created a solution via uip solution init (or pre-rename `new`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+(init|new)\s+.*ResourceListDemo'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Solution manifest was created on disk"
    path: "ResourceListDemo/ResourceListDemo.uipx"
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed solution resources via uip solution resource list"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resource\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

