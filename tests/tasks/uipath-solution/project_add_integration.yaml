task_id: skill-solution-project-add
description: >
  Integration test: agent uses the uipath-solution skill to register an
  existing project into a solution via `uip solution project add`, then
  confirms it appears in the manifest. Covers the project-registration
  surface that all current tests skip (every other task uses empty
  solutions). Runs entirely in the sandbox tempdir — no tenant interaction.
tags: [uipath-solution, integration, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 12

initial_prompt: |
  I have an automation project I want to bundle into a UiPath solution.

  1. Create a new UiPath solution called "OrderFlow" in the current
     directory.
  2. Scaffold a separate project on disk (outside the solution), then
     register that EXISTING project into the OrderFlow solution.
  3. Tell me which projects are registered in the solution afterwards.

success_criteria:
  - type: command_executed
    description: "Agent created a solution via uip solution init (or pre-rename `new`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+(init|new)\s+.*OrderFlow'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: json_check
    description: "Solution manifest registers at least one project (proves the add took effect, not just ran)"
    path: "OrderFlow/OrderFlow.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: gte
        expected: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent registered an existing project via uip solution project add (or import)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+project\s+(add|import)\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: llm_judge
    description: "Final reply confirms the solution now has exactly one registered project"
    include_agent_output: true
    prompt: |
      Evaluate ONLY the agent's final reply. The task asked the agent to
      create a solution and register one existing project into it.

      Score 1.0 if the reply communicates that the solution now contains
      one registered project (names it, or clearly states a single project
      is registered). Both English and Romanian phrasing are acceptable.

      Score 0.0 if the reply claims zero projects, invents multiple
      fictional projects, dodges the question, or only dumps raw command
      output with no interpretation.
    weight: 1.5
    pass_threshold: 1.0
