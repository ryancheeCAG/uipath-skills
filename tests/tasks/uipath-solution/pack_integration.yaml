task_id: skill-solution-pack
description: >
  Integration test: agent uses the uipath-solution skill to build a
  deployable package with `uip solution pack`, after registering a project
  and syncing resources. Covers the pack surface, which today is only
  exercised implicitly inside the deploy e2e (never standalone). Runs
  entirely in the sandbox tempdir — no tenant interaction.
tags: [uipath-solution, integration, mode:build, lifecycle:generate]

run_limits:
  expected_turns: 14

initial_prompt: |
  I want a deployable package built from a UiPath solution.

  1. Create a new UiPath solution called "ShipDemo" and register a project
     into it.
  2. Make sure the solution's bundled resources are synced.
  3. Build a deployable package from it, written to a file named
     "ShipDemo.zip" in the current directory.

success_criteria:
  - type: command_executed
    description: "Agent created a solution via uip solution init (or pre-rename `new`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+(init|new)\s+.*ShipDemo'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent built the package via uip solution pack"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+pack\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Deployable package was produced on disk"
    path: "ShipDemo.zip"
    weight: 2.0
    pass_threshold: 1.0
