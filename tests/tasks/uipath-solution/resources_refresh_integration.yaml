task_id: skill-solution-resources-refresh
description: >
  Integration test: agent uses the uipath-solution skill to run
  `uip solution resources refresh` so the solution-folder artefacts and
  bindings reflect the registered projects before packing. Exercises the
  core sync mechanism (Critical Rule "refresh before pack/upload") that
  every binding-dependent test relies on implicitly but none asserts.
  Runs entirely in the sandbox tempdir — no tenant interaction.
tags: [uipath-solution, integration, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 12

initial_prompt: |
  I'm preparing a UiPath solution for packaging.

  1. Create a new UiPath solution called "BillingSuite" and register a
     project into it.
  2. Make sure the solution's bundled resources / bindings are synced to
     the current solution state so it's ready to pack.
  3. Confirm the resources are in sync and tell me you're ready to pack.

success_criteria:
  - type: command_executed
    description: "Agent created a solution via uip solution init (or pre-rename `new`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+(init|new)\s+.*BillingSuite'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "Solution has a project registered, so refresh acts on real state (not a no-op on an empty solution)"
    path: "BillingSuite/BillingSuite.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: gte
        expected: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent synced bundled artefacts via uip solution resources refresh"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources\s+refresh'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: llm_judge
    description: "Final reply confirms resources are synced and the solution is ready to pack"
    include_agent_output: true
    prompt: |
      Evaluate ONLY the agent's final reply. The task asked the agent to
      sync a solution's bundled resources/bindings and confirm readiness
      to pack.

      Score 1.0 if the reply states the resources/bindings are refreshed
      or in sync and the solution is ready to pack (English or Romanian).

      Score 0.0 if the reply skips the refresh, claims readiness without
      having synced, reports an unresolved error, or only dumps raw output
      with no interpretation.
    weight: 1.5
    pass_threshold: 1.0
