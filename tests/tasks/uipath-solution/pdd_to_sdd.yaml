task_id: skill-sdd-integration-pdd-to-sdd
description: >
  Skill-guided evaluation: agent uses the uipath-solution skill to
  analyze a small inline PDD and generate an SDD file. Tests whether the
  skill teaches correct PDD extraction, product selection, and SDD structure.
tags: [uipath-solution, integration, lifecycle:generate]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Analyze the following Process Design Document and generate a Solution Design
  Document (SDD). Use Autonomous mode — do not pause for checkpoints.

  For any [SME REVIEW] items, use the defaults and proceed.

  --- BEGIN PDD ---

  # Process Design Document: Invoice Data Entry

  ## Process Overview
  - **Process Name:** Invoice Data Entry
  - **Department:** Finance — Accounts Payable
  - **Schedule:** Daily, business hours (9 AM – 5 PM)
  - **Volume:** 50–75 invoices per day
  - **Average handling time (manual):** 4 minutes per invoice
  - **Exception rate:** ~8%

  ## In Scope
  - Download invoice attachments from Outlook
  - Extract invoice data from PDFs
  - Enter invoice data into SAP (transaction FB60)
  - Mark processed emails

  ## Out of Scope
  - Invoice approval workflow
  - Payment processing

  ## Detailed Process Steps
  | Step | Action | Application | Expected Result |
  |------|--------|-------------|-----------------|
  | 1.1 | Open Outlook, filter unread invoices | Outlook | List of unread invoice emails |
  | 1.2 | Download PDF attachment | Outlook | PDF saved to temp folder |
  | 1.3 | Open PDF and extract vendor, invoice number, amount, date | Adobe Reader | Data extracted into variables |
  | 1.4 | Log into SAP | SAP GUI | SAP main screen visible |
  | 1.5 | Navigate to FB60 | SAP GUI | Invoice entry screen |
  | 1.6 | Enter header: vendor, date, amount, invoice number | SAP GUI | Fields populated |
  | 1.7 | Save the entry | SAP GUI | Document number generated |
  | 1.8 | Mark email as processed in Outlook | Outlook | Email flagged |

  ## Business Exceptions
  | ID | Name | Trigger | Action |
  |----|------|---------|--------|
  | B1 | Duplicate invoice | Invoice number already exists in SAP | Skip, notify supervisor via email |
  | B2 | Amount over threshold | Amount > $10,000 | Route to manager for approval |

  ## System Errors
  | ID | Name | Trigger | Action |
  |----|------|---------|--------|
  | E1 | SAP login failure | Login screen not responding | Retry 3 times, then escalate |
  | E2 | PDF unreadable | PDF is scanned image without OCR | Move to exception folder, notify |

  ## Application Details
  | Application | Interface | Access Method |
  |-------------|-----------|---------------|
  | Outlook | Desktop | Installed locally |
  | SAP GUI | Desktop | Transaction FB60 |
  | Adobe Reader | Desktop | Installed locally |

  --- END PDD ---

success_criteria:
  - type: file_exists
    description: "SDD markdown file was created with kebab-case name"
    path: "invoice-data-entry-sdd.md"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "SDD contains core RPA template sections"
    path: "invoice-data-entry-sdd.md"
    includes:
      - "Process Overview"
      - "Process Map"
      - "Detailed Process Steps"
      - "Business Rules"
      - "Exception Handling"
      - "Error Handling"
      - "Application Inventory"
      - "Project Structure"
      - "Planner Handoff"
      - "Next Steps"
    weight: 2.0
    pass_threshold: 0.75

  - type: file_contains
    description: "SDD references the process name and key data from PDD"
    path: "invoice-data-entry-sdd.md"
    includes:
      - "Invoice Data Entry"
      - "SAP"
      - "Outlook"
      - "FB60"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "SDD contains exception and error IDs from PDD"
    path: "invoice-data-entry-sdd.md"
    includes:
      - "B1"
      - "B2"
      - "E1"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "SDD has a populated Planner Handoff header pointing at uipath-planner"
    path: "invoice-data-entry-sdd.md"
    includes:
      - "Execution autonomy"
      - "SDD scope"
      - "Tasks file"
      - "Generated by"
      - "uipath-planner"
    weight: 1.5
    pass_threshold: 1.0
