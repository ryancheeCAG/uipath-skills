task_id: skill-hitl-e2e-gdpr-compliance-greenfield
# NOTE: "e2e" here means authoring end-to-end (greenfield JSON flow authoring).
# This test does NOT deploy or execute the flow — it only validates the authored
# .flow file JSON and the skill's ability to author compliance-pattern HITL nodes.
description: >
  Authoring E2E golden scenario (green field): agent builds a GDPR deletion
  request flow with a privacy officer sign-off checkpoint. Tests proactive
  compliance pattern detection, schema design with Reject path, and timeout
  duration configuration. Real business use case. Full Discover -> Plan ->
  Build -> Verify loop. Does not deploy or run the flow.
tags: [uipath-human-in-the-loop, e2e, green-field, compliance, gdpr]

run_limits:
  expected_turns: 22
  max_turns: 40
  turn_timeout: 1200

initial_prompt: |
  Build a UiPath Flow named "GdprDeletionApproval" that processes GDPR
  data deletion requests. Each request must be reviewed and signed off by
  a privacy officer before the deletion runs — we need an audit trail for
  every decision. If the officer doesn't respond within 7 days, escalate
  automatically.

  The HITL node must use the inline quickform style (uipath.human-in-the-loop).
  Give the privacy officer Approve and Reject outcomes. Configure the node
  with a 7-day ISO 8601 timeout duration (e.g. "P7D") so the request
  expires automatically if the officer does not respond.

  Validate the flow when you're done.

success_criteria:
  - type: file_exists
    description: "Flow file was created at the expected path"
    path: "GdprDeletionApproval/GdprDeletionApproval/GdprDeletionApproval.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow contains the inline HITL node type"
    path: "GdprDeletionApproval/GdprDeletionApproval/GdprDeletionApproval.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow exposes Approve and Reject outcomes"
    path: "GdprDeletionApproval/GdprDeletionApproval/GdprDeletionApproval.flow"
    includes:
      - "Approve"
      - "Reject"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow wires the completed handle"
    path: "GdprDeletionApproval/GdprDeletionApproval/GdprDeletionApproval.flow"
    includes:
      - '"completed"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Flow configures a 7-day ISO 8601 timeout (P7D or PT168H or similar)"
    path: "GdprDeletionApproval/GdprDeletionApproval/GdprDeletionApproval.flow"
    pattern: '"P(7D|T168H|1W)"'
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran flow validate during the session"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "uip flow validate passes against the authored .flow file"
    command: "uip maestro flow validate GdprDeletionApproval/GdprDeletionApproval/GdprDeletionApproval.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
