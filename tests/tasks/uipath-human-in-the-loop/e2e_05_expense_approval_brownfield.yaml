task_id: skill-hitl-e2e-expense-approval-brownfield
# NOTE: "e2e" here means authoring end-to-end (brownfield JSON flow editing).
# This test does NOT deploy or execute the flow — it only validates the authored
# .flow file JSON and the skill's ability to insert a HITL node into a minimal flow.
description: >
  Authoring E2E test (brown field): agent adds a HITL node between two existing
  nodes in a minimal flow, wires the completed handle, and validates the authored
  .flow file. Tests C2 (brown field insert), C5 (completed handle), F1 and F2
  (validate). Does not deploy or run the flow.
tags: [uipath-human-in-the-loop, e2e, brown-field]

agent:
  type: claude-code

run_limits:
  max_turns: 70
  turn_timeout: 1200

initial_prompt: |
  I have a UiPath Flow project. First, create this starting flow by writing
  it to ExpenseApproval/ExpenseApproval/ExpenseApproval.flow:

  {
    "nodes": [
      {
        "id": "trigger1",
        "type": "core.trigger.manual",
        "label": "Start",
        "position": { "x": 100, "y": 200 }
      },
      {
        "id": "postExpense",
        "type": "core.action.script",
        "label": "Post to Finance System",
        "position": { "x": 400, "y": 200 },
        "inputs": { "script": "console.log('posting expense');" }
      }
    ],
    "edges": [
      {
        "id": "e1",
        "source": "trigger1",
        "target": "postExpense",
        "sourcePort": "output",
        "targetPort": "input"
      }
    ],
    "variables": [],
    "definitions": []
  }

  Now add a Human-in-the-Loop node between the trigger and the posting step.
  A manager should review and approve the expense before it is posted.
  Wire the completed handle to the posting step and validate the flow.

success_criteria:
  - type: file_contains
    description: "HITL node is present in the flow file"
    path: "ExpenseApproval/ExpenseApproval/ExpenseApproval.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Completed handle is wired in the flow file"
    path: "ExpenseApproval/ExpenseApproval/ExpenseApproval.flow"
    includes:
      - '"completed"'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

