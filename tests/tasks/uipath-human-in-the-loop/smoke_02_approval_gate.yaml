task_id: skill-hitl-smoke-approval-gate
description: >
  Smoke test: agent should detect an approval gate pattern and recommend
  HITL even though the user said "approve" rather than "HITL". Verifies
  proactive business-language-based triggering.
tags: [uipath-human-in-the-loop, smoke]

run_limits:
  expected_turns: 3

initial_prompt: |
  Build a UiPath Flow that extracts expense report data and emails it to
  finance — but a manager must approve each expense report before the email
  is sent.

  Analyze whether a human checkpoint is needed and identify what type of
  approval pattern applies. Write your analysis to `recommendation.json`:
  {
    "hitl_needed": <true or false>,
    "pattern": "<type of human checkpoint pattern>",
    "proposed_schema": {
      "inputs": ["<field names>"],
      "outputs": ["<field names>"],
      "outcomes": ["<button names>"]
    }
  }

success_criteria:
  - type: file_exists
    description: "Agent wrote a recommendation.json"
    path: "recommendation.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Agent identified HITL is needed"
    path: "recommendation.json"
    includes:
      - '"hitl_needed": true'
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent identified the canonical approval-gate pattern"
    path: "recommendation.json"
    assertions:
      - expression: "pattern"
        operator: regex
        expected: "(?i)approval.gate"
    weight: 1.5
    pass_threshold: 1.0
