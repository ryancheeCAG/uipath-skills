task_id: skill-hitl-smoke-writeback
description: >
  Smoke test: agent should proactively detect a write-back validation
  pattern when the user describes an AI agent writing to a system of record
  WITHOUT explicitly asking for HITL. Verifies proactive recommendation.
tags: [uipath-human-in-the-loop, smoke]

run_limits:
  expected_turns: 2

initial_prompt: |
  I'm designing a UiPath Flow where an AI agent reads incomplete SAP purchase orders,
  enriches the missing vendor and cost-center fields using company data, and
  writes the corrected records back to SAP.

  Analyze whether this flow needs any human checkpoints, explain why,
  and identify where one should go if needed.

  Do not build or scaffold a project. Write only your analysis to
  `recommendation.json`:
  {
    "hitl_needed": <true or false>,
    "pattern": "<type of human checkpoint pattern, if applicable>",
    "reason": "<why HITL is or is not needed>",
    "proposed_insertion_point": "<where in the flow>"
  }

success_criteria:
  - type: file_exists
    description: "Agent wrote a recommendation.json"
    path: "recommendation.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Agent proactively identified HITL is needed (write-back detection)"
    path: "recommendation.json"
    includes:
      - '"hitl_needed": true'
    weight: 3.0
    pass_threshold: 1.0

  - type: json_check
    description: >
      Agent picked a canonical HITL pattern that fits an "AI enriches data,
      writes it back to a system of record" scenario. Write-back-validation
      (HITL before write to system of record), data-enrichment (HITL fills
      / validates incomplete data), and agentic-output-review (human
      verifies AI output before downstream use) are all documented in
      `references/hitl-patterns.md` as applicable here.
    path: "recommendation.json"
    assertions:
      - expression: "pattern"
        operator: regex
        expected: "(?i)(write.back|enrich|agentic.output|approv|review)"
    weight: 1.5
    pass_threshold: 1.0
