task_id: skill-hitl-e2e-invoice-approval-greenfield
# NOTE: "e2e" here means authoring end-to-end (greenfield JSON flow authoring).
# This test does NOT deploy or execute the flow — it only validates the authored
# .flow file JSON and the skill's ability to design and wire HITL nodes.
description: >
  Authoring E2E golden scenario (green field): agent builds a complete invoice
  approval flow from scratch — detecting write-back + approval gate signals,
  designing schema, adding HITL node, wiring all handles, and validating the
  authored .flow file. Real business use case. Full Discover -> Plan -> Build -> Verify loop.
tags: [uipath-human-in-the-loop, e2e, green-field, invoice, approval-gate, write-back]

agent:
  type: claude-code

run_limits:
  max_turns: 40
  turn_timeout: 1200

initial_prompt: |
  Build a UiPath Flow named "InvoiceApproval" that extracts invoice data
  from a SharePoint folder and posts the approved invoices to SAP. Finance
  needs to review and approve each invoice before it is posted — we cannot
  write to SAP without human sign-off.

  The HITL node must use the inline quickform style (uipath.human-in-the-loop).
  Show the finance manager the relevant invoice fields, give them Approve and
  Reject outcomes, and wire the completed handle to the downstream SAP step.
  Use $vars.<hitl-node-id>.output downstream to access the manager's decision.

  Validate the flow when you're done.

success_criteria:
  - type: file_exists
    description: "Flow file was created at the expected path"
    path: "InvoiceApproval/InvoiceApproval/InvoiceApproval.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow contains the inline HITL node type"
    path: "InvoiceApproval/InvoiceApproval/InvoiceApproval.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow uses the quickform schema type"
    path: "InvoiceApproval/InvoiceApproval/InvoiceApproval.flow"
    includes:
      - '"type": "quick"'
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow exposes Approve and Reject outcomes"
    path: "InvoiceApproval/InvoiceApproval/InvoiceApproval.flow"
    includes:
      - "Approve"
      - "Reject"
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow wires the completed handle"
    path: "InvoiceApproval/InvoiceApproval/InvoiceApproval.flow"
    includes:
      - '"completed"'
    weight: 1.5
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Downstream step references $vars.<hitl-node-id>.output"
    path: "InvoiceApproval/InvoiceApproval/InvoiceApproval.flow"
    pattern: '\$vars\.[A-Za-z0-9_-]+\.output'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran flow validate during the session"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "uip flow validate passes against the authored .flow file"
    command: "uip maestro flow validate InvoiceApproval/InvoiceApproval/InvoiceApproval.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
