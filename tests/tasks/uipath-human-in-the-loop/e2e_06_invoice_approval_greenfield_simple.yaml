task_id: skill-hitl-e2e-invoice-approval-greenfield-simple
# NOTE: "e2e" here means authoring end-to-end (greenfield flow project creation).
# This test does NOT deploy or execute the flow — it only validates the authored
# .flow file JSON and the skill's ability to scaffold and wire a new project.
description: >
  Authoring E2E test (green field): agent creates a new Flow project with a HITL
  checkpoint from scratch. Tests C1 (green field), B1-B3 (schema design),
  C5 (completed handle), F1 (validate after add). Does not deploy or run the flow.
tags: [uipath-human-in-the-loop, e2e, green-field]

agent:
  type: claude-code

run_limits:
  max_turns: 40
  turn_timeout: 1200

initial_prompt: |
  Create a new UiPath Flow project called "InvoiceApproval" that processes
  invoices. The flow must pause so a finance manager can review and approve
  each invoice before a final confirmation step runs.

  The HITL node should show the manager: invoice ID, vendor name, and amount.
  The manager should be able to Approve or Reject.

  After adding the HITL node and wiring it, validate the flow.

success_criteria:
  - type: command_executed
    description: "Agent created a solution"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+solution\s+new'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent initialized a Flow project"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+init'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "HITL node is present in the flow file"
    path: "InvoiceApproval/InvoiceApproval/InvoiceApproval.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Completed handle is wired in the flow file"
    path: "InvoiceApproval/InvoiceApproval/InvoiceApproval.flow"
    includes:
      - '"completed"'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

