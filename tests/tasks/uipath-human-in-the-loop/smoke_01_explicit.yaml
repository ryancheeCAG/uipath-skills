task_id: skill-hitl-smoke-explicit
description: >
  Smoke test: agent should trigger the uipath-human-in-the-loop skill
  when explicitly asked to add a HITL node. Verifies the skill fires for
  direct HITL language and that the agent identifies the correct pattern.
tags: [uipath-human-in-the-loop, smoke]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  I have a UiPath Flow. Before the final data write step, a manager
  needs to review and approve the data before it is posted.

  Analyze whether a human checkpoint is needed and what kind of approval
  pattern applies. Write your analysis to `recommendation.json`:
  {
    "hitl_needed": <true or false>,
    "pattern": "<type of human checkpoint pattern>",
    "proposed_schema": {
      "inputs": ["<field names the human will see>"],
      "outputs": ["<field names the human fills in>"],
      "outcomes": ["<action button names>"]
    }
  }

success_criteria:
  - type: file_exists
    description: "Agent wrote a recommendation.json"
    path: "recommendation.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Agent identified HITL is needed"
    path: "recommendation.json"
    includes:
      - '"hitl_needed": true'
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: >
      Agent picked a canonical HITL pattern that fits an "approve before
      writing" scenario. Either approval-gate (manager approves the
      artifact) or write-back-validation (HITL gates a write to a
      system of record) is documented in `references/hitl-patterns.md`
      as applicable here; both are accepted.
    path: "recommendation.json"
    assertions:
      - expression: "pattern"
        operator: regex
        expected: "(?i)(approval.gate|write.back)"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Agent proposed a schema with outcomes"
    path: "recommendation.json"
    includes:
      - "outcomes"
      - "inputs"
    weight: 1.5
    pass_threshold: 1.0
