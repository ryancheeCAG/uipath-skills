task_id: skill-hitl-quality-runtime-vars
description: >
  Quality test: after adding a HITL node, agent must wire a downstream
  script node that correctly references $vars.<NodeId>.output and
  $vars.<NodeId>.status. Tests G1 and G2.
tags: [uipath-human-in-the-loop, integration, runtime-variables]

agent:
  type: claude-code

run_limits:
  max_turns: 50

initial_prompt: |
  Create a flow called "ReviewAndRoute" with:
  1. A manual trigger
  2. A HITL node (label: "Review Decision")
  3. A script node after HITL that reads the human's decision and logs it

  The script node must read the reviewer's decision via the HITL output
  runtime variable ($vars.<nodeId>.output) and ALSO check the completion
  status via the status runtime variable ($vars.<nodeId>.status). Wire the
  completed handle to the script node. Validate the flow.

success_criteria:
  - type: file_contains
    description: "HITL node with specified ID is present in the flow file"
    path: "ReviewAndRoute/ReviewAndRoute/ReviewAndRoute.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Downstream script references the HITL output runtime variable"
    path: "ReviewAndRoute/ReviewAndRoute/ReviewAndRoute.flow"
    pattern: '\$vars\.[A-Za-z0-9_-]+\.output'
    weight: 3.0
    pass_threshold: 1.0

  - type: file_matches_regex
    description: "Downstream script references the HITL status runtime variable"
    path: "ReviewAndRoute/ReviewAndRoute/ReviewAndRoute.flow"
    pattern: '\$vars\.[A-Za-z0-9_-]+\.status'
    weight: 2.0
    pass_threshold: 1.0

