task_id: skill-hitl-quality-completed-handle-and-result
description: >
  Quality test: agent must wire the completed handle to a downstream node
  and demonstrate how to read the human's decision using $vars.<nodeId>.output
  in the next script node. Tests C5, C6, F2.
tags: [uipath-human-in-the-loop, integration, edge-wiring]

run_limits:
  expected_turns: 21
  max_turns: 50
  turn_timeout: 600

initial_prompt: |
  Create a flow called "PurchaseOrderApproval" with the following structure:
  - A manual trigger
  - A HITL node for purchase order approval (label: "PO Approval")
  - A script node that reads the human's decision after the HITL step
    (id: "processResult", label: "Process Result")

  Wire the output of the human approval step to processResult. In the
  processResult script body, log the reviewer's decision.

  Validate after adding and wiring.

success_criteria:
  - type: file_contains
    description: "HITL node is present in the flow file"
    path: "PurchaseOrderApproval/PurchaseOrderApproval/PurchaseOrderApproval.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "completed handle is wired in the flow file"
    path: "PurchaseOrderApproval/PurchaseOrderApproval/PurchaseOrderApproval.flow"
    includes:
      - '"completed"'
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated after wiring"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip flow validate passes"
    command: "uip maestro flow validate PurchaseOrderApproval/PurchaseOrderApproval/PurchaseOrderApproval.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

