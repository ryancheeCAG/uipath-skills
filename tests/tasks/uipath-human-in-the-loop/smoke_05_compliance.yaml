task_id: skill-hitl-smoke-compliance
description: >
  Smoke test: agent should detect a compliance checkpoint pattern from
  regulatory language. Verifies the skill fires on audit/sign-off signals.
tags: [uipath-human-in-the-loop, smoke]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Automate GDPR data deletion requests. These are subject to regulatory
  compliance requirements: each request needs documented regulatory
  sign-off from our data privacy officer before the deletion runs, plus
  an audit trail for every decision (required for compliance with GDPR
  Article 17 — Right to Erasure).

  Analyze whether a human checkpoint is needed and what kind of sign-off
  pattern this is. Write your analysis to `recommendation.json`:
  {
    "hitl_needed": <true or false>,
    "pattern": "<type of human checkpoint pattern>",
    "proposed_schema": {
      "inputs": ["<what the privacy officer will see>"],
      "outputs": ["<what they fill in>"],
      "outcomes": ["<their decision options>"]
    }
  }

success_criteria:
  - type: file_exists
    description: "Agent wrote a recommendation.json"
    path: "recommendation.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Agent identified HITL is needed"
    path: "recommendation.json"
    includes:
      - '"hitl_needed": true'
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: >
      Agent picked a canonical HITL pattern that fits a regulatory-sign-off
      scenario. Compliance-checkpoint is the textbook fit (the doc lists
      "regulatory sign-off" and "GDPR consent flows" as its examples), but
      approval-gate is also defensible since "sign off" is a shared signal
      phrase. Both are accepted.
    path: "recommendation.json"
    assertions:
      - expression: "pattern"
        operator: regex
        expected: "(?i)(compliance|gdpr|regulatory|sign.off|approval.gate)"
    weight: 1.5
    pass_threshold: 1.0
