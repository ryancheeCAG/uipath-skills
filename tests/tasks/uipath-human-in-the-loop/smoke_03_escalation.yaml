task_id: skill-hitl-smoke-escalation
description: >
  Smoke test: agent should detect an exception escalation pattern from
  AI confidence threshold language. Verifies the skill fires on escalation
  signals without explicit HITL mention.
tags: [uipath-human-in-the-loop, smoke]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  My UiPath Flow has an AI agent that classifies customer complaints.
  Most classifications are confident and route automatically, but a
  fraction land below the 70% confidence threshold. Those are edge
  cases the agent cannot resolve autonomously — they need to escalate
  to a human supervisor who makes the final routing call.

  Analyze whether a human checkpoint is needed, identify what type of pattern
  this is, and describe where in the flow it should go.

  Write your analysis to `recommendation.json`:
  {
    "hitl_needed": <true or false>,
    "pattern": "<type of human checkpoint pattern>",
    "insertion_point": "<short phrase describing where in the flow>",
    "proposed_schema": {
      "inputs": ["<field names>"],
      "outcomes": ["<button names>"]
    }
  }

success_criteria:
  - type: file_exists
    description: "Agent wrote a recommendation.json"
    path: "recommendation.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Agent identified HITL is needed"
    path: "recommendation.json"
    includes:
      - '"hitl_needed": true'
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: >
      Agent picked a canonical HITL pattern that fits a low-confidence-AI
      scenario. Either Exception escalation (conditional escalate-when-stuck)
      or Agentic output review (always-verify-AI) is documented in
      `references/hitl-patterns.md` as applicable here; both are accepted.
    path: "recommendation.json"
    assertions:
      - expression: "pattern"
        operator: regex
        expected: "(?i)(escalat|agentic.output)"
    weight: 1.5
    pass_threshold: 1.0

  - type: json_check
    description: "Agent proposed an insertion point that references the AI classifier, the confidence threshold, or the routing branch"
    path: "recommendation.json"
    assertions:
      - expression: "insertion_point"
        operator: regex
        expected: "(?i)(classif|confidence|routing|low.{0,10}confidence|after.{0,30}\\bAI\\b)"
    weight: 1.0
    pass_threshold: 1.0
