task_id: skill-hitl-quality-priority-timeout
description: >
  Quality test: agent must configure a high-priority HITL node for a
  financial compliance check. Tests C3 (priority).
tags: [uipath-human-in-the-loop, integration, options]

run_limits:
  expected_turns: 16
  max_turns: 50
  task_timeout: 500
  turn_timeout: 600

initial_prompt: |
  Add a Human-in-the-Loop node to a new flow called "FinanceCompliance".
  This is a financial compliance check — set it to HIGH priority and give
  reviewers 48 hours to respond before it times out.

  Wire the completed handle to a script node that logs the approval.
  Validate the flow after adding.
  Do NOT ask for approval, confirmation, or feedback. Do NOT pause between planning and implementation. Build the complete flow end-to-end in a single pass.

success_criteria:
  - type: file_contains
    description: "HITL node priority is set to High"
    path: "FinanceCompliance/FinanceCompliance/FinanceCompliance.flow"
    includes:
      - '"High"'
    weight: 2.5
    pass_threshold: 1.0

  - type: file_contains
    description: "HITL node is present in the flow file"
    path: "FinanceCompliance/FinanceCompliance/FinanceCompliance.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "uip flow validate passes"
    command: "uip maestro flow validate FinanceCompliance/FinanceCompliance/FinanceCompliance.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

