task_id: skill-hitl-e2e-ai-escalation-brownfield
# NOTE: "e2e" here means authoring end-to-end (brownfield JSON flow editing).
# This test does NOT deploy or execute the flow — it only validates the authored
# .flow file JSON and the skill's ability to insert HITL nodes into existing flows.
description: >
  Authoring E2E golden scenario (brown field): agent reads an existing
  classification flow and inserts a HITL escalation node on the low-confidence
  path. Real business use case. Full Discover -> Plan -> Build -> Verify loop.
  Does not deploy or run the flow.
tags: [uipath-human-in-the-loop, e2e, brown-field, escalation, ai-agent]

run_limits:
  expected_turns: 17
  max_turns: 40
  turn_timeout: 1200

initial_prompt: |
  I have an existing complaint classification flow. First, create it by
  writing to ComplaintTriage/ComplaintTriage/ComplaintTriage.flow:

  {
    "nodes": [
      {"id": "trigger1", "type": "core.trigger.manual", "label": "New Complaint", "position": {"x": 100, "y": 200}},
      {"id": "aiClassify", "type": "core.action.script", "label": "AI Classifier", "position": {"x": 300, "y": 200}, "inputs": {"script": "// AI classifies complaint; sets confidence"}},
      {"id": "routeHigh", "type": "core.action.script", "label": "Route High Priority", "position": {"x": 500, "y": 100}, "inputs": {"script": "console.log('routing high priority');"}},
      {"id": "routeLow", "type": "core.action.script", "label": "Route Standard", "position": {"x": 500, "y": 300}, "inputs": {"script": "console.log('routing standard');"}}
    ],
    "edges": [
      {"id": "e1", "source": "trigger1", "target": "aiClassify", "sourcePort": "output", "targetPort": "input"},
      {"id": "e2", "source": "aiClassify", "target": "routeHigh", "sourcePort": "output", "targetPort": "input"},
      {"id": "e3", "source": "aiClassify", "target": "routeLow", "sourcePort": "output", "targetPort": "input"}
    ],
    "variables": [],
    "definitions": []
  }

  When the AI classifier confidence is below 80%, a human reviewer must
  make the final routing decision before the complaint is acted on.
  Insert a human review step in the appropriate place, wire it, and validate.
  Do NOT ask for approval, confirmation, or feedback. Do NOT pause between planning and implementation. Complete the task end-to-end in a single pass.

success_criteria:
  - type: file_contains
    description: "HITL node is present in the flow file"
    path: "ComplaintTriage/ComplaintTriage/ComplaintTriage.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Completed handle is wired in the flow file"
    path: "ComplaintTriage/ComplaintTriage/ComplaintTriage.flow"
    includes:
      - '"completed"'
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the flow"
    tool_name: "Bash"
    command_pattern: '(uip|\$UIP)\s+(maestro\s+)?flow\s+validate.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0
