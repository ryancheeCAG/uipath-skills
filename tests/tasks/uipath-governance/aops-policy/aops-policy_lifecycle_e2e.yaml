task_id: skill-gov-aops-policy-lifecycle
description: >
  End-to-end test against the staging tenant: agent walks the full AOps
  governance policy lifecycle for the AITrustLayer (AITL) product —
  create, get, update, delete — driven entirely by the uipath-governance
  skill. The prompt only states the **goal**; the skill is responsible
  for teaching the CLI surface, full-replace semantics, identity sourcing,
  and what to re-pass on update.

  The test asserts outcomes via `require_success: true` on every mutating
  command — if the skill teaches the wrong workflow (e.g. omits a flag
  that the server requires), the failing exit code makes the criterion
  fail loudly instead of scoring a false positive. Retries are fine —
  the criterion counts only successful invocations.

  The trailing delete is the cleanup; the test self-cleans on success.
  If a run fails mid-flow and leaves an `aitl-crud-lifecycle-clie2e`
  policy behind, delete it manually before the next run.
tags: [uipath-governance, e2e, aops-policy, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 18
  max_turns: 40

pre_run:
  - command: 'CLEANUP_POLICY_KIND="aops-policy" CLEANUP_POLICY_NAME="aitl-crud-lifecycle-clie2e" python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-governance'',''cleanup_policy.py''))"'
    timeout: 30

initial_prompt: |
  Walk the full lifecycle of an AOps governance policy on the current
  login tenant. Use the product `AITrustLayer`.

  1. Create a policy named `aitl-crud-lifecycle-clie2e` using the
     product's default settings.
  2. Fetch the policy to confirm it exists.
  3. Update it — set the description to `Updated by CRUD lifecycle e2e test`.
     Keep every other field (including the name) as-is.
  4. Delete the policy.

  Important:
  - Do not prompt the user for confirmation — this is an automated test.
  - The final delete cleans up the test policy — do not skip it, even if
    a prior step had warnings.

success_criteria:
  - type: command_executed
    description: "Agent created the test policy named `aitl-crud-lifecycle-clie2e` AND the server accepted it (exit 0)"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+create\s+(?=[\s\S]*--name\s+["'']?aitl-crud-lifecycle-clie2e["'']?\s).*'
    require_success: true
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched the policy by GUID returned from create (exit 0)"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+get\s+.*(?:\$\w+|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})'
    require_success: true
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran update with --identifier and --description (command shape validation)"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+update\s+(?=[\s\S]*--identifier\s)(?=[\s\S]*--description\s)[\s\S]*'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent deleted the test policy at end of lifecycle (cleanup, exit 0)"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+delete\s+.*(?:\$\w+|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})'
    require_success: true
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on at least 3 aops-policy commands (skill convention)"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+[\s\S]*--output\s+json'
    min_count: 3
    weight: 1.0
    pass_threshold: 1.0

post_run:
  - command: 'CLEANUP_POLICY_KIND="aops-policy" CLEANUP_POLICY_NAME="aitl-crud-lifecycle-clie2e" python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-governance'',''cleanup_policy.py''))"'
    timeout: 30
