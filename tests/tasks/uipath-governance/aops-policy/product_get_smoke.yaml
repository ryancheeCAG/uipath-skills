task_id: skill-gov-aops-policy-product-get-smoke
description: >
  Smoke test: agent uses aops-policy product get to fetch details for
  a specific product. Only product list is currently tested; product get
  is an untested CLI verb.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable; what matters is correct
  command shape.
tags: [uipath-governance, smoke, mode:diagnose, lifecycle:discover, catalog]

run_limits:
  expected_turns: 5

initial_prompt: |
  I need to check the configuration details for the AITrustLayer
  governance product. First list all available products, then fetch
  the full details for AITrustLayer specifically. Save all command
  output to ./output.txt.

  Important:
  - The `uip` CLI is available but is NOT connected to a live governance
    tenant in this environment. Commands will fail with auth errors — that
    is expected. Run each command once, capture both stdout and stderr to
    ./output.txt (use `> output.txt 2>&1` for the first command and
    `>> output.txt 2>&1` for subsequent ones), and move on. Do NOT retry
    or attempt to login.
  - Use --output json on every uip gov aops-policy command.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent invoked aops-policy product list"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+product\s+list\b'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent invoked aops-policy product get for AITrustLayer"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+product\s+get\b'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+[\s\S]*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Command output captured to ./output.txt"
    path: "output.txt"
    weight: 1.0
    pass_threshold: 1.0
