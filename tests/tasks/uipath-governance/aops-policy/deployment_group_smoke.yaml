task_id: skill-gov-aops-policy-deployment-group-smoke
description: >
  Smoke test: agent uses the deployment group verbs (list, get, delete)
  that are currently untested. Only deployment user and tenant scopes
  are covered; the group scope is entirely missing.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable; what matters is correct
  command shape.
tags: [uipath-governance, smoke, mode:diagnose, lifecycle:discover, deployment]

run_limits:
  expected_turns: 8

initial_prompt: |
  Audit the AOps governance deployment state for groups. Run these
  queries:
  1. List every governance group that has policy assignments
  2. Fetch assignments for group ID
     `00000000-0000-0000-0000-0000000000b2`

  If the list command fails, still run the get command with the
  placeholder group ID.

  Save all command output to ./output.txt.

  Important:
  - The `uip` CLI is available but is NOT connected to a live governance
    tenant in this environment. Commands will fail with auth errors — that
    is expected. Run each command once, capture both stdout and stderr to
    ./output.txt (use `> output.txt 2>&1` for the first command and
    `>> output.txt 2>&1` for subsequent ones), and move on. Do NOT retry
    or attempt to login.
  - Use --output json on every uip gov aops-policy command.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent invoked deployment group list"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+deployment\s+group\s+list\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent invoked deployment group get with group ID"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+deployment\s+group\s+get\b'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Command output captured to ./output.txt"
    path: "output.txt"
    weight: 1.0
    pass_threshold: 1.0
