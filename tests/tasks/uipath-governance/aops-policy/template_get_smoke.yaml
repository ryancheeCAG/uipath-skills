task_id: skill-gov-aops-policy-template-get-smoke
description: >
  Smoke test: agent uses aops-policy template get to fetch the form
  template for a specific product (the update flow prerequisite).
  Only template list (bootstrap) is tested; template get for a
  single product is an untested verb.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable; what matters is correct
  command shape.
tags: [uipath-governance, smoke, mode:diagnose, lifecycle:discover, template]

run_limits:
  expected_turns: 5

initial_prompt: |
  I need to update an existing AITrustLayer governance policy. Before
  editing, fetch the current form template for the AITrustLayer product
  into a session directory using `--output-dir`. Save command output
  to ./output.txt.

  Important:
  - The `uip` CLI is available but is NOT connected to a live governance
    tenant in this environment. Commands will fail with auth errors — that
    is expected. Run each command once, capture both stdout and stderr to
    ./output.txt (use `> output.txt 2>&1` for the first command and
    `>> output.txt 2>&1` for subsequent ones), and move on. Do NOT retry
    or attempt to login.
  - Use --output json on every uip gov aops-policy command.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent invoked aops-policy template get or list for AITrustLayer"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+template\s+(get|list)\b'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+[\s\S]*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Command output captured to ./output.txt"
    path: "output.txt"
    weight: 1.0
    pass_threshold: 1.0
