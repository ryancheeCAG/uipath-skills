task_id: skill-gov-aops-policy-deployment-configure-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-governance skill to
  apply AOps governance policy assignments to a user and a group via
  `uip gov aops-policy deployment {user,group} configure`. Tests:
  - the new `--email` flag on `deployment user configure` (consumed only
    on first-time auto-registration via the `AddUser` endpoint);
  - the canonical `--user` / `--group` display-name flag (guards against
    the retired `--user-name` / `--group-name` flag-rename regression);
  - that the agent passes `--input` with a written JSON assignment file
    instead of attempting to merge in-place;
  - that the agent does NOT make a separate `add user` / `add group`
    registration call — `configure` auto-registers in the same call.

  Platform note: the smoke test runs without an authenticated tenant, so
  `uip gov aops-policy` commands that hit the service will fail with an
  auth error. That is acceptable — what matters is that the agent invokes
  the correct commands with the correct flags.
tags: [uipath-governance, smoke, aops-policy, deployment, configure]

sandbox: {}

initial_prompt: |
  Apply AOps governance policy assignments to two subjects. Save every
  command's stdout+stderr to ./output.txt (use `> output.txt 2>&1` for
  the first command and `>> output.txt 2>&1` for subsequent ones).

  1. User assignment.
     - `USER_ID`: `00000000-0000-0000-0000-0000000000a1`
     - Display name: `Alice Example`
     - Email: `alice@example.com`
     - Source: `cloud`
     - Assignment: product `AITrustLayer` → policy GUID
       `11111111-1111-1111-1111-111111111111`.

  2. Group assignment.
     - `GROUP_ID`: `00000000-0000-0000-0000-0000000000b2`
     - Display name: `Ops Team`
     - Source: `aad`
     - Assignment: product `AITrustLayer` → policy GUID
       `22222222-2222-2222-2222-222222222222`.

  Write each assignment file somewhere the `--input` flag can read
  before calling `configure`.

  Important:
  - The `uip` CLI is available but is NOT connected to a live governance
    tenant in this environment. Commands WILL fail with auth errors —
    that is expected. Run each command exactly once, capture stdout+stderr
    to ./output.txt, and move on. Do NOT retry or attempt to login.
  - Both subjects are brand-new to the governance service and have never
    been assigned a policy before.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent invoked `deployment user configure <USER_ID>` with --user, --email, --source, --input, and --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+deployment\s+user\s+configure\s+["'']?00000000-0000-0000-0000-0000000000a1["'']?\s+(?=.*--user\s+)(?=.*--email\s+)(?=.*--source\s+)(?=.*--input\s+)(?=.*--output\s+json).*'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent invoked `deployment group configure <GROUP_ID>` with --group, --source, --input, and --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+deployment\s+group\s+configure\s+["'']?00000000-0000-0000-0000-0000000000b2["'']?\s+(?=.*--group\s+)(?=.*--source\s+)(?=.*--input\s+)(?=.*--output\s+json).*'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent did NOT use the retired `--user-name` flag on deployment user configure"
    tool_name: "Bash"
    command_pattern: 'deployment\s+user\s+configure\s+.*--user-name'
    min_count: 0
    max_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent did NOT use the retired `--group-name` flag on deployment group configure"
    tool_name: "Bash"
    command_pattern: 'deployment\s+group\s+configure\s+.*--group-name'
    min_count: 0
    max_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent did NOT make a separate `user add` / `add-user` registration call — configure auto-registers"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+deployment\s+user\s+(add|add-user)'
    min_count: 0
    max_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent did NOT make a separate `group add` / `add-group` registration call — configure auto-registers"
    tool_name: "Bash"
    command_pattern: 'uip\s+gov\s+aops-policy\s+deployment\s+group\s+(add|add-group)'
    min_count: 0
    max_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Command output captured to ./output.txt"
    path: "output.txt"
    weight: 1.0
    pass_threshold: 1.0
