task_id: skill-governance-compliance-full-apply-e2e-live
description: >
  Live e2e: full ISO 42001 posture improvement lifecycle against a real tenant.
  Agent must: (1) call catalog get, (2) run state coverage, (3) present posture plan
  with Applied/Not Applied labels, (4) call state enable if gaps exist,
  (5) verify with state get, (6) produce clean user-facing report using "settings" not "controls".

  Requires UIPATH_CLI_ENABLE_ENV_AUTH + UIPATH_CLI_AUTH_TOKEN + org/tenant env vars.
  Run via experiments/live-e2e-local.yaml. See that file for setup instructions.

  Note on enable_called: if the tenant already has all ISO 42001 settings configured
  (coverage returns newCount == 0), the skill correctly skips state enable. The
  json_check assertion uses pass_threshold: 0.7 to allow for this case.
tags: [uipath-governance, e2e, lifecycle:execute, feature:compliance, live]

sandbox:
  python: {}

post_run:
  - command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-governance'',''compliance-pack'',''cleanup_compliance_pack.py''))"'
    timeout: 60

run_limits:
  max_turns: 40

initial_prompt: |
  Apply the ISO 42001 compliance standard to my UiPath tenant to improve my
  posture. Follow the complete process:
  1. Get the compliance standard catalog detail
  2. Run posture analysis to see which settings are Applied vs Not Applied
  3. Save the posture plan to posture_plan.txt (must include Applied/Not Applied status for each setting)
  4. Apply the full standard (only if there are gaps — skip if all settings are already Applied)
  5. Verify the final state

  Use the uipath-governance skill. Save a detailed summary to report.json:
    {
      "pack_id": "iso-42001-2023",
      "posture_analysis_run": true,
      "clauses_with_gaps": <integer from coverage API>,
      "settings_not_applied": <integer — number of settings with status Not Applied>,
      "settings_applied": <integer — number of settings already Applied>,
      "enable_called": <true if state enable was run, false if tenant already fully configured>,
      "verify_called": true,
      "pack_active_after": <true/false — from state get Data.Active>,
      "commands_attempted": ["<all commands in sequence>"]
    }

  Also capture all CLI output to output.txt as you go.
  After running state coverage, also save the raw JSON response to coverage.json in the current working directory (alongside output.txt).

  Important:
  - Use --output json on all uip gov commands.
  - Do NOT prompt for confirmation at any step — automated test.
  - The CLI IS connected to a live tenant via env-var auth. Commands will succeed.
  - If state coverage shows newCount == 0, all settings are already Applied — do NOT call state enable, set enable_called to false in report.json.
  - Present Applied/Not Applied status labels in your posture plan — do NOT expose raw API values like "in-place" or "new" to the user.
  - Do NOT narrate CLI commands to the user — present a clean report.

success_criteria:
  - type: command_executed
    description: "Step 1: catalog get for compliance standard detail"
    command_pattern: 'uip\s+gov\s+compliance-packs\s+catalog\s+get\s+iso-42001.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Step 2: state coverage for posture analysis"
    command_pattern: 'uip\s+gov\s+compliance-packs\s+state\s+coverage\s+(?:tenant|organization)\s+\S+\s+iso-42001.*--output\s+json'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Step 5: state get or state list to verify final state"
    command_pattern: 'uip\s+gov\s+compliance-packs\s+state\s+(get|list)\s+(?:tenant|organization)\s+\S+\s+iso-42001.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Full apply does NOT call aops-policy create (wrong path)"
    command_pattern: 'uip\s+gov\s+aops-policy\s+create'
    weight: 2.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Full apply does NOT use pack-walker.mjs (removed)"
    command_pattern: 'pack-walker\.mjs'
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "posture_plan.txt created — agent must present posture plan as a file"
    path: "posture_plan.txt"
    weight: 2.0
    pass_threshold: 1.0

  - type: json_check
    description: "report.json confirms lifecycle completed against real tenant"
    path: "report.json"
    assertions:
      - expression: "pack_id"
        operator: equals
        expected: "iso-42001-2023"
      - expression: "posture_analysis_run"
        operator: equals
        expected: true
      - expression: "verify_called"
        operator: equals
        expected: true
      - expression: "settings_not_applied"
        operator: gte
        expected: 0
      - expression: "settings_applied"
        operator: gte
        expected: 0
      - expression: "pack_active_after"
        operator: equals
        expected: true
      - expression: "length(commands_attempted)"
        operator: gte
        expected: 3
    weight: 3.0
    pass_threshold: 0.7

  - type: run_command
    description: "report.json passes logical checks — enable_called→pack_active_after, correct sequence"
    command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''TASK_DIR''],''check_full_apply_report.py''))"'
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "coverage.json has real API data — non-empty policies, valid Status fields"
    command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''TASK_DIR''],''check_coverage_real_data.py''))"'
    timeout: 30
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: file_contains
    description: "report.json references iso-42001-2023, uses new field names, excludes old terminology"
    path: "report.json"
    includes:
      - "iso-42001-2023"
      - "settings_not_applied"
      - "pack_active_after"
    excludes:
      - "controls_to_configure"
      - "pack-walker"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "posture_plan.txt uses Applied/Not Applied labels and excludes raw API status values"
    path: "posture_plan.txt"
    includes:
      - "ISO 42001"
      - "Applied"
      - "Not Applied"
    excludes:
      - "in-place"
    weight: 2.5
    pass_threshold: 0.6

  - type: llm_judge
    description: "Agent presented a structured report without narrating raw CLI to the user"
    include_agent_output: true
    prompt: |
      The agent was asked to apply the ISO 42001 compliance standard to a UiPath tenant
      and produce a clean user-facing report.

      Assess ONE thing only: did the agent present its findings as structured, readable
      output — or did it narrate raw CLI command strings in conversational prose?

      Acceptable: structured tables, SUMMARY sections, a posture plan, a post-apply receipt.
        Also acceptable: showing report.json as a JSON block (it was explicitly requested).
        Also acceptable: mentioning command names like "state enable" once in an explanation.

      Not acceptable: pasting long raw CLI invocations with full tenant UUIDs into prose,
        or a log-style narration of every command run ("I ran... then I ran... then I ran...").

      Score 1.0 if the output is primarily structured and readable.
      Score 0.5 if there is some raw CLI narration but the core report is still readable.
      Score 0.0 if the response is predominantly a raw CLI log with no structured summary.
    weight: 2.0
    pass_threshold: 0.5
