task_id: skill-ixp-list-projects-smoke
description: >
  Smoke: agent picks `uip ixp projects list --output json` to
  enumerate IXP projects on the tenant.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp-designtime, smoke, lifecycle:discover]

run_limits:
  expected_turns: 4

initial_prompt: |
  A document automation engineer wants to see every IXP project on the
  tenant before deciding which one to iterate on.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant
    in this environment. Commands will fail with auth errors — that is
    expected. Run each command once and move on. Do NOT retry or attempt
    to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent invoked `uip ixp projects list`"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+projects\s+list(\s|$)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
