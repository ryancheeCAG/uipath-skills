task_id: skill-ixp-get-metrics-smoke
description: >
  Smoke: agent picks `uip ixp projects get-metrics <Name>
  --output json` to fetch per-field F1/Precision/Recall before
  iterating on prompts. Locks in the project-`Name` argument
  (not `Title`) and `--output json`.

  Harness is unauthenticated; CLI calls fail with auth errors.
  Grades command shape, not wire effect.
tags: [uipath-ixp-designtime, smoke, lifecycle:discover]

run_limits:
  expected_turns: 4

initial_prompt: |
  A document automation engineer wants to inspect the per-field F1 scores
  of the IXP project named `my_invoices-f1afa9ef-ixp` before iterating on
  prompts.

  Important:
  - The `uip` CLI is available but is NOT connected to a live IXP tenant
    in this environment. Commands will fail with auth errors — that is
    expected. Run each command once and move on. Do NOT retry or attempt
    to login.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent invoked `uip ixp projects get-metrics` against the requested project Name (positional or via --project-name flag)"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+projects\s+get-metrics\s+.*my_invoices-f1afa9ef-ixp'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on a uip ixp command"
    tool_name: "Bash"
    command_pattern: 'uip\s+ixp\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
