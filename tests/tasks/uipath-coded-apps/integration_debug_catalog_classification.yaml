task_id: skill-coded-apps-integration-debug-catalog-classification
description: >
  Integration test (mode:diagnose, offline): agent reads three deployment
  fault descriptions, consults the skill's `references/debug.md` catalog,
  and writes a structured diagnosis (root cause + fix) for each to
  `diagnosis.json`. Tests the D8 failure-mode classification archetype.
  Closes the diagnose-mode coverage gap identified in
  tests/reports/uipath-coded-apps.md (only S2 validate→fix loop was
  diagnose-covered before this test).
tags: [uipath-coded-apps, integration, mode:diagnose, lifecycle:discover]
run_limits:
  expected_turns: 8
  turn_timeout: 600

initial_prompt: |
  A user reports three separate problems with their deployed UiPath Coded
  Web App. Consult the skill's `references/debug.md` Troubleshooting
  catalog and classify each fault.

  **Fault A:**
    "After publishing my Web App I open the URL but get a CORS error in
    the browser console: 'No Access-Control-Allow-Origin'. Every Orchestrator
    SDK call fails with this same error. Everything worked locally."

  **Fault B:**
    "I just added a new Tasks service call to my dashboard alongside the
    existing Assets and Queues calls. The Tasks call returns 401
    Unauthorized on first invocation. Assets and Queues still work fine."

  **Fault C:**
    "I deployed my Web App but loading it shows a blank page. Browser
    console shows 'Failed to load resource: 404' for several files
    in `/assets/...`."

  Write `diagnosis.json` at the sandbox root with EXACTLY this structure
  (one entry per fault; each fault has a `root_cause` and `fix` field):

  ```
  {
    "faultA": {
      "root_cause": "<one-sentence root cause>",
      "fix": "<the canonical fix from debug.md — name the config field / file / rule that needs to change>"
    },
    "faultB": { "root_cause": "...", "fix": "..." },
    "faultC": { "root_cause": "...", "fix": "..." }
  }
  ```

  Each `fix` field must reference the specific config or file the skill's
  debug.md tells you to change for that fault.

  Do NOT run `uip` or `npm` commands and do NOT attempt to reproduce the
  faults — this test grades classification accuracy, not reproduction.

success_criteria:
  - type: file_exists
    description: "diagnosis.json was created"
    path: "diagnosis.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "diagnosis.json is valid JSON"
    command: "python3 -c \"import json; json.load(open('diagnosis.json'))\""
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  # Skill change #1562 moved SDK config from .env/VITE_UIPATH_* to uipath.json;
  # debug.md's canonical fixes now say "set baseUrl in uipath.json" / "update
  # the scope field in uipath.json". The regexes accept the current canonical
  # phrasing and the specific value — but still reject vague answers
  # ('check CORS settings', 'check your scopes') and dead VITE_* env vars.
  - type: json_check
    description: "Fault A — fix names the API hostname or the baseUrl config field (debug.md: 'Set baseUrl in uipath.json to https://api.uipath.com'). NOT just 'cloud.uipath.com' (the wrong value)."
    path: "diagnosis.json"
    assertions:
      - expression: "faultA.fix"
        operator: regex
        expected: "(?i)(api\\.uipath\\.com|\\bbaseUrl\\b)"
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Fault B — fix names the specific OR.Tasks scope or the uipath.json scope field (debug.md: 'Update the scope field in uipath.json with the missing scope' — Rule #16). Bare 'scope' with no config location still fails."
    path: "diagnosis.json"
    assertions:
      - expression: "faultB.fix"
        operator: regex
        expected: "(?i)(OR\\.Tasks|scope[^.;]{0,60}uipath\\.json|uipath\\.json[^.;]{0,60}scope)"
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Fault C — root cause names Vite `base: './'` and/or `getAppBase()` runtime URL issue (debug.md: '404 after deploy — Vite base not relative or hardcoded router basename')"
    path: "diagnosis.json"
    assertions:
      - expression: "faultC.fix"
        operator: regex
        expected: "(?i)(base:\\s*['\\\"]?\\./|getAppBase|vite\\.config|relative\\s+base)"
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Each fault has both a root_cause and a fix (the structure required by the prompt)"
    path: "diagnosis.json"
    assertions:
      - expression: "faultA.root_cause"
        operator: regex
        expected: ".+"
      - expression: "faultA.fix"
        operator: regex
        expected: ".+"
      - expression: "faultB.root_cause"
        operator: regex
        expected: ".+"
      - expression: "faultB.fix"
        operator: regex
        expected: ".+"
      - expression: "faultC.root_cause"
        operator: regex
        expected: ".+"
      - expression: "faultC.fix"
        operator: regex
        expected: ".+"
    weight: 1.5
    pass_threshold: 1.0
