task_id: skill-coded-apps-integration-push-ignore-resources
description: >
  Integration test (mode:operate, cloud-auth required): agent pushes a Coded
  App to Studio Web in a scenario where the Studio Web project already has
  resources (env vars, connectors) configured by the team. The agent must
  recall the right CLI flag to skip re-importing those resources. Tests the
  `--ignore-resources` push flag (the last untested `uip codedapp push` flag
  surface) WITHOUT naming the flag in the prompt — agent must recall it
  from the skill.
tags: [uipath-coded-apps, integration, mode:operate, feature:push-pull]

run_limits:
  expected_turns: 15
  turn_timeout: 900

initial_prompt: |
  You're handed an existing Coded App that's already wired up to a Studio
  Web project. The team's Studio Web side has its environment variables and
  third-party connector configs already set up — your push to Studio Web
  must NOT overwrite or re-import those resources.

  **Step 0 — bootstrap the persistent test project.** This test uses a
  pre-created Studio Web project on the tenant (managed by test infra, not
  the agent). Write `.env` at the sandbox root with the project ID from the
  `CODED_APPS_TEST_PROJECT_ID` environment variable. This makes push
  non-interactive:
  ```
  echo "UIPATH_PROJECT_ID=$CODED_APPS_TEST_PROJECT_ID" > .env
  ```
  Do NOT proceed if `$CODED_APPS_TEST_PROJECT_ID` is empty — surface the
  configuration error to the user.

  Write these files at the sandbox root EXACTLY as shown (Step 1). The seed
  content is deliberately identical to `integration_push_pull_roundtrip` so
  both tests can share the same persistent fixture without racing on
  content — parallel writes are byte-identical no-ops on Studio Web.

  `package.json`:
  ```
  {
    "name": "integration-roundtrip-app",
    "version": "0.1.0",
    "type": "module"
  }
  ```

  `src/App.tsx`:
  ```
  // roundtrip-marker:v1
  export default function App() {
    return null;
  }
  ```

  Step 2 — push to Studio Web:

  1. Check login: `uip login status --output json`.
  2. Create a stub `dist/` folder — push requires a build-output folder
     to exist, but we're skipping `npm run build`, so seed one with a
     placeholder: `mkdir -p dist && echo "<html><body>stub</body></html>" > dist/index.html`.
  3. Run `uip codedapp push` with the appropriate flag(s) so that the push
     does NOT re-import Studio Web resources. Pick that flag from the
     skill's documented `push` surface — the team's Studio Web resources
     must be left untouched.
  4. Use `--output json` so the result is parseable.

  Do NOT run `npm install`, `npm run build`, `uip codedapp pack`, `publish`,
  or `deploy`.

success_criteria:
  - type: command_executed
    description: "Agent ran `uip login status` (Rule #2)"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran `uip codedapp push` (the operation under test)"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedapp\s+push\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Push command included the `--ignore-resources` flag — the agent recalled the right flag for the scenario (skill knowledge check; flag NOT named in the prompt)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+codedapp\s+push\b.*--ignore-resources'
    min_count: 1
    weight: 3.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Push command used --output json"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+codedapp\s+push\b.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent did NOT run pack/publish/deploy (out of scope for this push-only test)"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedapp\s+(pack|publish|deploy)\b'
    weight: 1.0
    pass_threshold: 1.0
