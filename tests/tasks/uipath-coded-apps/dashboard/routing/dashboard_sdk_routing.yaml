task_id: uipath-coded-apps-dashboard-sdk-routing
description: >
  Validates that metrics with SDK signals (queue items, running jobs, pending tasks)
  are routed to SDK calls, not to the Insights RTM API. A widget using
  useInsights for these metrics is a routing bug.
tags: [uipath-coded-apps, integration, dashboard, feature:routing, mode:build]

sandbox:
  driver: tempdir
  node: {}

initial_prompt: |
  Build a dashboard showing:
  - Current active queue items by folder
  - Running and pending jobs count
  - Pending Action Center tasks

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.
  Before starting, load the uipath-coded-apps skill and follow its workflow.

success_criteria:
  # Queue items must use SDK
  - type: run_command
    description: "Queue widget uses SDK QueueItems (not Insights)"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('QueueItems' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # Jobs must use SDK
  - type: run_command
    description: "Jobs widget uses SDK Jobs (not Insights)"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('Jobs.getAll' in open(os.path.join(d,f)).read() or 'jobs.getAll' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # Tasks must use SDK
  - type: run_command
    description: "Tasks widget uses SDK Tasks (not Insights)"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('Tasks.getAll' in open(os.path.join(d,f)).read() or 'tasks.getAll' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  # None of the above should use Insights jobs.* endpoints
  - type: run_command
    description: "No widget misroutes operational data to Insights jobs API"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; bad=['jobs.getCompletedTimeline','jobs.getSummary','jobs.getTopFailures']; sys.exit(1 if any(p in open(os.path.join(d,f)).read() for f in files for p in bad) else 0)\""
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  # Scaffold valid
  - type: file_exists
    description: "project scaffold created"
    path: "package.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "tsc --noEmit ran"
    tool_name: "Bash"
    command_pattern: 'tsc\s+--noEmit'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0
