task_id: uipath-coded-apps-dashboard-insights-routing
description: >
  Validates that Insights-routed metrics use the correct namespace and
  endpoint. Checks that agent errors use agents.getErrors, latency uses
  agents.getLatencyTimeline, and not a misrouted traceview or wrong endpoint.
tags: [uipath-coded-apps, integration, dashboard, feature:routing, mode:build]

sandbox:
  driver: tempdir
  node: {}

initial_prompt: |
  Build a dashboard showing:
  - Agent error trend over the last 7 days
  - P95 latency per agent
  - Top agents ranked by error count

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.
  Before starting, load the uipath-coded-apps skill and follow its workflow.

success_criteria:
  # Error trend uses agents.getErrors
  - type: run_command
    description: "Error trend widget uses agents.getErrors endpoint"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('agents.getErrors' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # Latency uses agents.getLatencyTimeline
  - type: run_command
    description: "Latency widget uses agents.getLatencyTimeline endpoint"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('agents.getLatencyTimeline' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # Top erroring agents uses agents.getTopErroredAgents
  - type: run_command
    description: "Top agents widget uses agents.getTopErroredAgents"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('agents.getTopErroredAgents' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  # All three use useInsights hook
  - type: run_command
    description: "Widgets use useInsights hook (not raw fetch)"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('useInsights' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  # Outcome check via script
  - type: run_command
    description: "check_dashboard validates Insights routing and structure"
    command: >
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-coded-apps/dashboard/_shared/check_dashboard.py
      --min-widgets 3 --require-insights
      --require-recipe agents.getErrors --no-tsc
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "tsc --noEmit ran"
    tool_name: "Bash"
    command_pattern: 'tsc\s+--noEmit'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0
