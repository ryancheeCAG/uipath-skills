task_id: uipath-coded-apps-dashboard-scaffold
description: >
  Validates that a minimal 2-widget dashboard produces a structurally
  correct scaffold: package.json, all required .env.local vars, a
  src/widgets/ directory, and a passing tsc --noEmit.
tags: [uipath-coded-apps, smoke, dashboard, feature:scaffold]

sandbox:
  driver: tempdir
  node: {}

initial_prompt: |
  Build a dashboard with two widgets: agent success rate (last 30 days)
  and agent error trend (last 7 days).

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.
  Before starting, load the uipath-coded-apps skill and follow its workflow.

success_criteria:
  # Core scaffold files
  - type: file_exists
    description: "package.json created"
    path: "package.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "vite.config.ts present"
    path: "vite.config.ts"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: ".env.local written"
    path: ".env.local"
    weight: 1.5
    pass_threshold: 1.0

  # All required env vars present
  - type: file_contains
    description: ".env.local has VITE_UIPATH_CLOUD_URL (Insights RTM base)"
    path: ".env.local"
    pattern: "VITE_UIPATH_CLOUD_URL="
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: ".env.local has VITE_UIPATH_BASE_URL (SDK API base)"
    path: ".env.local"
    pattern: "VITE_UIPATH_BASE_URL="
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: ".env.local has VITE_INSIGHTS_TENANT_ID"
    path: ".env.local"
    pattern: "VITE_INSIGHTS_TENANT_ID="
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: ".env.local has VITE_UIPATH_PAT (dev auth token)"
    path: ".env.local"
    pattern: "VITE_UIPATH_PAT="
    weight: 2.0
    pass_threshold: 1.0

  # Widget output
  - type: file_exists
    description: "src/widgets/ directory exists"
    path: "src/widgets"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "src/widgets/index.ts exports widgets"
    path: "src/widgets/index.ts"
    weight: 1.0
    pass_threshold: 1.0

  # TypeScript clean
  - type: command_executed
    description: "tsc --noEmit ran and passed"
    tool_name: "Bash"
    command_pattern: 'tsc\s+--noEmit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  # Outcome validation via check script
  - type: run_command
    description: "check_dashboard.py validates structure and env vars"
    command: >
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-coded-apps/dashboard/_shared/check_dashboard.py
      --min-widgets 1 --require-insights --no-tsc
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
