task_id: uipath-coded-apps-dashboard-scaffold
description: >
  Validates that a minimal 2-widget dashboard writes the correct file
  structure and env vars. Smoke-tier: checks CLI behaviour and file
  content only — does not run npm ci or tsc (those belong in e2e).
tags: [uipath-coded-apps, smoke, dashboard, feature:scaffold, mode:build]

sandbox:
  driver: tempdir
  node: {}

initial_prompt: |
  Build a dashboard with two widgets: agent success rate (last 30 days)
  and agent error trend (last 7 days).

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.
  Before starting, load the uipath-coded-apps skill and follow its workflow.

success_criteria:
  # ── Core scaffold files ───────────────────────────────────────────────
  - type: file_exists
    description: "package.json created"
    path: "package.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "vite.config.ts present"
    path: "vite.config.ts"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: ".env.local written"
    path: ".env.local"
    weight: 1.5
    pass_threshold: 1.0

  # ── Required env vars (all 6 must be present) ────────────────────────
  - type: file_check
    description: ".env.local has VITE_UIPATH_CLOUD_URL (Insights RTM base)"
    path: ".env.local"
    patterns:
      - pattern: "VITE_UIPATH_CLOUD_URL="
        must_match: true
    weight: 1.5
    pass_threshold: 1.0

  - type: file_check
    description: ".env.local has VITE_UIPATH_BASE_URL (SDK API base)"
    path: ".env.local"
    patterns:
      - pattern: "VITE_UIPATH_BASE_URL="
        must_match: true
    weight: 1.5
    pass_threshold: 1.0

  - type: file_check
    description: ".env.local has VITE_INSIGHTS_TENANT_ID"
    path: ".env.local"
    patterns:
      - pattern: "VITE_INSIGHTS_TENANT_ID="
        must_match: true
    weight: 1.5
    pass_threshold: 1.0

  - type: file_check
    description: ".env.local has VITE_UIPATH_PAT (dev auth token)"
    path: ".env.local"
    patterns:
      - pattern: "VITE_UIPATH_PAT="
        must_match: true
    weight: 2.0
    pass_threshold: 1.0

  # ── Widget output ─────────────────────────────────────────────────────
  - type: file_exists
    description: "src/widgets/ directory created"
    path: "src/widgets"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "src/widgets/index.ts exports widgets"
    path: "src/widgets/index.ts"
    weight: 1.0
    pass_threshold: 1.0

  # ── Routing labels in plan (agent showed plan before building) ────────
  - type: command_executed
    description: "Agent ran npm ci (scaffold executed)"
    tool_name: "Bash"
    command_pattern: 'npm\s+ci'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_check
    description: "App.tsx imports widgets"
    path: "src/App.tsx"
    patterns:
      - pattern: "widgets"
        must_match: true
    weight: 1.0
    pass_threshold: 1.0
