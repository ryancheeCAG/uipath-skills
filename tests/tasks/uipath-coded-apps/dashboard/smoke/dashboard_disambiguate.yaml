task_id: uipath-coded-apps-dashboard-disambiguate
description: >
  Validates that an ambiguous prompt does not trigger immediate scaffolding.
  The agent must show a disambiguation question and halt before building.
  Verified by: npm ci not run AND no package.json created.
tags: [uipath-coded-apps, smoke, dashboard, mode:build]

sandbox:
  driver: tempdir
  node: {}

initial_prompt: |
  I need to create something to track my automation performance.

success_criteria:
  # Positive anchor: the skill must engage (so agent inaction / a crash can't
  # satisfy the negative gate checks below).
  - type: skill_triggered
    description: "Agent invoked the uipath-coded-apps skill"
    skill_name: "uipath-coded-apps"
    expected_skill: "uipath-coded-apps"
    weight: 1.0
    pass_threshold: 1.0

  # Primary: agent must NOT run npm ci before disambiguation
  - type: command_executed
    description: "Agent did NOT run npm ci — halted for disambiguation"
    tool_name: "Bash"
    command_pattern: 'npm\s+ci'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  # Secondary: no scaffold files created
  # Uses node (guaranteed by sandbox: node: {}) rather than python3 which may not be on PATH
  - type: run_command
    description: "package.json NOT created — agent paused before building"
    command: "node -e \"const fs=require('fs'); process.exit(fs.existsSync('package.json') ? 1 : 0)\""
    expected_exit_code: 0
    timeout: 10
    weight: 2.0
    pass_threshold: 1.0
