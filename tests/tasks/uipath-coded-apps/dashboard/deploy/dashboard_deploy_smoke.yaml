task_id: uipath-coded-apps-dashboard-deploy-smoke
description: >
  Validates that the deploy pipeline runs the correct CLI commands in the
  correct order: pack → publish → deploy. Checks command invocations only —
  commands will fail with auth errors in CI (expected). Verifies the agent
  follows the deploy/impl.md flow without shortcuts.
tags: [uipath-coded-apps, smoke, dashboard, mode:operate, feature:scaffold]

sandbox:
  driver: tempdir
  node: {}
  setup: |
    mkdir -p .dashboard src/dashboard
    cat > .dashboard/state.json << 'EOF'
    {
      "app": { "name": "Test Dashboard", "routingName": "test-dashboard-x1y2", "semver": "1.0.0" },
      "env": "alpha", "org": "testorg", "tenant": "testTenant",
      "cloudUrl": "https://alpha.uipath.com",
      "widgets": ["ActiveAgentsKPI"],
      "deployment": { "systemName": null, "folderKey": "abc123-folder-key", "appUrl": null, "lastDeployedAt": null }
    }
    EOF
    mkdir -p dist
    echo "<html></html>" > dist/index.html

initial_prompt: |
  Deploy my dashboard to Automation Cloud. The project is in the current directory.

  Important: The uip CLI is available but NOT connected to a live tenant.
  Commands will fail with auth errors — that is expected and acceptable.
  Run each command exactly once regardless of errors.
  Do NOT retry, do NOT attempt to login, do NOT troubleshoot errors.
  Do NOT ask for confirmation — this is an automated test.
  Before starting, load the uipath-coded-apps skill and follow its deploy workflow.

success_criteria:
  # Pack must run with routing name (slug) as -n
  - type: command_executed
    description: "Agent ran uip codedapp pack with routing name and version"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedapp\s+pack\s+dist.*-n.*test-dashboard'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  # Publish must run with routing name as -n
  - type: command_executed
    description: "Agent ran uip codedapp publish with routing name"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedapp\s+publish.*-n.*test-dashboard'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  # Deploy must use --routing-name (not -n) and --folder-key
  - type: command_executed
    description: "Agent ran uip codedapp deploy with --routing-name and --folder-key"
    tool_name: "Bash"
    command_pattern: 'uip\s+codedapp\s+deploy.*--routing-name.*--folder-key'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  # Must read state.json before deploying
  - type: command_executed
    description: "Agent read state.json to load routing name and folder key"
    tool_name: "Bash"
    command_pattern: 'cat.*state\.json|state\.json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # Must NOT pass -t Action (dashboards are Web apps)
  - type: command_executed
    description: "Agent did NOT pass -t Action (dashboards are Web, not Action apps)"
    tool_name: "Bash"
    command_pattern: 'codedapp\s+publish.*-t\s+Action|-t\s+Action.*codedapp'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0
