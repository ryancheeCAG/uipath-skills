task_id: uipath-coded-apps-dashboard-starttime
description: >
  Validates that the agent uses named startTime constants from build-plan.md
  rather than inline Date.now() arithmetic. Inline arithmetic in each widget
  is a code smell that causes inconsistent time ranges and subtle bugs when
  widgets are generated at slightly different times during the same session.
tags: [uipath-coded-apps, integration, dashboard, feature:recipes]

sandbox:
  driver: tempdir
  node: {}

initial_prompt: |
  Build a dashboard showing agent error trend for the last 7 days and
  agent success rate for the last 30 days.

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.
  Before starting, load the uipath-coded-apps skill and follow its workflow.

success_criteria:
  # Named constant or clearly named variable used
  - type: file_contains
    description: "Widget uses a named startTime constant (not raw Date.now())"
    path: "src/widgets"
    pattern: "SEVEN_DAYS_AGO|THIRTY_DAYS_AGO|sevenDaysAgo|thirtyDaysAgo|startTime\\s*="
    weight: 3.0
    pass_threshold: 1.0

  # No raw Date.now() - n directly as the startTime argument
  - type: file_contains
    description: "No inline Date.now() subtraction passed directly to useInsights"
    path: "src/widgets"
    pattern: "useInsights.*Date\\.now\\(\\)"
    expected: false
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Scaffold created"
    path: "package.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "tsc --noEmit ran"
    tool_name: "Bash"
    command_pattern: 'tsc\s+--noEmit'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "check_dashboard validates startTime constant usage"
    command: >
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-coded-apps/dashboard/_shared/check_dashboard.py
      --min-widgets 2 --require-starttime --no-tsc
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
