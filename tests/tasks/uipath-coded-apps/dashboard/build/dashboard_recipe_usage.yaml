task_id: uipath-coded-apps-dashboard-recipe-usage
description: >
  Validates that the agent uses the catalog's widget recipes rather than
  inventing custom patterns. Recipe usage is indicated by correct endpoint
  names, typed response interfaces, and the DATA_SELECTOR extraction pattern
  matching the catalog's documented response shapes.
tags: [uipath-coded-apps, integration, dashboard, feature:recipes, mode:build]

sandbox:
  driver: tempdir
  node: {}

initial_prompt: |
  Build a dashboard showing:
  - Agent error trend for the last 7 days (line chart)
  - Active agent count (KPI)
  - Top agents by AGU consumption (bar chart)

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.
  Before starting, load the uipath-coded-apps skill and follow its workflow.

success_criteria:
  # Recipe 1: error trend → agents.getErrors with data[].{date,value}
  - type: run_command
    description: "Error trend uses agents.getErrors (Recipe 1)"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('agents.getErrors' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  # Recipe 1: data extracted from .data array (not raw response)
  - type: run_command
    description: "Error trend extracts data array from response wrapper"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('.data' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  # Recipe 3: active agents → agents.getAgents (count)
  - type: run_command
    description: "Active agents KPI uses agents.getAgents (Recipe 3)"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('agents.getAgents' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  # Recipe 10: top consumers → agents.getConsumption
  - type: run_command
    description: "Consumption bar chart uses agents.getConsumption (Recipe 10)"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('agents.getConsumption' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  # Typed response interfaces present (indicates recipe-style coding)
  - type: run_command
    description: "Widgets include TypeScript response type annotations"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('useInsights<' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "tsc --noEmit ran"
    tool_name: "Bash"
    command_pattern: 'tsc\s+--noEmit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Validates 3 widgets with Insights routing"
    command: >
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-coded-apps/dashboard/_shared/check_dashboard.py
      --min-widgets 3 --require-insights --no-tsc
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
