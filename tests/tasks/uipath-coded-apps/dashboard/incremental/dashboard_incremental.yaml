task_id: uipath-coded-apps-dashboard-incremental
description: >
  Validates that adding a widget to an existing 1-widget dashboard only writes
  the new widget file — no re-scaffolding of package.json or node_modules,
  no overwriting of the existing ActiveAgentsKpi widget, and index.ts updated
  to export the new component.
tags: [uipath-coded-apps, e2e, dashboard, feature:incremental, mode:build]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 600

sandbox:
  driver: tempdir
  node: {}
  template_sources:
    - type: template_dir
      path: templates/existing_dashboard

initial_prompt: |
  Add a widget to my existing dashboard showing governance violations
  over the last 30 days.

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.
  Before starting, load the uipath-coded-apps skill and follow its workflow.

success_criteria:
  # New widget created
  - type: file_exists
    description: "New governance widget created in src/widgets/"
    path: "src/widgets"
    weight: 2.0
    pass_threshold: 1.0

  # New widget uses governance endpoint
  - type: run_command
    description: "New widget uses governance.getPolicyTraces or governance.getOperationSummary"
    command: "python3 -c \"import os,sys; d='src/widgets'; files=[f for f in os.listdir(d) if f.endswith('.tsx')] if os.path.isdir(d) else []; sys.exit(0 if any('governance.get' in open(os.path.join(d,f)).read() for f in files) else 1)\""
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # Existing widget NOT overwritten
  - type: file_exists
    description: "Original ActiveAgentsKpi widget preserved"
    path: "src/widgets/ActiveAgentsKpi.tsx"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_check
    description: "ActiveAgentsKpi still contains original content (not overwritten)"
    path: "src/widgets/ActiveAgentsKpi.tsx"
    patterns:
      - pattern: "agents\\.getAgents"
        must_match: true
    weight: 2.0
    pass_threshold: 1.0

  # index.ts updated with new export
  - type: file_check
    description: "index.ts exports both old and new widget"
    path: "src/widgets/index.ts"
    patterns:
      - pattern: "ActiveAgentsKpi"
        must_match: true
    weight: 1.5
    pass_threshold: 1.0

  # No re-scaffold (npm ci should NOT run again)
  - type: command_executed
    description: "Agent did not re-run npm ci (no full re-scaffold)"
    tool_name: "Bash"
    command_pattern: 'npm\s+ci'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  # tsc passes after addition
  - type: command_executed
    description: "tsc --noEmit ran after adding widget"
    tool_name: "Bash"
    command_pattern: 'tsc\s+--noEmit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "2 widgets present, Insights used, no hardcoded UUIDs"
    command: >
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-coded-apps/dashboard/_shared/check_dashboard.py
      --min-widgets 2 --require-insights --no-tsc
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0
