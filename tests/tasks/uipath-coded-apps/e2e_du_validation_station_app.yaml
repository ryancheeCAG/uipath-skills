task_id: skill-coded-apps-e2e-du-validation-station-app
description: >
  E2E scenario (cloud auth required): agent builds a Coded Action App that
  embeds the Document Understanding Validation Station widget for human
  review of extracted invoice data. Given only a business goal, the agent
  must scaffold an Action App, install the widget with the correct hard
  peer versions (`react >= 19.2.0`, `@uipath/uipath-typescript >= 1.4.1`),
  wire `<ValidationStation>` with the required props, implement
  `onSubmitComplete` and `onReportExceptionComplete` callbacks (the widget
  surfaces NO error UI — host owns all callbacks), copy `du-assets/`
  post-build via a Vite plugin (missing this silently breaks PDF rendering
  and translations in production), and exclude the web-component from Vite
  `optimizeDeps`. Tests the most complex coded-apps surface: widget
  integration, not just CLI flow.
tags: [uipath-coded-apps, e2e, mode:build, feature:action-app, feature:du-validation-station]

run_limits:
  expected_turns: 50
  max_turns: 70
  turn_timeout: 600

initial_prompt: |
  Build a UiPath Coded Action App that AP clerks use to review extracted
  invoice data.

  Business requirements:

  - Use the UiPath Document Understanding Validation Station widget for
    the review surface (do NOT build a custom form). The widget renders
    the PDF on one side and the extracted fields on the other, and lets
    the reviewer correct values, confirm, and submit.
  - Reviewers can either submit the validated document or report an
    exception (e.g. the PDF is unreadable, the wrong document was sent).
  - The host app must handle both completion outcomes — the widget
    surfaces no error UI of its own.
  - The deployed app must render correctly in Action Center, including
    the PDF preview and any localized strings.

  Use the app name `InvoiceValidationApp_<EPOCH>` (Unix epoch seconds
  suffix) with version `0.1.0`. Deploy to the Orchestrator folder named
  `Shared` (resolve the folder name to a key via the documented mechanism
  — do NOT let the deploy command go interactive).

  When you finish, write `report.json` at the sandbox root with:
    {
      "app_name": "<the exact app name you used>",
      "deployment_id": "<the deploymentId from .uipath/app.config.json>",
      "app_url": "<the appUrl from .uipath/app.config.json>"
    }

  Use `--output json` on every `uip` command. Do not prompt for
  confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent verified login status before cloud commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent resolved the folder name to a folder key via `uip or folders list`"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+folders\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran `npm run build` (Rule #3 — never skip the build step). Pack would fail without `dist/`, but an explicit check tightens the signal and surfaces build skipping directly."
    tool_name: "Bash"
    command_pattern: 'npm\s+run\s+build'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran `uip codedapp publish` with `-t Action` / `--type Action` (Rule #6 — Action app, not Web)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+codedapp\s+publish\b.*(?:-t\s+Action|--type\s+Action)'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran `uip codedapp deploy` with --folder-key"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+codedapp\s+deploy\b.*--folder-key'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: run_command
    description: "package.json was created (anywhere in the project tree)"
    command: "find . -name 'package.json' -not -path '*/node_modules/*' -print -quit | grep -q ."
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "package.json declares the DU Validation Station widget as a dependency"
    command: "F=$(find . -name 'package.json' -not -path '*/node_modules/*' -print -quit) && test -n \"$F\" && python3 -c \"import json,sys; p=json.load(open('$F')); deps={**p.get('dependencies',{}), **p.get('devDependencies',{})}; sys.exit(0 if any(('validation' in k.lower() and 'station' in k.lower()) or '@uipath/du-' in k.lower() or 'document-understanding' in k.lower() for k in deps.keys()) else 1)\""
    timeout: 15
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: run_command
    description: "package.json declares @uipath/uipath-typescript >= 1.4.1 (hard peer requirement of the widget)"
    command: "F=$(find . -name 'package.json' -not -path '*/node_modules/*' -print -quit) && test -n \"$F\" && python3 -c \"import json,sys,re; p=json.load(open('$F')); deps={**p.get('dependencies',{}), **p.get('devDependencies',{})}; v=deps.get('@uipath/uipath-typescript',''); m=re.search(r'(\\d+)\\.(\\d+)\\.(\\d+)', v); ok = m and (int(m.group(1)) > 1 or (int(m.group(1)) == 1 and int(m.group(2)) >= 4)); sys.exit(0 if ok else 1)\""
    timeout: 15
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "package.json declares react >= 19.2.0 (hard peer requirement of the widget)"
    command: "F=$(find . -name 'package.json' -not -path '*/node_modules/*' -print -quit) && test -n \"$F\" && python3 -c \"import json,sys,re; p=json.load(open('$F')); deps={**p.get('dependencies',{}), **p.get('devDependencies',{})}; v=deps.get('react',''); m=re.search(r'(\\d+)\\.(\\d+)', v); ok = m and (int(m.group(1)) > 19 or (int(m.group(1)) == 19 and int(m.group(2)) >= 2)); sys.exit(0 if ok else 1)\""
    timeout: 15
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Some source file mounts the <ValidationStation> widget"
    command: "find . \\( -name '*.tsx' -o -name '*.ts' -o -name '*.jsx' \\) -not -path '*/node_modules/*' -not -path '*/dist/*' -exec grep -lE '<ValidationStation' {} + | grep -q ."
    timeout: 15
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Source code wires a submit-completion mechanism for the widget (any of: onSubmitComplete, save prop with onComplete, completeTask, codedActionAppService.complete) — the widget surfaces no error UI; host MUST own this"
    command: "find . \\( -name '*.tsx' -o -name '*.ts' -o -name '*.jsx' \\) -not -path '*/node_modules/*' -not -path '*/dist/*' -exec grep -lE 'onSubmitComplete|onConfirmComplete|onSaveAsDraftComplete|completeTask|codedActionAppService' {} + | grep -q ."
    timeout: 15
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Source code handles exception reporting (any of: onReportExceptionComplete callback OR OrchestratorDuModule.submitExceptionReport host-side persistence) — widget makes NO API call for exceptions; host persists"
    command: "find . \\( -name '*.tsx' -o -name '*.ts' -o -name '*.jsx' \\) -not -path '*/node_modules/*' -not -path '*/dist/*' -exec grep -lE 'onReportExceptionComplete|submitExceptionReport|OrchestratorDuModule' {} + | grep -q ."
    timeout: 15
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "vite.config.{ts,js} copies the du-assets/ folder post-build (missing this silently breaks PDF + translations)"
    command: "find . \\( -name 'vite.config.ts' -o -name 'vite.config.js' \\) -not -path '*/node_modules/*' -exec grep -lE '(du-assets|du_assets)' {} + | grep -q ."
    timeout: 15
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: run_command
    description: "src/uipath.ts does NOT call .initialize() (Rule #17 — Action apps must not start a PKCE OAuth redirect; comments allowed)"
    command: "F=$(find . -path '*/src/uipath.ts' -not -path '*/node_modules/*' -print -quit) && test -n \"$F\" && sed 's|//.*||' \"$F\" | grep -F '.initialize('"
    timeout: 10
    expected_exit_code: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "publish wrote a .uipath/app.config.json somewhere in the project tree"
    command: "find . -path '*/.uipath/app.config.json' -not -path '*/node_modules/*' -print -quit | grep -q ."
    timeout: 10
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "app.config.json.appType == \"Action\""
    command: "F=$(find . -path '*/.uipath/app.config.json' -not -path '*/node_modules/*' -print -quit) && test -n \"$F\" && python3 -c \"import json,sys; d=json.load(open('$F')); sys.exit(0 if d.get('appType','').lower() == 'action' else 1)\""
    timeout: 10
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: run_command
    description: "app.config.json contains a non-empty deploymentId"
    command: "F=$(find . -path '*/.uipath/app.config.json' -not -path '*/node_modules/*' -print -quit) && test -n \"$F\" && python3 -c \"import json,sys; d=json.load(open('$F')); sys.exit(0 if d.get('deploymentId') else 1)\""
    timeout: 10
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was written at the sandbox root so post-run cleanup can find the deployed app"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "report.json contains app_name + deployment_id (app_url may be null until the app is activated)"
    command: "python3 -c \"import json,sys; r=json.load(open('report.json')); sys.exit(0 if r.get('app_name') and r.get('deployment_id') else 1)\""
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0
