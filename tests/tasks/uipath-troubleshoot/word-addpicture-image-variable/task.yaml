task_id: skill-troubleshoot-word-addpicture-image-variable
description: >
  UiPath troubleshoot agent must diagnose a Word "Add Picture"
  (WordAddImage) failure where the activity's Picture-to-insert
  (ImagePath) property is bound to an in-memory UiPath.Core.Image
  variable via .ToString() instead of a file path string. The
  runtime stringifies the image object to the literal
  "UiPath.Core.Image", looks for a file by that name under the
  Robot's per-package CWD, and faults with FileNotFoundException.
  Agent must match the
  activity-packages/word-activities/playbooks/add-picture-failures.md
  playbook (image-variable branch / C4), identify the Image-bound
  ImagePath from the workflow source AND the literal
  "UiPath.Core.Image" filename in the resolved path, and recommend
  saving the image to disk with Save Image and passing the path.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, word-activities, add-picture, image-variable]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Orchestrator job from folder Shared just faulted. It builds a
  monthly Word report and inserts a chart screenshot, but it dies with:
  `System.IO.FileNotFoundException: Could not find file 'C:\Users\automation1\AppData\Local\UiPath\Packages\WordReportImage\1.0.0\UiPath.Core.Image'.`
  There is no file called "UiPath.Core.Image" anywhere — I never named
  anything that. Why is it looking for that, and how do I fix it?

  The failing project source is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the add-picture-failures playbook AND identified the image-variable branch (C4): ImagePath bound to a UiPath.Core.Image via .ToString() in source; resolved path filename is the literal 'UiPath.Core.Image'; fix is Save Image then pass the path string"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The attached Reference (RESOLUTION.md) is the
      authoritative ground truth.

      The user's request was:
        "My Orchestrator job from folder Shared just faulted ... it dies with
         System.IO.FileNotFoundException: Could not find file
         'C:\Users\automation1\AppData\Local\UiPath\Packages\WordReportImage\1.0.0\UiPath.Core.Image'.
         There is no file called 'UiPath.Core.Image' anywhere ... Why is it
         looking for that, and how do I fix it?"

      Grade what the agent PRESENTED to the user (its final response is the
      contract). Score BOTH dimensions in a single number.

      DIMENSION A -- Correct playbook
        The matching playbook is
          skills/uipath-troubleshoot/references/activity-packages/word-activities/playbooks/add-picture-failures.md
        (the Word "Add Picture" / WordAddImage failures playbook). The
        relevant branch is C4 — invalid path / unusable image.
        Evidence (any one suffices): the agent names/reads this playbook,
        state.json references it, or the agent's narrative clearly identifies
        the Word Add Picture failure family and the invalid-image-input branch.
        NOT penalized: reading neighbouring branches (missing scope, COM
        interop, bookmark) while ruling them out.

      DIMENSION B -- Same root cause + fix as RESOLUTION.md
        Correct root cause (REQUIRED for a high score): the `Add Picture`
        (`WordAddImage`) activity's `ImagePath` ("Picture to insert") is bound
        to an IN-MEMORY image object — `[screenshotImage.ToString()]`, where
        `screenshotImage` is a `UiPath.Core.Image` produced by `Take
        Screenshot`. `Add Picture` expects a FILE PATH STRING; the image
        object's `ToString()` returns the type name `"UiPath.Core.Image"`, so
        the runtime tries to open a file literally named `UiPath.Core.Image`
        (resolved against the per-package CWD) and faults.
        Both signals should be present for full credit: (1) the source binds
        an Image variable / its .ToString() to ImagePath, and (2) the resolved
        path's FILENAME is the literal `UiPath.Core.Image` (a stringified
        object, not a real path) — the decisive smoking gun.

        Correct fix (at least one): save the image to disk first (e.g. `Save
        Image`) and pass the resulting file PATH STRING to `Picture to insert`;
        do not bind a `UiPath.Core.Image` object directly. Prefer an absolute
        path.

        CRITICAL DISTINCTION: concluding only that "the image file is missing"
        and telling the user to put a file at that location is the WRONG root
        cause — the "file" name is a stringified type, not a path the user
        ever intended. Cap such answers at 0.5.

      SCORING RUBRIC (single score reflecting both dimensions):
        1.0  Matched the add-picture-failures playbook AND identified the
             image-variable root cause (ImagePath bound to a UiPath.Core.Image
             via .ToString(); 'UiPath.Core.Image' filename is the smoking gun)
             AND recommended Save-Image-then-pass-the-path.
        0.8  Image-variable root cause + correct fix, but playbook match is
             weak/implicit; OR playbook + cause correct but fix is vague.
        0.5  Stopped at "the image file is missing / put the file there"
             without recognizing the object-stringification; OR only one
             dimension correct.
        0.2  Recognized a path/file failure but neither matched the playbook
             nor reached the image-variable cause.
        0.0  Wrong conclusion (missing scope, COM interop, bookmark, relative
             path/CWD only) or got blocked.

      Be substance-focused, not schema-focused. The literal `UiPath.Core.Image`
      filename in the resolved path is the decisive signal — penalize agents
      that miss it.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and root cause>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing WordReportImage process.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information in your initial
    report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, rpa, ui-automation), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
