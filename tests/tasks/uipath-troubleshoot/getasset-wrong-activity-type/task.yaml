task_id: skill-troubleshoot-getasset-wrong-activity-type
description: >
  UiPath troubleshoot agent must diagnose a Get Credential failure where
  the workflow uses the `Get Credential` activity (GetRobotCredential)
  on an asset whose actual type in Orchestrator is `Text` (not
  `Credential`). Orchestrator returns HTTP 400 / "Activity does not
  work with assets of type 'Text'. Invalid asset type." The agent must
  rule out asset-not-found (asset is present in the folder list),
  folder-scope-mismatch (folder is present), and permission-denied
  (different error signature) — and converge on the activity-vs-asset
  type mismatch.

tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, system-activities, get-asset, wrong-activity-type, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]
  max_turns: 60
  turn_timeout: 3600   # 60 min per turn — LLMGW-proxied diagnostic runs observe up to ~30 min per turn

run_limits:
  task_timeout: 1800

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My AssetWrongActivityType process is faulting in Orchestrator on
  every run. Can you investigate?

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the get-asset-wrong-activity-type playbook AND identified the activity-vs-asset type mismatch"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    files:
      - .local/investigations/state.json
      - .local/investigations/hypotheses.json
    prompt: |
      You are grading a UiPath diagnostic agent against a known-correct
      reference outcome. The Reference solution attached to this prompt
      is the RESOLUTION.md for this scenario. Treat it as the
      authoritative ground truth.

      The user's request was:
        "My AssetWrongActivityType process is faulting in Orchestrator
         on every run."

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/system-activities/playbooks/get-asset-wrong-activity-type.md
        because the runtime error
          "Activity does not work with assets of type 'Text'. Invalid asset type."
        is the verbatim signature of that playbook ("does not work with
        assets of type X" / "Invalid asset type" language).

        Evidence sources (in priority order):
          1. state.json's `matched_playbooks` -- the
             get-asset-wrong-activity-type playbook should appear
             (absolute or relative path).
          2. The agent's tool-call summary -- a Read on a file under
             references/activity-packages/system-activities/playbooks/.
          3. state.json's `scope.domain` -- should include the
             system-activities or activity-packages domain.

        Acceptable / non-penalized: the agent may also Read neighboring
        get-asset-* playbooks (not-found, folder-scope-mismatch,
        permission-denied) while ruling them out. Exploration is normal.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The Get Credential activity (`GetRobotCredential`) in
            Main.xaml targets `AssetName="ApiBaseUrl"` in folder
            "Remote Debugging".
          - The asset `ApiBaseUrl` exists in that folder but its
            actual type in Orchestrator is `Text`, NOT `Credential`.
          - The `Get Credential` activity only works on assets of
            type `Credential`. Orchestrator therefore returns HTTP
            400 with "Activity does not work with assets of type
            'Text'. Invalid asset type."
        The reference fix:
          - Either: replace the `Get Credential` activity in
            `Main.xaml` with `Get Orchestrator Asset` (the
            `GetRobotAsset` activity, which works on Text/Integer/
            Boolean), wiring its `Value` output to the existing
            consumer.
          - Or: if the asset truly should hold credentials, change
            its type to `Credential` in Orchestrator (delete and
            recreate, or use a different asset).

        Evidence sources (in priority order):
          1. state.json -- `requirements.activity_type`,
             `requirements.asset_type`, `triage_summary`,
             scope/domain.
          2. hypotheses.json -- the hypothesis flagged
             `is_root_cause: true` should describe the type mismatch:
             activity is `Get Credential` but asset is `Text`. Should
             explicitly name `ApiBaseUrl` and its type, and contrast
             with the activity's expected type.
          3. The agent's last text response.

      SCORING RUBRIC (single score reflecting both dimensions):

        1.0  Agent matched get-asset-wrong-activity-type AND
             identified the activity-vs-asset type mismatch
             explicitly. Conclusion must name both the activity
             (`Get Credential` / `GetRobotCredential`) and the asset
             type (`Text`) and explain that they are incompatible.
        0.8  Both partial: e.g., correct playbook but conclusion
             says "type problem" without naming both sides; or
             conclusion names the type mismatch but matched the
             system-activities investigation_guide rather than the
             specific wrong-activity-type playbook.
        0.5  Only one dimension correct.
        0.2  Recognized the surface (asset failure) but neither
             matched the playbook nor identified the type mismatch.
        0.0  Misdiagnosed (e.g., concluded asset-not-found,
             folder-scope-mismatch, permission-denied) or got blocked.

      Be substance-focused, not schema-focused. Intermediate file shapes
      may vary between runs — look at the meaning of what the agent
      recorded.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the diagnostic agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, system-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
