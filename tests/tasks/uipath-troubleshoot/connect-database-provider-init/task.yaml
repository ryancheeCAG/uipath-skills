task_id: skill-troubleshoot-connect-database-provider-init
description: >
  UiPath diagnostic agent must diagnose a Connect to Database failure that began
  right after a Windows-Legacy -> Windows migration. The LedgerExportXlsx process
  reads an Excel workbook as a database through an ACE OLE DB connection string,
  but the Connect to Database activity's ProviderName was left empty. On the
  modern Windows (.NET) runtime an empty ProviderName resolves to SqlClient, so
  the activity initializes Microsoft.Data.SqlClient and faults with
  "System.TypeInitializationException: The type initializer for
  'Microsoft.Data.SqlClient.SqlConnection' threw an exception." even though the
  intended target is Excel. The agent must recognize this as the Connect to
  Database failures playbook branch 4 and recommend setting ProviderName
  explicitly to System.Data.OleDb (NOT switching to Microsoft.Data.SqlClient —
  the source is Excel/Access).

tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, database-activities, rpa]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 40
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  node: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My LedgerExportXlsx process started faulting in Orchestrator on every run
  right after we migrated it to the new Windows compatibility. Can you
  investigate why? The project source is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing LedgerExportXlsx process.
    The process worked fine until you migrated it from Windows - Legacy to the
    new Windows compatibility, and now it faults on every Orchestrator run. You
    are waiting for the diagnostic agent to finish and trust its expertise. You
    only have the information you wrote in your initial report — no extra data.
  goal: |
    Let the agent complete its diagnostic flow from Orchestrator evidence and
    the workflow source. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution, and accept
    a workflow-side fix you can apply in Studio.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, database-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report, except that the process worked before the Windows migration."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
