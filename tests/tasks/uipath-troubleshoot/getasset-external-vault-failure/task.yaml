task_id: skill-troubleshoot-getasset-external-vault-failure
description: >
  UiPath diagnostic agent must diagnose a Get Credential failure where
  the target asset exists in the correct folder with the right type
  (Credential) and the robot is correctly licensed with appropriate
  roles — but the asset's value is stored in an external credential
  store (CyberArk) that is currently unreachable or misconfigured.
  Orchestrator returns "Failed to read from Credential Store type
  'CyberArk'. Error code: 2304." The agent must recognize that the
  failure layer is the external vault, not the asset itself.

tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, system-activities, get-asset, external-vault-failure, credential-stores, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]
  max_turns: 60
  turn_timeout: 3600

run_limits:
  task_timeout: 1800

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My AssetVaultFailure process is faulting in Orchestrator on every
  run. Can you investigate?

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the get-asset-external-vault-failure playbook AND identified the external credential store as the failing layer"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    files:
      - .local/investigations/state.json
      - .local/investigations/hypotheses.json
    prompt: |
      You are grading a UiPath diagnostic agent against a known-correct
      reference outcome. The Reference solution attached to this prompt
      is the RESOLUTION.md for this scenario. Treat it as the
      authoritative ground truth.

      The user's request was:
        "My AssetVaultFailure process is faulting in Orchestrator on
         every run."

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/system-activities/playbooks/get-asset-external-vault-failure.md
        because the runtime error
          "Failed to read from Credential Store type 'CyberArk'. Error code: 2304"
        is the verbatim signature of that playbook (error codes 2303
        and 2304 are unique to external-vault failures).

        Evidence sources (in priority order):
          1. state.json's `matched_playbooks` -- the
             get-asset-external-vault-failure playbook should appear
             (absolute or relative path).
          2. The agent's tool-call summary -- a Read on a file under
             references/activity-packages/system-activities/playbooks/.
          3. state.json's `scope.domain` -- should include the
             system-activities or activity-packages domain. The agent
             may also scope into credential-stores / orchestrator
             configuration.

        Acceptable / non-penalized: the agent may also Read neighboring
        get-asset-* playbooks (not-found, folder-scope-mismatch,
        permission-denied, wrong-activity-type, per-robot-no-value,
        robot-not-authenticated) while ruling them out. Exploration is
        normal.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The Get Credential activity (GetRobotCredential) in
            Main.xaml targets `AssetName="MyCyberArkSecret"` in
            folder "Remote Debugging".
          - The asset is correctly configured: present in the folder,
            ValueType=Credential, ValueScope=Global, robot has the
            necessary roles, robot is licensed.
          - The asset is backed by an EXTERNAL credential store
            (CyberArk) — its `CredentialStoreId` references a
            non-default credential store named "Production CyberArk
            Store" of type `CyberArk`.
          - The CyberArk vault endpoint is unreachable / misconfigured
            from Orchestrator. Orchestrator therefore returns error
            code 2304 / "Failed to read from Credential Store type
            'CyberArk'."
        The reference fix:
          - Verify network connectivity between Orchestrator server
            and the CyberArk vault endpoint (firewall, DNS, proxy).
          - Verify the CyberArk Credential Store configuration in
            Orchestrator (Tenant -> Credential Stores) — correct
            endpoint URL, correct web service name, no FIPS / SDK
            mismatch on the Orchestrator host.
          - If the issue is intermittent, contact the CyberArk vault
            administrator to check vault availability.

        Evidence sources (in priority order):
          1. state.json -- `requirements.error_code` (2304),
             `requirements.error_message`,
             `requirements.credential_store_type` (CyberArk),
             `triage_summary`, scope/domain.
          2. hypotheses.json -- the hypothesis flagged
             `is_root_cause: true` should describe the external
             credential-store failure (NOT a missing asset, NOT a
             folder issue, NOT a permission gap, NOT a license issue,
             NOT a type mismatch).
          3. The agent's last text response.

      SCORING RUBRIC (single score reflecting both dimensions):

        1.0  Agent matched get-asset-external-vault-failure AND
             identified the external credential store as the failing
             layer. Conclusion must (a) name the vault type
             (CyberArk), (b) recognize the asset is backed by an
             external store, and (c) recommend checking vault
             connectivity / configuration (not modifying the asset).
        0.8  Both partial: e.g., correct playbook but conclusion
             names the failure as "credential store issue" without
             naming the vault type; or conclusion names the vault
             but matched the system-activities investigation_guide
             rather than the specific external-vault-failure playbook.
        0.5  Only one dimension correct.
        0.2  Recognized the surface (asset / auth failure) but
             neither matched the playbook nor identified the external
             vault layer.
        0.0  Misdiagnosed (e.g., concluded asset-not-found,
             folder-scope-mismatch, permission-denied,
             wrong-activity-type, per-robot-no-value, or
             robot-not-authenticated) or got blocked.

      Be substance-focused, not schema-focused.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the diagnostic agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, system-activities, activity-packages, credential-stores), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
