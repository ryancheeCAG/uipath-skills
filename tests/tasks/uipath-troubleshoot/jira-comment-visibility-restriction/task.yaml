task_id: skill-troubleshoot-jira-comment-visibility
description: >
  UiPath troubleshooting agent must diagnose an Add Comment activity that faults
  with HTTP 400 "You are currently not a member of the project role 'Service Desk
  Team' that you are restricting the comment visibility to". The Jira Scope
  authenticates and the IssueKey is valid; the Add Comment activity sets
  VisibilityType="Role" / VisibilityValue="Service Desk Team", restricting the
  comment to a project role the bot account is not a member of, so Jira rejects
  it. Success = agent matches the jira-add-comment-failures playbook (sub-case
  C4), identifies the misconfigured comment Visibility restriction - NOT an auth
  failure, a bad IssueKey (C2), or a missing Add Comments permission (C3) - AND
  recommends clearing the Visibility for a public comment (or setting a role/group
  the account belongs to), without fabricating host actions.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, jira-activities, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My JiraNoteBot process faults in Orchestrator on every run. The folder is
  "Service Desk". It connects to Jira and finds the ticket, but the Add Comment
  step dies with a 400 Bad Request that mentions something about a project role
  and comment visibility. I just want it to post a normal comment.

  I'm not on the Robot host right now and have no shell access to MOCK-ROBOT,
  only Orchestrator. Diagnose what you can from Orchestrator and the project
  source. If the answer needs something only I can check, give me the exact
  things to verify and I'll come back with the result. Do not stall waiting on
  me - hand me the list and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing JiraNoteBot process. You
    built the Add Comment step and you only need a normal, public comment. You
    are away from the robot host and only have Orchestrator access. You trust the
    agent and want a diagnosis or a check list.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, jira-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the check list at the end."
    - "If asked whether the comment needs to be restricted to a specific audience, say no, a normal public comment is fine."
    - "If asked how the Add Comment step is configured, say it is whatever is in the project."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
