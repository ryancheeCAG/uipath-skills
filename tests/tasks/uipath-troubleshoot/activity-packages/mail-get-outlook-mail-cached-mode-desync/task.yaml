task_id: skill-troubleshoot-get-outlook-mail-cached-mode-desync
description: >
  UiPath troubleshooting agent must diagnose a Get Outlook Mail Messages
  silent shortfall (Branch 5 of get-outlook-mail-failures): the
  ComplianceMailExport job ends Successful with NO error, but the activity
  returns only the locally cached subset of the Inbox because the account
  uses Cached Exchange Mode with a restricted Offline Settings window
  (out-of-window mail is not in the local .ost cache). The workflow is
  correct (Top=500, no Filter, folder resolved). Success = agent matches
  Branch 5, rules out Top/Filter/folder, attributes the miss to Cached
  Exchange Mode / Offline Settings, and hands a host-side check to widen
  the Offline Settings slider to All / disable Cached Exchange Mode and
  re-run, without fabricating host actions.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 40
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  node: {}
  template_sources:
  - type: template_dir
    path: ../../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: data
  mock_path_dirs:
  - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My ComplianceMailExport process reports Success in Orchestrator on every
  run, but it only exports a fraction of the Inbox - recent emails I can
  clearly see in Outlook are missing from its output, with no error. The
  folder is "RPA Production".

  I'm not on the Robot host (MOCK-HOST), only Orchestrator. Diagnose what
  you can; if the fix needs the host, hand me the exact things to check
  next time I'm there and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the ComplianceMailExport process.
    Every run reports Success in Orchestrator, but the export is missing
    recent emails you can clearly see in the Outlook desktop client. You
    are away from the Robot host (MOCK-HOST) and only have Orchestrator
    access. You trust the agent's expertise and are waiting for either a
    diagnosis or a list of host-side things to check next time you are in
    front of the machine.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, mail-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when host data is missing, tell it to proceed with best-effort findings using the evidence already gathered and to hand you the host check list at the end."
    - "Never invent or provide new factual data - you don't know any details beyond your initial report (you can confirm the missing emails are visible in your Outlook client)."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
