task_id: skill-troubleshoot-excel-rr-host-evidence
description: >
  UiPath troubleshoot agent must diagnose a Read Range failure
  (System.IO.IOException: ... used by another process) where the
  available `uip` CLI evidence does NOT determine which cause-branch
  applies. The agent must match the activity-packages/excel-activities/playbooks/read-range-file-locked.md
  playbook, recognize that the CLI evidence chain is exhausted (no
  concurrent siblings, no prior faulted runs, no overlapping triggers,
  clean workflow source), and surface a host-side investigation
  recommendation (`Get-Process EXCEL`, `handle.exe -a <path>`,
  `Get-SmbOpenFile`) to the user instead of guessing a branch.

tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 5400

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Orchestrator job just faulted with
  `System.IO.IOException: The process cannot access the file 'C:\Robot\Data\sales-2026-05.xlsx' because it is being used by another process.`
  Pinned job key: ee555555-6666-7777-8888-99990000aaaa. There are no
  other jobs running, no recent failures, and only one trigger is
  configured. The workflow looks fine.

  I'm not on the Robot host right now and have no shell access
  to MOCK-HOST — only Orchestrator. Don't try to run anything
  on the host yourself; just tell me what to run and I'll come
  back with the output. If a local Bash call gets rejected,
  treat that as a hard signal to switch to writing
  recommendations for me rather than retrying.

  The project source for the failing process is at ./ExcelDailyImport/ in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Auto-answer the diagnostic skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option and never invents data — keeps the investigation faithful.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the faulted Orchestrator job.
    You only know what you wrote in your initial report. You are NOT on
    the Robot host (MOCK-HOST) and have no shell access to it — only
    Orchestrator. You have no other data.
  goal: |
    Let the agent complete its diagnostic flow. Approve scope expansions
    and clarifications so the investigation reaches a final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as excel-activities, orchestrator, integration-service), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks you to run something on the Robot host, say you'll run it later and ask it to give you the exact commands — you have no host access right now."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and hand you any host-side commands to run next time."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
