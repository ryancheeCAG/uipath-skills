task_id: skill-troubleshoot-python-scope-dotnet-runtime-hang
description: >
  UiPath troubleshooting agent must diagnose a Python Scope that hangs with no
  error: a Windows-target project on UiPath.Python.Activities 1.10.0 runs on a
  robot host missing the .NET Desktop Runtime, so the Python host process never
  becomes ready and the job stalls until it is stopped on the max-execution
  timeout - with no Python traceback and no engine-init error. Success = agent
  matches the python-scope-hang-dotnet-runtime playbook, identifies the missing
  .NET Desktop Runtime on a Windows-target project (NOT a bitness / Library-path
  / script bug), AND recommends installing the .NET Desktop Runtime 6.0 (x64) or
  switching the project to Windows-Legacy (handing over the Event Viewer /
  `dotnet --list-runtimes` host check), without fabricating host actions.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: data
  mock_path_dirs:
  - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My PyScoreModel process hangs in Orchestrator on every run. The folder is
  "ML Pipelines". It uses a Python Scope, but instead of finishing it just
  sits there doing nothing for about 15 minutes and then gets stopped. There's
  no real error in the output - it never even seems to start my script. We
  recently rebuilt this on a new unattended robot.

  I'm not on the Robot host right now and have no shell access to MOCK-ROBOT,
  only Orchestrator. Diagnose what you can from Orchestrator. If the answer
  needs evidence from the host itself, give me the exact things to check on
  the host the next time I'm in front of it; I'll do them and come back with
  the result. Do not stall waiting for host data - hand me the list and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_dialog: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the hanging PyScoreModel process. Your
    team recently rebuilt the automation on a new unattended robot. You are away
    from the robot host and only have Orchestrator access.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, python-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the host check list at the end."
    - "If asked whether the .NET Desktop Runtime is installed on the new robot, say you are not sure and cannot check right now - that is exactly what you need the agent to tell you to verify."
    - "If asked about the target framework, say the project was built with the default Windows target framework."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
