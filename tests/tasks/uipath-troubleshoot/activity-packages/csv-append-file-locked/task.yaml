task_id: skill-troubleshoot-csv-append-file-locked
description: >
  UiPath troubleshooting agent must diagnose an Append To CSV failure caused by a
  file lock: the target daily.csv is open in Microsoft Excel on the robot host,
  so the append cannot acquire write access and faults with "The process cannot
  access the file because it is being used by another process". Success = agent
  matches the csv-file-locked-or-invalid-path playbook, identifies the file lock
  (open in Excel / held by another process), AND recommends closing or killing
  the Excel lock holder (e.g. Kill Process EXCEL before the step), without
  fabricating host actions.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: data
  mock_path_dirs:
  - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My CsvDailyAppend process faults in Orchestrator on most runs. The folder is
  "Daily Loads". It appends the day's rows to daily.csv, but it dies at the
  Append To CSV step saying the file "is being used by another process". People
  sometimes have that CSV open in Excel to eyeball it.

  I'm not on the Robot host right now and have no shell access to MOCK-ROBOT,
  only Orchestrator. Diagnose what you can from Orchestrator and the project
  source in the current working directory. If the answer needs evidence from
  the host itself, hand me the exact checks to run and stop - don't stall
  waiting on host data.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_dialog: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing CsvDailyAppend process.
    Colleagues sometimes open daily.csv in Excel to review it. You are away from
    the robot host and only have Orchestrator access.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, csv-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the host check list at the end."
    - "If asked whether the CSV might be open in Excel during runs, say yes, colleagues sometimes leave it open to review it."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
