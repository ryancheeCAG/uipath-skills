task_id: skill-troubleshoot-python-scope-arch-mismatch
description: >
  UiPath troubleshoot agent must diagnose a Python Scope engine-init failure
  where the scope faults at open with `One or more errors occurred. (Error
  initializing the Python engine)` and an inner BadImageFormatException
  (0x8007000B). The Python Scope `Target` is set to x86 but the Python 3.11
  install on the robot host is 64-bit; a 64-bit interpreter cannot load into
  a 32-bit host. The script uses only the standard library, ruling out a
  missing-module cause, and the error is engine-init (not "path is not
  valid"). The decisive evidence is Target=x86 in Main.xaml plus the user's
  statement that the install is 64-bit, plus the BadImageFormat HRESULT.
  Agent must match the
  python-activities/playbooks/python-scope-architecture-version-mismatch.md
  playbook, identify the bitness mismatch, and recommend setting Target to
  x64.

tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  Our `PythonDataCruncher` unattended job fails right at the Python Scope
  with:

  `Python Scope: One or more errors occurred. (Error initializing the Python engine)`

  Faulted job key: cc333333-7777-bbbb-cccc-ddddeeeeffff. The robot machine has
  Python 3.11 (64-bit) installed and the script is plain standard-library
  Python — nothing fancy. Why won't the Python engine start, and how do I fix
  it?

  The project source for the failing process is at ./PythonDataCruncher/ in
  the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the diagnostic agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, system-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
