task_id: skill-troubleshoot-jira-auth-username
description: >
  UiPath troubleshooting agent must diagnose a Jira Scope that faults at scope
  open with "Authentication information is invalid. Please check your
  credentials...". The scope is configured with Authentication Type = Api Token,
  the Api Token is bound from a SecureString, and no Client Id / Client Secret
  are set - so the only inconsistent property is the Username, which is an
  alphanumeric Jira accountId ("557058:9d8c...") instead of the account email.
  Jira Cloud requires the full account email as the Username. Success = agent
  matches the jira-scope-authentication-failures playbook, identifies the
  Username-format sub-case (A2) - NOT a bad token (A1), leftover OAuth params
  (A3), or an MFA/password blocker (A4) - AND recommends setting Username to the
  account email, without fabricating host actions.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: data
  mock_path_dirs:
  - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My JiraIssueSync process faults in Orchestrator on every run. The folder is
  "Issue Sync". It dies right at the Jira Scope with "Authentication
  information is invalid. Please check your credentials and try again." I've
  regenerated the API token and it's valid, and the same account works fine
  when I log into Jira in the browser.

  I'm not on the Robot host right now and have no shell access to MOCK-ROBOT,
  only Orchestrator. Diagnose what you can from Orchestrator and the project
  source. If the answer needs something only I can check (Atlassian account
  settings, org policy), give me the exact things to verify and I'll come
  back with the result. Do not stall waiting on me - hand me the list and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing JiraIssueSync process. You
    configured the Jira Scope. You are away from the robot host and only have
    Orchestrator access. You trust the agent and want a diagnosis or a check
    list of things to verify on the Atlassian side.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, jira-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the check list at the end."
    - "If asked what value the Username is set to, say it is whatever is in the project - you copied it from your Jira profile page."
    - "If asked whether your org enforces MFA or SSO, say you are not sure and cannot check right now."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
