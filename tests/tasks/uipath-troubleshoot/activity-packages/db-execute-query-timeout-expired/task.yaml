task_id: skill-troubleshoot-execute-query-timeout-expired
description: >
  UiPath diagnostic agent must diagnose an Execute Query failure that
  faults on every Orchestrator run because the query exceeds the
  activity's TimeoutMS. The Execute Query runs an expensive, un-indexed
  statement
  ("SELECT * FROM Orders WHERE UPPER(Notes) LIKE '%...%'") whose
  TimeoutMS is left at the default 30000 ms (30 s). The provider performs
  a full-table scan, runs past the timeout, aborts, and UiPath surfaces
  "Execute Query: Timeout expired. The timeout period elapsed prior to
  completion of the operation or the server is not responding." The agent
  must identify the query exceeding TimeoutMS as the root cause AND
  recognize this is a runaway un-indexed query, so the real fix is adding
  an index / narrowing the query — with raising TimeoutMS (in
  milliseconds) only a stopgap. It must NOT blame a null connection, SQL
  syntax, provider mismatch, a CLR crash, the wrong activity, or "the
  database is down".

tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 40
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  node: {}
  template_sources:
    - type: template_dir
      path: ../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  mock_path_dirs:
    - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My OrderNotesSearch process is faulting in Orchestrator on every run.
  Can you investigate why?

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the diagnostic agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, database-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
