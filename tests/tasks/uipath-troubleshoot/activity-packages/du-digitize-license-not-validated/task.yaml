task_id: skill-troubleshoot-du-digitize-license-not-validated
description: >
  Faithful replay of a UiPath.IntelligentOCR.Activities Digitize Document
  failure. The UiPath Document OCR call to the Document Understanding service is
  rejected because the API key is invalid, and the activity faults with
  System.AggregateException whose inner message is
  "Server response: Invalid API key specified Error:UiPathOCRInvalidApiKey"
  (from PageDigitizer.ApplyOcr). The agent runs the uipath-troubleshoot skill
  against a uip CLI mock and must identify the invalid UiPath Document OCR API
  key as the cause — reading the inner server response, not stopping at the
  AggregateException wrapper, and not blaming the document, a missing file, the
  Digitizer PDF-component license, or DU not being enabled on the tenant.
  Signature captured verbatim from a live run. Success = same root cause as
  RESOLUTION.md.
tags: [uipath-troubleshoot, rpa, document-understanding, e2e, faithful-replay, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 28
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../../_shared/mock_template
    - type: template_dir
      path: data
  mock_path_dirs:
    - m
reference:
  file: RESOLUTION.md

initial_prompt: |
  why did my last job from the Shared folder fail?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing job. You are waiting for
    the troubleshooting agent to finish and trust its expertise. You only have
    the information in your initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification it requests so
    the investigation reaches a final resolution.
  constraints:
    - "If the agent asks where the project source code / project directory / XAML files are, tell it the source is not available and to proceed best-effort from the Orchestrator job evidence."
    - "If the agent asks whether to expand investigation scope (e.g. integration-service, activity-packages, orchestrator), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
