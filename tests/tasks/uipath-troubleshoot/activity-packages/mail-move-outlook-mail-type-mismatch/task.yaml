task_id: skill-troubleshoot-move-outlook-mail-type-mismatch
description: >
  UiPath troubleshooting agent must diagnose a Move Outlook Mail Message
  failure caused by a modern-vs-classic type mismatch (Branch 3 of the
  move-outlook-mail-failures playbook). After a mail-package update the
  InboxAutoFiler workflow uses the modern Move Email activity
  (UiPath.MicrosoftOffice365.Activities) but wires a String message-ID
  variable into the message input, which expects an Office365Message /
  IResource object - so the job faults with "Cannot convert type
  'System.String' to '...Office365Message'". Success = agent matches
  Branch 3, attributes the cast error to a String wired into the modern
  activity's resource-typed input (classic/modern mismatch), and
  recommends the + resource picker OR switching to the classic Move
  Outlook Mail Message (MoveOutlookMessage) with string/MailMessage
  inputs.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose, lifecycle:discover]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 40
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  node: {}
  template_sources:
  - type: template_dir
    path: ../../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: data
  mock_path_dirs:
  - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My InboxAutoFiler process is faulting in Orchestrator on every run since
  we updated the mail packages. The folder is "RPA Production". Can you
  investigate why? The project source for the failing process is in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing InboxAutoFiler
    process. You only know that it started faulting on every run after the
    team updated the mail packages, and that the Orchestrator folder is
    "RPA Production". You trust the agent's expertise and are waiting for a
    diagnosis.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, mail-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data - you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
