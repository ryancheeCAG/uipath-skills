task_id: skill-troubleshoot-replace-text-file-locked
description: >
  UiPath troubleshooting agent must diagnose a Replace Text file-lock failure:
  a Use Word File scope with Auto Save enabled edits the same shared file on
  every iteration of a For Each loop, so a save races the next iteration's
  access and faults with System.IO.IOException ("being used by another
  process"). Success = agent matches the replace-text-file-locked playbook AND
  recommends unchecking Auto Save and/or writing to a distinct output path per
  iteration (or clearing the lock), not blaming Word or the document content.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: data
  mock_path_dirs:
  - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  My ContractMerge process faults in Orchestrator (folder "Contracts Batch",
  machine MOCK-ROBOT-06). It loops over recipients filling a Word document
  and throws an error about the file being used by another process. The
  first item seems to work and then it dies.

  I'm not on the robot host right now, only Orchestrator. Diagnose what you
  can from Orchestrator and the project source, and give me the fix.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing batch process. It loops
    over recipients editing a Word document; the first item works and then
    it throws "being used by another process." You are away from the robot
    host and only have Orchestrator access. You trust the agent and want a
    diagnosis plus the fix.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the fix at the end."
    - "If asked whether anything else opens that document at the same time, say not that you know of - it is the same single template the loop keeps editing."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
