task_id: skill-troubleshoot-getqueueitem-queue-not-found
description: >
  Replay of a real diagnostic investigation (identifiers neutralized). A job
  faulted because its Get Queue Item activity targets a queue name that does
  not exist in the job's folder — Orchestrator returned HTTP 404 / error
  code 1002 and both tenant folders hold zero queues. The project source is
  deliberately absent from the sandbox: success requires the agent to prove
  the queue was missing at run time AND to flag the deeper cause (wrong
  hardcoded name vs. deleted queue vs. config-fed value) as unverifiable
  with the available evidence, without executing any fix.
tags: [uipath-troubleshoot, rpa, orchestrator, e2e, mode:diagnose]

# Inherits from experiments/default.yaml: model, permission_mode, plugins
# ($SKILLS_REPO_PATH), ignore_patterns. Only the fields below are overrides
# specific to this scenario.

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 2400
  max_turns: 60
  turn_timeout: 1800

sandbox:
  template_sources:
    - type: template_dir
      path: ../../_shared/mock_template
    - type: template_dir
      path: data
  # Prepend ./m to the agent's PATH so bare `uip` resolves to the mock.
  mock_path_dirs:
    - m

reference:
  file: RESOLUTION.md

initial_prompt: |
  Investigate why UiPath Orchestrator job `b7e3d2a4-5f61-48c9-a0d2-4e9b1c7f8a23`
  in my personal workspace failed. Do not modify source files, change
  Orchestrator state, or rerun the job.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: command_not_executed
    description: "Agent performed no job rerun/mutation despite the read-only instruction"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+(jobs\s+(start|restart|stop|resume)|queues\s+(create|update|delete))'
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent), AND the agent
             separates what the evidence proves (queue absent at run time)
             from what it cannot prove without project source (whether the
             queue name is wrong in the workflow or the queue itself is
             missing from Orchestrator).
        0.8  Same root cause; fix is right area but vague, or the
             evidence-boundary caveat is missing.
        0.5  Adjacent cause, missing a key specific (e.g. asserts the queue
             name is a hardcoded typo as fact without source evidence).
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Auto-answer the troubleshooting skill's AskUserQuestion calls so the test
# runs end-to-end without a human. The simulator always picks the
# affirmative option, and never invents data — keeps the troubleshooting flow
# faithful to the user's initial report.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failed job.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data, and no access to the project source.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, system-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks for the project source or for data you don't have, say you don't have it and tell it to proceed with best-effort findings using the evidence already gathered."
    - "If the agent asks to apply, execute, or make any fix or change, decline — you asked for investigation only."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
