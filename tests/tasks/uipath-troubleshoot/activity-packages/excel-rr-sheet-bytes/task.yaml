task_id: skill-troubleshoot-excel-rr-sheet-bytes
description: >
  UiPath troubleshoot agent must diagnose a Read Range failure
  (UiPath.Excel.BusinessException) where the configured SheetName and
  the actual workbook sheet are visually identical but differ in byte
  content (non-breaking space U+00A0 vs regular space U+0020). The
  agent must match the activity-packages/excel-activities/playbooks/read-range-sheet-not-found.md
  playbook, recognize that the names visually match but the BusinessException
  still fires, and either identify the U+00A0 mismatch from the byte
  content of the Get Workbook Sheets log evidence, or narrow to the
  look-alike/whitespace branches and recommend the host-side PowerShell
  byte-compare snippet to confirm — never assert a specific code point
  without byte-level evidence.

tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 7200
  max_turns: 60
  turn_timeout: 5400

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: data
  mock_path_dirs: ["m"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Orchestrator job just faulted with
  `UiPath.Excel.BusinessException: The sheet with the name 'Quarterly Data' does not exist.`
  Pinned job key: cc333333-7777-8888-9999-000011112222. The sheet
  IS there — I just opened the workbook in Excel and 'Quarterly Data'
  is right at the top of the tab list. The workflow's Get Workbook
  Sheets activity even logged it. I checked the casing, the spelling,
  the spaces — everything looks identical between what the workflow
  says and what the workbook has. What am I missing?

  I'm not on the Robot host right now and have no shell access to
  MOCK-HOST — only Orchestrator. PowerShell, byte-dump tools, and
  any host-side analysis are unavailable to you too; do not attempt
  to run them — any such call will be rejected. This is a
  diagnose-from-evidence task.

  If you can identify the root cause directly from the workflow
  source and the job's Orchestrator evidence (especially the Get
  Workbook Sheets output in the job logs), name it. Otherwise give
  me the exact host-side commands as a plain text list and stop —
  I will run them on the host and come back with the output. Do not
  loop on tool failures; if a Bash/PowerShell call is rejected once,
  treat that as a hard signal to switch to writing recommendations
  for me.

  The project source for the failing process is at ./ExcelDailyImport/ in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Auto-answer the diagnostic skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option and never invents data — keeps the investigation faithful.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing process. You are
    waiting for the diagnostic agent to finish and trust its expertise.
    You only know what you wrote in your initial report. You have no
    other data.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
