task_id: skill-troubleshoot-python-loadscript-engine-init
description: >
  UiPath troubleshooting agent must diagnose a Load Python Script failure
  caused by the Python Scope being unable to initialize the Python engine on
  the robot host: the scope targets Python 3.11 (Target x64) with an empty
  Library path, so it faults at startup with "Error initializing Python engine
  64 bit". Success = agent matches the load-script-failures playbook, identifies
  an engine-initialization failure (NOT a ModuleNotFoundError / syntax error),
  AND recommends setting the Library path to the matching pythonXX.dll for
  Python > 3.9 and/or verifying the interpreter bitness, without fabricating
  host actions.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, python-activities, python-scope, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  I just deployed a new Python automation, PyDataTransform, and it faults
  in Orchestrator on every run. The folder is "Data Pipelines". It fails
  almost immediately - it never seems to get to my script.

  I'm not on the Robot host right now and have no shell access to
  MOCK-ROBOT, only Orchestrator. Diagnose what you can from Orchestrator.
  If the answer needs evidence from the host itself, give me the exact
  things to check on the host the next time I'm in front of it; I'll do
  them and come back with the result. Do not stall waiting for host data
  - hand me the list and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing process. You just
    deployed a new Python automation to a new unattended robot and it
    faults immediately on every run. You are away from the robot host and
    only have Orchestrator access. You trust the agent and want a diagnosis
    or a host check list.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, python-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the host check list at the end."
    - "If asked whether Python is installed on the robot host or what its version/bitness is, say you are not sure and cannot check right now - that is exactly what you need the agent to tell you to verify."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
