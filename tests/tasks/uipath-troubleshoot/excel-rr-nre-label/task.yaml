task_id: skill-troubleshoot-excel-rr-nre-label
description: >
  UiPath troubleshoot agent must diagnose a Read Range failure
  (System.NullReferenceException from inside the activity) where the
  workbook is protected by a Microsoft Purview / Azure Information
  Protection sensitivity label that the Robot user lacks permission
  for. The activity opens the file (no IOException), but parsing
  fails with NRE because the label-enforced encryption / policy
  blocks programmatic access. Agent must match the
  activity-packages/excel-activities/playbooks/read-range-null-reference.md
  playbook, identify the sensitivity-label branch from the workflow
  source + the job-log Trace entry naming the label, and recommend
  granting Robot user permission or removing the label.

tags: [uipath-troubleshoot, e2e, mode:diagnose, excel-activities, read-range, null-reference, sensitivity-label]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 4500
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Orchestrator job just faulted with
  `System.NullReferenceException: Object reference not set to an instance of an object.`
  Pinned job key: aa111111-bbbb-cccc-dddd-eeeeffffaaaa. There's no
  stack pointing at a specific cell or sheet — just the bare NRE.
  The workbook opens fine when I double-click it in Explorer, but
  there's a "Confidential" banner at the top. Could that be the
  problem?

  The project source for the failing process is at ./ExcelDailyImport/ in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Auto-answer the diagnostic skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option and never invents data — keeps the investigation faithful.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the faulted Orchestrator job.
    You are waiting for the diagnostic agent to finish and trust its
    expertise. You only know what you wrote in your initial report — the
    error text and the pinned job key. You have no other data.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as excel-activities, orchestrator, integration-service), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
