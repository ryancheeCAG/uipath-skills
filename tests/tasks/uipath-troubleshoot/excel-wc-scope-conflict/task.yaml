task_id: skill-troubleshoot-excel-wc-scope-conflict
description: >
  UiPath troubleshoot agent must diagnose a Write Cell failure where
  a Classic Workbook `Write Cell` activity is nested inside a Modern
  `Use Excel File` scope that has already opened the same workbook.
  The error wording (System.IO.IOException: ... used by another
  process) is identical to the Read Range file-locked playbook's,
  but the cause-branch and fix are different — the locker is the
  workflow's own surrounding scope, not an external process. Agent
  must match the activity-packages/excel-activities/playbooks/write-cell-failures.md
  playbook and identify the Classic/Modern scope conflict (branch 1
  scope-conflict variant) from the workflow source — NOT the
  external-locker variant covered by read-range-file-locked.md.

tags: [uipath-troubleshoot, e2e, mode:diagnose, excel-activities, write-cell, scope-conflict]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

task_timeout: 4500
max_turns: 50
turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Orchestrator job just faulted with
  `System.IO.IOException: The process cannot access the file 'C:\Robot\Data\sales-2026-05.xlsx' because it is being used by another process.`
  Pinned job key: 11aa1111-2222-3333-4444-555566667777. The workbook
  is only used by this one process — no human had it open, and there
  are no other jobs running against it. Why is the file locked from
  itself?

  The project source for the failing process is at ./ExcelWriteCellProcess/ in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the write-cell-failures playbook AND identified the Classic-inside-Modern scope-conflict (NOT the external-locker variant of read-range-file-locked). Recommended either moving the Classic Workbook Write Cell out of the Use Excel File scope, OR replacing it with a Modern Write Cell nested inside the existing scope."
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as the authoritative
      ground truth.

      The user's request was:
        "My Orchestrator job just faulted with
         `System.IO.IOException: The process cannot access the file
         'C:\Robot\Data\sales-2026-05.xlsx' because it is being used by
         another process.` Pinned job key:
         11aa1111-2222-3333-4444-555566667777. The workbook is only used
         by this one process — no human had it open, and there are no
         other jobs running against it. Why is the file locked from
         itself?"

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          skills/uipath-troubleshoot/references/activity-packages/excel-activities/playbooks/write-cell-failures.md
        because the failing activity is a Write Cell and the
        cause-branch is the Classic/Modern scope conflict variant
        (branch 1 scope-conflict variant) — NOT the external-locker
        variant covered by read-range-file-locked.md.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The workflow uses a Modern `Use Excel File` scope on
            `C:\Robot\Data\sales-2026-05.xlsx` that holds the file
            open through its body.
          - Inside the scope's body, the workflow calls a Classic
            Workbook `Write Cell` activity with its OWN `WorkbookPath`
            property pointing at the SAME file. The Classic Workbook
            surface accesses the file's raw bytes directly and
            refuses to write while another process — including
            UiPath's own surrounding Modern scope — has the file
            open.
          - The IOException wording is identical to an external
            locker (orphan EXCEL.EXE, user editing, etc.) but the
            user has confirmed no external locker exists. The
            workflow source is what makes the diagnosis: two
            scopes on the same file inside the same job.

        The reference fix:
          - Replace the Classic Workbook `Write Cell` with a Modern
            `Write Cell` activity NESTED inside the existing
            `Use Excel File` scope (no separate `WorkbookPath` —
            the scope owns the file).
          - Alternative: move the Classic Workbook activity OUT of
            the Modern scope's body so it runs after the scope
            releases the file.
          - Do NOT recommend `Kill Process` for EXCEL — there is
            no EXCEL.EXE to kill; the locker is UiPath's own
            scope, not an external process.
          - Do NOT recommend pivoting to the read-range-file-locked
            investigation chain (orphan check, network share,
            AV scanner) — none of those apply.

        Decisive signals the agent must surface:
          - The workflow source contains BOTH a `UseExcelFile` (or
            equivalent Modern scope) AND a Classic Workbook
            `Write Cell` with a `WorkbookPath` property targeting
            the same file.
          - The user's explicit statement: "no human had it open,
            and there are no other jobs running against it" — rules
            out the read-range-file-locked external-locker
            cause-branches.

      SCORING RUBRIC:

        1.0  Agent matched the write-cell-failures playbook AND
             identified the Classic/Modern scope conflict from the
             workflow source. Named both scopes / activities and
             recommended either nesting Modern Write Cell or
             unnesting the Classic activity.
        0.8  Both dimensions partially correct: matched the playbook
             and identified the dual-scope pattern but recommended
             only one of the two fix options without naming why.
        0.5  Only one dimension correct: matched the playbook but
             concluded an external-locker cause (orphan EXCEL.EXE,
             network share, etc.) despite the user explicitly ruling
             those out; OR identified the scope conflict but
             matched read-range-file-locked.md instead of
             write-cell-failures.md.
        0.2  Agent recognized the IOException as Excel-related but
             neither matched the write-cell-failures playbook nor
             identified the dual-scope pattern.
        0.0  Reached the wrong branch (recommended killing
             EXCEL.EXE / checking for orphans / network-share
             investigation despite the user's explicit exclusion);
             concluded a different root cause; got blocked;
             or failed.

      Be substance-focused. The combination of (a) IOException
      wording, (b) user's explicit exclusion of external lockers,
      and (c) workflow source showing dual-scope pattern is the
      decisive signal. Penalize agents that miss the workflow
      source evidence and reflexively recommend the read-range
      file-locked investigation chain.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}
