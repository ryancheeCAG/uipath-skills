task_id: skill-troubleshoot-lookup-file-locked
description: >
  UiPath troubleshooting agent must diagnose a classic Lookup Range failure
  caused by the workbook being held open by another process on the robot
  host: the Excel Application Scope cannot acquire the file handle and faults
  at open with System.IO.IOException ("The process cannot access the file ...
  because it is being used by another process"). The most likely unattended
  cause is an orphaned EXCEL.EXE from a prior undisposed run. Success = agent
  matches the lookup-range-file-locked playbook AND recommends forcing a clean
  release (kill stray EXCEL.EXE + clean scope dispose) or serializing access,
  without fabricating host actions.
tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, excel-activities, lookup-range, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

task_timeout: 5400
max_turns: 60
turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My InvoiceLookup process faults intermittently in Orchestrator - some
  runs succeed, others fault. It's been worse since we moved it to the new
  unattended robot. The folder is "RPA Production".

  I'm not on the Robot host right now and have no shell access to
  MOCK-HOST, only Orchestrator. Diagnose what you can from Orchestrator.
  If the answer needs evidence from the host itself, give me the exact
  things to check on the host the next time I'm in front of it; I'll do
  them and come back with the result. Do not stall waiting for host data
  - hand me the list and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the lookup-range-file-locked playbook AND recommended forcing a clean handle release / serializing access"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as authoritative.

      The user's request was:
        "My InvoiceLookup process faults intermittently in Orchestrator -
         some runs succeed, others fault. Worse since we moved it to the new
         unattended robot. Folder 'RPA Production'. I'm not on the Robot
         host, only Orchestrator."

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/excel-activities/playbooks/lookup-range-file-locked.md
        because the runtime error
          "System.IO.IOException: The process cannot access the file
           'C:\ProgramData\Automation\Invoices.xlsx' because it is being
           used by another process"
        at the Excel Application Scope open is the file-handle-contention
        signature of a locked/in-use workbook. The error names the FILE as
        in use, which routes here and NOT to the modern COM dispatcher
        playbook (0x80010100 RPC_E_SYS_CALL_FAILED, a blocked/hung call).

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The classic Excel Application Scope must open Invoices.xlsx
            before the Lookup Range can run; on MOCK-HOST the file is held
            by another process, so the scope cannot get the handle and
            faults at open.
          - The most likely unattended holder is an orphaned EXCEL.EXE left
            by a prior run that did not dispose its Excel instance (file
            looks closed to a human, handle still held by a windowless
            process). A user holding the file, a concurrent job, or a
            sync/backup/AV client are alternative holders.
          - The intermittent success/failure corroborates handle
            contention, not a workflow defect.
        The reference fix offers:
          - Force a clean release: Kill Process (EXCEL) at workflow start +
            ensure the scope disposes cleanly (no Try/Catch swallowing the
            exit); on the modern surface, Excel Process Scope's
            KillExcelProcessesEachIteration; OR
          - Serialize/relocate access: schedule when the file is free,
            stagger conflicting jobs, move the file out of a synced/scanned
            folder, open read-only, or copy to a private path and look up
            against the copy.

      DIMENSION C -- No fabricated host actions
        Because the user is off-host, the agent must hand over a host check
        (look for orphaned EXCEL.EXE / who holds the file) and/or recommend
        the fix. It must NOT claim to have killed processes or run host
        commands itself.

      SCORING RUBRIC:
        1.0  Agent matched lookup-range-file-locked AND identified the
             workbook being held by another process (orphaned EXCEL.EXE the
             most likely unattended cause) AND recommended at least one valid
             fix (kill stray EXCEL.EXE + clean dispose, or serialize/relocate
             access), without fabricating host actions.
        0.8  Correct playbook and "file in use / locked" cause, but the fix
             is vague (e.g. "make sure nothing has the file open" without
             naming the kill-stray-Excel/clean-dispose or serialize path).
        0.5  Recognized a file-access/open problem but did not tie it to the
             file being held by another process, OR matched a sibling Lookup
             Range playbook (excel-not-installed, null-reference,
             invalid-range), OR misrouted to the COM dispatcher
             (0x80010100) playbook.
        0.2  Surfaced the IOException to the user without diagnosis.
        0.0  Wrong cause (e.g. concluded the sheet name, the range, the
             lookup value, or a missing Excel install was at fault), or
             fabricated a host action.

      Reward any valid fix path equally. Penalize confident wrong causes and
      misrouting to the COM-interop playbook.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing process. It faults
    intermittently and got worse after moving to a new unattended robot.
    You are away from the robot host and only have Orchestrator access. You
    trust the agent and want a diagnosis or a host check list.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, excel-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the host check list at the end."
    - "If asked whether the workbook is open on the host or whether stray EXCEL.EXE processes exist, say you are not sure and cannot check right now - that is exactly what you need the agent to tell you to verify."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
