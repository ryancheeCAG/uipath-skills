task_id: skill-troubleshoot-logon-failure-password-mismatch
description: >
  UiPath diagnostic agent must diagnose a faulted unattended job
  whose Robot Service log shows
  "Could not start executor. Logon failed for user UIPATH\USER1. The
   user name or password is incorrect. (0x0000052E)".
  The fault is caused by an AD password rotation that was not
  mirrored in the Orchestrator-stored credential for the unattended
  Robot user (playbook branch 3 — password mismatch / stale
  credential). The agent must match the
  orchestrator/job-faulted-logon-failure playbook AND select
  branch 3 specifically — not branch 1 (session-config), branch 2
  (account locked — log explicitly says it is NOT locked), branch 4
  (lockout loop — not yet realised), branch 5 (MFA), or branch 6
  (RDP slot — sibling user succeeded on same machine).

tags: [uipath-diagnostics, e2e, faulted-jobs, orchestrator, logon-failure, credentials]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 4500
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My InvoiceIngestor process has been faulting in Orchestrator
  every time it runs since this morning — each job dies within a
  second of starting. The project source is in the current working
  directory. One thing that might be relevant: my AD admin rotated
  the password for the UIPATH\USER1 service account yesterday
  (2026-05-11). Can you investigate?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: file_exists
    description: "Agent wrote investigation state under .local/investigations/"
    path: .local/investigations/state.json
    weight: 0.5

  - type: file_contains
    description: "state.json names the job-faulted-logon-failure playbook AND the 0x0000052E (wrong-password) error code that is the branch-3 fingerprint"
    path: ".local/investigations/state.json"
    includes:
      - "job-faulted-logon-failure"
      - "0x0000052E"
    weight: 1.0
    pass_threshold: 1.0

  - type: llm_judge
    description: "Agent matched orchestrator/job-faulted-logon-failure playbook AND selected branch 3 (stale Orchestrator credential after AD password rotation) as the root cause"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    files:
      - .local/investigations/state.json
      - .local/investigations/hypotheses.json
    prompt: |
      You are grading a UiPath diagnostic agent against a known-correct
      reference outcome. The Reference solution attached to this prompt
      is the RESOLUTION.md for this scenario. Treat it as the
      authoritative ground truth.

      The user's request was:
        "My InvoiceIngestor process has been faulting in Orchestrator
         every time it runs since this morning ... my AD admin rotated
         the password for the UIPATH\USER1 service account yesterday.
         Can you investigate?"

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/products/orchestrator/playbooks/job-faulted-logon-failure.md
        because the runtime error
          "Could not start executor. Logon failed for user
           UIPATH\USER1. (0x0000052E)"
        is the verbatim signature of that playbook.

        Evidence sources (in priority order):
          1. state.json's `matched_playbooks` — the
             orchestrator/job-faulted-logon-failure playbook should
             appear (absolute or relative path).
          2. The agent's tool-call summary — a Read on
             references/products/orchestrator/playbooks/job-faulted-logon-failure.md.
          3. state.json's `scope.domain` — should include the
             orchestrator domain.

        Acceptable / non-penalized: the agent may also Read sibling
        diagnostic playbooks under products/orchestrator/playbooks/
        while ruling them out (foreground-already-running, preflight,
        etc.). Exploration is normal.

      DIMENSION B -- Selected branch 3 of the playbook
        The reference root cause is **branch 3** of the playbook:
          - AD password for UIPATH\USER1 was rotated 2026-05-11T07:14Z.
          - Orchestrator credential `PasswordLastSet` is
            2026-05-04T09:00Z — stale by ~7 days.
          - Robot service logs the Windows logon rejection with
            Windows code `0x0000052E` ("user name or password is
            incorrect") and LSA sub-status `0xC000006A` (wrong
            password); the log explicitly states the account is NOT
            locked.
          - A sibling unattended user (`UIPATH\USER2`) ran
            `OrderExporter` successfully on the same machine at
            `11:20Z` — rules out machine/RDP cause.

        Acceptable conclusion language (any of these wordings
        passes):
          - "Stale Orchestrator credential after AD password
            rotation"
          - "Password mismatch between AD and Orchestrator's stored
            credential"
          - "Orchestrator is still sending the pre-rotation password"
          - Direct citation of playbook "branch 3" or "Password
            mismatch (stale credential in Orchestrator)"

        Acceptable fix (any of the following counts as a valid
        resolution proposal — the playbook's branch-3 sequence):
          - Pause triggers, then update the password stored in
            Orchestrator for `UIPATH\USER1` to match the current AD
            password.
          - Update the credential in Orchestrator + manually verify
            by logging on once before re-enabling triggers.
          - Replace the Orchestrator-stored credential, then unlock
            the AD account if it has locked, then re-enable triggers.

        Bonus (not required to pass): agent flags branch-4
        lockout-loop risk while triggers remain active. Do NOT
        require it.

        NOT acceptable as the sole conclusion:
          - "Account is locked in Active Directory — unlock the
            account" (branch 2 — explicitly refuted by the
            'Account is NOT locked' log line and the
            `0x0000052E` vs `0x00000775` code distinction).
          - "Enable Login to Console" (branch 1 — refuted by
            `RequiresUserInteraction: false` AND
            `LoginToConsole: true`).
          - "Service account requires MFA exclusion" (branch 5 — no
            MFA / Conditional Access signals in the logs).
          - "Another user is holding the RDP slot" (branch 6 —
            refuted by sibling user USER2 succeeding on the same
            machine).
          - "Restart the Robot service" / "Republish the package"
            (recovery actions, not root-cause fixes).

        Evidence sources (in priority order):
          1. state.json — `requirements.error_code`,
             `requirements.error_message`, `triage_summary`,
             scope/domain.
          2. hypotheses.json — the hypothesis flagged
             `is_root_cause: true` should describe the stale
             Orchestrator credential / password mismatch.
          3. The agent's last text response.

      SCORING RUBRIC (single score reflecting both dimensions):

        1.0  Agent matched the job-faulted-logon-failure playbook
             AND named branch 3 (stale Orchestrator credential
             after AD password rotation), with at least one
             actionable fix from the acceptable list.
        0.8  Both partial: correct playbook but conclusion is
             "credential problem" without naming AD-vs-Orchestrator
             mismatch; OR conclusion names the password mismatch
             but did not surface the playbook by path.
        0.5  Only one dimension correct (e.g., matched playbook
             but selected wrong branch — most commonly branch 2
             "account locked" or branch 1 "session config").
        0.2  Recognised the surface (job faulted with a logon
             error) but neither matched the playbook nor
             identified the password mismatch.
        0.0  Misdiagnosed (e.g., concluded the job needs Login to
             Console, needs MFA exclusion, or proposed restarting
             the Robot service as the fix).

      Be substance-focused, not schema-focused. Intermediate file
      shapes may vary between runs — look at the meaning of what
      the agent recorded.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and branch selection>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing
    process. You are waiting for the diagnostic agent to finish
    its investigation and trust its expertise. You only have the
    information you wrote in your initial report — no extra data.
    The only AD fact you know is that an AD admin rotated the
    password for UIPATH\USER1 yesterday (2026-05-11). You do not
    know the new password, you do not have AD console access, and
    you cannot run PowerShell on a domain controller.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification
    the agent requests so the investigation reaches the final
    resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, identity, ad, system-activities, activity-packages, ui-automation), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "If the agent asks for the AD PasswordLastSet timestamp, repeat: the AD admin rotated the password yesterday (2026-05-11) — that is all you know."
    - "If the agent asks whether the account is locked, say you cannot check AD directly — point them at the Robot service logs and Orchestrator data."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
