task_id: skill-troubleshoot-mail-smtp-malformed-recipient
description: >
  UiPath troubleshoot agent must diagnose a faulted SendStatusReport job whose
  Send SMTP Mail Message activity (UiPath.Mail.SMTP.Activities.SendMail) threw
  System.FormatException ("The specified string is not in the form required for
  an e-mail address.") while building the message. The root cause is a malformed
  recipient: the To value is the literal "finance team distribution list" (a
  description, not an address), rejected by MailAddressParser /
  MailMessageBuilder.AddRecipientsToMail before any SMTP connection. The agent
  must match the send-smtp-mail-failures playbook (inputs/address-format branch),
  identify the bad To value from the workflow source, and recommend correcting /
  validating the recipient address — NOT a TLS, auth, server-outage, or timeout
  failure. Replayed from a real staging faulted job.

tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, mail-activities, rpa]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "TodoWrite"]

run_limits:
  expected_turns: 40
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  node: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My last job in folder Shared just faulted. Why did it fail and how do I fix
  it? The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched send-smtp-mail-failures (inputs/address-format branch) AND identified the malformed To recipient as the cause of the SendMail FormatException, recommending a valid-address fix — not a TLS, auth, server, or timeout failure"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against the attached
      RESOLUTION.md (authoritative ground truth). The user asked why their last
      job in folder Shared faulted and how to fix it, with the failing project
      source in the working directory.

      Grade BOTH dimensions in a single score:

      (a) FAULT — the agent identifies the failure as
          `System.FormatException: The specified string is not in the form
          required for an e-mail address.` raised by the **Send SMTP Mail
          Message** activity (`UiPath.Mail.SMTP.Activities.SendMail`) while
          building the message (frames into `MailAddressParser.TryParseAddress`
          / `MailMessageBuilder.AddRecipientsToMail`) — before any SMTP connect.

      (b) CAUSE — the agent concludes the **recipient address is malformed**:
          the `To` value is the literal `finance team distribution list` (a
          human description, not a valid e-mail address / not a semicolon-
          separated address list), so `System.Net.Mail` address parsing rejects
          it at message construction. The agent should cite the bad `To` value
          from the project source. It matches
          `references/activity-packages/mail-activities/playbooks/send-smtp-mail-failures.md`
          (Inputs / address format branch).

      (c) RESOLUTION — the agent recommends **correcting the `To` to a valid
          address** (or semicolon-separated list) and/or **validating recipient
          inputs before SendMail** (guard data-driven addresses / Try Catch).

      Anti-fabrication (hard gate): score 0.2 or below if the agent attributes
      the fault to any of these WRONG causes:
        - a TLS / SSL handshake / SecureConnection mismatch (no TLS frame; the
          fault precedes the connection)
        - an authentication / credential failure
        - an SMTP server outage, relay rejection, or connect timeout
        - an invented different activity, package, or error

      Grade only on the agent's final response and tool-call summary (a Read
      under references/activity-packages/mail-activities/playbooks/ is strong
      evidence for the playbook match). Do NOT require any internal
      investigation-state files.

      RUBRIC:
        1.0  Correct FAULT (SMTP SendMail FormatException at message build) +
             CAUSE (malformed `To` recipient, playbook inputs branch, no
             fabrication) + valid recipient-fix.
        0.8  Correct fault + cause but thin/partial fix, OR names the malformed
             recipient without explicitly matching the playbook branch.
        0.5  Recognizes the FormatException / bad-input family but neither
             matches the playbook nor pins the `To` recipient (without
             fabricating a wrong cause).
        0.2  Lands on a REJECT cause (TLS/auth/server/timeout) OR recognizes
             only a generic error with no actionable cause/fix.
        0.0  Misdiagnoses entirely, concludes a different fault, or gets blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering fault, cause, and fix>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing SendStatusReport process.
    You have Orchestrator access and the project source in your working
    directory. You trust the diagnostic agent and only know what you wrote in
    your initial report.
  goal: |
    Let the agent complete its diagnostic flow from Orchestrator evidence and
    the workflow source. Approve every scope expansion or clarification it
    requests so the investigation reaches the final resolution, and accept a fix
    you can apply in Studio.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, mail-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks which job or process you meant, tell it to use the most recent faulted job in folder Shared and the project source in the working directory."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report and the project source."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
