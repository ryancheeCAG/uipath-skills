task_id: skill-troubleshoot-testing-verify-expression-null-reference
description: >
  UiPath troubleshooting agent must diagnose a faulted ResultValidation job
  whose Verify Expression activity (UiPath.Testing.Activities.VerifyExpression)
  threw System.NullReferenceException. The exception is raised during OPERAND /
  expression evaluation (argument resolution) -- the stack runs through
  VisualBasicValue.Execute -> InArgument.TryPopulateValue -> ResolveArguments,
  i.e. before the activity body -- because the Expression `[loadedValue.Length
  > 0]` dereferences the String variable `loadedValue`, which is never assigned
  (Nothing). Success = agent matches the operand-NullReference branch of
  verify-expression-failures.md, cites the Expression and the unassigned
  variable in Main.xaml, and recommends initializing / null-guarding the
  operand -- WITHOUT mistaking it for a designed "Verification failed"
  assertion result or proposing ContinueOnFailure as the fix.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 40
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  node: {}
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My ResultValidation process keeps faulting in Orchestrator (folder Shared).
  Diagnose why and how to fix it. The project source is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the operand-NullReference branch of verify-expression-failures.md: NRE during expression evaluation (not a designed assertion fail), caused by the uninitialized variable in the Expression, fixed by initializing/guarding the operand"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is the
      RESOLUTION.md for this scenario. Treat it as authoritative.

      The user's request was:
        "My ResultValidation process keeps faulting in Orchestrator (folder
         Shared). Diagnose why and how to fix it. The project source is in the
         current working directory."

      Grade ONLY the agent's final response to the user and its tool calls.
      Do NOT inspect or require any internal investigation state under
      .local/investigations/ (state.json, hypotheses.json, matched_playbooks,
      scope.domain, requirements, is_root_cause, evidence shapes). What the
      agent presents IS the contract.

      DIMENSION A -- FAULT correctly identified
        The runtime fault is a `System.NullReferenceException` thrown by the
        `Verify Expression` activity
        (`UiPath.Testing.Activities.VerifyExpression`), raised during
        OPERAND / expression evaluation -- i.e. while resolving the activity's
        arguments, BEFORE the activity body runs. The stack proves this: it
        runs through `VisualBasicValue`1.Execute` ->
        `InArgument`1.TryPopulateValue` -> `ResolveArguments`
        (`__Expr0Get`), not through the activity's own assertion code. It is
        NOT a "Verification failed" assertion result.
        Evidence the agent identified it:
          (1) the agent's final response names the NullReferenceException from
              Verify Expression AND places it in operand/expression
              (argument-resolution) evaluation, not the assertion logic; AND
          (2) a tool call that read the job evidence (`or jobs get` /
              `or jobs logs`) AND/OR a file under
              references/activity-packages/testing-activities/playbooks/.

      DIMENSION B -- CAUSE matches RESOLUTION.md
        The Expression `[loadedValue.Length > 0]` dereferences the `String`
        variable `loadedValue`, which is declared in the `Validate Result`
        sequence but never assigned, so it is `Nothing` at run time. Calling
        `.Length` on a null operand throws the NRE during expression
        evaluation. This matches verify-expression-failures.md, the operand
        NullReference branch (null dereference / uninitialized operand).
        Evidence the agent reached this:
          (1) the agent's final response attributes the NRE to the null /
              uninitialized operand (`loadedValue` is Nothing) being
              dereferenced by the Expression; AND
          (2) the agent cited the `Expression` (`loadedValue.Length > 0`) and
              the unassigned `loadedValue` variable from `Main.xaml`.

      DIMENSION C -- RESOLUTION matches RESOLUTION.md
        The fix is to ensure the operand is populated / non-null before
        Verify Expression runs: assign or load `loadedValue` upstream, or
        null-guard the Expression (e.g.
        `loadedValue IsNot Nothing AndAlso loadedValue.Length > 0`), or fix the
        upstream step that should have set `loadedValue`. The agent should NOT
        propose `ContinueOnFailure` (that governs assertion results, not
        evaluation crashes).

      ANTI-FABRICATION HARD GATE -- cap the score at 0.2 if the agent does ANY
      of the following:
        - Attributes the fault to a DESIGNED assertion failure
          (`TestingActivitiesException` "Verification failed. The expression
          ... returned 'False'") -- this is an NRE during evaluation, not an
          assertion result.
        - Proposes `ContinueOnFailure = True` as the fix (that suppresses
          assertion failures, not evaluation crashes; it would hide the real
          null-operand bug).
        - Blames the assertion-report HTTP / Orchestrator posting path.
        - Blames a different activity than Verify Expression.
        - Fabricates evidence, a variable, or a config that is not in the
          job data or Main.xaml.

      SCORING RUBRIC:
        1.0  Agent nails all three dimensions: (A) NRE from Verify Expression
             during operand/expression evaluation (argument resolution, not
             the assertion result), (B) caused by the uninitialized/null
             `loadedValue` dereferenced by the Expression `loadedValue.Length
             > 0` (cites both from Main.xaml), AND (C) recommends
             initializing / loading / null-guarding the operand (not
             ContinueOnFailure).
        0.8  Correct operand-NullReference cause (null/uninitialized variable
             in the Expression) AND the init/guard fix, but omits part of the
             evidence citation (e.g. names the variable but not the Expression,
             or does not explicitly place the stack in argument resolution).
        0.5  Recognized a NullReferenceException tied to the Expression / a
             null operand but did not identify `loadedValue` as the
             uninitialized variable, or gave no actionable init/guard fix.
        0.2  Surfaced the NRE to the user without diagnosis, OR tripped the
             anti-fabrication hard gate (designed assertion fail,
             ContinueOnFailure fix, assertion-report HTTP path, wrong activity,
             or fabrication).
        0.0  Wrong cause unrelated to a null operand in the Expression, or the
             agent fabricated a fix / action it could not support from the
             evidence.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing ResultValidation process.
    You are away from the Robot host (MOCK-HOST) and only have Orchestrator
    access plus the project source in the current working directory. You trust
    the agent's expertise and are waiting for a diagnosis and a fix.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, testing-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered and to hand you the diagnosis and fix at the end."
    - "Never invent or provide new factual data - you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
