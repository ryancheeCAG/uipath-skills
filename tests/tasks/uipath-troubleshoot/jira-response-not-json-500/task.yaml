task_id: skill-troubleshoot-jira-not-json-500
description: >
  UiPath troubleshooting agent must diagnose a Jira child activity (Search
  Issues) that faults with "Response was not recognized as JSON". The Jira Scope
  authenticated successfully (logs show the session opened), so this is NOT a
  credential problem. The Server URL is set to
  "https://acme.atlassian.net/secure/Dashboard.jspa" - a dashboard page path
  appended past the instance root - so the REST call hits an HTML page and the
  pack cannot parse the response. Success = agent matches the
  jira-scope-response-not-json-or-500 playbook (sub-case R1), identifies the
  Server URL truncation (path appended past the root instance) - NOT an auth
  failure or an on-prem/Data-Center issue (R2) - AND recommends setting Server
  URL to the bare root "https://acme.atlassian.net", without fabricating host
  actions.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, jira-activities, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My JiraWeeklyReport process faults in Orchestrator on every run. The folder
  is "Reporting". The Jira Scope seems to connect, but then it dies on the
  Search Issues step with "Response was not recognized as JSON." The same JQL
  works when I paste it into the Jira issue search in my browser.

  I'm not on the Robot host right now and have no shell access to MOCK-ROBOT,
  only Orchestrator. Diagnose what you can from Orchestrator and the project
  source. If the answer needs something only I can check, give me the exact
  things to verify and I'll come back with the result. Do not stall waiting
  on me - hand me the list and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing JiraWeeklyReport process.
    You configured the Jira Scope, including the Server URL, which you pasted
    from your browser. You are away from the robot host and only have
    Orchestrator access. You trust the agent and want a diagnosis or a check
    list.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, jira-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the check list at the end."
    - "If asked what the Server URL is set to, say it is whatever is in the project - you copied it from your browser address bar."
    - "If asked whether the instance is Jira Cloud or on-premises, say it is the company's standard Jira at acme.atlassian.net."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
