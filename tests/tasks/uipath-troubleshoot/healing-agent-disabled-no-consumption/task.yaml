task_id: skill-troubleshoot-healing-agent-disabled-no-consumption
description: >
  Faithful replay of a real uipath-troubleshoot investigation. A user asks
  whether the Healing Agent ran on their last job in folder Shared, whether
  it consumed any AI units/credits, and what the healing-agent log line
  means. Ground truth: HA was disabled for the job (AutopilotForRobots
  Enabled=false/HealingEnabled=false), the "Healing agent is disabled for
  the current job." Info log is a benign config-read, the healing-data
  archive is an empty 22-byte ZIP, and zero units were consumed. The job
  itself faulted on an unrelated UI Automation NodeNotFoundException.
  Success = the agent reaches the same conclusion as RESOLUTION.md.
tags: [uipath-troubleshoot, e2e, faithful-replay, healing-agent, rpa]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 2400
  max_turns: 60
  turn_timeout: 1800

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  # Prepend ./mocks to the agent's PATH so bare `uip` resolves to the mock.
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  Investigate my last job in Orchestrator folder Shared — it faulted. I also see a Healing Agent log line on that job and I'm worried: was the Healing Agent actually engaged on this run, did it consume any AI units / credits, and what does that log line actually mean?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Auto-answer the troubleshooting skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option, and never invents data — keeps the flow faithful to the
# original session.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the question. You are
    waiting for the troubleshooting agent to finish its investigation and
    trust its expertise. You only have the information you wrote in your
    initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final answer.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as ui-automation, integration-service, maestro, orchestrator), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "If the agent asks which job in folder Shared you mean, say it's the most recent one — you don't have the key."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
