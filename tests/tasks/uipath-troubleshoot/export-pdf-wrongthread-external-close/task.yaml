task_id: skill-troubleshoot-export-pdf-wrongthread-external-close
description: >
  UiPath troubleshooting agent must diagnose a Save Document as PDF COM
  wrong-thread fault: the export faults casting the document to
  Microsoft.Office.Interop.Word._Document (IID {0002096B-...}) with
  0x8001010E RPC_E_WRONG_THREAD. Word Application Scope (which has no
  isolated-instance option) attached to an already-open external WINWORD.EXE
  that the user closed mid-run, replacing the STA apartment that owned the
  _Document proxy. The workflow is structurally correct. Success = agent
  matches the word-export-pdf-com-wrong-thread playbook AND ties the
  RPC_E_WRONG_THREAD cast to the external-attach / mid-run-close cause (using
  the attach + close warnings), recommending no external Word during the run
  (let the scope own its instance) with an A/B re-run to confirm, and System
  Word for unattended/while-open export — without blaming the document or
  output path or fabricating host actions.
tags: [uipath-troubleshoot, e2e, mode:diagnose, faulted-jobs, orchestrator, word-activities, export-pdf, com-wrong-thread, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My ContractPdfExport process faulted in Orchestrator (folder "Contracts",
  machine MOCK-HOST). It opens a Word doc and saves it as PDF, and it failed
  with some COM casting error about a "different thread". I was working on
  the same machine and had Word open at the time.

  Pinned faulted job: b2c3d4e5-f6a7-4819-8b2c-3d4e5f607182. Diagnose what
  happened and tell me how to stop it. If the fix needs the workflow changed
  or something done on the host, give me the exact steps.

  The project source for the process is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched word-export-pdf-com-wrong-thread AND tied RPC_E_WRONG_THREAD to the external-attach / mid-run-close cause, recommending no external Word during the run + A/B confirm / System Word"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome (the attached RESOLUTION.md is authoritative).

      The user's request:
        "ContractPdfExport faulted in Orchestrator (folder 'Contracts',
         machine MOCK-HOST) saving a Word doc as PDF, with a COM casting
         error about a 'different thread'. I was on the same machine with
         Word open at the time. Job b2c3d4e5-...."

      DIMENSION A -- Correct playbook
        Matches references/activity-packages/word-activities/playbooks/word-export-pdf-com-wrong-thread.md
        because the signature is an InvalidCastException to
        Microsoft.Office.Interop.Word._Document (IID {0002096B-...}) with
        0x8001010E RPC_E_WRONG_THREAD at Save Document as PDF.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        Root cause: Word Application Scope has no isolated-instance option, so
        it ATTACHED to an already-open external WINWORD.EXE; the document's
        _Document COM object lived on that external process's STA apartment.
        The user CLOSED that Word window MID-RUN (after the doc was bound,
        before the export), replacing the apartment that owned the proxy, so
        the export's cross-apartment QueryInterface failed with
        RPC_E_WRONG_THREAD. The log shows the attach warning AND the
        mid-run-close warning. The workflow is structurally correct (export is
        the sole child of the scope) — this is environmental, not a code/path/
        document defect. RPC_E_WRONG_THREAD (replaced apartment) is distinct
        from RPC_E_DISCONNECTED (dead server).
        Fix: ensure no external Word is open during the run (let the scope own
        its own instance), confirm with an A/B re-run (Trial A: external Word
        open then closed mid-run → error; Trial B: no external Word → success);
        for unattended/while-open export, migrate to the System Word
        (background) activities.

      DIMENSION C -- Off-host discipline
        The agent may recommend the host/workflow steps and hand over the A/B
        re-run; it must NOT claim to have closed Word or run host commands
        itself, and must NOT blame the document or the output path.

      SCORING RUBRIC:
        1.0  Matched the wrong-thread playbook AND identified the
             external-attach + mid-run-close cause (citing the attach and
             close warnings and the replaced-apartment nature of
             RPC_E_WRONG_THREAD) AND recommended no external Word during the
             run (+ A/B confirm, and/or System Word for unattended) — without
             blaming the path/document or fabricating host actions.
        0.8  Correct playbook and the wrong-thread/external-Word cause, but
             the fix or the attach-vs-close distinction is vague.
        0.5  Recognized a COM apartment/thread problem but did not tie it to
             the external-attach/mid-run-close cause (e.g. only blamed an
             off-STA runtime, or matched a sibling export-pdf playbook).
        0.2  Surfaced the HRESULT without diagnosis.
        0.0  Wrong cause (orphaned-WINWORD RPC_E_CALL_REJECTED, bad output
             path, corrupt document, Word not installed) or fabricated a host
             action.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the user who reported the ContractPdfExport failure. It saved a
    Word doc as PDF and failed with a COM casting error about a "different
    thread". You were on the same machine (MOCK-HOST) with Word open at the
    time. You want a diagnosis plus exact steps.
  goal: |
    Let the agent complete its flow; approve scope expansions / clarifications.
  constraints:
    - "If the agent asks whether to expand investigation scope (orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and hand you the steps."
    - "If asked whether you closed the Word window during the run, say yes - you closed your own Word while the job was running."
    - "If asked whether a Word instance was open when the job started, say yes - you had Word open on the machine."
    - "Never invent or provide new factual data beyond your initial report and these answers."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
