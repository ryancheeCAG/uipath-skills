task_id: skill-troubleshoot-delete-range-invalid-syntax
description: >
  UiPath troubleshoot agent must diagnose a Delete Range failure
  (ArgumentException 'The range is invalid') where the activity's
  Range property is an expression that resolved to an invalid A1
  string ("A1:B0") because the preceding Read Range returned zero
  rows and the workflow used the row count to build the range.
  Agent must match the activity-packages/excel-activities/playbooks/delete-range-failures.md
  playbook, identify the invalid-range-syntax branch from the resolved
  expression value in the job logs + the expression form in the
  workflow source, and recommend either guarding the expression
  (skip when lastRow=0), switching to Clear Range, or using a literal
  range.

tags: [uipath-troubleshoot, smoke, e2e, mode:diagnose, excel-activities, delete-range, invalid-range-syntax]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 4500
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Orchestrator job just faulted with
  `System.ArgumentException: The range is invalid`.
  Pinned job key: dd111111-cccc-dddd-eeee-ffffaaaabbbb. It's a Delete
  Range activity and it worked yesterday when the workbook had data —
  failed today on a freshly-recreated workbook. What's wrong?

  The project source for the failing process is at ./ExcelCleanupProcess/ in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the delete-range-failures playbook AND identified the invalid-range-syntax branch (configured Range expression 'A1:B' + lastRow.ToString() resolved to 'A1:B0' because the preceding Read Range returned 0 rows, making lastRow=0)"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as the authoritative
      ground truth.

      The user's request was:
        "My Orchestrator job just faulted with
         `System.ArgumentException: The range is invalid`. Pinned job
         key: dd111111-cccc-dddd-eeee-ffffaaaabbbb. It's a Delete
         Range activity and it worked yesterday when the workbook had
         data — failed today on a freshly-recreated workbook."

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          skills/uipath-troubleshoot/references/activity-packages/excel-activities/playbooks/delete-range-failures.md
        because the runtime error is the ArgumentException-on-invalid-range
        signature from Modern Delete Range's range validator.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The workflow's Delete Range activity is configured with
            `Range = "A1:B" + lastRow.ToString()`.
          - The preceding Read Range on Sales!A1:Z1000 returned 0
            rows (the workbook had only a header).
          - The Assign computed `lastRow = dtCleanup.Rows.Count = 0`.
          - The Range expression evaluated to "A1:B0" — invalid
            because row 0 is not a legal A1 address.
          - DeleteRangeX's range validator rejected the string with
            ArgumentException before any provider call.

        The reference fix:
          - Guard the expression: wrap Delete Range in If lastRow > 0.
          - OR replace with Clear Range (tolerates empty targets and
            doesn't depend on a row count).
          - OR use a literal range if the deletion target is known at
            design time.

        Evidence sources (in priority order):
          1. Job logs --
             "Read Range: scan used data (Sales!A1:Z1000) — returned 0 rows"
             then
             "Assign: lastRow = dtCleanup.Rows.Count → 0"
             then
             "Delete Range: clear stale block — resolved Range expression \"A1:B\" + lastRow.ToString() to \"A1:B0\""
             then the ArgumentException. The resolved-Range Trace line
             is the decisive evidence.
          2. Workflow source -- Main.xaml's DeleteRange_1 has
             `Range="[&quot;A1:B&quot; + lastRow.ToString()]"`, an
             expression dependent on the lastRow variable.
          3. The "worked yesterday" context from the user --
             yesterday's workbook had data rows so lastRow was > 0
             and the expression resolved to a valid range.

      SCORING RUBRIC:

        1.0  Agent matched the delete-range-failures playbook AND
             converged on the invalid-range-syntax branch with all
             three pieces: named the resolved Range value "A1:B0",
             traced the lastRow=0 root, and recommended at least one
             of the three fixes (guard, Clear Range, or literal range).
        0.8  Both dimensions partially correct: matched the playbook
             and identified the range as invalid but did not connect
             it to the lastRow=0 root, OR connected the root but
             only recommended a generic "validate input" fix.
        0.5  Only one dimension correct: matched the playbook but
             classified the cause-branch incorrectly (scope-missing,
             shift-conflict, file-lock, filter-misalignment) without
             supporting evidence; OR identified the lastRow / "A1:B0"
             chain without matching the specific playbook.
        0.2  Agent recognized the ArgumentException as a range issue
             but neither matched the playbook nor identified the
             resolved-value chain.
        0.0  Reached the wrong conclusion (e.g., claimed the workbook
             was corrupted, blamed Excel COM, recommended killing
             EXCEL.EXE), got blocked, or failed.

      Be substance-focused. The chain "lastRow=0 → 'A1:B0' →
      invalid" is the decisive signal -- penalize agents that
      observe the ArgumentException but miss the resolved-value
      evidence.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}
