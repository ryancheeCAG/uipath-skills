task_id: skill-troubleshoot-getasset-robot-not-authenticated
description: >
  UiPath diagnostic agent must diagnose a Get Credential failure where
  the target asset and folder are correctly configured, the robot has
  the right permissions assigned, AND the robot is licensed and
  connected — yet the activity's Orchestrator API call is rejected with
  HTTP 401 / "You are not authenticated! Error code: 0." The job
  actually started and ran (~1s) before faulting inside Main.xaml,
  which proves the robot could acquire a runtime — so this is NOT a
  licensing failure. The agent must rule out asset-not-found,
  folder-scope-mismatch, permission-denied (which is "not authorized",
  NOT "not authenticated"), wrong-activity-type, per-robot-no-value,
  AND the missing-license red herring, then converge on the robot
  identity / API-token layer (machine-key mismatch, robot-key auth
  disabled, or a System.Activities auth regression).

tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, system-activities, get-asset, robot-not-authenticated, rpa]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 34
  task_timeout: 5400

  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My AssetRobotAuthFailure process is faulting in Orchestrator on every
  run. Can you investigate?

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the get-asset-robot-not-authenticated playbook AND identified the robot API-token authentication failure (not licensing)"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    files:
      - .local/investigations/state.json
      - .local/investigations/hypotheses.json
    prompt: |
      You are grading a UiPath diagnostic agent against a known-correct
      reference outcome. The Reference solution attached to this prompt
      is the RESOLUTION.md for this scenario. Treat it as the
      authoritative ground truth.

      The user's request was:
        "My AssetRobotAuthFailure process is faulting in Orchestrator
         on every run."

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/system-activities/playbooks/get-asset-robot-not-authenticated.md
        because the runtime error
          "You are not authenticated! Error code: 0"
        is the verbatim signature of that playbook ("not authenticated"
        phrasing — distinct from "not authorized" which is the
        permission-denied playbook).

        Evidence sources (in priority order):
          1. state.json's `matched_playbooks` -- the
             get-asset-robot-not-authenticated playbook should appear
             (absolute or relative path).
          2. The agent's tool-call summary -- a Read on a file under
             references/activity-packages/system-activities/playbooks/.
          3. state.json's `scope.domain` -- should include the
             system-activities or activity-packages domain.

        Acceptable / non-penalized: the agent may also Read neighboring
        get-asset-* playbooks (not-found, folder-scope-mismatch,
        permission-denied, wrong-activity-type, per-robot-no-value)
        while ruling them out. Exploration is normal.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The Get Credential activity (GetRobotCredential) in
            Main.xaml targets `AssetName="myHiddenAsset"` in folder
            "Remote Debugging".
          - The asset and folder are correctly configured; the asset
            is the right type (Credential); the robot holds the
            necessary roles; AND the robot account running the job
            (`RobotUser1`) is licensed and connected
            (`IsLicensed: true`, `LicenseType: Unattended`,
            `ConnectionState: Connected`).
          - The job STARTED and ran ~1 second before faulting inside
            Main.xaml at the Get Credential activity. A running job
            proves the robot could acquire a runtime, so this is NOT
            a licensing failure (an unlicensed robot never starts).
          - The activity's Orchestrator REST call is rejected with
            HTTP 401 / "You are not authenticated! Error code: 0".
            With asset, folder, type, permissions, AND license all
            correct, the fault is at the robot identity / API-token
            layer.
        The reference fix (a ranked checklist — the evidence does not
        single out one sub-cause, so any of these is acceptable as the
        primary recommendation):
          - Reconnect `RobotUser1` with the current machine key from
            Orchestrator -> Tenant -> Machines (machine-key mismatch),
            AND/OR
          - Enable "Allow both user authentication and robot key
            authentication" in Tenant -> Settings -> Security
            (robot-key auth disabled), AND/OR
          - Roll back / update `UiPath.System.Activities` if the
            failure began after a package upgrade (auth regression).

        Evidence sources (in priority order):
          1. state.json -- `requirements.error_code`,
             `requirements.error_message`, `triage_summary`,
             scope/domain.
          2. hypotheses.json -- the hypothesis flagged
             `is_root_cause: true` should describe a robot
             authentication / API-token failure (NOT a missing
             license, NOT a missing asset, NOT a folder issue, NOT a
             permission gap, NOT a per-robot value gap, NOT a type
             mismatch).
          3. The agent's last text response.

      SCORING RUBRIC (single score reflecting both dimensions):

        1.0  Agent matched get-asset-robot-not-authenticated AND
             concluded the robot's Orchestrator authentication /
             API-token is failing. Conclusion must (a) name the robot
             (`RobotUser1`), (b) recognize the failure is at the
             authentication / identity / token layer -- explicitly
             distinct from "not authorized"/permission AND explicitly
             NOT a licensing problem (the robot is licensed; the job
             ran), and (c) recommend at least one of: reconnect with
             the correct machine key, enable robot-key authentication,
             or check System.Activities for the auth regression.
        0.8  Both partial: e.g., correct playbook and "robot auth
             issue" but the conclusion still attributes it to a
             missing license, or omits the robot name / a concrete
             fix; or names the auth/token layer correctly but matched
             the system-activities investigation_guide rather than the
             specific robot-not-authenticated playbook.
        0.5  Only one dimension correct.
        0.2  Recognized the surface (asset / auth failure) but neither
             matched the playbook nor localized the failure to the
             robot authentication / token layer.
        0.0  Misdiagnosed (e.g., concluded permission-denied,
             asset-not-found, folder-scope-mismatch, wrong-activity-
             type, per-robot-no-value, or a missing robot license) or
             got blocked.

      Note: concluding the robot is UNLICENSED is a misdiagnosis here
      (score 0.0 on dimension B) -- the fixtures show the robot
      licensed and the job running. The licensing angle is a
      deliberate red herring the agent must rule out.

      Be substance-focused, not schema-focused.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the diagnostic agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, system-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
