task_id: skill-troubleshoot-word-addpicture-bookmark-missing
description: >
  UiPath troubleshoot agent must diagnose a Word "Add Picture"
  (WordAddImage) failure where the activity is configured to insert
  relative to a named bookmark (InsertRelativeTo="Bookmark",
  BookmarkName="LogoAnchor"), but the runtime document instance opened
  by Use Word File does NOT contain that bookmark. The bookmark existed
  in the design-time template; this batch's generated document lacks it.
  At runtime the activity faults with
  UiPath.Word.BusinessException: The bookmark 'LogoAnchor' was not found
  in the document. Agent must match the
  activity-packages/word-activities/playbooks/add-picture-failures.md
  playbook (insertion-target / bookmark branch / C3), identify the
  Bookmark-anchored Add Picture from the workflow source AND the missing
  bookmark in the opened document, and recommend adding the bookmark to
  the document, correcting BookmarkName, or switching to
  InsertRelativeTo="Document" with Position Start/End.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, word-activities, add-picture, bookmark-not-found]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Orchestrator job from folder Shared just faulted. It's the
  WordTemplateFill process that fills an offer-letter Word template and
  drops a signature logo into it, but it dies with:
  `UiPath.Word.BusinessException: The bookmark 'LogoAnchor' was not found in the document.`
  The weird part: it works fine on most of the documents we run it
  against, but every document in this batch fails the same way. Why is
  it looking for that bookmark, and how do I fix it?

  The failing project source is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing WordTemplateFill process.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information in your initial
    report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, rpa, ui-automation), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
