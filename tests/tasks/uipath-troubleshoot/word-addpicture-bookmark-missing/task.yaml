task_id: skill-troubleshoot-word-addpicture-bookmark-missing
description: >
  UiPath troubleshoot agent must diagnose a Word "Add Picture"
  (WordAddImage) failure where the activity is configured to insert
  relative to a named bookmark (InsertRelativeTo="Bookmark",
  BookmarkName="LogoAnchor"), but the runtime document instance opened
  by Use Word File does NOT contain that bookmark. The bookmark existed
  in the design-time template; this batch's generated document lacks it.
  At runtime the activity faults with
  UiPath.Word.BusinessException: The bookmark 'LogoAnchor' was not found
  in the document. Agent must match the
  activity-packages/word-activities/playbooks/add-picture-failures.md
  playbook (insertion-target / bookmark branch / C3), identify the
  Bookmark-anchored Add Picture from the workflow source AND the missing
  bookmark in the opened document, and recommend adding the bookmark to
  the document, correcting BookmarkName, or switching to
  InsertRelativeTo="Document" with Position Start/End.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, word-activities, add-picture, bookmark-not-found]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Orchestrator job from folder Shared just faulted. It's the
  WordTemplateFill process that fills an offer-letter Word template and
  drops a signature logo into it, but it dies with:
  `UiPath.Word.BusinessException: The bookmark 'LogoAnchor' was not found in the document.`
  The weird part: it works fine on most of the documents we run it
  against, but every document in this batch fails the same way. Why is
  it looking for that bookmark, and how do I fix it?

  The failing project source is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the add-picture-failures playbook AND identified the insertion-target / bookmark branch (C3): Add Picture set InsertRelativeTo=Bookmark with BookmarkName=LogoAnchor in source, but the opened document instance lacks that bookmark; fix is add the bookmark, correct BookmarkName, or switch to InsertRelativeTo=Document with Position Start/End"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The attached Reference (RESOLUTION.md) is the
      authoritative ground truth.

      The user's request was:
        "My Orchestrator job from folder Shared just faulted ... the
         WordTemplateFill process ... dies with
         UiPath.Word.BusinessException: The bookmark 'LogoAnchor' was not
         found in the document. It works fine on most documents but every
         document in this batch fails the same way. Why is it looking for
         that bookmark, and how do I fix it?"

      Grade what the agent PRESENTED to the user (its final response is the
      contract). Score BOTH dimensions in a single number.

      DIMENSION A -- Correct playbook
        The matching playbook is
          skills/uipath-troubleshoot/references/activity-packages/word-activities/playbooks/add-picture-failures.md
        (the Word "Add Picture" / WordAddImage failures playbook). The
        relevant branch is C3 — insertion target (bookmark) not found.
        Evidence (any one suffices): the agent names/reads this playbook,
        state.json references it, or the agent's narrative clearly identifies
        the Word Add Picture failure family and the insertion-target /
        bookmark branch.
        NOT penalized: reading neighbouring branches (missing scope, COM
        interop, invalid image input) while ruling them out.

      DIMENSION B -- Same root cause + fix as RESOLUTION.md
        Correct root cause (REQUIRED for a high score): the `Add Picture`
        (`WordAddImage`) activity is configured `InsertRelativeTo="Bookmark"`
        with `BookmarkName="LogoAnchor"`, but the Word document opened at
        runtime (`offer-letter.docx`) does NOT contain a bookmark named
        `LogoAnchor`. The bookmark existed in the design-time template, but
        this batch's runtime document instance was generated without it, so
        `Add Picture` cannot resolve its insertion location and throws the
        `BusinessException`.
        Both signals should be present for full credit: (1) the source sets
        `InsertRelativeTo="Bookmark"` + `BookmarkName="LogoAnchor"`, and (2)
        the runtime fault is a `BusinessException` that the bookmark
        `LogoAnchor` is missing from the opened document — the decisive
        smoking gun. The image input is a valid absolute path and is NOT the
        problem.

        Correct fix (at least one): add the `LogoAnchor` bookmark to the
        actual document (fix the document-generation step so the batch's
        documents carry it); OR correct `BookmarkName` to a bookmark that
        exists in the opened document; OR if only top/bottom placement is
        needed, switch to `InsertRelativeTo="Document"` with
        `Position="Start"`/`"End"` to drop the anchor dependency. Confirming
        the opened document is the intended instance is a plus.

        CRITICAL DISTINCTION: concluding that the image file is
        missing/invalid, or that this is a COM/interop or missing-scope
        problem, instead of the missing-bookmark insertion target, is the
        WRONG root cause. Cap such answers at 0.5.

      SCORING RUBRIC (single score reflecting both dimensions):
        1.0  Matched the add-picture-failures playbook AND identified the
             bookmark-not-found root cause (InsertRelativeTo=Bookmark +
             BookmarkName=LogoAnchor in source; BusinessException that the
             bookmark is missing from the opened document is the smoking
             gun) AND recommended a correct fix (add the bookmark / fix
             BookmarkName / switch to InsertRelativeTo=Document).
        0.8  Bookmark-not-found root cause + correct fix, but playbook match
             is weak/implicit; OR playbook + cause correct but fix is vague.
        0.5  Reached only a partial / wrong branch: e.g. concluded the image
             file is missing/invalid, a COM/interop fault, or a missing
             scope; OR only one dimension correct.
        0.2  Recognized an Add Picture / Word failure but neither matched the
             playbook nor reached the missing-bookmark cause.
        0.0  Wrong conclusion (missing scope, COM interop, invalid image
             input only) or got blocked.

      Be substance-focused, not schema-focused. The `BusinessException` that
      the bookmark `LogoAnchor` is missing from the opened document, combined
      with `InsertRelativeTo="Bookmark"` in the source, is the decisive
      signal — penalize agents that miss it or blame the image input.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and root cause>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing WordTemplateFill process.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information in your initial
    report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, rpa, ui-automation), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
