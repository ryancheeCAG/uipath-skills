task_id: skill-troubleshoot-no-login-pending
description: >
  Faithful replay of a real UiPath troubleshooting investigation. A job is
  stuck in Pending in the Shared folder with PendingReasons.ErrorCodes
  ["RobotNoMatchingUsernames"] — the robot user's credential-store username
  does not match any machine-user mapping on the eligible machine template.
  The agent must match robot-credentials.md (NOT the host-family playbooks)
  and recommend one of: update robot credentials, assign the correct account
  to the folder, or run under a different account.
tags: [uipath-troubleshoot, e2e, faithful-replay, orchestrator, pending-job, robot-credentials]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 3600
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  why my last job from folder Shared doesn't start?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the stuck Pending job in the
    Shared folder. You know your own setup when asked: it's the ERN
    process on an unattended robot on the DanLaptopNew machine, the robot
    account has Windows credentials saved, and this process has worked in
    the past. You are not a deep platform expert — you do not know off
    the top of your head whether the credential's username exactly matches
    the machine's configured user. You trust the agent's investigation.
  goal: |
    Let the agent complete its investigation and tell you the root cause
    and the fix. Approve any scope expansion or clarification it requests.
  constraints:
    - "If the agent asks whether to expand investigation scope, always answer Yes."
    - "If the agent asks for the job key, say you don't have it handy but it is the ONLY Pending job in the Shared folder — ask it to look the job up. Do NOT invent a key."
    - "If the agent asks whether the robot account has Windows credentials saved, answer: Yes, credentials are saved."
    - "If the agent asks whether the credential's username matches the machine's configured user, say you are not sure how it is set up — ask the agent to verify that for you. Do NOT claim it matches."
    - "If the agent asks whether the Assistant is in Service Mode / Unattended, answer: Yes, Unattended / Service Mode."
    - "If the agent asks about license counts, say you are not sure of the exact numbers and ask it to check in Orchestrator — do NOT guess a number."
    - "If the agent asks how to proceed when some data is missing, tell it to proceed with best-effort findings from the evidence it already gathered."
    - "Never volunteer new factual data beyond your initial report and the answers above. Keep replies short (one sentence)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 10
