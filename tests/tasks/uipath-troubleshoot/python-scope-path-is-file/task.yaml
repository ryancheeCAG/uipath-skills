task_id: skill-troubleshoot-python-scope-path-is-file
description: >
  UiPath troubleshoot agent must diagnose a Python Scope failure where the
  scope faults at open with `The specified Python path is not valid:
  C:\Program Files\Python311\python.exe`. The Python Scope `Path` property
  must be the install FOLDER (C:\Program Files\Python311), but it is set to
  the python.exe executable. The scope appends the interpreter internally
  and cannot resolve a valid interpreter from a path ending in python.exe.
  The decisive evidence is the trailing \python.exe on the Python Scope
  Path in Main.xaml, matching the path echoed in the error. Agent must
  match the python-activities/playbooks/python-path-not-valid.md playbook,
  identify the file-vs-folder mistake, and recommend stripping \python.exe
  to the containing folder.

tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, python-activities, python-scope, path-not-valid, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My `PythonHelloWorld` job keeps failing at the Python Scope with:

  `Python Scope: The specified Python path is not valid: C:\Program Files\Python311\python.exe`

  Faulted job key: bb222222-7777-bbbb-cccc-ddddeeeeffff. But that path is
  correct — python.exe really is at C:\Program Files\Python311\python.exe, I
  can double-click it and it opens. Why does UiPath say it's not valid?

  The project source for the failing process is at ./PythonHelloWorld/ in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the diagnostic agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its diagnostic flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, system-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
