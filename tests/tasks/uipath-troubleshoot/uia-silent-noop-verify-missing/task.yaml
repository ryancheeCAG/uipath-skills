task_id: skill-troubleshoot-uia-silent-noop-verify-missing
description: >
  Faithful replay of a real UiPath troubleshooting investigation. The agent
  runs the uipath-troubleshoot skill against a uip CLI mock whose
  responses are the verbatim sub-agent outputs from the real session.
  Success = the agent reaches the same root cause as RESOLUTION.md.
tags: [uipath-troubleshoot, rpa, ui-automation, healing-agent, e2e, faithful-replay]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  # Prepend ./mocks to the agent's PATH so bare `uip` resolves to the mock.
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  my last job from folder Shared was successful but it did not click on my button and I had healing agent enabled

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

# Auto-answer the troubleshooting skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option, and never invents data — keeps the troubleshooting flow
# faithful to the original session.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its investigation, but DECLINE any change to your
    workflow — you only want to understand why the job "succeeded" without
    clicking. This mirrors what the original user did (the agent recommended
    adding a Verify Execution target; the user declined and nothing was edited).
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as ui-automation, orchestrator), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks where the project / source code is, tell it the BlankProcess2 project files (Main.xaml, project.json) are in the current working directory."
    - "If the agent proposes to APPLY a fix by editing your workflow / Main.xaml, configuring a Verify Execution target, or changing the Click input method, DECLINE — say you don't want your workflow changed right now, you just wanted to understand the cause. Pick the 'do not apply' / 'no' option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any runtime details beyond your initial report (the project path and its files are a real fact about your setup and may be shared)."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
