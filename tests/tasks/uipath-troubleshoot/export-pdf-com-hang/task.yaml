task_id: skill-troubleshoot-export-pdf-com-hang
description: >
  UiPath troubleshooting agent must diagnose an Export to PDF COM interop
  failure: an orphaned WINWORD.EXE (a Word instance already running on the
  host) blocks the export's COM call, which faults with COMException
  (RPC_E_CALL_REJECTED). Success = agent matches the export-pdf-com-hang
  playbook AND recommends clearing the stale Word session (Kill Process
  WINWORD before the scope + dispose; ensure input free), with the Invoke
  Code C# ExportAsFixedFormat fallback as an option — without fabricating
  host actions or blaming the output path/document.
tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, word-activities, export-pdf, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My BatchPdfConvert process faults intermittently in Orchestrator (folder
  "Batch PDF", machine MOCK-HOST). It's a scheduled job that converts Word
  docs to PDF, and it throws a COM error when it exports. Re-running
  sometimes works.

  I'm not on the robot host right now, only Orchestrator. Diagnose what you
  can. If the fix needs the workflow changed or something checked/done on
  the host, give me the exact steps and stop.

  The project source for the process is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the user who reported the intermittent PDF-conversion failure. It
    throws a COM error on export and re-running sometimes works. You are
    off-host, Orchestrator only. You want a diagnosis plus steps.
  goal: |
    Let the agent complete its flow; approve scope expansions / clarifications.
  constraints:
    - "If the agent asks whether to expand investigation scope (orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and hand you the steps."
    - "If asked whether an orphaned WINWORD.EXE is running on the host or the input is locked, say you are not sure and cannot check right now."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
