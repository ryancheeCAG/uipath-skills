task_id: skill-troubleshooting-getasset-network-connectivity
description: >
  UiPath troubleshooting agent must troubleshoot a Get Credential failure where
  the asset, folder, robot license, and robot roles are all correctly
  configured — but the robot host cannot reach the Orchestrator URL
  (network / firewall / DNS / proxy / SSL / TLS / session-expiry
  issue). Job logs contain "Orchestrator information is not available"
  along with connection-failure language. The agent must recognize
  this as a robot-to-Orchestrator connectivity failure (low-confidence
  playbook with multiple sub-causes — the agent's job is to identify
  the family, not pinpoint the exact sub-cause).

tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, system-activities, get-asset, network-connectivity, rpa]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 47
  task_timeout: 5400

  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My AssetNetworkConnectivity process is faulting in Orchestrator on
  every run. Can you investigate?

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the get-asset-network-connectivity playbook AND identified the robot-to-Orchestrator connectivity layer as the failing layer"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    files:
      - .local/investigations/state.json
      - .local/investigations/hypotheses.json
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt
      is the RESOLUTION.md for this scenario. Treat it as the
      authoritative ground truth.

      The user's request was:
        "My AssetNetworkConnectivity process is faulting in Orchestrator
         on every run."

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/system-activities/playbooks/get-asset-network-connectivity.md
        because the runtime error
          "Orchestrator information is not available. Connection timed
           out connecting to https://cloud.uipath.com..."
        is the verbatim signature of that playbook ("Orchestrator
        information is not available" / timeout / SSL handshake
        language).

        Evidence sources (in priority order):
          1. state.json's `matched_playbooks` -- the
             get-asset-network-connectivity playbook should appear
             (absolute or relative path).
          2. The agent's tool-call summary -- a Read on a file under
             references/activity-packages/system-activities/playbooks/.
          3. state.json's `scope.domain` -- should include the
             system-activities or activity-packages domain.

        Acceptable / non-penalized: the agent may also Read neighboring
        get-asset-* playbooks (not-found, folder-scope-mismatch,
        permission-denied, wrong-activity-type, per-robot-no-value,
        robot-not-authenticated, external-vault-failure,
        activity-bug-silent-failure) while ruling them out. Exploration
        is normal.

      DIMENSION B -- Same conclusion as RESOLUTION.md (flexible — this
      playbook is low-confidence with multiple sub-causes)
        The reference root cause is **at the robot-to-Orchestrator
        connectivity layer.** Any of these sub-causes counts as a
        correct conclusion as long as the agent (a) recognizes the
        failure is at the connectivity layer (not asset / folder /
        permission / license / type / vault / silent-failure), and
        (b) recommends fixes in the connectivity family:
          - UiPath Robot Windows service not running
          - Robot machine cannot reach the Orchestrator URL
            (firewall / DNS / proxy)
          - Authenticated proxy in the network path (only
            unauthenticated supported)
          - SSL certificate expired or not trusted by the robot host
          - TLS Extended Master Secret incompatibility
          - Orchestrator session expired in a long-running process

        The reference fix recommendations (any of these is fine):
          - Verify UiPath Robot service is running on the robot host
          - Verify network connectivity from the robot host to the
            Orchestrator URL (ping, telnet/Test-NetConnection, curl)
          - Inspect proxy / SSL / TLS configuration on the robot host

        Evidence sources (in priority order):
          1. state.json -- `requirements.error_message` (should
             reference "Orchestrator information is not available"
             or timeout/SSL language), `triage_summary`, scope/domain.
          2. hypotheses.json -- the hypothesis flagged
             `is_root_cause: true` should describe a connectivity
             issue (NOT an asset-side, role-side, license-side, or
             vault-side issue).
          3. The agent's last text response.

      SCORING RUBRIC (single score reflecting both dimensions):

        1.0  Agent matched get-asset-network-connectivity AND
             identified the robot-to-Orchestrator connectivity layer
             as the failing layer. Conclusion must (a) recognize
             "Orchestrator information is not available" as the
             defining symptom and (b) recommend at least one
             connectivity-family fix (robot service, network/firewall,
             proxy, SSL/TLS).
        0.8  Both partial: e.g., correct playbook but conclusion
             names "network issue" generically without naming any
             specific sub-cause; or conclusion identifies a specific
             sub-cause but matched the system-activities
             investigation_guide rather than the specific network-
             connectivity playbook.
        0.5  Only one dimension correct.
        0.2  Recognized the surface (job failed during asset call)
             but neither matched the playbook nor identified the
             connectivity layer.
        0.0  Reached the wrong conclusion (e.g., concluded asset-not-found,
             folder-scope-mismatch, permission-denied,
             wrong-activity-type, per-robot-no-value,
             robot-not-authenticated, external-vault-failure,
             activity-bug-silent-failure) or got blocked.

      Be substance-focused, not schema-focused. This is a low-
      confidence playbook with broad sub-cause coverage; reward
      pattern recognition over exact sub-cause matching.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, system-activities, activity-packages), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
