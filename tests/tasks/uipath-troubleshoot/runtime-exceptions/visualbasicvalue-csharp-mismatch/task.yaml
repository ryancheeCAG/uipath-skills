task_id: skill-troubleshoot-visualbasicvalue-csharp-mismatch
description: >
  UiPath troubleshoot agent must diagnose an Orchestrator job that faulted with
  "Expression Activity type 'VisualBasicValue`1' requires compilation in order to
  run." The OrderRouter project is expressionLanguage CSharp / targetFramework
  Windows, but the Assign 'Build Route Key' value is a VisualBasicValue node (VB
  '&' concatenation) left over from a paste out of a VB project. Modern .NET
  runtime JIT is disabled, so the stray VB expression cannot compile at run. The
  decisive evidence is the expression-language mismatch: project.json
  expressionLanguage=CSharp combined with the <mva:VisualBasicValue> node in
  process/Main.xaml. Agent must match the
  runtime-exceptions/visualbasicvalue-requires-compilation.md playbook and
  recommend replacing the VB expression with a C# expression
  (CSharpValue/CSharpReference) and rebuilding.
tags: [uipath-troubleshoot, rpa, e2e, mode:diagnose]

agent:
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
    - type: template_dir
      path: ../../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs:
    - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My OrderRouter job faults in Orchestrator every run. Faulted job key
  bb22cc33-dd44-ee55-ff66-778899001122 in the Shared folder. It validated cleanly
  in Studio with no designer errors. Can you find out why it fails?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause (a VisualBasicValue / VB expression left in a C#
             project; modern .NET JIT disabled so it cannot compile at run) AND
             same fix (replace the VB expression with a C# expression and rebuild).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific (e.g. names "expression
             compilation" but not the language mismatch).
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks where the project source code / project directory / XAML files are, answer with the current working directory: respond exactly `.` (a single dot) — the project files for this scenario are staged into the sandbox cwd by the test harness."
    - "If the agent asks whether to expand investigation scope (any new product domain such as ui-automation, integration-service, maestro, orchestrator, runtime-exceptions), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered. EXCEPTION: if the missing data is the project source code path, fall back to the rule above (`.` / current working directory) before suggesting best-effort."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report. EXCEPTION: the project source code path IS a real fact about your test setup; you may share it when asked (see rules above)."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
