task_id: skill-troubleshoot-export-pdf-wrongthread-parallel
description: >
  UiPath troubleshooting agent must diagnose a Save Document as PDF COM
  wrong-thread fault: the export faults casting the document to
  Microsoft.Office.Interop.Word._Document (IID {0002096B-...}) with
  0x8001010E RPC_E_WRONG_THREAD because a Parallel between scope-open and the
  export runs the export on a non-creator thread, off the STA that owns the
  document. The run is attended/foreground with no external Word; the cause
  is the threading construct in the workflow source (also visible as a
  Parallel frame in the stack). Success = agent matches the
  word-export-pdf-com-wrong-thread playbook AND ties RPC_E_WRONG_THREAD to
  the Parallel / non-creator-thread cause (reading Main.xaml and/or the stack
  frame), recommending the export be moved onto the same thread/scope that
  opened the document — without blaming the document or output path.
tags: [uipath-troubleshoot, e2e, mode:diagnose, faulted-jobs, orchestrator, word-activities, export-pdf, com-wrong-thread, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My BulkDocPdf process faulted in Orchestrator (folder "DocOps", machine
  MOCK-HOST). It opens a Word document and saves it as PDF, and it failed
  with a COM error about an interface "marshalled for a different thread". No
  one had Word open — it ran on its own.

  Pinned faulted job: f6a7b8c9-d0e1-4c4d-8f60-718293041526. Diagnose the
  cause and tell me exactly what to change. The project source for the
  process is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched word-export-pdf-com-wrong-thread AND tied RPC_E_WRONG_THREAD to the Parallel / non-creator-thread cause, recommending the export be moved onto the scope-creator thread"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome (the attached RESOLUTION.md is authoritative).

      The user's request:
        "BulkDocPdf faulted in Orchestrator (folder 'DocOps', machine
         MOCK-HOST) saving a Word doc as PDF, with a COM error about an
         interface 'marshalled for a different thread'. No one had Word open;
         it ran on its own. Job f6a7b8c9-...."

      DIMENSION A -- Correct playbook
        Matches references/activity-packages/word-activities/playbooks/word-export-pdf-com-wrong-thread.md
        because the signature is an InvalidCastException to
        Microsoft.Office.Interop.Word._Document (IID {0002096B-...}) with
        0x8001010E RPC_E_WRONG_THREAD at Save Document as PDF.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        Root cause: the _Document COM proxy is valid only on the thread that
        created it. The workflow nests Save Document as PDF inside a PARALLEL
        activity (visible in Main.xaml AND as the stack frame
        `at Parallel "Parallel — export + audit log"`), so the export runs on
        a non-creator thread → cross-apartment QueryInterface fails with
        RPC_E_WRONG_THREAD. The run is attended/foreground with NO external
        Word — so this is neither the external-attach/mid-run-close cause nor
        the off-STA/Session-0 cause; it is the in-workflow threading construct.
        Fix: move Save Document as PDF OUT of the Parallel so it runs on the
        same thread/scope that opened the document (run it sequentially as a
        direct child of Word Application Scope); never parallelize Word
        interop children.

      DIMENSION C -- Discipline
        The agent must NOT blame the document or the output path, and must
        ground the cause in the Parallel (Main.xaml / stack frame), not guess.

      SCORING RUBRIC:
        1.0  Matched the wrong-thread playbook AND identified the
             Parallel/non-creator-thread cause (citing the Parallel in
             Main.xaml and/or the Parallel stack frame, and noting the run is
             attended with no external Word) AND recommended moving the export
             out of the Parallel onto the scope-creator thread.
        0.8  Correct playbook and the non-creator-thread cause, but did not
             cite the Parallel from source/stack OR the fix is vague.
        0.5  Recognized a COM apartment/thread problem but mis-assigned the
             cause (e.g. blamed an external attached Word or an unattended
             Session-0 surface, neither of which holds here), or matched a
             sibling export-pdf playbook.
        0.2  Surfaced the HRESULT without diagnosis.
        0.0  Wrong cause (orphaned-WINWORD RPC_E_CALL_REJECTED, bad output
             path, corrupt document, Word not installed) or fabricated
             evidence.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the user who reported the BulkDocPdf failure. It opens a Word doc
    and saves it as PDF and failed with a COM error about an interface
    "marshalled for a different thread". No one had Word open; it ran on its
    own (attended, you launched it and walked away). You want a diagnosis plus
    exact workflow changes.
  goal: |
    Let the agent complete its flow; approve scope expansions / clarifications.
  constraints:
    - "If the agent asks whether to expand investigation scope (orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and hand you the steps."
    - "If asked whether any Word window was open on the host, say no - nothing was open, it ran on its own."
    - "If asked whether the run was unattended on a server, say no - you launched it attended on your own machine and let it run."
    - "Never invent or provide new factual data beyond your initial report and these answers."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
