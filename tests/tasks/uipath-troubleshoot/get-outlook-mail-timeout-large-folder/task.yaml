task_id: skill-troubleshoot-get-outlook-mail-timeout-large-folder
description: >
  UiPath troubleshooting agent must diagnose a Get Outlook Mail Messages
  fault caused by a timeout enumerating a very large folder. The activity
  reads the 'Archive' folder (approx. 18,420 items) with Top=5000 and
  OnlyUnreadMessages=False, exceeding the default TimeoutMS=30000 and
  faulting with System.TimeoutException ("The operation has timed out").
  The folder string, Account, and COM session are all fine - the cause is
  message volume vs the timeout window. Success = agent matches
  get-outlook-mail-failures Branch 2 AND recommends raising TimeoutMS and
  reducing the batch (Top / OnlyUnreadMessages / Filter).
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, mail-activities, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 40
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  node: {}
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My ArchiveMailScanner process is faulting in Orchestrator on every run.
  The folder is "RPA Production". Can you investigate why?

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched get-outlook-mail-failures Branch 2 (timeout on a large folder) AND recommended raising TimeoutMS plus reducing the batch (Top / OnlyUnreadMessages / Filter)"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as authoritative.

      The user's request was:
        "My ArchiveMailScanner process is faulting in Orchestrator on every
         run. The folder is 'RPA Production'. Can you investigate why? The
         project source for the failing process is in the current working
         directory."

      DIMENSION A -- Correct playbook / branch
        The matching playbook is
          references/activity-packages/mail-activities/playbooks/get-outlook-mail-failures.md
        and the matching cause is Branch 2 (Timeout on a large folder),
        because the runtime error "The operation has timed out"
        (System.TimeoutException) fired after the full default TimeoutMS
        window while enumerating a folder with thousands of messages.
        Evidence the agent should show:
          (1) its final response names the get-outlook-mail-failures
              playbook and/or Branch 2 (timeout on a large folder);
          (2) a tool-call Read of a file under
              references/activity-packages/mail-activities/playbooks/.
        Do NOT inspect the agent's internal investigation state
        (.local/investigations/, state.json, hypotheses.json, matched
        playbooks); grade only the final response and the tool calls.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause: the Get Outlook Mail Messages activity
        timed out enumerating a very large folder ('Archive', approx.
        18,420 items) within the default TimeoutMS=30000, because Top was
        high/unset (5000) and OnlyUnreadMessages was off, so it tried to
        pull far more mail than the 30s window allows. The MailFolder
        string, the Account, and the Outlook/COM session are all fine -
        this is volume vs timeout, NOT a folder-resolution or COM problem.
        The reference fix: raise TimeoutMS (e.g. 60000 or more) AND/OR
        reduce the batch (set Top to ~10-20, enable OnlyUnreadMessages);
        for a chronically huge folder, narrow with a Filter or migrate the
        read to the modern Graph o365-activities.
        Evidence the agent should show:
          (1) its final response names the timeout, attributes it to the
              large folder + high/unset Top + default TimeoutMS, and gives
              the fix;
          (2) it cites Main.xaml (the Top and TimeoutMS values) and the
              job-log volume line (approx. 18,420 items in 'Archive').

      WRONG ANSWERS TO REJECT (cap 0.2):
        - Concludes the folder was not resolved (Branch 1 - "specified
          folder does not exist").
        - Concludes Outlook is not running / a COM cast failure / a
          privilege mismatch (Branch 3).
        - Concludes a malformed Filter (Branch 4).
        - Concludes Cached Exchange Mode desync (Branch 5).
        - A generic network error or "couldn't read mail".
        Any wrong CAUSE caps the score at 0.2 even if a timeout is
        mentioned. NOTE: "raise TimeoutMS" with NO mention of reducing the
        batch is still the correct cause and is acceptable at 0.8.

      SCORING RUBRIC:
        1.0  Agent (a) names the timeout enumerating a large folder, (b)
             attributes it to message volume vs TimeoutMS (Top high/unset,
             OnlyUnreadMessages off), AND (c) recommends raising TimeoutMS
             AND reducing the batch (Top / OnlyUnreadMessages / Filter).
        0.8  Correct cause (timeout on a large folder, volume vs
             TimeoutMS) but recommends only ONE lever (e.g. only raise
             TimeoutMS, or only reduce Top).
        0.5  Recognizes the timeout but does not tie it to folder volume /
             Top / TimeoutMS, or offers no concrete fix.
        0.2  Wrong cause (Branch 1 / 3 / 4 / 5, or generic), or surfaces
             the timeout to the user with no diagnosis.
        0.0  Wrong cause AND fabricated host actions, or no usable answer.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing ArchiveMailScanner
    process. You only have the information in your initial report and the
    project source in the working directory. You trust the agent's
    expertise and are waiting for a diagnosis and a fix.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, mail-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "Never invent or provide new factual data - you don't know any details beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
