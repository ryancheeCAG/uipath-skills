task_id: skill-troubleshoot-append-text-missing-container
description: >
  UiPath troubleshooting agent must diagnose an Append Text failure where the
  App-Integration Append Text activity is dropped outside a Word Application
  Scope and faults with "Activity is valid only inside WordApplicationScope"
  (it has no file input of its own). Success = agent matches the
  append-text-missing-container playbook AND recommends nesting Append Text in
  a Word Application Scope / Use Word File OR using the standalone Word
  Document Append Text that takes a file path, not blaming the file/document.
tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, word-activities, append-text, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My AppendNotes process faults in Orchestrator (folder "Doc Append",
  machine MOCK-ROBOT-15) the moment it runs. The error says the Append Text
  activity is valid only inside WordApplicationScope. I just want to append
  a note to a Word document.

  I'm not on the robot host right now, only Orchestrator. Diagnose what you
  can from Orchestrator and the project source, and tell me how to fix it.

  The project source for the process is in the current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the user who reported the failing process. It faults immediately
    saying Append Text is valid only inside WordApplicationScope; you just
    want to append a note to a Word document. You are off-host, Orchestrator
    only. You want a diagnosis and the fix.
  goal: |
    Let the agent complete its flow; approve scope expansions / clarifications.
  constraints:
    - "If the agent asks whether to expand investigation scope (orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and hand you the fix."
    - "If asked whether the Append Text activity is inside a Word Application Scope, say you are not sure - you just dragged the activity in and set the text."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
