task_id: skill-troubleshoot-word-unknown-type
description: >
  UiPath troubleshooting agent must diagnose a Word Application Scope load
  failure on an unattended robot whose UiPath.Word.Activities package does not
  match the published dependency: the process faults at load with
  "Cannot create unknown type WordApplicationScope" before any activity runs.
  Success = agent matches the word-scope-cannot-create-unknown-type playbook
  AND recommends restoring/pinning the UiPath.Word.Activities version on the
  robot feed and republishing, not editing workflow logic.
tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, word-activities, word-application-scope, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My InvoiceLetters process runs fine in Studio on my machine, but it
  faults immediately every time I run it via Orchestrator on the new
  unattended robot (folder "Doc Automation", machine MOCK-ROBOT-02). It
  fails in under a second, before it does any real work.

  Diagnose what's going on from Orchestrator and from the project source.
  The project source for the failing process is in the current working
  directory. If the fix needs something done on the robot or the package
  feed that I have to do myself, give me the exact steps and stop.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing process. It works in
    Studio on your machine but faults instantly on the new unattended
    robot. You trust the agent and want a diagnosis plus the exact steps to
    fix the package on the robot / feed.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the steps at the end."
    - "If asked whether the UiPath.Word.Activities package is available on the robot's feed, say you are not sure and cannot check right now - that is exactly what you need the agent to tell you to verify."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
