task_id: skill-troubleshoot-word-file-corrupted
description: >
  UiPath troubleshooting agent must diagnose a Word Application Scope failure
  where the document opens reporting "The file appears to be corrupted". The
  workflow edits a template in place and a Word instance was already running
  on the host (orphaned WINWORD.EXE holding the lock). Success = agent matches
  the word-scope-file-corrupted playbook AND recommends clearing the locked
  Word session (Kill Process WINWORD before the scope) and saving to a new
  file instead of overwriting the template, without fabricating host actions.
tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, word-activities, word-application-scope, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  expected_turns: 300
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My MonthlyReportFiller process is faulting in Orchestrator. It's a
  scheduled job in the "Reporting" folder on machine MOCK-HOST. It worked
  for the first few runs and now throws something about the file being
  corrupted - but the template opens fine when I double-click it on my own
  machine.

  I'm not on the robot host right now, only Orchestrator. Diagnose what you
  can. If the fix needs changes to the workflow or something checked/done
  on the host, give me the exact steps and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing scheduled process. It
    worked for the first few runs and now reports the file as corrupted,
    though the template opens fine on your own machine. You are away from
    the robot host and only have Orchestrator access. You trust the agent
    and want a diagnosis plus exact steps.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the steps at the end."
    - "If asked whether a Word instance or orphaned WINWORD.EXE is running on the host, say you are not sure and cannot check right now - that is exactly what you need the agent to tell you to verify."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
