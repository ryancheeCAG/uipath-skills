task_id: skill-troubleshoot-word-file-corrupted
description: >
  UiPath troubleshooting agent must diagnose a Word Application Scope failure
  where the document opens reporting "The file appears to be corrupted". The
  workflow edits a template in place and a Word instance was already running
  on the host (orphaned WINWORD.EXE holding the lock). Success = agent matches
  the word-scope-file-corrupted playbook AND recommends clearing the locked
  Word session (Kill Process WINWORD before the scope) and saving to a new
  file instead of overwriting the template, without fabricating host actions.
tags: [uipath-troubleshoot, e2e, faulted-jobs, orchestrator, word-activities, word-application-scope, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My MonthlyReportFiller process is faulting in Orchestrator. It's a
  scheduled job in the "Reporting" folder on machine MOCK-HOST. It worked
  for the first few runs and now throws something about the file being
  corrupted - but the template opens fine when I double-click it on my own
  machine.

  I'm not on the robot host right now, only Orchestrator. Diagnose what you
  can. If the fix needs changes to the workflow or something checked/done
  on the host, give me the exact steps and stop.

  The project source for the failing process is in the current working
  directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the word-scope-file-corrupted playbook AND recommended clearing the lock + save-as-new-file"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as authoritative.

      The user's request was:
        "My MonthlyReportFiller scheduled process (folder 'Reporting',
         machine MOCK-HOST) worked for the first few runs and now faults
         saying the file is corrupted, but the template opens fine when I
         double-click it on my own machine."

      DIMENSION A -- Correct playbook
        The matching playbook is
          references/activity-packages/word-activities/playbooks/word-scope-file-corrupted.md
        because the error
          "Word experienced an error trying to open the file ... The file
           appears to be corrupted"
        from a Word Application Scope, on a job that ran successfully before,
        is the signature of a locked / half-written document rather than a
        genuinely corrupt source.

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The workflow opens the template 'MonthlyTemplate.docx' and edits
            it IN PLACE (no save-as-new). The scheduled job log shows a Word
            instance was already running on the host when the scope started
            (orphaned WINWORD.EXE from a prior run holding the file handle).
          - The lock leaves the template partially written, so the next run
            opens it and Word reports it as corrupted.
          - "Worked the first few runs, opens fine on my own machine" points
            at a host-state / locking problem, not a workflow-logic defect or
            a genuinely corrupt template.
        The reference fix offers:
          - Clear the locked Word session: add a Kill Process for WINWORD
            BEFORE the Word Application Scope (and ensure the scope disposes
            so Word always closes); one-time, end stray WINWORD.EXE on the
            host.
          - Stop overwriting the template in place: save to a NEW output file
            (distinct path) so the source template is never half-written.

      DIMENSION C -- No fabricated host actions
        The user is off-host, so the agent must hand over the host check /
        steps; it must NOT claim to have killed processes or run host
        commands itself. Recommending the workflow change (Kill Process /
        save-as-new) is expected.

      SCORING RUBRIC:
        1.0  Agent matched word-scope-file-corrupted AND identified an
             orphaned/locked Word session and/or in-place template overwrite
             as the cause AND recommended at least one of: clear the lock
             (Kill Process WINWORD before the scope / end orphan WINWORD.EXE)
             OR save to a new file instead of overwriting the template -
             without fabricating host actions. Both fixes is ideal; either
             alone earns 1.0.
        0.8  Correct playbook and cause, but the fix is vague (e.g., "clear
             the lock" without naming Kill Process / save-as-new).
        0.5  Recognized a file-lock / process issue but concluded the
             template is genuinely corrupt and only suggested replacing it,
             or matched a sibling Word playbook instead.
        0.2  Surfaced the error text without diagnosis.
        0.0  Wrong cause (e.g., Word not installed, missing package, file
             path wrong), or fabricated a host action.

      Reward either valid fix path equally. Penalize confident wrong causes.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing scheduled process. It
    worked for the first few runs and now reports the file as corrupted,
    though the template opens fine on your own machine. You are away from
    the robot host and only have Orchestrator access. You trust the agent
    and want a diagnosis plus exact steps.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, word-activities, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the steps at the end."
    - "If asked whether a Word instance or orphaned WINWORD.EXE is running on the host, say you are not sure and cannot check right now - that is exactly what you need the agent to tell you to verify."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
