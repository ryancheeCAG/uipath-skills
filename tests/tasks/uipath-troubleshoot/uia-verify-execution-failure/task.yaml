task_id: skill-troubleshoot-uia-verify-execution-failure
description: >
  Faithful replay of a real UiPath troubleshooting investigation. The agent
  runs the uipath-troubleshoot skill against a uip CLI mock whose responses
  are the verbatim sub-agent outputs from the real session. Failure mode:
  NClick.VerifyOptions assertion does not hold because the action's outcome
  is non-deterministic ("I'm Feeling Lucky") and the verify target is
  over-specific. Success = the agent matches the verify-execution-failure
  playbook, reaches branch (D), and never recommends removing VerifyOptions.
tags: [uipath-troubleshoot, e2e, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  # Prepend ./mocks to the agent's PATH so bare `uip` resolves to the mock.
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  why did my last job from folder Shared failed?

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the verify-execution-failure playbook AND reached the same conclusion as RESOLUTION.md AND did not recommend removing VerifyOptions"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome (the attached RESOLUTION.md).

      The user's request was:
        "why did my last job from folder Shared failed?"

      The originating fault is `VerifyActivityExecutionException` on NClick
      "Click 'Simt că am noroc(1)'" inside NApplicationCard "Edge Google"
      in ClickCase.xaml (process ERN, job
      61f7af05-ad2a-464d-a23e-ba2b45fb59c1). The friendly message is
      "The element was found but the verification failed because the action
      did not have the expected outcome." (resource key
      `ExceptionCheckActivity`). The action succeeded — the click on the
      Google "I'm Feeling Lucky" submit button dispatched and the browser
      navigated. Only the post-action assertion (`VerifyOptions.Mode=Appears`
      against the `Creating a Doodle` anchor on `doodles.google`) failed,
      because "I'm Feeling Lucky" randomizes its destination per click and
      the verify target is reachable only on a small fraction of landings.

      Per the verify-execution-failure.md playbook decision tree:
        - Branch (A) ExceptionVerificationTargetNotFoundOrInvalid —
          ELIMINATED: friendly key is ExceptionCheckActivity, not
          TargetNotFoundOrInvalid.
        - Branch (B) ExceptionVerificationTextNotSupported /
          ImageCouldNotBeRetrieved — ELIMINATED: friendly key and
          Mode=Appears both rule out.
        - Branch (C) ExceptionRecoveredButValidationFailed —
          ELIMINATED: no recovery frames in the stack; HA was enabled on
          the card but did not fire a recovery for this NClick.
        - Branch (D) Non-deterministic action outcome — verify target
          over-specific — APPLIES.
        - Branch (E) Verify timeout too short — ELIMINATED: the verify
          target literally does not exist on this run's landing page;
          waiting longer does not help.
        - Branch (F) Action had no UI effect — ELIMINATED: the friendly
          message wording and the VerifyExecutionService stack origin
          both establish that the action dispatched successfully.

      You must grade THREE dimensions in a single score:

      DIMENSION A -- Correct playbook
        The agent must match the UI-automation verify-execution-failure
        playbook (verify-execution-failure.md). It is acceptable for
        the agent to also Read neighboring playbooks (e.g., the
        selector-failure-* family, timeout-issue, disabled-element)
        during exploration, but the conclusion must rest on
        verify-execution-failure.md.

      DIMENSION B -- Correct fix per playbook branch (D)
        The reference fix names ALL of:
          (a) The exception is `VerifyActivityExecutionException` on
              NClick "Click 'Simt că am noroc(1)'" — the agent must name
              both the activity and the verify-execution failure mode.
          (b) Branch (D) — non-deterministic action outcome — applies
              because the action targets the Google "I'm Feeling Lucky"
              button whose destination is randomized per click and the
              VerifyOptions target ("Creating a Doodle" on doodles.google)
              is over-specific for that non-determinism.
          (c) Primary fix: switch `VerifyOptions.Mode` from `Appears`
              to `AspectChanges` on a guaranteed-change region of the
              post-click page (preferred), OR loosen the verify target
              to an element present on every reachable landing. Either
              is acceptable as the primary fix.
          (d) The agent eliminates at least branch (A) (friendly key
              is not TargetNotFoundOrInvalid) OR branch (C) (no recovery
              frames in the stack).

      DIMENSION C -- Mandatory anti-recommendations
        The agent's presented resolution MUST NOT recommend any of the
        following, in any phrasing:
          - "Remove VerifyOptions", "delete VerifyOptions", "remove the
            verify block", "drop verification", "disable the verify
            step", "uncheck verification in Studio", or any equivalent
            that asks the user to strip `VerifyOptions` from the
            activity.
          - "Increase the verify timeout" / "raise VerifyOptions.Timeout"
            as the primary fix. (The agent may mention timeout extension
            ONLY to explicitly rule it out, citing that the verify target
            is non-existent on the wrong landing page, not slow.)
        Either of these as a primary or fallback fix fails Dimension C.
        Mentioning them as "do NOT do this" anti-patterns is acceptable.

      SCORING RUBRIC (single score reflecting all three dimensions):

        1.0  All dimensions clean: matched verify-execution-failure.md,
             named (a)+(b)+(c)+(d), and the resolution does not
             recommend removing VerifyOptions or extending the timeout.
        0.8  Matched playbook, named (a)+(b)+(c), and Dimension C is
             clean (no remove-VerifyOptions / no timeout-as-primary-fix).
        0.5  Matched playbook and identified verify-execution failure,
             but recommended `AspectChanges` / loosened target only as
             a secondary fix, OR omitted the branch (D) reasoning.
             Dimension C must still be clean.
        0.2  Matched the playbook but recommended the wrong primary
             fix (e.g., increase timeout, change input mode without
             evidence, treat as a selector-not-found case).
        0.0  Recommended removing VerifyOptions in ANY form — this is
             an automatic 0.0 regardless of how correct the rest of
             the diagnosis is.
        0.0  Misdiagnosed entirely (e.g., blamed selector failure,
             disabled element, Orchestrator infrastructure) or got
             blocked.

      Be substance-focused, not schema-focused. Intermediate file shapes
      may vary between runs — look at the meaning of what the agent
      presented to the user.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering playbook match, fix recommendation, and Dimension C compliance>"}

# Auto-answer the troubleshooting skill's AskUserQuestion calls so the test runs
# end-to-end without a human. The simulator always picks the recommended /
# affirmative option, and never invents data — keeps the troubleshooting flow
# faithful to the original session.
simulation:
  enabled: true
  persona: |
    You are the UiPath user who originally reported the failing process.
    You are waiting for the troubleshooting agent to finish its investigation
    and trust its expertise. You only have the information you wrote in
    your initial report — no extra data. You do, however, know where the
    project source lives on your machine: the workflow files (.xaml files,
    project.json) are in the current working directory of this session,
    i.e. `.` (the cwd the agent is running in).
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the
    agent requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as ui-automation, integration-service, maestro, orchestrator), always answer Yes — pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings using the evidence already gathered."
    - "If the agent asks for the project source path (workflow folder, XAML location, where the project lives), reply with `.` (the current working directory) — that is where the workflow files are."
    - "Never invent or provide new factual data — you don't know any details beyond your initial report and the project path above."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
