task_id: skill-troubleshoot-append-range-variant-mismatch
description: >
  UiPath troubleshoot agent must diagnose an Append Range failure
  (BusinessException 'must be placed inside a Use Excel File container')
  where the Modern AppendRangeX activity sits at the workflow's root
  with no enclosing scope. Agent must match the
  activity-packages/excel-activities/playbooks/append-range-failures.md
  playbook, identify the activity-variant-mismatch branch from the
  scope-validation Trace + the missing Use Excel File in the workflow
  source, and recommend a structural fix (wrap in Use Excel File OR
  switch to Append Range Workbook standalone) with awareness of the
  host's Excel-installed context.

tags: [uipath-troubleshoot, smoke, e2e, mode:diagnose, excel-activities, append-range, variant-mismatch]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  driver: tempdir
  python: {}
  template_sources:
    - type: template_dir
      path: ../_shared/mock_template
    - type: template_dir
      path: process
    - type: template_dir
      path: fixtures
  mock_path_dirs: ["mocks"]

reference:
  file: RESOLUTION.md

initial_prompt: |
  My Orchestrator job just faulted with
  `UiPath.Excel.BusinessException: The 'Append Range' activity must be placed inside a 'Use Excel File' container, which manages the workbook context for the activity.`
  Pinned job key: ff111111-cccc-dddd-eeee-ffffaaaabbbb. I refactored
  the workflow last week to "simplify" the structure. What did I
  break?

  The project source for the failing process is at ./ExcelPayrollProcess/ in the
  current working directory.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent matched the append-range-failures playbook AND identified the activity-variant-mismatch branch (Modern AppendRangeX at workflow root, no enclosing Use Excel File) AND recommended either wrapping in Use Excel File or switching to Append Range Workbook surface with host-context awareness"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    include_tool_calls: true
    prompt: |
      You are grading a UiPath troubleshooting agent against a known-correct
      reference outcome. The Reference solution attached to this prompt is
      the RESOLUTION.md for this scenario. Treat it as the authoritative
      ground truth.

      The user's request was:
        "My Orchestrator job just faulted with
         `UiPath.Excel.BusinessException: The 'Append Range' activity
         must be placed inside a 'Use Excel File' container, which
         manages the workbook context for the activity.` Pinned job
         key: ff111111-cccc-dddd-eeee-ffffaaaabbbb. I refactored the
         workflow last week to 'simplify' the structure. What did I
         break?"

      You must grade BOTH dimensions in a single score:

      DIMENSION A -- Correct playbook
        The matching playbook is
          skills/uipath-troubleshoot/references/activity-packages/excel-activities/playbooks/append-range-failures.md
        because the runtime error is the canonical BusinessException
        for the activity-variant-mismatch branch (Modern AppendRangeX
        outside its required Use Excel File scope).

      DIMENSION B -- Same conclusion as RESOLUTION.md
        The reference root cause is:
          - The Modern AppendRangeX activity sits at the workflow's
            root Sequence with no enclosing Use Excel File scope.
          - The "refactor to simplify" likely removed a previous
            Use Excel File wrapper.
          - The activity's scope validator detected the missing
            container and threw the BusinessException before any
            provider call.

        The reference fix has TWO branches based on the Robot host's
        Excel availability:
          - **Host HAS Excel installed**: wrap the activity in a
            Use Excel File scope with the workbook path moved to
            the scope.
          - **Host has NO Excel installed**: switch the activity
            from Modern AppendRangeX to the standalone
            Append Range Workbook surface (no scope needed; uses
            raw bytes).
          - Alternative (if COM features needed): wrap in Excel
            Application Scope with the Classic Append Range
            activity.
          - NOT acceptable: blindly switching to Workbook just to
            silence the error without considering host context or
            workflow needs (the playbook's anti-pattern).

        Evidence sources (in priority order):
          1. Job logs -- the decisive Trace lines:
             (a) "Append Range: payroll rows — scope validation:
                 no enclosing Use Excel File / Excel Application
                 Scope found; this is the Modern AppendRangeX
                 surface which requires a Use Excel File container"
             (b) "Append Range: payroll rows — UiPath.Excel.
                 BusinessException: The 'Append Range' activity
                 must be placed inside a 'Use Excel File' container"
             These two together pin the failure to branch 1.
          2. Workflow source -- Main.xaml shows the
             `<uix:ExcelAppendRange>` activity at the root Sequence
             with no `<uix:UseExcelFile>` or `<uix:ExcelApplicationScope>`
             anywhere in the file.
          3. The "I refactored last week" framing from the user
             reinforces that the workflow was changed and the
             scope was likely removed.

      SCORING RUBRIC:

        1.0  Agent matched the append-range-failures playbook AND
             identified the activity-variant-mismatch branch AND
             named both viable fixes (wrap in Use Excel File +
             switch to Append Range Workbook) AND demonstrated
             EXPLICIT host-context framing in the recommendation
             — either branching the fix on Excel availability
             ("if Excel is installed on the Robot host... if not...")
             OR asking the user about the host's Excel state
             before committing to one fix. The fork must be
             load-bearing in the agent's reasoning, not a passing
             aside.
        0.9  Matched playbook + identified branch + named BOTH
             fixes (wrap in scope AND switch to Workbook) but
             mentioned the alternative as a brief / soft aside
             without explicit host-context framing. The agent
             recognized that Workbook exists as an alternative but
             didn't anchor the choice to the deployment context —
             academically thorough but didn't internalize the
             surface-choice nuance.
        0.8  Matched playbook + identified the missing scope AND
             recommended exactly ONE fix correctly (typically
             wrap-in-Use-Excel-File) with NO mention of the
             Append Range Workbook alternative anywhere in the
             response. The diagnostic chain is complete and the
             fix works for the standard case, but the agent did
             not surface the deployment-context fork at all.
             This is "complete but not nuanced" — the observed
             baseline behavior the rubric expects to be exceeded.
        0.7  Matched playbook + identified the missing scope AND
             recommended switching to Append Range Workbook as
             the PRIMARY fix without justifying the surface
             choice on host-context or workflow-feature grounds —
             i.e., switching surfaces purely to "make the error
             go away." This is the playbook's anti-pattern (the
             "switch-to-Workbook-to-silence-the-scope-error"
             pattern). At threshold; passes but signals the
             agent didn't reason about the surface trade-offs.
        0.5  Only one dimension correct: matched the playbook but
             classified the cause-branch incorrectly (sheet-not-
             found, file-lock, etc.) without supporting evidence;
             OR identified the missing-scope chain without
             matching the specific playbook.
        0.2  Agent recognized the BusinessException as a scope
             issue but never connected it to the Append Range
             surface choice.
        0.0  Recommended an unrelated fix (e.g., killing
             EXCEL.EXE, blaming a corrupt workbook); OR got
             blocked / timed out.

      Tier-distinguishing language to anchor the judge's decision:
        - 1.0 example wording from the agent: "If Excel is
          installed on the Robot host, wrap in Use Excel File.
          If the host runs unattended without Excel, switch to
          the standalone Append Range Workbook activity. Which
          deployment are you on?"
        - 0.9 example: "Wrap the activity in Use Excel File.
          Alternatively, you could switch to Append Range
          Workbook." (no fork reasoning, just a list)
        - 0.8 example: "Wrap the activity in Use Excel File."
          (no mention of Workbook at all)
        - 0.7 example: "Switch to Append Range Workbook —
          that variant doesn't need a scope." (recommended
          switching as the primary fix without justifying it)

      Be substance-focused. The decisive chain is "Modern
      AppendRangeX in workflow root → no Use Excel File scope →
      scope validator throws BusinessException." Diagnosis is
      the floor — an agent that correctly names this chain and
      recommends a working primary fix scores 0.8 (passes
      threshold). Higher tiers reward INCREASING nuance about
      the surface-choice fork:
        - 0.8 baseline: correct diagnosis + correct primary fix.
        - 0.9: also surfaces the Workbook alternative.
        - 1.0: explicitly anchors the choice to host context OR
               asks the user to clarify before committing.
      The 0.7 tier is reserved for the playbook's anti-pattern
      (recommending Workbook surface as the primary fix without
      justification) — it passes threshold barely, signaling
      that surface-switching without justification is not
      acceptable troubleshooting practice even when it
      coincidentally fixes the symptom.

      Return JSON: {"score": <float>, "rationale": "<one sentence covering both playbook and conclusion>"}
