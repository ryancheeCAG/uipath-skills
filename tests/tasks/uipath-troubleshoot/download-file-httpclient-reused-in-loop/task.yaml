task_id: skill-troubleshoot-download-file-httpclient-reused-in-loop
description: >
  UiPath troubleshooting agent must diagnose a Download File from URL failure
  inside a For Each loop: the activity's internal HTTP client is reused across
  iterations, so the first file downloads but a later iteration faults with
  "This instance has already started one or more requests. Properties can only
  be modified before sending the first request" (HttpClient InvalidOperationException).
  Success = agent matches the download-file-httpclient-reused-in-loop playbook and
  recommends the same fix as RESOLUTION.md (instantiate a fresh
  System.Net.Http.HttpClient per iteration, or force release with GC.Collect /
  GC.WaitForPendingFinalizers after the download), without fabricating host actions.
tags: [uipath-troubleshoot, e2e, mode:diagnose, lifecycle:discover, faulted-jobs, orchestrator, file-operations, rpa]

agent:
  type: claude-code
  allowed_tools: ["Bash", "Read", "Write", "Edit", "Glob", "Grep", "Skill", "Agent", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 5400
  max_turns: 60
  turn_timeout: 3600

sandbox:
  template_sources:
  - type: template_dir
    path: ../_shared/mock_template
  - type: template_dir
    path: process
  - type: template_dir
    path: fixtures
  mock_path_dirs:
  - mocks

reference:
  file: RESOLUTION.md

initial_prompt: |
  My BulkDownloader process faults in Orchestrator. The folder is "Batch
  Downloads". It loops over a list of URLs and uses Download File from URL to
  save each one. The first file downloads fine, then it dies with "This
  instance has already started one or more requests".

  I'm not on the Robot host right now and have no shell access to MOCK-ROBOT,
  only Orchestrator. Diagnose what you can from Orchestrator and the project
  source in the current working directory. If the answer needs evidence from
  the host itself, hand me the exact checks to run and stop - don't stall
  waiting on host data.

success_criteria:
  - type: skill_triggered
    description: "Agent invoked the uipath-troubleshoot skill"
    skill_name: "uipath-troubleshoot"
    expected_skill: "uipath-troubleshoot"
    weight: 1.0

  - type: llm_judge
    description: "Agent's diagnosis matches RESOLUTION.md"
    weight: 3.0
    pass_threshold: 0.7
    include_reference: true
    include_agent_output: true
    prompt: |
      Grade the agent's final answer against the attached RESOLUTION.md.

      Score on whether the agent identifies the same root cause and
      recommends the same fix as RESOLUTION.md:

        1.0  Same root cause AND same fix (or equivalent).
        0.8  Same root cause; fix is right area but vague.
        0.5  Adjacent cause, missing a key specific.
        0.2  Wrong direction; recognized surface only.
        0.0  Misdiagnosed or blocked.

      Return JSON: {"score": <float>, "rationale": "<one sentence>"}

simulation:
  enabled: true
  persona: |
    You are the UiPath user who reported the failing BulkDownloader process. It
    loops over URLs and downloads each with Download File from URL. You are away
    from the robot host and only have Orchestrator access.
  goal: |
    Let the agent complete its troubleshooting flow without imposing
    constraints. Approve every scope expansion or clarification the agent
    requests so the investigation reaches the final resolution.
  constraints:
    - "If the agent asks whether to expand investigation scope (any new product domain such as orchestrator, file-operations, activity-packages), always answer Yes - pick the recommended / first / affirmative option."
    - "If the agent asks how to proceed when data is missing, tell it to proceed with best-effort findings and to hand you the host check list at the end."
    - "If asked whether the download is inside a loop and which iteration fails, say it is in a For Each over URLs and the first one works but the next fails."
    - "Never invent or provide new factual data beyond your initial report."
    - "Keep replies short (one sentence or pick a numbered option)."
    - "Never instruct the agent to stop, abort, or skip phases."
  max_turns: 6
