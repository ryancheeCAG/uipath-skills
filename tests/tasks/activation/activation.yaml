task_id: skill-activation
description: >
  Skill activation eval: measures whether each covered UiPath skill is
  invoked iff a user prompt warrants it. ONE agent run per row; per-skill
  confusion matrices (precision / recall / F1) are computed in parallel
  from the same traces by stacking one skill_triggered criterion per skill.
  See README.md for coverage notes.
tags: [activation, classification]

dataset:
  paths:
    - uipath-agents.jsonl
    - uipath-coded-apps.jsonl
    - uipath-data-fabric.jsonl
    - uipath-troubleshoot.jsonl
    - uipath-feedback.jsonl
    - uipath-governance.jsonl
    - uipath-human-in-the-loop.jsonl
    - uipath-maestro-bpmn.jsonl
    - uipath-maestro-case.jsonl
    - uipath-maestro-flow.jsonl
    - uipath-planner.jsonl
    - uipath-platform.jsonl
    - uipath-review.jsonl
    - uipath-rpa.jsonl
    - uipath-solution.jsonl
    - uipath-tasks.jsonl
    - uipath-test.jsonl
    - negative.jsonl

initial_prompt: "${row.prompt}"

# 20 skill_triggered criteria — one per skill. Each derives expected internally
# from `expected_skill == skill_name`. Heavy class imbalance (~50 yes / ~900 no
# per skill) means recall.yes is the meaningful gate; recall.no is trivially high.
success_criteria:
  - type: skill_triggered
    description: "uipath-agents activation"
    skill_name: uipath-agents
    expected_skill: "${row.expected_skill}"
    suite_thresholds: {recall.yes: 0.70}
  - type: skill_triggered
    description: "uipath-coded-apps activation"
    skill_name: uipath-coded-apps
    expected_skill: "${row.expected_skill}"
    suite_thresholds: {recall.yes: 0.70}
  - type: skill_triggered
    description: "uipath-data-fabric activation"
