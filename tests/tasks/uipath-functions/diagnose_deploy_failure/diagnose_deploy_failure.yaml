task_id: skill-functions-diagnose-deploy-failure
description: >
  Diagnose-mode coverage for the Coded Function publish lifecycle. The
  Troubleshooting guidance documents `Project authors cannot be empty`
  as the canonical pyproject hygiene rejection on `uip functions
  publish`. This seeds a Coded Function project whose `pyproject.toml`
  is missing the `authors` entry and expects the skill to (1) diagnose
  the rejection from the error wording, (2) add a valid
  `authors = [...]` entry, and (3) successfully re-ship to the user's
  personal workspace. **Cloud auth pre-configured.**
tags: [uipath-functions, e2e, mode:diagnose, feature:deploy]
max_iterations: 1
pre_run:
  - command: "cp -r $SKILLS_REPO_PATH/tests/tasks/uipath-functions/diagnose_deploy_failure/_fixtures/daily-digest ."
    timeout: 10

initial_prompt: |
  I have a UiPath Coded Function at `daily-digest/`.
  Shipping it to the personal workspace with
  `uip functions publish --my-workspace` fails with:

      Project authors cannot be empty

  Fix what's blocking the deploy and ship it to the personal
  workspace.

  The test harness has UiPath auth pre-configured. Do NOT rewrite
  the agent — it works as-is. Complete it in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent ran uip functions init to refresh entry-points.json"
    tool_name: "Bash"
    command_pattern: 'uip\s+functions\s+init'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent published to personal workspace after fixing pyproject"
    tool_name: "Bash"
    command_pattern: 'uip\s+functions\s+publish\b'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Seeded agent code preserved (no rewrite)"
    path: "daily-digest/main.py"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "pyproject.toml now has authors, code preserved, pack artifact exists"
    command: "python3 $TASK_DIR/check_diagnose_deploy_failure.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

run_limits:
  expected_turns: 28
  max_turns: 60
  turn_timeout: 2100
  task_timeout: 2100
