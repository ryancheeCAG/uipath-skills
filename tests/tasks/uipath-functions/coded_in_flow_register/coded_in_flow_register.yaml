task_id: skill-functions-in-flow-register
description: >
  Smoke test: scaffold a UiPath solution containing a Flow project and a
  sibling Coded Function project, then confirm the function is registered and
  synced as a local resource in the solution. Two distinct steps verified:
  (1) the function PROJECT is registered in the .uipx Projects manifest —
  written either by explicit `uip solution project add` or by the
  auto-registration `uip functions init` performs in a parent solution; and
  (2) syncing resources (`uip solution resources refresh`, or a pack) mints a
  process resource file with a `resource.key` UUID under
  `resources/solution_folder/process/` and surfaces it via
  `uip solution resources list` as a Local resource.
tags: [uipath-functions, smoke, mode:build, lifecycle:generate, resource, feature:registry]

run_limits:
  expected_turns: 43
  turn_timeout: 1200
  max_turns: 100

initial_prompt: |
  Create a UiPath solution "ClaimsSol" containing a Flow project
  "ClaimsFlow" and a sibling Coded Function "ClassifierAgent" in its own
  `ClassifierAgent/` subfolder (Python, simple stub — no LLM call needed,
  just Input/Output Pydantic models). Register the function in the solution,
  then sync solution resources so it is tracked as a Local resource, and
  confirm it appears with structured CLI output:
  `uip solution resources list ... --output json`.

  Use the Coded Function framework (package: `uipath`) — NOT LangGraph,
  LlamaIndex, or OpenAI Agents. This keeps setup minimal: one lightweight
  pip install, no graph wiring needed for the stub.

  Create the `ClaimsSol/` solution at the working-directory root.

  Do NOT publish, upload, or deploy. Do NOT call `uip login`. Do NOT
  ask for approval, confirmation, or feedback. Do NOT pause between
  planning and implementation. Complete the entire task end-to-end in
  a single pass.

success_criteria:
  - type: command_executed
    description: "Agent created the solution with uip solution init"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+init'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded the Coded Function project (uip functions/codedagent new or uipath new)"
    tool_name: "Bash"
    command_pattern: '(uip\s+(functions|codedagent)\s+new\s+(?!-{1,2}help)\S+|uipath\s+new\s+(?!-{1,2}help)\S+)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent generated entry-points.json (uip functions/codedagent init or uipath init)"
    tool_name: "Bash"
    command_pattern: '(uip\s+(functions|codedagent)\s+init|uipath\s+init)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent confirmed local registration with uip solution resources list"
    tool_name: "Bash"
    command_pattern: 'uip\s+solution\s+resources\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Coded agent main.py exists"
    path: "ClaimsSol/ClassifierAgent/main.py"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Coded agent entry-points.json exists"
    path: "ClaimsSol/ClassifierAgent/entry-points.json"
    weight: 0.3
    pass_threshold: 1.0

  - type: run_command
    description: "Local resource file (resource.key) was minted during solution registration — explicit `uip solution project add` or `uip functions init` auto-registration (accepts agent/ or function/ subdirectory)"
    command: |
      python3 -c "
      import os, json, sys
      base = 'ClaimsSol/resources/solution_folder/process'
      for root, dirs, files in os.walk(base):
          for f in files:
              if f.endswith('.json'):
                  path = os.path.join(root, f)
                  try:
                      with open(path) as fp:
                          data = json.load(fp)
                      r = data.get('resource', {})
                      if r.get('kind') == 'process' and r.get('key'):
                          print('Found:', path)
                          sys.exit(0)
                  except Exception:
                      pass
      print('No process resource file with key found under', base)
      sys.exit(1)
      "
    timeout: 10
    expected_exit_code: 0
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Both projects (flow + coded agent) registered in the parent solution .uipx"
    path: "ClaimsSol/ClaimsSol.uipx"
    assertions:
      - expression: "length(Projects)"
        operator: "gte"
        expected: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "Flow file was created"
    path: "ClaimsSol/ClaimsFlow/ClaimsFlow.flow"
    weight: 1.0
    pass_threshold: 1.0
