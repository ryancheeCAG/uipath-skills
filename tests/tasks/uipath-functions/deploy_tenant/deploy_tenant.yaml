task_id: skill-functions-deploy-tenant
description: >
  Coded Function publish to the **tenant feed** with `packOptions`.
  Exercises `uip functions publish` to a tenant-level feed and forces
  the agent to keep a non-source directory (`data/`) out of the
  package via `packOptions.directoriesExcluded` in `uipath.json` — the
  documented knob for controlling package contents. **Cloud auth +
  tenant-level publish permission required** for the host running
  coder-eval.
tags: [uipath-functions, e2e, mode:build, feature:deploy]
max_iterations: 1

initial_prompt: |
  Build a UiPath Coded Function named `tenant-echo`
  that takes a `message` (string) and returns
  `{"echoed": message}`. No LLM, no SDK calls.

  Alongside the source, the project includes a `data/` directory
  with fixture JSON used during local development only — create it
  as `tenant-echo/data/fixtures.json` containing
  `{"sample": "value"}`. The `data/` directory must NOT end up in
  the published package.

  Take the function through scaffold → init → run locally, then
  publish it to the tenant feed. The host has UiPath auth
  pre-configured with permission to publish to the tenant feed.

  Do NOT publish to the personal workspace or to a folder feed.
  Complete it in a single pass.

success_criteria:
  - type: command_executed
    description: "Agent scaffolded the project"
    tool_name: "Bash"
    command_pattern: 'uip\s+functions\s+new'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip functions init"
    tool_name: "Bash"
    command_pattern: 'uip\s+functions\s+init'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent published to the tenant feed"
    tool_name: "Bash"
    command_pattern: 'uip\s+functions\s+publish\b'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: file_exists
    description: "Coded Function project exists"
    path: "tenant-echo/pyproject.toml"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "pyproject.toml + packOptions excludes data/ + .nupkg artifact present"
    command: "python3 $TASK_DIR/check_deploy_tenant.py"
    timeout: 30
    expected_exit_code: 0
    weight: 4.0
    pass_threshold: 1.0

run_limits:
  expected_turns: 50
  max_turns: 60
  turn_timeout: 1500
  task_timeout: 1500
