task_id: skill-functions-python-e2e-lifecycle
description: >
  Python Coded Function e2e lifecycle via the `uip functions` CLI. A naturally-phrased
  validation request — no mention of LLM, AI, or frameworks — must be recognised as
  a Python Coded Function and routed to the `uipath-functions` skill. Verifies the
  agent passes `-l py` to `uip functions new`, runs `uip functions init`, produces
  a correct typed I/O schema (pydantic/dataclass), includes SDK tracing, registers
  the entrypoint in `uipath.json`'s `functions` map, contains no LLM imports, and
  runs the function locally with `uip functions run`.
tags: [uipath-functions, e2e, mode:build, lifecycle:generate]

run_limits:
  expected_turns: 31
  turn_timeout: 1200

initial_prompt: |
  I need a UiPath Python Coded Function named `invoice-validator` that checks
  whether invoice data is complete and well-formed.

  It takes `invoice_number` (str), `vendor_name` (str), `total_amount` (float),
  and `currency` (str). Return `is_valid` (bool), `validation_errors` (list of
  strings), and `normalized_currency` (the currency code uppercased).
  Use this hardcoded list of accepted currencies: ["USD", "EUR", "GBP", "JPY", "CHF", "AUD", "CAD"].
  Validate the currency field against this list. Make execution observable through UiPath tracing.

  Run it with:
  `'{"invoice_number": "INV-001", "vendor_name": "Acme Corp", "total_amount": 1500.0, "currency": "usd"}'`
  and write `RAN_OK` to `run_marker.txt` after success. Do NOT deploy.

success_criteria:
  - type: skill_triggered
    description: "Agent recognised the prompt as a Python Coded Function and invoked the uipath-functions skill"
    skill_name: "uipath-functions"
    expected_skill: "uipath-functions"
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scaffolded a Python Functions project with uip functions new -l py"
    tool_name: "Bash"
    command_pattern: 'uip\s+functions\s+new\s+.*(-l\s+(py|python)|--language\s+(py|python))'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran uip functions init to generate entry-points.json (Python-only command)"
    tool_name: "Bash"
    command_pattern: 'uip\s+functions\s+init'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran the function locally with uip functions run"
    tool_name: "Bash"
    command_pattern: 'uip\s+functions\s+run'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Correct typed I/O schema, uipath.json functions entrypoint, no LLM imports, init ran, SDK tracing present"
    command: "python3 $TASK_DIR/check_e2e_lifecycle.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
