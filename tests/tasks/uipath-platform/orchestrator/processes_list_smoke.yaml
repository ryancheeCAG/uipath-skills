task_id: skill-platform-orchestrator-processes-list
description: >
  Smoke test: agent uses the uipath-platform skill to list published processes
  (releases) in an Orchestrator folder via `uip or processes list
  --folder-(key|path) ...`. Prompt passes a placeholder folder key — CLI
  returning Auth/404 is acceptable; the goal is correct command shape, not
  tenant state.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

run_limits:
  expected_turns: 6

initial_prompt: |
  List the processes published in the `Finance/Accounting` folder of the
  current UiPath tenant. Use that folder path directly when calling the CLI;
  do not spend time discovering or validating the folder first.

  Note: the folder may not exist on this tenant. We're checking that the
  CLI invocation has the right shape — an auth/404 response is acceptable.
  Don't bother enumerating folders first; just run `processes list` against
  `Finance/Accounting` and report what came back.

success_criteria:
  - type: command_executed
    description: "Agent listed processes via uip or processes list"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+processes\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scoped the list to a folder via --folder-key or --folder-path"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+processes\s+list.*--folder-(key|path)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
