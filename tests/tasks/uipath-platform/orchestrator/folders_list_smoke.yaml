task_id: skill-platform-orchestrator-folders-list
description: >
  Smoke test: agent uses the uipath-platform skill to discover Orchestrator
  folders in the current tenant via `uip or folders list --output json`.
  Auth errors or empty results are acceptable outcomes — the goal is correct
  command shape, not tenant state.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

sandbox: {}

initial_prompt: |
  List all Orchestrator folders available in the current UiPath tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed folders via uip or folders list"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+folders\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on the folders list call"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+folders\s+list.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

