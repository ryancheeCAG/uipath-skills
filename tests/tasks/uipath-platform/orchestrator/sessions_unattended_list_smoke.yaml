task_id: skill-platform-orchestrator-sessions-unattended-list
description: >
  Smoke test: agent uses the uipath-platform skill to list unattended robot
  sessions in the tenant via `uip or sessions unattended list --output json`.
  Auth errors or empty results are acceptable outcomes — the goal is correct
  command shape, not tenant state.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  List the unattended robot sessions available in the current UiPath tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed unattended sessions via uip or sessions unattended list"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+sessions\s+unattended\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

