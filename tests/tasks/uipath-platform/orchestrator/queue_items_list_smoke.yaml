task_id: skill-platform-orchestrator-queue-items-list
description: >
  Smoke test: agent uses the uipath-platform skill to list queue items in an
  Orchestrator folder via `uip or queue-items list --folder-(key|path)
  ...`. Prompt passes a placeholder folder key — CLI returning Auth/404 is
  acceptable; the goal is correct command shape, not tenant state.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

run_limits:
  expected_turns: 6

initial_prompt: |
  List the queue items in the Orchestrator folder with key
  `11111111-2222-3333-4444-555566667777` in the current UiPath tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed queue items via uip or queue-items list"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+queue-items\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scoped the list to a folder via --folder-key or --folder-path"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+queue-items\s+list.*--folder-(key|path)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

