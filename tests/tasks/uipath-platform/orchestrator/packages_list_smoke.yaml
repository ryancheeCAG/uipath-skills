task_id: skill-platform-orchestrator-packages-list
description: >
  Smoke test: agent uses the uipath-platform skill to list packages uploaded to
  the tenant's Orchestrator feed via `uip or packages list --output json`.
  Auth errors or empty results are acceptable outcomes — the goal is correct
  command shape, not tenant state.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  List the Orchestrator packages available in the current UiPath tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed packages via uip or packages list"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+packages\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

