task_id: skill-platform-licensing-consumables-summary
description: >
  Smoke test: agent uses the uipath-platform skill to fetch a consumables
  summary report (default mode). Verifies the agent calls `uip platform
  licenses consumables get --output json` (summary is the default `--mode`,
  so the flag is optional). CLI auth failure is expected offline.
tags: [uipath-platform, smoke, licensing, consumables]

initial_prompt: |
  Give me a summary of license consumption for this account.

  Important:
  - The `uip` CLI is available but is NOT connected to a live tenant in this
    environment. Commands may fail with auth errors — that is expected.
  - Use `--output json` on every uip command.

success_criteria:
  - type: command_executed
    description: "Agent ran `uip platform licenses consumables get` for a summary report (summary is the default --mode)"
    tool_name: "Bash"
    command_pattern: 'uip\s+platform\s+licenses\s+consumables\s+get(?!.*--mode\s+(?:daily|folders))'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: skill_triggered
    description: "Agent invoked the uipath-platform skill"
    skill_name: "uipath-platform"
    expected_skill: "uipath-platform"
    weight: 1.0
