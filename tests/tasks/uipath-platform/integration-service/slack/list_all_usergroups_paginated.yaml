task_id: skill-ipe-slack-list-all-usergroups-paginated
description: >
  Paginated reference-lookup test on the Slack connector — exercises the "List All User Groups"
  activity with structural and CLI-pattern validation.
tags: [uipath-platform, integration, lifecycle:generate, shape:multi-node, connector, uipath-salesforce-slack, ipe]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  task_timeout: 1500
  max_turns: 120
  turn_timeout: 1200

initial_prompt: |
    Use the `uipath-maestro-flow` skill to build this flow.

    Create a new Flow project called "SlackListAllUsergroupsPaginatedTest" with a manual trigger.
    The flow must:

    1. Use the Slack "List All User Groups" activity with a small page size (e.g. limit=2)
       so pagination is forced — invoke `uip is resources run list` (or the equivalent
       activities run) MORE THAN ONCE with the next-page cursor.
       Pick any user group returned on a page AFTER the first page.
       Wire the resolved group id into a downstream Script node that logs the group name.
       Use connection name 'is-sandboxes' for the Slack node.
    2. Add a Decision node to check whether the list call succeeded.
    3. Route failure to a Terminate node with error message "SlackListAllUsergroupsPaginatedTest test failed".
    4. Route success to a final action that logs "SlackListAllUsergroupsPaginatedTest test passed".
    5. Validate the final flow with `uip maestro flow validate`.

    Auth failures and connection errors are expected in sandbox — build the
    structure and wiring correctly; do not attempt a live debug run.

    Confirm the connector key is registered before adding nodes:
      uip maestro flow registry search "slack"

    Test connections for this task live in Orchestrator folder "uipath-maestro-flow".
    Resolve its key with `uip or folders list --all -o json` (look for Name
    "uipath-maestro-flow") and pass `--folder-key <key>` on every
    `uip is connections list` call.

    If a required Slack connector operation is not present in the registry,
    use a managed HTTP fallback for the equivalent REST call and finish after
    validation. Do not keep searching for a connector node that the registry
    does not expose.

success_criteria:
  - type: run_command
    description: "Tenant has at least one Slack connection"
    command: "python3 $TASK_DIR/check_connection_available.py uipath-salesforce-slack"
    timeout: 35
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow structure: List All User Groups node present, required fields wired, Decision + Terminate"
    command: "python3 $TASK_DIR/check_list_all_usergroups_paginated.py"
    timeout: 30
    expected_exit_code: 0
    weight: 10.0
    pass_threshold: 1.0
  - type: command_executed
    description: "Agent paginated through Slack results (≥2 list invocations)"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+is\\s+(resources|activities)\\s+run\\s+\\S+"
    min_count: 2
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "uip maestro flow validate was called"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+(maestro\\s+)?flow\\s+validate"
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0
