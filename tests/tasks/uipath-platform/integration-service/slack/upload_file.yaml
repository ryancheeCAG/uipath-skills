task_id: skill-ipe-slack-upload-file
description: >
  Multipart upload test on the Slack connector — wires the "Send File to
  Channel" activity with a small text file and a Decision + Terminate
  failure-routing pair.
tags: [uipath-platform, integration, lifecycle:generate, shape:multi-node, connector, uipath-salesforce-slack, ipe]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  task_timeout: 1500
  max_turns: 120
  turn_timeout: 1200

initial_prompt: |
  Use the `uipath-maestro-flow` skill to build this flow.

  Create a new Flow project called "SlackUploadFileTest" with a manual trigger.
  The flow must:

  1. Upload a small text file (filename "eval-upload.txt", contents
     "uploaded from the Slack eval") into the Slack channel named
     "coding-agent-testing" via Slack's "Send File to Channel" activity.
     Send as `user`. Use connection name 'is-sandboxes' for the Slack node.
  2. Add a Decision node to check whether the upload succeeded.
  3. Route failure to a Terminate node with error message
     "SlackUploadFileTest test failed".
  4. Route success to a final action that logs "SlackUploadFileTest test passed".
  5. Validate the final flow with `uip maestro flow validate`.

  Auth failures and connection errors are expected in sandbox — build the
  structure and wiring correctly; do not attempt a live debug run.

  Confirm the connector key is registered before adding nodes:
    uip maestro flow registry search "slack"

  Test connections for this task live in Orchestrator folder "uipath-maestro-flow".
  Resolve its key with `uip or folders list --all -o json` (look for Name
  "uipath-maestro-flow") and pass `--folder-key <key>` on every
  `uip is connections list` call.

  If the connector node is not present in the registry, use a managed HTTP
  fallback for the equivalent REST call (multipart upload to files.upload /
  files.uploadV2) and finish after validation. Do not keep searching for a
  connector node that the registry does not expose.

success_criteria:
  - type: run_command
    description: "Tenant has at least one Slack connection"
    command: "python3 $TASK_DIR/check_connection_available.py uipath-salesforce-slack"
    timeout: 35
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow structure: Slack upload-file node present, channel + filename wired, Decision + Terminate"
    command: "python3 $TASK_DIR/check_upload_file.py"
    timeout: 30
    expected_exit_code: 0
    weight: 10.0
    pass_threshold: 1.0

  - type: command_executed
    description: "uip maestro flow validate was called"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+(maestro\\s+)?flow\\s+validate"
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0
