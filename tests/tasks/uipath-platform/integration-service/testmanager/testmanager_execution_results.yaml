  - type: command_executed
    description: "Get Robot Logs (`... run list uipath-uipath-testmanager GetRobotLogs`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+run\s+\S+\s+["\x27]?uipath-uipath-testmanager["\x27]?\s+["\x27]?GetRobotLogs'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Get Assertions (`... run list uipath-uipath-testmanager GetAssertions`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+resources\s+run\s+\S+\s+["\x27]?uipath-uipath-testmanager["\x27]?\s+["\x27]?GetAssertions'
    min_count: 1
    weight: 1.0
