task_id: skill-datafabric-smoke-bulk-import
description: >
  Smoke test: agent uses the uipath-platform skill to bulk-import records
  from a CSV file. Tests that the skill teaches correct CSV format: header row
  must match exact entity field names (case-sensitive), system fields must be
  excluded, and records import --file is the correct command (not records insert).
tags: [uipath-platform, data-fabric, smoke, records, import, mode:build, lifecycle:setup]
run_limits:
  expected_turns: 10
  max_turns: 30

initial_prompt: |
  We already have a Products UiPath Data Fabric entity. Each row holds a ProductName, a
  UnitPrice, and an InStock flag.

  Could you load these three into it from a spreadsheet:
    - Product A — $9.99, in stock
    - Product B — $24.50, not in stock
    - Product C — $4.99, in stock

  Save the spreadsheet as `products.csv` and load it into Products.

  Important:
  - The `uip` CLI is available but not connected to a live tenant. Commands
    will fail — that is expected. Run each command exactly once regardless
    of errors. Do NOT retry, do NOT attempt to login, do NOT install tools,
    do NOT troubleshoot.

success_criteria:
  - type: command_executed
    description: "Agent retrieved entity schema with entities get before creating CSV (soft — schema is given inline in the prompt, so this is informational only)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+get\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 0.0

  - type: command_executed
    description: "Agent ran records import with --file flag"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+import\s+.*--file'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: file_exists
    description: "products.csv was created"
    path: "products.csv"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "CSV uses correct case-sensitive field names as headers"
    path: "products.csv"
    includes:
      - "ProductName"
      - "UnitPrice"
      - "InStock"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_check
    description: "CSV does not include system fields (Id, CreatedBy, CreateTime, UpdatedBy, UpdateTime)"
    path: "products.csv"
    excludes:
      - "CreatedBy"
      - "CreateTime"
      - "UpdatedBy"
      - "UpdateTime"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT delete any entity — the list stays intact even if columns or rows are dropped"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+delete'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0
  - type: command_executed
    description: "Agent must NOT silently drop columns via removeFields — irreversible on CHOICE_SET / RELATIONSHIP fields (loses all values)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*removeFields'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0
