task_id: skill-datafabric-integration-large-pagination
description: >
  Integration test: agent paginates through a pre-seeded 500-record entity —
  cursor walk (limit=60 → 9 pages, 500 unique IDs), offset jump to a specific
  page (matches the cursor-walked slice), and filterGroup walk on Active=true
  (5 pages, 300 IDs). Brownfield: pre_run seeds the 500 records once via
  `seed_entity.py` and post_run leaves them in place. Focuses on pagination
  correctness at scale; bulk-import coverage lives in integration_csv_import
  and smoke_bulk_import.
tags: [uipath-platform, data-fabric, integration, bulk-pagination, mode:operate, lifecycle:discover]
run_limits:
  expected_turns: 30
  max_turns: 50
  turn_timeout: 900

pre_run:
  # 1. Stage helper scripts the agent uses for pagination assertions.
  - command: "cp $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/extract_page_ids.py $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/verify_pagination.py ."
    timeout: 10
    fail_on_error: true

  # 2. Brownfield seed: ensure CE_LargePaginationTest exists with the right
  #    schema AND 500 canonical records. seed_entity.py is idempotent — if
  #    the count already matches, it's a no-op.
  - command: >-
      python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seed_entity.py
      --entity-name CE_LargePaginationTest
      --schema-file $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seeds/large_pagination.schema.json
      --records-file $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/seeds/large_pagination.records.json
    timeout: 300
    fail_on_error: false

initial_prompt: |
  There's an existing list `CE_LargePaginationTest` with 500 rows already in
  it. Each row has a `Name` (Record-001 through Record-500), a `Score` (the
  row number, 1-500), and an `Active` flag (yes for rows 1-300, no for
  rows 301-500). I'd like you to paginate through it three different ways.

  Two helpers are in the working directory — use them as-is:
    - `./extract_page_ids.py --out <file> --append` — pipe each page's
      output through this; it appends IDs to `<file>`.
    - `./verify_pagination.py --mode {walk|offset|count} …` — checks a
      captured IDs file (walk / count) or compares against a slice
      (offset).

  Three walks:

  1) Walk all 500 rows, 60 per page. EACH page is its own separate
     command (no in-process loop). Pipe every page through
     `./extract_page_ids.py --out walk_ids.txt --append`. Expect 9 pages
     and 500 unique IDs. Verify:
        ./verify_pagination.py --mode walk --file walk_ids.txt --count 500

  2) Jump straight to rows 181-240 — page size 60, start position 180. One
     page only, no walking. Save to `offset_page_ids.txt`. Verify:
        ./verify_pagination.py --mode offset --file offset_page_ids.txt \
          --against walk_ids.txt --start 180 --stop 240
     Never combine a position jump with paging on the same command.

  3) Walk only Active=yes rows, 60 per page, into `active_ids.txt`. Expect
     5 pages and 300 IDs. Verify:
        ./verify_pagination.py --mode count --file active_ids.txt --count 300

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent paginated through all records with records list --limit (at least 9 calls to walk the 500 rows in pages of 60)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(list|query)\s+.*--limit'
    min_count: 9
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent jumped to a page using -o/--offset on records list"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+list\s+.*(-o\s+\d+|--offset\s+\d+)'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT combine --offset and --cursor on the same command"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(list|query)(?=[^\n]*--cursor)(?=[^\n]*(-o\s+\d+|--offset\s+\d+))'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried Active=true records with filterGroup"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT delete any entity — the list stays intact across runs (brownfield)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+delete'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT silently drop columns via removeFields — irreversible on CHOICE_SET / RELATIONSHIP fields (loses all values)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*removeFields'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT mutate the seed — no records insert / update / delete / import against the brownfield entity"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(insert|update|delete|import)'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0
