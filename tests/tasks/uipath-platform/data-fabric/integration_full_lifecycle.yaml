task_id: skill-datafabric-integration-full-lifecycle
description: >
  Integration (brownfield): create-or-reuse CE_LifecycleTest, add a long-
  text column, tighten Score constraint via updateFields, rename entity
  metadata, insert / query / update / verify / delete records in one run.
  Exercises schema management + field/entity-level updates + record CRUD.
  Entity delete is intentionally not exercised (Rule 10 workflow lives
  elsewhere).
tags:
  [
    uipath-platform,
    data-fabric,
    integration,
    entities,
    records,
    mode:build,
    lifecycle:setup,
  ]
run_limits:
  expected_turns: 35
  turn_timeout: 600

initial_prompt: |
  I need a fresh `CE_LifecycleTest` UiPath Data Fabric entity built out. Create it with:
    - Label — short text, up to 200 chars
    - Score — whole number, 0 to 1000
    - Active — yes/no

  Once it's there:
    - Read its settings back and show me the Score column's min and
      max — that tells me they saved.
    - Add a long-text column (up to 2000 chars) for freeform notes.
      Pick any column name you like.
    - Tighten Score: rename it "Test Score", make it required, and
      drop the max to 500.
    - Rename the list itself to "Lifecycle Test Entity" and set a
      description. Read it back and confirm both stuck.

  Then:
    - Add row "alpha" with score 10 and Active = yes.
    - Add row "beta" with score 5 and Active = no.
    - Pull rows where Active is yes — at least one should come back.
    - Update alpha's score to 99. Read alpha back to confirm.
    - Delete both rows. Leave the list itself in place.

success_criteria:
  - type: command_executed
    description: "Agent verified login status before any operation"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed native-only entities"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+list\s+.*--native-only'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent retrieved entity schema with entities get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+get\s+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran entities update for both addFields and updateFields"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+update'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inserted records"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+insert'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried records with a filter body"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated a record"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified the update with records get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+get'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent deleted the test records"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+delete'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used the `fieldName` key when defining a field (entity create or update addFields)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+(create|update).*fieldName'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used addFields key in entities update body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*addFields'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used filterGroup key in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied lengthLimit on a field (via entities create or addFields on update)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+(create|update).*lengthLimit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied minValue/maxValue on a numeric field (via entities create or update)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+(create|update).*(minValue|maxValue)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent tightened a numeric constraint via updateFields"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*updateFields.*(minValue|maxValue)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent edited entity-level metadata (top-level displayName + description, not addFields/updateFields)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update(?!.*addFields)(?!.*updateFields)(?:.*displayName.*description|.*description.*displayName)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent renamed the entity's displayName to the exact string 'Lifecycle Test Entity' per the prompt"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update[\s\S]*?\\?\"displayName\\?\"\s*:\s*\\?\"Lifecycle Test Entity\\?\"'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT use removeFields (not supported)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*removeFields'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT delete the CE_LifecycleTest entity (entity delete coming in a follow-up PR with proper confirm semantics)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+delete'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

pre_run:
  # Ensure the entity is FRESH each run — greenfield pattern. If the entity
  # persists across runs, an already-configured schema causes the agent to
  # skip the modification section (thinking it's already in the target state).
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_LifecycleTest"
    timeout: 60
    fail_on_error: false

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_LifecycleTest"
    timeout: 60
