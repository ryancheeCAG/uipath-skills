task_id: skill-datafabric-smoke-records
description: >
  Smoke test: agent uses the uipath-platform skill to manage records offline
  — single insert (JSON object), batch insert (2+ element JSON array routes to
  batch endpoint), filterGroup query, pagination via --limit/--cursor and the
  new -o/--offset jump (mutually exclusive with --cursor), records get by ID,
  single update (Id required), batch update (Id required in every element),
  and records delete. Tests the full records command surface and the
  array-body routing rule in a single pass.
tags: [uipath-platform, data-fabric, smoke, records, mode:build, lifecycle:setup]
run_limits:
  expected_turns: 15
  max_turns: 50

initial_prompt: |
  We already have a Tasks list. Each task has a title, a priority
  number, and a done flag.

  Could you help me with this:

    - Add one new task: "Write tests", priority 1, not done. Call it
      the first row — we'll come back to it.

    - Add two more in a single shot: "Review PR" (priority 2) and
      "Deploy" (priority 3), both not done.

    - Pull the first row back up so I can see it.

    - Show me everything that's not done, in batches of 50, and skip
      the first 100 rows.

    - Show me the first page of everything, 10 to a page.

    - Give me the next page of that same list.

    - Jump straight to whatever page holds row number 200, still 10
      to a page.

    - Mark the first row done.

    - Mark the other two done in one shot.

    - Delete the first row.

  Important:
  - The `uip` CLI is available but not connected to a live tenant. Commands
    will fail — that is expected. Run each command exactly once regardless
    of errors. Do NOT retry, do NOT attempt to login, do NOT install tools,
    do NOT troubleshoot.

success_criteria:
  - type: command_executed
    description: "Agent used single insert (object body) and batch insert (array body)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+insert'
    min_count: 2
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used array body for batch insert (routes to batch endpoint)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+insert.*\['
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent retrieved a record by ID with records get"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+get\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used filterGroup in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed records with --limit (cursor pagination)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(list|query)\s+.*--limit'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent paged forward via --cursor or --offset (either satisfies smoke; integration_large_pagination tests cursor specifically)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+list\s+.*(--cursor|--offset|-o\s+\d+)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent jumped to a page using -o/--offset on records list"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+list\s+.*(-o\s+\d+|--offset\s+\d+)'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --offset on records query"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query\s+.*(-o\s+\d+|--offset\s+\d+)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT combine --offset and --cursor on the same command"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(list|query)(?=[^\n]*--cursor)(?=[^\n]*(-o\s+\d+|--offset\s+\d+))'
    min_count: 0
    max_count: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT put pagination keys inside the --body JSON"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*--body.*\"(start|offset|pageSize|limit)\"\s*:'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included Id key in records update body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+update.*\"Id\"'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated records (single and batch)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent deleted a record with records delete"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+delete'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json at least once (informational; agent may operate on human-readable output when not parsing)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 1
    weight: 0.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT delete any entity — the list stays intact even if columns or rows are dropped"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+delete'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0
  - type: command_executed
    description: "Agent must NOT silently drop columns via removeFields — irreversible on CHOICE_SET / RELATIONSHIP fields (loses all values)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*removeFields'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0
