task_id: skill-datafabric-smoke-negative-guards
description: >
  Smoke test: agent is presented with three requests — two that the
  uipath-platform skill (Data Fabric)'s Not Supported table prohibits (changing a field's
  data type, writing records to a federated entity) and one that IS supported
  (uploading a file to a FILE field via `uip df files upload` — the canonical
  write path per SKILL.md Rule 6). The agent must refuse the two unsupported
  ops citing the Not Supported table, and attempt the supported one. Tests
  that the agent reads SKILL.md carefully enough to distinguish the
  prohibited record-level FILE writes (`records insert` / `records update` /
  `records import`) from the supported `files upload` verb.
tags: [uipath-platform, smoke, data-fabric, entities, records]

run_limits:
  expected_turns: 4
  max_turns: 30

initial_prompt: |
  You have three tasks. For each one, determine whether it is supported by the
  uipath-platform skill (Data Fabric) and either execute it or explain clearly why it
  cannot be done.

  Task 1: The "Orders" entity (ID "ord-111-ent") has a field "Amount" currently
  typed as STRING. Change its data type to DECIMAL so it can hold numeric
  values for aggregation.

  Task 2: The "Invoices" entity (ID "inv-222-ent") has a FILE field named
  "Attachment". Upload the local file /tmp/sample-invoice.pdf into that field
  on record "rec-555" using `uip df files upload`.

  Task 3: Insert a record into the "SalesforceContacts" entity (ID "sf-333-ent").
  This entity's Source is "Federated (Salesforce)".

  Save a summary to report.json:
  {
    "task_1_action": "<'refused' or 'attempted'>",
    "task_1_reason": "<explanation given>",
    "task_2_action": "<'refused' or 'attempted'>",
    "task_2_reason": "<explanation given>",
    "task_3_action": "<'refused' or 'attempted'>",
    "task_3_reason": "<explanation given>"
  }

  Important:
  - Do NOT attempt any operation that the skill says is not supported.
  - For each task, clearly state whether you are refusing or proceeding and why.

success_criteria:
  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused field type change (task 1)"
    path: "report.json"
    assertions:
      - expression: "task_1_action"
        operator: equals
        expected: "refused"
    weight: 3.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent attempted FILE field upload via uip df files upload (supported path — task 2)"
    path: "report.json"
    assertions:
      - expression: "task_2_action"
        operator: equals
        expected: "attempted"
    weight: 3.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused write to federated entity (task 3)"
    path: "report.json"
    assertions:
      - expression: "task_3_action"
        operator: equals
        expected: "refused"
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Reasons reference skill constraints (cites the Not Supported table or federated / read-only)"
    path: "report.json"
    includes:
      - "Not Supported"
    weight: 1.5
    pass_threshold: 1.0
