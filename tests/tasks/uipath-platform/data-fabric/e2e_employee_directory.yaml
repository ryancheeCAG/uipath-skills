task_id: skill-datafabric-e2e-employee-directory
description: >
  E2E: build CE_EmployeeDirectory from scratch with STRING lengthLimit +
  DECIMAL constraints + DATE, bulk-import 20 employees via generated CSV
  (4 departments, 5 each), evolve schema with addFields + PerformanceScore
  constraints, batch-update scores on 6 employees, then run top-performers
  and per-department headcount queries.
tags: [uipath-platform, data-fabric, e2e, employee-directory, mode:build, lifecycle:setup]

run_limits:
  expected_turns: 40
  max_turns: 50
  turn_timeout: 1200

initial_prompt: |
  HR needs a digital employee directory in UiPath Data Fabric.

  Make a list called `CE_EmployeeDirectory` with these fields:
    - Full name — required, no longer than 200 characters
    - Department — required, no longer than 50 characters (one of:
      Engineering, Sales, Finance, HR)
    - Job title — no longer than 100 characters
    - Hire date — just the date, no time of day
    - Salary — required, in dollars, two decimal places, between
      $0 and $1,000,000

  Then bulk-load 20 employees from a CSV file you generate
  (`employees.csv`):
    - 5 per department
    - Realistic names and job titles (Software Engineer, Account
      Executive, etc.)
    - Hire dates spread across 2020 to 2024
    - Salaries in the $45k–$120k range

  After the import, add one more field — a performance score (0 to
  100) — and set scores between 70 and 98 on 6 employees spanning
  all four departments.

  Then two quick queries for me:
    1. Top performers (score above 85), highest first.
    2. Headcount per department — one query per department.

success_criteria:
  - type: command_executed
    description: "Agent created the entity"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+create'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent bulk-loaded employees — CSV via records import, JSON array via records insert --body '[...]', or JSON via records insert --file"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+(?:import|insert[\s\S]*?(?:--file\s+\S+|--body\s+[\''"]?\[))'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added PerformanceScore field after initial import"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+update'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated employee records with performance scores"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried employees with filterGroup"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used fieldName key in entity create body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*fieldName'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used addFields key when evolving schema"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*addFields'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied lengthLimit on STRING fields"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*lengthLimit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied decimalPrecision on Salary"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*decimalPrecision'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent applied minValue / maxValue on a numeric field (Salary on create or PerformanceScore on addFields)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+(create|update).*(minValue|maxValue)'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0


  - type: command_executed
    description: "Agent used filterGroup key in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included Id key in records update body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+update.*\"Id\"'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: "employees.csv was generated"
    path: "employees.csv"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "employees.csv has 20 data rows (header + 20)"
    command: "awk 'END { exit (NR == 21 ? 0 : 1) }' employees.csv"
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "End state (deterministic): all 20 employee records landed in CE_EmployeeDirectory"
    command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/assert_record_count.py --entity-name CE_EmployeeDirectory --expected 20"
    timeout: 60
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: llm_judge
    description: "Agent reported correct query results — top performers sorted descending by score, and per-department headcount adds up to 20 across 4 departments"
    include_agent_output: true
    prompt: |
      The agent seeded 20 employees (5 per department across Engineering,
      Sales, Finance, HR), then set PerformanceScore on 6 employees
      (scores between 70 and 98). Two queries were asked:

        Q1. Top performers (score > 85), highest first. Some subset of
            the 6 scored employees should come back, sorted descending.
        Q2. Headcount per department — one query per department. Each
            department has 5 employees so the four counts should be
            5 + 5 + 5 + 5 = 20 total.

      Read the agent's final response. Score 1.0 if BOTH queries were
      reported with plausible results (Q1: descending-by-score order,
      Q2: 5-per-department or a total of 20 across the four).
      Score 0.5 if 1 of 2 is clearly reported.
      Score 0.0 if the queries are skipped or the reported numbers
      contradict the seed (e.g., "3 in Engineering" when we seeded 5).
    weight: 2.5
    pass_threshold: 0.5

  - type: command_executed
    description: "Agent must NOT delete any entity — the list stays intact even if columns or rows are dropped"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+delete'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0
  - type: command_executed
    description: "Agent must NOT silently drop columns via removeFields — irreversible on CHOICE_SET / RELATIONSHIP fields (loses all values)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+update.*removeFields'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

pre_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_EmployeeDirectory"
    timeout: 60
    fail_on_error: false

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/data-fabric/_shared/cleanup_entities_by_name.py --name-prefix CE_EmployeeDirectory"
    timeout: 60
