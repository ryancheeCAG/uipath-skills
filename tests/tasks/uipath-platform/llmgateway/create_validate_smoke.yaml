task_id: skill-platform-llmgateway-create-validate
description: >
  Smoke test: agent uses the uipath-platform skill to walk the BYO LLM Typical
  Flow end-to-end — discovery, IS connection lookup, folder lookup, then a
  `byo-connections create` invocation. Verifies the agent constructs the right
  CLI shape (single-mapping for AnyModelWithOwnAdditions) and runs prerequisite
  discovery before the create. Auth errors are expected in CI.
tags: [uipath-platform, smoke, llmgateway, byo-connections, lifecycle:create]

run_limits:
  expected_turns: 14

initial_prompt: |
  Before starting, load the uipath-platform skill and follow its workflow.

  I want to register my own OpenAI key for the `agenthub-llm-call` feature
  (product=agenthub). I want the model gpt-4o-2024-08-06 mapped onto my own
  OpenAI connection, using the OpenAI Responses api-flavor.

  Walk the Typical Flow:

  1. Identify the feature shape — run list-product-configs filtered to
     product=agenthub feature=agenthub-llm-call so we know whether we need
     single-mapping or multi-mapping form.
  2. List Integration Service connections so we can find a connection-id.
  3. List Orchestrator folders so we can pick a folder-key (skip any folder
     whose Type is Personal).
  4. Construct and run the `byo-connections create` command with:
       --product agenthub
       --feature agenthub-llm-call
       --connector-type OpenAi
       --api-flavor OpenAiResponses
       --llm-name gpt-4o-2024-08-06
     Use placeholder UUIDs for --folder-key and --connection-id if the
     previous list commands returned nothing.

  Important:
  - The `uip` CLI is available but is NOT connected to a live tenant in this
    environment. Commands WILL fail with auth errors — that is expected.
    You MUST still run every command listed above (steps 1–4). Do NOT skip
    a command just because a previous one failed. Do NOT retry or attempt
    to login.
  - Use `--output json` on every uip command.
  - Do NOT prompt me for missing values mid-flow — use placeholders and
    keep going. The goal is to verify the CLI shape, not real data.

success_criteria:
  - type: command_executed
    description: "Agent discovered feature shape via list-product-configs"
    tool_name: "Bash"
    command_pattern: 'uip\s+llm-configuration\s+byo-connections\s+list-product-configs.*--product\s+agenthub.*--feature\s+agenthub-llm-call'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed Integration Service connections"
    tool_name: "Bash"
    command_pattern: 'uip\s+is\s+connections\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed Orchestrator folders for folder-key discovery"
    tool_name: "Bash"
    command_pattern: 'uip\s+or\s+folders\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent invoked byo-connections create with the required flags"
    tool_name: "Bash"
    command_pattern: 'uip\s+llm-configuration\s+byo-connections\s+create.*--product\s+agenthub.*--feature\s+agenthub-llm-call.*--connector-type\s+OpenAi.*--api-flavor\s+OpenAiResponses.*--llm-name\s+gpt-4o-2024-08-06'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on the create call"
    tool_name: "Bash"
    command_pattern: 'uip\s+llm-configuration\s+byo-connections\s+create.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
