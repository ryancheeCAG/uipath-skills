task_id: skill-platform-resources-assets-list
description: >
  Smoke test: agent uses the uipath-platform skill to list Orchestrator assets
  in a folder via `uip resource assets list --folder-(key|path) ...`. Prompt
  passes a placeholder folder key — CLI returning Auth/404 is acceptable; the
  goal is correct command shape, not tenant state.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

sandbox: {}

initial_prompt: |
  List the assets defined in the `Shared` folder of the current UiPath
  tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed assets via uip resource assets list"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scoped the list to a folder via --folder-key or --folder-path"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+assets\s+list.*--folder-(key|path)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

