task_id: skill-platform-resources-queues-list
description: >
  Smoke test: agent uses the uipath-platform skill to list Orchestrator queues
  in a folder via `uip resource queues list --folder-(key|path) ...`. Prompt
  passes a placeholder folder key — CLI returning Auth/404 is acceptable; the
  goal is correct command shape, not tenant state.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

sandbox:
  driver: docker
  python: {}

initial_prompt: |
  List the queues defined in the Orchestrator folder with key
  `11111111-2222-3333-4444-555566667777` in the current UiPath tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed queues via uip resource queues list"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+queues\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scoped the list to a folder via --folder-key or --folder-path"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+queues\s+list.*--folder-(key|path)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

