task_id: skill-platform-asset-scoping-e2e
description: >
  E2E: agent leaves the tenant with an asset created in folder A, never
  shared elsewhere — proves folder scoping by absence in folder B's listing.
tags: [uipath-platform, e2e, mode:operate, lifecycle:setup]

agent:
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

pre_run:
  - command: "E2E_PROCESS_KEY=$E2E_PROCESS_KEY python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/seed.py"
    timeout: 30

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/cleanup.py"
    timeout: 60

initial_prompt: |
  Use the `uipath-platform` skill.

  I want to double-check that folder-scoped assets really are isolated to
  their folder. The path to folder A is in `seed.json` along with a
  unique prefix.

  Spin up a second folder named `e2e-folder-b-<prefix>` directly inside
  folder A (so it lives at `<folder_a_path>/e2e-folder-b-<prefix>`) and
  write its full path to `folder_b.txt`.

  Then create an asset called `e2e-asset-scoping-<prefix>` inside folder
  A only. I want to confirm it shows up in A's asset list but does NOT
  show up in B's.

  Do NOT ask for approval. Do NOT pause.

success_criteria:
  - type: run_command
    description: "Tenant state: asset in A, not in B"
    command: "python3 $TASK_DIR/check_asset_scoping.py"
    timeout: 60
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
