task_id: skill-platform-resources-libraries-list
description: >
  Smoke test: agent uses the uipath-platform skill to list library packages
  uploaded to the tenant via `uip resource libraries list --output json`.
  Auth errors or empty results are acceptable outcomes — the goal is correct
  command shape, not tenant state.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

sandbox: {}

initial_prompt: |
  List the library packages available in the current UiPath tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed libraries via uip resource libraries list"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+libraries\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

