task_id: skill-platform-resources-buckets-list
description: >
  Smoke test: agent uses the uipath-platform skill to list storage buckets in
  an Orchestrator folder via `uip resource buckets list --folder-(key|path)
  ...`. Prompt passes a placeholder folder key — CLI returning Auth/404 is
  acceptable; the goal is correct command shape, not tenant state.

  Note: locally requires the `@uipath/resource-tool` plugin installed once via
  `GH_NPM_REGISTRY_TOKEN=$(gh auth token) uip tools install resource-tool`.
  In CI the plugin auth is provisioned, so this is environment-transparent.
tags: [uipath-platform, smoke, mode:operate, lifecycle:discover]

run_limits:
  expected_turns: 6

initial_prompt: |
  List the storage buckets defined in the `Finance` folder of the current
  UiPath tenant.

success_criteria:
  - type: command_executed
    description: "Agent listed buckets via uip resource buckets list"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+buckets\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent scoped the list to a folder via --folder-key or --folder-path"
    tool_name: "Bash"
    command_pattern: 'uip\s+resource\s+buckets\s+list.*--folder-(key|path)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
