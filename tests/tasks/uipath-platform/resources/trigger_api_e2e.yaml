task_id: skill-platform-trigger-api-e2e
description: >
  E2E: agent uses the skill to leave the tenant in a state where an API
  trigger exists on the seeded process with a known slug/method/name. Check
  queries tenant directly.
tags: [uipath-platform, e2e, mode:operate, lifecycle:setup, resources, triggers]
# Unblocked: the old "A folder is required" bug is gone since triggers moved
# into orchestrator-tool. `uip or triggers create --type api` now derives the
# folder from --release-key (needs --runtime-type/--slug/--method; do NOT pass
# --folder-path on create). Verified live against alpha/codereval/DefaultTenant.

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

# driver: docker (NOT tempdir): the seed's `uip or folders` needs
# @uipath/orchestrator-tool, pre-baked into skills-image:latest. In tempdir the
# CLI must auto-install it at runtime, which fails on a prerelease CLI (resolves
# on `stable`, no stable build on its line — UiPath/cli#3083), so the seed dies
# before the task starts. role-lifecycle-e2e runs the same seed under docker.
sandbox:
  driver: docker
  python: {}

pre_run:
  - command: "E2E_PROCESS_KEY=$E2E_PROCESS_KEY python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/seed.py"
    timeout: 30

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/cleanup.py"
    timeout: 60

initial_prompt: |
  Use the `uipath-platform` skill.

  `seed.json` provides: `uuid8`, `process_key`, `folder_path` (the folder
  containing the process — triggers must live in the same folder).

  Goal: leave the tenant in this state — an **API trigger** exists in
  `folder_path`, attached to `process_key`, with these fields:
  - Name: `e2e-trigger-api-<uuid8>-renamed`
  - Slug: `e2e-trigger-api-<uuid8>-slug`
  - Method: `Post`

  Exercise renaming the trigger at some point (you may create it with a
  different name first, then rename). What matters at the end is the desired
  state above.

  Do NOT ask for approval. Do NOT pause.

success_criteria:
  - type: run_command
    description: "Tenant state: API trigger with expected name/slug/method exists"
    command: "python3 $TASK_DIR/check_trigger_api.py"
    timeout: 60
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
