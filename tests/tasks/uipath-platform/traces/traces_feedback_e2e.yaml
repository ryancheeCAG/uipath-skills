task_id: skill-platform-traces-feedback-e2e
description: >
  E2E test: agent uses the uipath-platform skill to run a full feedback
  round-trip against a real trace. Starts a job from $TRACES_SMOKE_PROCESS_KEY,
  extracts FolderKey and TraceId from the job/spans output, creates positive
  feedback on that trace, then fetches the feedback by ID and verifies the
  round-trip. No hardcoded IDs — all values derived at runtime.
tags: [uipath-platform, e2e, mode:diagnose, lifecycle:discover]

agent:
  type: claude-code
  allowed_tools: ["Skill", "Bash", "Read", "Write"]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Use the `uipath-platform` skill.

  Run a feedback round-trip on a real trace:
  - Start a job for process `$TRACES_SMOKE_PROCESS_KEY` and save the result to job.json
  - Fetch the LLM trace spans for that job and save to spans.json
  - Create positive feedback on the trace and save the response to feedback_create.json
  - Fetch the feedback record back by ID and save to feedback_get.json

success_criteria:
  - type: command_executed
    description: "Agent fetched spans using uip traces spans get"
    tool_name: "Bash"
    command_pattern: 'uip\s+traces\s+spans\s+get(\s+\S+|\s+.*--job-key)'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created feedback with --positive, --trace-id, and --folder-key"
    tool_name: "Bash"
    command_pattern: 'uip\s+traces\s+feedback\s+create(?=.*--positive)(?=.*--trace-id)'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent fetched feedback by ID using uip traces feedback get"
    tool_name: "Bash"
    command_pattern: 'uip\s+traces\s+feedback\s+get\s+\S+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+.*--output\s+json'
    min_count: 3
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "feedback_create.json written to sandbox"
    path: "feedback_create.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "feedback_get.json written to sandbox"
    path: "feedback_get.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Round-trip verified: create ID matches get ID, IsPositive=True"
    command: "python3 $TASK_DIR/check_traces_feedback_e2e.py"
    timeout: 30
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-platform/traces/cleanup_traces_feedback_e2e.py"
    timeout: 60
