task_id: skill-datafabric-e2e-product-catalogue
description: >
  E2E scenario: agent builds a complete product catalogue in Data Fabric from
  scratch — designs the entity schema, bulk-imports 15 products via CSV,
  queries by category, updates pricing for specific products, marks items as
  out of stock, uploads a product image to the most expensive item, and
  produces a final inventory summary. Tests the full Discover → Act → Verify
  loop for a realistic e-commerce use case.
tags: [uipath-data-fabric, e2e, product-catalogue]

run_limits:
  expected_turns: 35
  max_turns: 50
  turn_timeout: 600

initial_prompt: |
  Build an e-commerce product catalogue in UiPath Data Fabric.
  Load the uipath-data-fabric skill before starting.

  Create entity `ProductCatalogue_<EPOCH>` (Unix epoch seconds suffix —
  e.g. `ProductCatalogue_1716163200`) with fields:
    - ProductName  STRING
    - Category     STRING   (values: Electronics | Clothing | Home)
    - Price        DECIMAL
    - InStock      BOOLEAN
    - SKU          STRING
    - Poster       FILE

  Generate `products.csv` with 15 products, 5 per category (omit the
  Poster column — file fields are not importable via CSV). Import via
  `uip df records import --file products.csv`.

  Then:
    - Query Electronics — confirm exactly 5 results.
    - Apply +10% to the two most expensive products (across all
      categories), updating each individually.
    - Mark the three cheapest products `InStock=false`.
    - Create `product_hero.jpg` locally and upload it to the `Poster`
      field of the single most expensive product.
    - Report final state: total products, in-stock count, Electronics
      count.

  Before finishing, write `report.json` to the working directory:
    {"entity_id": "<created-entity-id>"}

  The harness deletes the entity using `report.json`. Do not delete it
  yourself.

success_criteria:
  - type: command_executed
    description: "Agent created the entity"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+create'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent imported products from CSV"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+import'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried products by category"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated product records (price + stock status)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent uploaded product image"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+upload\s+.*--file'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used fieldName key in entity create body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*fieldName'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used filterGroup key in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included Id key in records update body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+update.*\"Id\"'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: "products.csv was generated"
    path: "products.csv"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "products.csv has 15 data rows (header + 15)"
    command: "awk 'END { exit (NR == 16 ? 0 : 1) }' products.csv"
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "product_hero.jpg placeholder image was created"
    path: "product_hero.jpg"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "report.json was written so cleanup can delete the entity"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities.py"
    timeout: 60
