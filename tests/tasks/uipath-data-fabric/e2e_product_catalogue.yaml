task_id: skill-datafabric-e2e-product-catalogue
description: >
  E2E scenario: agent builds a complete product catalogue in Data Fabric from
  scratch — designs the entity schema, bulk-imports 15 products via CSV,
  queries by category, updates pricing for specific products, marks items as
  out of stock, uploads a product image to the most expensive item, and
  produces a final inventory summary. Tests the full Discover → Act → Verify
  loop for a realistic e-commerce use case.
tags: [uipath-data-fabric, e2e, product-catalogue]

agent:
  type: claude-code

run_limits:
  max_turns: 50
  turn_timeout: 600

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  We're building a product catalogue for an e-commerce store using UiPath
  Data Fabric. Load the uipath-data-fabric skill before starting.

  The entity must have these fields: ProductName (STRING), Category (STRING),
  Price (DECIMAL), InStock (BOOLEAN), SKU (STRING), Poster (FILE). Create the
  entity with all six fields before importing. Seed it with 15 products
  (5 per category: Electronics / Clothing / Home) by generating and importing
  a CSV named `products.csv` (CSV does not include the Poster column). Then:

  - Query all Electronics products and confirm you get exactly 5.
  - Apply a 10% price increase to the 2 most expensive products across all
    categories (update them individually).
  - Mark the 3 cheapest products as out of stock (InStock = false).
  - Upload a small placeholder image file (product_hero.jpg — create it
    locally with any content) to the Poster field of the single most
    expensive product.
  - Confirm the final state: total products, how many are in stock, how
    many are Electronics.

  Do NOT delete the entity.

success_criteria:
  - type: command_executed
    description: "Agent created the entity"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+create'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent imported products from CSV"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+import'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried products by category"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated product records (price + stock status)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+update'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent uploaded product image"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+files\s+upload\s+.*--file'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used fieldName key in entity create body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+entities\s+create.*fieldName'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used filterGroup key in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included Id key in records update body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+update.*\"Id\"'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: file_exists
    description: "products.csv was generated"
    path: "products.csv"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "products.csv has 15 data rows (header + 15)"
    command: "awk 'END { exit (NR == 16 ? 0 : 1) }' products.csv"
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "product_hero.jpg placeholder image was created"
    path: "product_hero.jpg"
    weight: 1.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities.py"
    timeout: 60
