task_id: skill-datafabric-smoke-bulk-import
description: >
  Smoke test: agent uses the uipath-data-fabric skill to bulk-import records
  from a CSV file. Tests that the skill teaches correct CSV format: header row
  must match exact entity field names (case-sensitive), system fields must be
  excluded, and records import --file is the correct command (not records insert).
tags: [uipath-data-fabric, smoke, records, import]

run_limits:
  expected_turns: 10
  max_turns: 30

initial_prompt: |
  OFFLINE SMOKE TEST: The uip CLI is available but NOT connected to a live tenant.
  Every uip df command will fail with an auth error — that is expected and normal.
  Run each command exactly once, ignore the auth error, and continue to the next step.
  Do NOT retry any command. Do NOT attempt to login.

  Before starting, load the uipath-data-fabric skill and follow its workflow.

  There is a "Products" entity with entity ID "prod-002-ent".
  Its fields are: ProductName (STRING), UnitPrice (DECIMAL), InStock (BOOLEAN).

  Bulk-import 3 products from a CSV file:
  - Product A, price 9.99, in stock
  - Product B, price 24.50, not in stock
  - Product C, price 4.99, in stock

  Steps:
  1. Get the entity schema to confirm exact field names (case-sensitive).
  2. Create the CSV file at products.csv with correct headers and 3 data rows.
  3. Run the bulk import command.

  Additional constraints:
  - Use --output json on every uip df command.
  - Do NOT include system fields (Id, CreatedBy, CreateTime, UpdatedBy, UpdateTime)
    in the CSV headers.

success_criteria:
  - type: command_executed
    description: "Agent retrieved entity schema with entities get before creating CSV"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+entities\s+get\s+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran records import with --file flag"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+import\s+.*--file'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json on uip df commands"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: file_exists
    description: "products.csv was created"
    path: "products.csv"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "CSV uses correct case-sensitive field names as headers"
    path: "products.csv"
    includes:
      - "ProductName"
      - "UnitPrice"
      - "InStock"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_check
    description: "CSV does not include system fields (Id, CreatedBy, CreateTime, UpdatedBy, UpdateTime)"
    path: "products.csv"
    excludes:
      - "CreatedBy"
      - "CreateTime"
      - "UpdatedBy"
      - "UpdateTime"
    weight: 2.0
    pass_threshold: 1.0
