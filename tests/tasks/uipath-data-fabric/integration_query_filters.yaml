task_id: skill-datafabric-integration-query-filters
description: >
  Integration test: agent constructs advanced records queries against a live
  tenant — AND filterGroup, OR filterGroup, nested filterGroups, sortOptions
  with isDescending, selectedFields projection, and cursor-based pagination
  using records query (no body). Creates test records first, runs 5 query
  scenarios, then deletes the test records. Tests the full query body schema
  and the no-body pagination path end-to-end.
tags: [uipath-data-fabric, integration, records]

agent:
  type: claude-code

run_limits:
  turn_timeout: 600

initial_prompt: |
  Before starting, load the uipath-data-fabric skill and follow its workflow.

  1. Check login: run `uip login status --output json`. Do NOT re-login — use
     whatever tenant is currently active.

  2. List native-only entities. Use an entity named "IntegrationOrders" if it
     exists. If not, create it with fields:
       - Code (STRING)
       - Value (DECIMAL)
       - Status (STRING)

  3. Batch-insert exactly these 4 records (use a single insert call with an array body):
       { "Code": "ORD-001", "Value": 100.00, "Status": "Pending" }
       { "Code": "ORD-002", "Value": 500.00, "Status": "Active"  }
       { "Code": "ORD-003", "Value": 250.00, "Status": "Active"  }
       { "Code": "ORD-004", "Value": 750.00, "Status": "Closed"  }
     Save the 4 record IDs from the response.

  4. AND query: records query with filterGroup logicalOperator 0 (AND):
       Status = "Active" AND Value > "300"
     Expected: exactly 1 result (ORD-002; ORD-003 is Active but Value 250 fails).
     Save count as and_query_count.

  5. OR query: records query with filterGroup logicalOperator 1 (OR):
       Status = "Pending" OR Status = "Closed"
     Expected: exactly 2 results (ORD-001, ORD-004).
     Save count as or_query_count.

  6. Nested filterGroups query — outer logicalOperator 1 (OR) over two inner AND groups:
       Group 1: Status = "Active" AND Value > "200"
       Group 2: Status = "Pending"
     Expected: exactly 3 results (ORD-001, ORD-002, ORD-003; ORD-004 fails both).
     Save count as nested_query_count.

  7. Sort query: records query with sortOptions Value isDescending true, no filter.
     Save the Value field of Records[0] as sort_first_value (expected: 750.0).

  8. Projection query: records query with selectedFields ["Code"], no filter.
     Verify that the Value and Status fields are absent from every record returned.
     Save projection_value_absent and projection_status_absent as true/false.

  9. Paginate all records using records query with --limit 2 and no --body:
       uip df records query <entity-id> --limit 2 --output json
     If HasNextPage is true, repeat with --cursor <NextCursor> until exhausted.
     Collect all record IDs across pages.
     Use Python to verify: total unique IDs == 4 and no duplicates.
     Save pagination_total_ids and pagination_no_duplicates.

  10. Delete the 4 records you inserted in step 3.

  Use --output json on every uip df command.
  Pagination must use --limit and --cursor CLI flags — never body keys.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent inserted test records"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+insert'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran filter queries with --body (AND, OR, nested, sort, projection)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query\s+.*--body'
    min_count: 4
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent paginated with records query --limit (no body)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query\s+.*--limit'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent deleted the test records"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+delete'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used filterGroup key in records query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*filterGroup'
    min_count: 3
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used logicalOperator in filterGroup body (AND=0 / OR=1)"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*logicalOperator'
    min_count: 2
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used sortOptions with isDescending in query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*sortOptions'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used selectedFields projection in query body"
    tool_name: "Bash"
    command_pattern: '(?s)uip\s+df\s+records\s+query.*selectedFields'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities.py"
    timeout: 60
