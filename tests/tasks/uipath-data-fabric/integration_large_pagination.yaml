task_id: skill-datafabric-integration-large-pagination
description: >
  Integration test: agent imports 500 records from a CSV into a live entity,
  traverses all pages using cursor-based pagination (limit=60), verifies no
  gap or duplicate record IDs across all 9 pages, jumps directly to a specific
  page using -o/--offset and confirms the offset-page subset matches the
  cursor-walked equivalent, then applies a filterGroup query with pagination
  (limit=60) to verify the 300-record Active=true subset across 5 pages.
  Covers large-dataset pagination stability, cursor continuity at scale, and
  offset-based page jumps.
tags: [uipath-data-fabric, integration, bulk-pagination]

run_limits:
  expected_turns: 36
  max_turns: 60
  turn_timeout: 600

pre_run:
  - command: "cp $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/extract_page_ids.py $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/verify_pagination.py ."
    timeout: 10
    fail_on_error: true
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/wipe_entity_records.py --entity-name LargePaginationTest"
    timeout: 300
    fail_on_error: true

initial_prompt: |
  Load the uipath-data-fabric skill and follow its workflow. Pass
  `--output json` on every `uip df` command.

  Two helper scripts are staged in the working directory by the harness:

    ./extract_page_ids.py   pipes a records list/query response to disk,
                            emits only {Result, IdCount, HasNextPage,
                            NextCursor} to stdout
    ./verify_pagination.py  asserts ID files match expected count /
                            uniqueness / offset slice

  Use them as shown — do not write inline Python equivalents.

  1. `uip login status --output json`. Do not re-login.

  2. List native-only entities. Reuse `LargePaginationTest` if present
     (the harness wipes its records before the run starts; the entity is
     guaranteed empty). Otherwise create it with fields `Name` (STRING),
     `Score` (INTEGER), `Active` (BOOLEAN).

  3. Generate `bulk_500.csv`:
       header:        Name,Score,Active
       rows   1..300: Record-NNN, N, true
       rows 301..500: Record-NNN, N, false

  4. `uip df records import <entity-id> --file bulk_500.csv --output json`

  5. Cursor-walk all records, limit 60. Each page MUST be a separate
     `uip df records list` Bash invocation — subprocess loops inside a
     single Python call do not satisfy the per-page rule.

       uip df records list <entity-id> --limit 60 --output json \
         | python3 ./extract_page_ids.py --out walk_ids.txt --append

     Subsequent pages add `--cursor "<NextCursor>"` before the pipe. Stop
     when `HasNextPage` is false. Expected: 9 pages, 500 IDs.

  6. Verify:
       python3 ./verify_pagination.py --mode walk --file walk_ids.txt --count 500

  7. Offset-jump to records 181..240:
       uip df records list <entity-id> --limit 60 --offset 180 --output json \
         | python3 ./extract_page_ids.py --out offset_page_ids.txt --no-pagination

     `--offset` rounds down to the nearest page boundary (offset 180 +
     limit 60 → page 4, records 181..240). Verify the slice matches:
       python3 ./verify_pagination.py --mode offset \
         --file offset_page_ids.txt --against walk_ids.txt --start 180 --stop 240

     `--offset` and `--cursor` are mutually exclusive. Never pass both
     on the same command.

  8. Cursor-walk `Active=true` via `records query --body` with filterGroup,
     limit 60. Same per-page Bash pattern; append IDs to `active_ids.txt`:

       uip df records query <entity-id> --limit 60 --output json \
         --body '{"filterGroup":{"logicalOperator":0,"queryFilters":[{"fieldName":"Active","operator":"=","value":true}]}}' \
         | python3 ./extract_page_ids.py --out active_ids.txt --append

     Subsequent pages add `--cursor`. Expected: 5 pages, 300 IDs.

  9. Verify:
       python3 ./verify_pagination.py --mode count --file active_ids.txt --count 300

     Server-side filterGroup guarantees `Active=true` on every returned
     record — count is sufficient.

  Do not delete the entity. The harness handles cleanup.

success_criteria:
  - type: command_executed
    description: "Agent verified login status"
    tool_name: "Bash"
    command_pattern: 'uip\s+login\s+status'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent imported 500 records from CSV"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+import'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent paginated through all records with records list --limit (at least 9 calls)"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+list\s+.*--limit'
    min_count: 9
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent jumped to a page using -o/--offset on records list"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+list\s+.*(-o\s+\d+|--offset\s+\d+)'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent must NOT combine --offset and --cursor on the same command"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+(list|query)(?=[^\n]*--cursor)(?=[^\n]*(-o\s+\d+|--offset\s+\d+))'
    min_count: 0
    max_count: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent queried Active=true records with filterGroup"
    tool_name: "Bash"
    command_pattern: 'uip\s+df\s+records\s+query'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: file_exists
    description: "bulk_500.csv was generated"
    path: "bulk_500.csv"
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "bulk_500.csv has exactly 500 data rows (header + 500)"
    command: "awk 'END { exit (NR == 501 ? 0 : 1) }' bulk_500.csv"
    timeout: 5
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "bulk_500.csv has the required header columns"
    path: "bulk_500.csv"
    includes:
      - "Name"
      - "Score"
      - "Active"
    weight: 1.5
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-data-fabric/_shared/cleanup_entities.py"
    timeout: 60
