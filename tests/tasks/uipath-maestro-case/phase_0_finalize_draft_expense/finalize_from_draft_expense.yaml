task_id: skill-case-phase-0-finalize-draft-expense
description: >
  Phase 0 FINALIZATION ONLY - an ExpenseReimbursement interview draft
  (sdd.draft.md) generated by the phase_0_to_case expense eval is staged into
  the sandbox; the skill resumes Phase 0, runs the Finalization checks, and
  renames it to an approved sdd.md. Decoupled from the interview so the heavier
  finalization step runs in one bounded turn. Grades mechanical validity of the
  produced sdd.md (sdd_check) plus expense-domain coherence.
tags:
  - uipath-maestro-case
  - integration
  - lifecycle:generate
  - mode:build
  - shape:multi-node
  - feature:phase-0
  - feature:stages
  - feature:case-exit
  - feature:conditions
  - feature:trigger

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "AskUserQuestion", "TodoWrite"]
  sdk_options:
    max_thinking_tokens: 10000

run_limits:
  task_timeout: 3000
  max_turns: 150
  turn_timeout: 2400

# Stage the ready-made interview draft into the sandbox root as sdd.draft.md.
# The skill's resumption path (sdd.draft.md present, no sdd.md) picks it up.
sandbox:
  template_sources:
    - type: template_dir
      path: fixtures

initial_prompt: |
  I have a draft design document for our ExpenseReimbursement case-management
  solution - it's saved as `sdd.draft.md` in this folder. Please finalize it into
  the final design document.

  Work from what's there; the design is settled, so don't redo it or re-interview
  me. The connector IDs and resource references in the draft are placeholders on
  purpose - leave them as placeholders where needed. I just need the finalized
  design for now, nothing built yet.

success_criteria:
  - type: file_exists
    description: "Finalization produced the approved sdd.md"
    path: "sdd.md"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "sdd.md is mechanically sound: variable mappings + lineage, per-gate rule legality, task types, entry/completion/exit conditions"
    command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-case/_shared/sdd_check.py"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "finalized sdd.md preserves all 5 primary stages"
    command: "[ \"$(grep -cE '^#+ +Stage [0-9]' sdd.md)\" -ge 5 ]"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "sdd.md preserves Rejected and Withdrawn terminal disposition lanes"
    command: "grep -Eiq 'rejected' sdd.md && grep -Eiq 'withdrawn' sdd.md"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "sdd.md preserves the expense_requests record-created trigger, companion data objects, and trigger-sourced intake field mappings"
    command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-case/phase_0_to_case/expense_reimbursement/check_expense_trigger_sdd.py sdd.md"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "sdd.md preserves finance-selected Payment and the Payment Tracking child case"
    command: "grep -Eiq 'select.{0,50}payment|payment.{0,50}select' sdd.md && grep -Eiq 'payment tracking|paymenttracking' sdd.md && grep -Eiq 'case-management|child case|sub-case|subcase' sdd.md"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "sdd.md preserves the required task-type mix"
    command: "grep -Eiq 'api[- ]workflow' sdd.md && grep -Eiq 'connector|outlook|workday|slack|sap|servicenow' sdd.md && grep -Eiq 'agent' sdd.md && grep -Eiq 'action|hitl|human' sdd.md && grep -Eiq 'timer' sdd.md && grep -Eiq 'rpa' sdd.md && grep -Eiq 'case-management|child case|sub-case|subcase' sdd.md"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "stopped at the finalized sdd.md - did not run ahead into a caseplan build"
    command: "! find . -name caseplan.json -not -path '*/.venv/*' | grep -q ."
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: llm_judge
    description: "Finalized sdd.md is domain-coherent for employee expense reimbursement"
    files:
      - sdd.md
    max_file_chars: 150000
    include_agent_output: false
    prompt: |
      You are reviewing a finalized Phase-0 Solution Design Document (the
      attached sdd.md) for an EMPLOYEE EXPENSE REIMBURSEMENT case. A separate
      mechanical check already verifies variable mappings, lineage, per-gate
      rule legality, task types, and entry/exit conditions - focus on DOMAIN
      COHERENCE.

      Judge:
      - Stage order and terminal outcomes match the bug-bash scenario:
        Submission -> Manager Approval -> Finance Approval -> Payment ->
        Approved, with rejection and withdrawal escape paths to Rejected /
        Withdrawn.
      - Payment is modeled as a user-selected / finance-selected stage, not
        only as an automatic transition.
      - Task types fit the work: validation API workflow, Workday enrichment,
        categorization/fraud agents, Outlook send/wait activities, human review
        actions, escalation timer, finance reconciliation process, ERP RPA
        payment, Payment Tracking child case, webhook wait, Slack/SAP approval
        close-out, ServiceNow audit, and withdrawal cleanup.
      - Minute-level SLAs are captured at the case and stage level.
      - No semantic gaps that would break downstream: a decision outcome that
        routes nowhere, Payment before Finance Approval, terminal stages with
        outbound happy-path transitions, or data a task needs that no upstream
        task or trigger produces. Tenant-default / placeholder connector IDs are
        expected - do NOT penalize them.

      Score 1.0 if the design is coherent and would build into a working case
      with no major flaws; 0.5 if mostly coherent with minor gaps; 0.0 if there
      are major logical/domain errors.
    weight: 3.0
    pass_threshold: 0.7

simulation:
  enabled: true
  persona: |
    You are the finance-operations lead who requested the ExpenseReimbursement
    case. The design draft is already written; you are only confirming its
    finalization into an approved sdd.md.
  goal: |
    Get the existing sdd.draft.md finalized into an approved sdd.md. Resume from
    the draft, use it as-is, and approve. Keep the agent in Phase 0 only.
  constraints:
    - "If it asks how you want to proceed with the existing draft, tell it to use the draft as-is and finalize it - you don't want to be re-interviewed or redo the design."
    - "When the agent presents the finalized sdd.md for approval, approve it on the first pass ('looks good - approved'). If it warns about high-severity review items or unresolved/tenant-default connector IDs, approve anyway - the placeholders are intentional for this design spec."
    - "Do not request design changes or add new requirements - the draft is settled. Do not ask the agent to re-run the interview."
    - "Decline or skip any optional HTML-preview offer."
    - "Keep the agent in Phase 0 only. If it offers to plan tasks.md, build a caseplan, or move to a later phase, tell it to stop at the approved sdd.md."
    - "Once sdd.md is approved, the task is done - end the conversation; do not open new topics."
    - "Keep replies short - one sentence or a single option pick."
  max_turns: 10
