task_id: skill-case-logging-issue-log
description: >
  Covers the `logging` plugin by exercising the issue-dump path on a deliberate
  validation failure. A two-stage built-in-timer case is built with a known
  invalid enum value (`invalid-exit-type`) for Stage 1's completion exitType.
  After validate fails (expected), the skill MUST dump the shared issue log to
  tasks/build-issues.md (Phase 4 / Step 12.1). All tasks are built-in timers,
  so the build is fully local (no registry/cloud needed).
tags: [uipath-maestro-case, integration, mode:build, lifecycle:generate, shape:multi-node]

initial_prompt: |
  Create a UiPath Case Management project named "TimerLogCase" with a manual
  trigger and two sequential stages, each holding one built-in timer task.
  Use the same name for the solution and the project so the case file lives
  at TimerLogCase/TimerLogCase/caseplan.json.

  Write this sdd.md to sdd.md first, then build from it:

  ```
  # SDD — TimerLogCase

  Two-stage linear case with one built-in wait-for-timer task per stage.

  ## Section 1: Case Definition

  ### 1.1 Case Metadata
  | Property | Value |
  |---|---|
  | Case Name | TimerLogCase |
  | Case Description | Two-stage timer flow. |
  | Case Identifier | Prefix: TLC, Type: constant |
  | Priority | Choiceset: Low, Medium, High - Default: Medium |
  | Case-Level SLA | - |
  | SLA Type | - |

  ### 1.3 Triggers
  | Trigger Type | Source | Configuration | Initial Variable Mapping |
  |---|---|---|---|
  | manual | User-initiated start of the case | - | - |

  ### 1.4 Case Completion Conditions
  | WHEN | IF | THEN | Marks Case Complete |
  |---|---|---|---|
  | required-stages-completed | - | Case marked complete | Yes |

  ## Section 2: Stages & Tasks

  ### Stage 1: Prepare (`prepare`)
  **Type:** Stage
  **Description:** Waits before proceeding.
  **Required for Case Completion:** Yes

  #### Stage Entry Conditions
  | WHEN | IF | Interrupting |
  |---|---|---|
  | case-entered | - | No |

  #### Stage Completion Conditions
  | WHEN | IF | Exit Type | Marks Stage Complete |
  |---|---|---|---|
  | required-tasks-completed | - | invalid-exit-type | Yes |

  #### Tasks
  | # | Task ID | Task Name | Type | Required | Run Only Once | Persona | SLA |
  |---|---------|-----------|------|----------|---------------|---------|-----|
  | 1 | `prepare.wait` | Prepare Wait | wait-for-timer | Yes | No | system | — |

  ##### Task 1.1: Prepare Wait (`prepare.wait`)

  **Type:** wait-for-timer
  **Description:** Non-repeating fixed-delay timer. Fires once after 2 seconds.

  **Entry Condition**

  | WHEN | IF |
  |---|---|
  | current-stage-entered | - |

  | Field | Value |
  |---|---|
  | Component Type | TIMER (built-in) |
  | Timer Type | timeDuration |
  | Time Duration | 2s (PT2S, fires once — not repeating) |

  ### Stage 2: Finish (`finish`)
  **Type:** Stage
  **Description:** Terminal wait.
  **Required for Case Completion:** Yes

  #### Stage Entry Conditions
  | WHEN | IF | Interrupting |
  |---|---|---|
  | selected-stage-completed("Prepare") | - | No |

  #### Stage Completion Conditions
  | WHEN | IF | Exit Type | Marks Stage Complete |
  |---|---|---|---|
  | required-tasks-completed | - | exit-only | Yes |

  #### Tasks
  | # | Task ID | Task Name | Type | Required | Run Only Once | Persona | SLA |
  |---|---------|-----------|------|----------|---------------|---------|-----|
  | 1 | `finish.wait` | Finish Wait | wait-for-timer | Yes | No | system | — |

  ##### Task 2.1: Finish Wait (`finish.wait`)

  **Type:** wait-for-timer
  **Description:** Non-repeating fixed-delay timer. Fires once after 2 seconds.

  **Entry Condition**

  | WHEN | IF |
  |---|---|
  | current-stage-entered | - |

  | Field | Value |
  |---|---|
  | Component Type | TIMER (built-in) |
  | Timer Type | timeDuration |
  | Time Duration | 2s (PT2S, fires once — not repeating) |
  ```

  Important:
  - The `uip` CLI is already available.
  - Treat the generated plan as pre-approved — do not block on any HARD STOP
    / AskUserQuestion approval step.
  - Do NOT run `uip maestro case debug`.
  - The `invalid-exit-type` exitType in Stage 1's completion condition is
    intentional — reproduce it exactly in the caseplan.json; do NOT correct it
    to `exit-only` or any other valid value.

  Run `uip maestro case validate TimerLogCase/TimerLogCase/caseplan.json
  --output json`. Validation is expected to fail due to the invalid exitType.
  After validate completes (regardless of exit code), write the issue log to
  `tasks/build-issues.md`. The task is NOT complete until validate has run and
  `tasks/build-issues.md` exists.

success_criteria:
  - type: run_command
    description: "uip maestro case validate fails (expected — invalid exitType enum value in caseplan.json)"
    command: "uip maestro case validate TimerLogCase/TimerLogCase/caseplan.json --output json"
    timeout: 30
    expected_exit_code: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: file_exists
    description: "logging plugin dumped the shared issue log to tasks/build-issues.md (written even on a clean build)"
    path: "tasks/build-issues.md"
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "build-issues.md carries the issue-log header naming this case (per logging/impl-json.md dump template)"
    path: "tasks/build-issues.md"
    includes:
      - "Build Issues"
      - "TimerLogCase"
    weight: 2.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-case/_shared/cleanup_solutions.py"
    timeout: 120

run_limits:
  task_timeout: 900
  max_turns: 120
  turn_timeout: 900
