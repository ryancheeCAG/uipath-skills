task_id: skill-case-multi-sla-with-escalation
description: >
  Build a Case Management definition that exercises root-level SLA,
  TWO conditional overrides, and a regular-stage SLA — covering four
  of the five SLA units in one test (min/d/w/m). Root: default 3
  weeks (unit=w) + conditional 30 minutes (unit=min) for Urgent
  priority + conditional 5 days (unit=d) for Standard priority,
  inserted in priority order. Resolve (regular stage) carries its own
  default SLA of 1 month (unit=m) — the regular-stage SLA path that
  no other multi_stages_tasks test covers (exception_stage uses h on an
  ExceptionStage). The root default rule carries an at-risk 80%
  MULTI-RECIPIENT escalation (User manager@corp.com + UserGroup
  "Operations Leadership" both notified at 80% risk); the Urgent
  conditional rule carries an sla-breached escalation to a single
  UserGroup. Exercises: multiple slaRules in priority order (≥2
  conditional + 1 default), conditional-rule expression-driven SLA,
  escalation attached to a conditional rule (not just the default),
  both escalation trigger types (at-risk + sla-breached), both
  recipient scopes (User + UserGroup), MULTI-RECIPIENT escalation
  (≥2 recipients on one notification), regular-Stage data.slaRules,
  and the d + w + m + min duration units. Recipient UUIDs are
  unresolved and stay as UNRESOLVED skeletons per the skill rules.
tags: [uipath-maestro-case, e2e, lifecycle:generate, shape:multi-node, feature:sla, feature:escalation, feature:conditional-sla, feature:stage-sla]
max_iterations: 1

run_limits:
  expected_turns: 78
  task_timeout: 1500
  max_turns: 120
  turn_timeout: 1500

initial_prompt: |
  Build a UiPath Case Management solution named "SlaWithEscalation"
  containing a project also named "SlaWithEscalation" from the sdd.md
  below. Write the sdd.md to disk first, then build from it.

  ```
  # SDD — SlaWithEscalation

  **Case Definition Blueprint** · Generic — SLA Rule & Escalation Coverage

  Root-level SLA with TWO conditional overrides plus a regular-stage SLA — covering four of the five SLA units (min/d/w/m) in one test. Exercises multiple slaRules in priority order, conditional-rule expression-driven SLA, escalation attached to a conditional rule (not just the default), both escalation trigger types (at-risk + sla-breached), both recipient scopes (User + UserGroup), MULTI-RECIPIENT escalation (≥2 recipients on one notification), and regular-Stage data.slaRules.

  > **Unresolved recipients.** Recipient UUIDs are not provided. The agent MUST leave them as UNRESOLVED skeletons per the skill rules; do NOT fabricate UUIDs.

  Prepared date: 2026-05-19

  ## Section 1: Case Definition

  ### 1.1 Case Metadata
  | Property | Value |
  |---|---|
  | Case Name | SlaWithEscalation |
  | Case Description | Root-level SLA with two conditional overrides (Urgent 30min, Standard 5d) and a default of 3w; Resolve stage carries its own 1m SLA. |
  | Case Identifier | Prefix: SWE, Type: constant |
  | Priority | Choiceset: Urgent, Standard - Default: Standard |
  | Case-Level SLA | 3w (default) |
  | SLA Type | Conditional (two condition-driven overrides + default) |

  ### 1.2 SLA Escalation

  Case-level slaRules (priority order — first match wins):

  | # | Rule Type | Expression | Duration | Unit | Escalation |
  |---|---|---|---|---|---|
  | 1 | Conditional | priority is Urgent | 30 | min | sla-breached → UserGroup "Incident Response Team" (UNRESOLVED). Display name: "Notify Incident Response". |
  | 2 | Conditional | priority is Standard | 5 | d | - |
  | 3 | Default | - | 3 | w | at-risk @ 80% → MULTI-RECIPIENT (User manager@corp.com UNRESOLVED + UserGroup "Operations Leadership" UNRESOLVED). Display name: "Notify Manager + Ops Leadership". |

  Insertion order matters — Urgent must precede Standard so Urgent wins when both expressions are truthy.

  Together with the Urgent (min), root default (w), Resolve default (m), and the Issues-stage SLA in the exception_stage test (h), this covers the full SLA unit set min/h/d/w/m.

  ### 1.3 Triggers
  | Trigger Type | Source | Configuration | Initial Variable Mapping |
  |---|---|---|---|
  | manual | User-initiated | - | - |

  ### 1.4 Case Completion Conditions
  | WHEN | IF | THEN | Marks Case Complete |
  |---|---|---|---|
  | required-stages-completed | - | Case marked complete | Yes |

  ### 1.4a Case Exit Conditions
  | WHEN | IF | THEN | Marks Case Complete |
  |---|---|---|---|
  | No case-exit hand-off declared. | - | - | No |

  ### 1.5 Case Variables
  | Variable | Category | Type | Default | Description |
  |---|---|---|---|---|
  | - | - | - | - | No case-level variables declared. |

  ## Section 2: Stages & Tasks

  ### Stage 1: Resolve (`resolve`)
  **Type:** Stage
  **Description:** Active resolution stage; carries its own monthly SLA. Receives the case after the manual trigger.
  **Required for Case Completion:** Yes
  #### Stage Entry Conditions
  | WHEN | IF | Interrupting |
  |---|---|---|
  | case-entered | - | No |
  #### Stage Completion Conditions
  | WHEN | IF | Exit Type | Marks Stage Complete |
  |---|---|---|---|
  | required-tasks-completed | - | exit-only | Yes |
  #### Stage Exit Conditions
  | WHEN | IF | Exit Type | Exit-To Stage | Marks Stage Complete |
  |---|---|---|---|---|
  | No stage exit hand-off declared. | - | exit-only | - | No |
  **Stage SLA**

  Stage-level data.slaRules — overrides the root default while Resolve is active. Stage data.description is set to "Active resolution stage; carries its own monthly SLA."

  | # | Rule Type | Duration | Unit | Escalation |
  |---|---|---|---|---|
  | 1 | Default | 1 | m | - |
  ```

  Treat the generated tasks.md plan as pre-approved — do NOT block on the
  HARD STOP / AskUserQuestion approval step. Do NOT run `uip maestro case
  debug` yourself — the test harness runs it. Do NOT ask for approval, confirmation, or feedback. Build end-to-end
  in a single pass and finish with `uip maestro case validate` passing on
  the resulting caseplan.json.
  Before starting, load the uipath-maestro-case skill. Read and follow its
  workflow steps exactly.

success_criteria:
  - type: run_command
    description: "uip maestro case validate passes on the generated caseplan.json"
    command: "uip maestro case validate SlaWithEscalation/SlaWithEscalation/caseplan.json --output json"
    timeout: 60
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "case-level slaRules (metadata.slaRules) has 2 conditional rules in priority order — Urgent (30min, sla-breached UserGroup escalation) then Standard (5d) — followed by default 3w with MULTI-RECIPIENT at-risk escalation (User + UserGroup on one notification); Resolve stage carries its own data.slaRules with default 1m (unit=m) AND data.description set; together SLA units min/d/w/m all exercised"
    command: "python3 $TASK_DIR/check_sla_with_escalation.py"
    timeout: 720
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-case/_shared/cleanup_solutions.py"
    timeout: 120
