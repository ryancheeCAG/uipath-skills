    description: "uip maestro case validate passes on the generated caseplan.json"
    command: "uip maestro case validate LinearThreeStages/LinearThreeStages/caseplan.json --output json"
    timeout: 60
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "3 stages chained via condition-driven transitions (Review←Intake, Decision←Review via selected-stage-completed, edges retired) + case-entered on Intake; TWO wait-for-timer tasks on Review — Hold For 1 Hour (isRequired:true default + skipCondition + shouldRunOnlyOnce) and Notify Reviewer (isRequired:false) — both carrying current-stage-entered task-entry in DISTINCT laneIndex lanes; root carries 7 variables exercising a spread of Variable types/shapes (boolean skipReview, string caseRef In + finalDecision Out, date dueDate, jsonSchema caseMetadata with body.type=object, jsonSchema attachments with body.type=array, jsonSchema caseSchema with body.type=object) including the trigger output mapping for caseRef In argument"
    command: "python3 $TASK_DIR/check_linear_three_stages.py"
    timeout: 720
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

