task_id: skill-case-phase-0-loan-origination
description: >
  End-to-end Phase 0 interview → case generation for a commercial-loan
  origination case at a mid-market bank. Exercises logical integrity of the
  generated case: 6 primary gating stages in order (Intake → Loan Setup →
  Underwriting → QA/QC → Closing → Resolved), 4 exception lanes (Customer
  Comms, Escalation, Withdrawn, Rejected), conditional gating for the
  Credit-Analyst review (>$5M loans only), and case-exit conditions
  covering happy path + terminal exception stages. No sdd.md is supplied —
  the skill must run Phase 0 from the narrative prompt before building.
tags:
  - uipath-maestro-case
  - e2e
  - lifecycle:generate
  - mode:build
  - shape:multi-node
  - feature:phase-0
  - feature:stages
  - feature:case-exit
  - feature:conditions
max_iterations: 3

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 2700
  max_turns: 300
  turn_timeout: 1500

initial_prompt: |
  We are building a case management solution for commercial loan origination
  at Accrual Capital, a mid-market commercial bank handling ~600 term
  loans/month between $1M–$25M (this case: $4M, real-estate secured), with
  a 30–45 day lifecycle. The process spans six primary stages — Intake,
  Loan Setup, Underwriting, QA/QC, Closing, and Resolved — plus four
  exception paths (Customer Comms, Escalation, Withdrawn, Rejected).

  Personas are Loan Officer, Credit Analyst (loans >$5M only; Underwriter
  absorbs this role for ≤$5M), Underwriter, Closing Officer, and Borrower.
  External systems include Experian, D&B, Databricks, Snowflake, and county
  UCC portals.

  Help me map out the end-to-end process across ~45 tasks, data fields, and
  business rules, then build the UiPath Case Management solution. Name the
  solution and the case project "LoanOrigination". Use v20 schema.

  No sdd.md exists yet — run the Phase 0 interview to generate one from
  this narrative, then proceed through planning and implementation. Treat
  every approval / hard-stop prompt as pre-approved: do not block on
  AskUserQuestion. Do not ask the user any clarifying questions. Do not
  run `uip maestro case debug` yourself. Build end-to-end in a single pass
  and finish with `uip maestro case validate` passing on the resulting
  caseplan.json.

  Before starting, load the uipath-maestro-case skill. Read and follow its
  workflow steps exactly, except for the approval gates noted above.

success_criteria:
  - type: run_command
    description: "uip maestro case validate passes on the generated caseplan.json"
    command: "uip maestro case validate LoanOrigination/LoanOrigination/caseplan.json --output json"
    timeout: 60
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: file_exists
    description: "sdd.md was generated by Phase 0 (not pre-supplied)"
    path: "LoanOrigination/LoanOrigination/sdd.md"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "sdd.md mentions the conditional Credit-Analyst rule for >$5M loans"
    command: "grep -Eiq 'credit analyst.{0,80}5' LoanOrigination/LoanOrigination/sdd.md"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "logical integrity: 6 primary stages in order, 4 exception lanes, conditional gating, terminal case-exits"
    command: "python3 $TASK_DIR/check_loan_origination.py"
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

  - type: run_command
    description: "rule + variable mapping integrity: every rule is a valid V12 name; selected-stage/task refs resolve; =vars / =bindings references all resolve"
    command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-case/_shared/rule_variable_check.py"
    timeout: 60
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-case/_shared/cleanup_solutions.py"
    timeout: 120
