task_id: skill-case-phase-0-candidate-interview
description: >
  End-to-end Phase 0 interview → case generation for a candidate interview
  process at a software company. Exercises logical integrity of the
  generated case: 7 primary stages in order (Application Received →
  Recruiter Screen → Technical Screen → Onsite Loop → Debrief → Offer →
  Hired), 3 exception lanes (Rejected, Withdrawn, On Hold), conditional
  gating for the Onsite Loop (engineering roles only), and case-exit
  conditions for both the happy path and the terminal exception lanes. No
  sdd.md is supplied — the skill must run Phase 0 from the narrative
  prompt.
tags:
  - uipath-maestro-case
  - e2e
  - lifecycle:generate
  - mode:build
  - shape:multi-node
  - feature:phase-0
  - feature:stages
  - feature:case-exit
  - feature:conditions
max_iterations: 3

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "AskUserQuestion", "TodoWrite"]

run_limits:
  task_timeout: 2700
  max_turns: 300
  turn_timeout: 1500

initial_prompt: |
  We are building a case management solution for the candidate-interview
  process at Helix, a 1,200-person software company hiring ~80 candidates
  per quarter across engineering, product, and design. A typical case
  (this one: senior backend engineer, L5) takes 4–6 weeks from application
  to offer. The process spans seven primary stages — Application Received,
  Recruiter Screen, Technical Screen, Onsite Loop, Debrief, Offer, and
  Hired — plus three exception paths (Rejected, Withdrawn, On Hold).

  Personas are Recruiter, Hiring Manager, Technical Interviewer,
  Compensation Analyst, and Candidate. Conditional rules: the Onsite Loop
  is required only for engineering roles at L4 and above (Technical Screen
  absorbs the loop for non-engineering or junior roles); Debrief cannot
  start until every onsite interview has submitted a scorecard. External
  systems include Greenhouse (ATS), LinkedIn Recruiter, CoderPad, DocuSign
  (offer letters), and Workday (HRIS handoff at the Hired stage).

  Help me map out the end-to-end process across ~30 tasks, data fields,
  and business rules, then build the UiPath Case Management solution.
  Name the solution and case project "CandidateInterview". Use v20 schema.

  No sdd.md exists yet — run the Phase 0 interview to generate one from
  this narrative, then proceed through planning and implementation. Treat
  every approval / hard-stop prompt as pre-approved: do not block on
  AskUserQuestion. Do not ask the user any clarifying questions. Do not
  run `uip maestro case debug` yourself. Build end-to-end in a single pass
  and finish with `uip maestro case validate` passing on the resulting
  caseplan.json.

  Before starting, load the uipath-maestro-case skill. Read and follow its
  workflow steps exactly, except for the approval gates noted above.

success_criteria:
  - type: run_command
    description: "uip maestro case validate passes on the generated caseplan.json"
    command: "uip maestro case validate CandidateInterview/CandidateInterview/caseplan.json --output json"
    timeout: 60
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: file_exists
    description: "sdd.md was generated by Phase 0 (not pre-supplied)"
    path: "CandidateInterview/CandidateInterview/sdd.md"
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "sdd.md mentions the engineering-role / L4+ Onsite Loop gating rule"
    command: "grep -Eiq '(onsite|loop).{0,80}(engineering|l[45]|level)' CandidateInterview/CandidateInterview/sdd.md"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "logical integrity: 7 primary stages in order, ≥2 exception lanes, terminal stages, debrief gating, case-exit happy + terminal"
    command: "python3 $TASK_DIR/check_candidate_interview.py"
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

  - type: run_command
    description: "rule + variable mapping integrity: every rule is a valid V12 name; selected-stage/task refs resolve; =vars / =bindings references all resolve"
    command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-case/_shared/rule_variable_check.py"
    timeout: 60
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-case/_shared/cleanup_solutions.py"
    timeout: 120
