task_id: skill-case-phase-0-expense-reimbursement
description: >
  Phase 0 INTERVIEW ONLY - simulated interview -> sdd.draft.md for an
  employee expense reimbursement case. Tests whether the Phase 0 interview
  captures the bug-bash design: expense_requests record-created trigger,
  expense_documents and expense_comments companion data objects, 7 stages
  (Submission -> Manager Approval -> Finance Approval -> Payment -> Approved,
  Rejected, Withdrawn), user-selected Payment entry, terminal Approved /
  Rejected / Withdrawn outcomes, and the core task-type mix. STOPS at the
  design document - no tasks.md, no caseplan build.
tags:
  - uipath-maestro-case
  - integration
  - lifecycle:generate
  - mode:build
  - shape:multi-node
  - feature:phase-0
  - feature:stages
  - feature:case-exit
  - feature:conditions
  - feature:trigger

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "AskUserQuestion", "TodoWrite"]
  sdk_options:
    max_thinking_tokens: 10000

run_limits:
  task_timeout: 3000
  max_turns: 150
  turn_timeout: 2400

initial_prompt: |
  We're designing a case-management solution for Employee Expense
  Reimbursement. An employee submits an expense, and the case flows through
  Submission, Manager Approval, Finance Approval, Payment, and then a terminal
  Approved, Rejected, or Withdrawn stage.

  The case starts when a new tenant case-entity record is created in
  `expense_requests`. The case also needs `expense_documents` for receipts /
  supporting files and `expense_comments` for participant notes. The main
  fields are employee_name, employee_email, department, expense_type, amount,
  currency, description, receipt_url, and submitted_date.

  Keep the design faithful to the bug-bash scenario. Submission validates the
  expense with an API workflow, enriches employee details from Workday, and uses
  an agent to categorize the expense. Manager Approval sends and waits for
  Outlook email, has a Manager Review action, and includes a 3-minute escalation
  timer plus ad-hoc request-info and withdrawal paths. Finance Approval runs a
  policy API workflow, fraud/anomaly agent, Budget and GL reconciliation process,
  and Finance Team Review action. Payment is selected by the finance reviewer,
  then runs ERP RPA reimbursement, an optional Payment Tracking sub-case, and a
  payment-confirmation webhook wait. Approved sends Slack confirmation and posts
  SAP GL records. Rejected sends rejection notification and logs ServiceNow
  audit. Withdrawn sends Outlook confirmation and runs RPA cleanup.

  SLAs are intentionally short: case-level 15 minutes at-risk at 70 percent;
  stages are Submission 3 min, Manager Approval 5 min, Finance Approval 5 min,
  Payment 4 min, and each terminal stage 2 min.

  Help me map this end to end as a Phase 0 design. Call it
  "ExpenseReimbursement".

  I want a draft design document I can review before we commit to anything.
  Let's get the draft down and stop there - we'll finalize and build it later,
  so don't polish or validate it yet, just capture the design.

success_criteria:
  - type: run_command
    description: "Phase 0 interview produced a design document (draft or finalized)"
    command: "test -f sdd.draft.md || test -f sdd.md"
    timeout: 10
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "design declares the expense_requests record-created trigger"
    command: "cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'expense_requests' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'record[- ]created|created.*record|new.*record'"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "design declares all 3 data objects"
    command: "cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'expense_requests' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'expense_documents' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'expense_comments'"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "design captures all 7 bug-bash stages (not truncated)"
    command: "f=$(ls sdd.draft.md sdd.md 2>/dev/null | head -1); [ -n \"$f\" ] && [ \"$(grep -cE '^#+ +Stage [0-9]' \"$f\")\" -ge 7 ] && grep -Eiq 'Submission' \"$f\" && grep -Eiq 'Manager Approval' \"$f\" && grep -Eiq 'Finance Approval' \"$f\" && grep -Eiq 'Payment' \"$f\" && grep -Eiq 'Approved' \"$f\" && grep -Eiq 'Rejected' \"$f\" && grep -Eiq 'Withdrawn' \"$f\""
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "design models Payment as a user-selected / finance-selected stage"
    command: "cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'payment.{0,120}(user-selected|selected by user|finance.{0,40}select|stage selection)|user-selected.{0,120}payment'"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "design captures the required task-type mix"
    command: "cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'api[- ]workflow' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'connector|outlook|workday|slack|sap|servicenow' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'agent' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'action|hitl|human' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'timer' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'rpa' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'sub-case|subcase|case-management|child case'"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "stayed in Phase 0 - did not run ahead into a caseplan build"
    command: "! find . -name caseplan.json -not -path '*/.venv/*' | grep -q ."
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: llm_judge
    description: "Captured design is domain-coherent for employee expense reimbursement"
    files:
      - sdd.draft.md
      - sdd.md
    max_file_chars: 150000
    include_agent_output: false
    prompt: |
      You are reviewing a Phase-0 design document for an EMPLOYEE EXPENSE
      REIMBURSEMENT case. The design is in whichever file is attached -
      `sdd.draft.md` (a pre-finalization draft) or `sdd.md` (the finalized
      version); grade whichever is present. Do NOT penalize unresolved
      connector IDs, placeholder resource references, or minor rule-syntax
      issues. Focus on DOMAIN COHERENCE of the captured design.

      Judge:
      - The case starts from an `expense_requests` record-created event, and
        the design also captures `expense_documents` and `expense_comments`.
      - Stage order and terminal outcomes match the bug-bash scenario:
        Submission -> Manager Approval -> Finance Approval -> Payment ->
        Approved, with rejection and withdrawal escape paths to Rejected /
        Withdrawn.
      - Payment is modeled as a user-selected / finance-selected stage, not
        only as an automatic transition.
      - Task types fit the work: validation API workflow, Workday enrichment
        connector, categorization/fraud agents, Outlook send/wait activities,
        human review actions, escalation timer, finance reconciliation process,
        ERP RPA payment, Payment Tracking sub-case, webhook wait, Slack/SAP
        approval close-out, ServiceNow audit, and withdrawal cleanup.
      - Minute-level SLAs are captured at the case and stage level.
      - No semantic gaps that would break downstream: a decision outcome that
        routes nowhere, Payment before Finance Approval, terminal stages with
        outbound happy-path transitions, or data a task needs that no upstream
        task or trigger produces.

      Score 1.0 if the captured design is coherent and would finalize into a
      working case with no major flaws; 0.5 if mostly coherent with minor gaps;
      0.0 if there are major logical/domain errors.
    weight: 3.0
    pass_threshold: 0.7

simulation:
  enabled: true
  persona: |
    You are the finance-operations lead who owns employee expense
    reimbursement end to end. You know everything in the opening message: the
    seven stages (Submission, Manager Approval, Finance Approval, Payment,
    Approved, Rejected, Withdrawn), the record-created trigger on
    `expense_requests`, the companion `expense_documents` and
    `expense_comments` objects, the core expense fields, the short SLAs, and
    the named systems and task types (Workday, Outlook 365, API workflows,
    agents, human review actions, timer escalation, finance process, ERP RPA,
    payment webhook, Slack, SAP, ServiceNow, and withdrawal cleanup).
  goal: |
    Get a complete Phase-0 sdd.draft.md for the ExpenseReimbursement case.
    Answer the designer's interview questions so the design reaches full
    depth. When the designer has written the draft and asks whether to
    finalize, produce sdd.md, validate, plan, build, or proceed, tell them to
    STOP at the draft - the draft is all you need.
  constraints:
    - "Answer each question concisely and decisively - one short sentence, or pick the recommended / first option in an AskUserQuestion. Never bounce the decision back ('you decide') and never stall."
    - "Ground every answer in the process described in the opening message. For a detail not specified, make a sensible, consistent call and state it in one line - do not invent new stages, data objects, personas, or external systems beyond that brief."
    - "Keep the design within Phase-0 scope. Capture the named stages, routes, data objects, SLAs, and task categories; do not ask for live connector IDs or deployment details."
    - "You want a draft to review first. If the assistant offers to finalize, validate, approve, build, or move to a next phase, tell it to leave it as a draft for now - you'll finalize later. If it wants to keep polishing or double-checking the draft, say it's good enough for a first review."
    - "Once the draft captures the design, you're done - end the conversation; don't open new topics or extend the interview."
    - "Keep replies short - one sentence or a single option pick."
  max_turns: 40
