task_id: skill-case-phase-0-aged-invoice-payment
description: >
  Phase 0 DOC-DERIVED INTERVIEW, over-cap continue path - the full aged-invoice
  case-management PDD is staged as `pdd.md`; the skill's Phase 0 reads the
  attachment (Listen doc-derived path) and sketches the SDD from it. The design
  is deliberately OVER the Phase-0 complexity caps (9 primary stages, 4 exception
  lanes, many integrations, a child case), so the skill would normally soft-redirect
  to uipath-planner. The prompt instructs the agent NOT to redirect - stay in
  uipath-maestro-case and capture the full design (Continue-with-warning path).
  Tests that the whole case survives into sdd.draft.md: the 9 primary stages
  (Intake -> Enrichment -> Triage -> AP Review -> Exception Resolution -> Supplier
  Collaboration -> Payment Risk -> Approval -> Closure), the exception lanes (SLA
  Escalation, Automation Incident, Reopen, Compliance Hold), and the full task-type
  mix (api-workflow, agent, action, rpa, wait-for-timer, connector, case-management).
  STOPS at the design document - no tasks.md, no caseplan build. An LLM judge rates
  design coherence. Fourth domain alongside candidate_interview, loan_origination,
  and expense_reimbursement; the only one seeded from a PDD file and the only
  over-cap case.
tags:
  - uipath-maestro-case
  - integration
  - lifecycle:generate
  - mode:build
  - shape:multi-node
  - feature:phase-0
  - feature:stages
  - feature:case-exit
  - feature:conditions

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep", "AskUserQuestion", "TodoWrite"]
  # Cap per-turn extended thinking so the agent writes the draft instead of
  # deliberating it as thinking tokens. Interview turns use far less than this.
  sdk_options:
    max_thinking_tokens: 10000

run_limits:
  # Larger than the within-cap siblings: a 9-stage / 4-exception-lane draft is a
  # long autonomous authoring turn. Keep turn_timeout above it so grading fires
  # after the draft lands; task_timeout above that for criteria + overhead.
  task_timeout: 3600
  max_turns: 150
  turn_timeout: 2700

# Stage the FULL aged-invoice PDD into the sandbox root as pdd.md. Phase 0 reads
# it via the Listen doc-derived path (see phase-0-interview.md § File / attachment
# / document detection) and sketches the SDD from it. This PDD is intentionally
# over every Phase-0 cap - the test exercises the Continue-with-warning path, not
# a soft-redirect to the planner.
sandbox:
  template_sources:
    - type: template_dir
      path: fixtures

initial_prompt: |
  We're designing a case-management solution for Aged Invoice Payment
  resolution. I've saved our process design document as `pdd.md` in this folder -
  read it and use it as the source of truth.

  Load the uipath-maestro-case skill and run its Phase 0 interview, seeding the
  design from the attached PDD. Capture the whole process as ONE Maestro case.

  This is a big process, and it may exceed the Phase 0 complexity thresholds.
  That's expected and fine: do NOT hand this off or soft-redirect to uipath-planner.
  If you hit a complexity-threshold prompt, choose to continue (with the warning
  header) and keep designing the full case here. Ask me about anything the PDD
  leaves open.

  Call it "AgedInvoicePayment".

  I want a draft design document I can review before we commit to anything.
  Let's get the draft down and stop there - we'll finalize and build it later,
  so don't polish or validate it yet, just capture the design.

success_criteria:
  # The interview grades the captured DESIGN, in whichever file Phase 0 leaves it:
  # sdd.draft.md if it stopped at the draft, or sdd.md if it finalized. All
  # content criteria read whichever exists, so the test does not hinge on the
  # agent stopping at exactly the draft step. Stage counting follows the sibling
  # convention (candidate_interview, loan_origination, expense_reimbursement):
  # count PRIMARY stages via the `### Stage N:` heading, and match exception
  # lanes by NAME separately - they render as `### Secondary Stage:` (no number)
  # per the skill's stage model, so they are never counted as primary stages.
  # A near-complete primary-stage count (>=8 of the PDD's 9) is also the anti-
  # redirect signal: a soft-redirect to the planner emits a plain-text suggestion,
  # not a 9-stage maestro-case draft.
  - type: run_command
    description: "Phase 0 produced a design document (draft or finalized)"
    command: "test -f sdd.draft.md || test -f sdd.md"
    timeout: 10
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "did not soft-redirect: the full case survives, >=8 of the PDD's 9 primary stages captured"
    command: "f=$(ls sdd.draft.md sdd.md 2>/dev/null | head -1); [ -n \"$f\" ] && [ \"$(grep -cE '^#+ +Stage [0-9]' \"$f\")\" -ge 8 ]"
    timeout: 10
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "design declares the SLA Escalation and Automation Incident exception lanes"
    command: "cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'escalation' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'incident|automation failure|failed (api|rpa|automation)'"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "design captures triage root-cause classification and priority/SLA scoring"
    command: "cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'triage' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'priorit'"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "design captures the required task-type mix"
    command: "cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'api[- ]workflow' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'connector|outlook|servicenow|slack|sap' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'agent' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'action|hitl|human' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'timer' && cat sdd.draft.md sdd.md 2>/dev/null | grep -Eiq 'rpa'"
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "stayed in Phase 0 - did not run ahead into a caseplan build"
    command: "! find . -name caseplan.json -not -path '*/.venv/*' | grep -q ."
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: llm_judge
    description: "Captured design is domain-coherent for aged invoice payment resolution"
    files:
      - sdd.draft.md
      - sdd.md
    max_file_chars: 150000
    include_agent_output: false
    prompt: |
      You are reviewing a Phase-0 design document for an AGED INVOICE PAYMENT
      resolution case, seeded from a comprehensive PDD. The design is in whichever
      file is attached - `sdd.draft.md` (a pre-finalization draft) or `sdd.md`
      (the finalized version); grade whichever is present. This is a large case
      that intentionally exceeds the usual Phase-0 size caps; do NOT penalize its
      size, and do NOT penalize unresolved connector IDs, placeholder resource
      references, a lightweight/threshold warning header, or minor rule-syntax
      issues. Focus on DOMAIN COHERENCE of the captured design.

      Judge:
      - The full case survived - it was NOT trimmed to a toy subset or replaced by
        a "use the planner instead" note. Expect roughly the PDD's nine primary
        stages in a sensible order: Intake/Registration -> Context Enrichment ->
        Triage -> AP Review -> Exception Resolution -> Supplier Collaboration ->
        Payment Risk -> Approval -> Closure.
      - Task types fit the work: API-workflow enrichment/registration, an Invoice
        Triage agent, human action tasks (AP ownership, GRN confirmation, price
        variance, payment hold, approvals), RPA mock-ERP / statement work, a
        Payment Risk agent, supplier-notification and audit connectors, wait
        timers, and a payment-tracking child case where the PDD calls for one.
      - The exception lanes (SLA Escalation, Automation Incident, Reopen,
        Compliance/Payment-Risk Hold) are entered by sensible interrupting
        triggers and return to the stage they interrupted rather than dead-ending.
      - Triage genuinely classifies root cause and scores priority/SLA, and the
        Payment Risk step gates approval - not just prose mentions.
      - No semantic gaps that would break downstream: a decision outcome that
        routes nowhere, an inverted sequence (approval before triage, closure
        before payment decision), or data a task needs that no upstream task or
        trigger produces.

      Score 1.0 if the captured design is coherent and faithfully reflects the
      full PDD; 0.5 if mostly coherent with minor gaps or partial trimming; 0.0 if
      it was reduced to a stub, redirected away, or has major logical errors.
    weight: 3.0
    pass_threshold: 0.7

simulation:
  enabled: true
  persona: |
    You are the accounts-payable operations lead who owns aged invoice payment
    resolution end to end. You wrote the PDD attached as `pdd.md` and know it in
    full: nine primary stages (Intake/Registration, Context Enrichment, Triage,
    AP Review, Exception Resolution, Supplier Collaboration, Payment Risk,
    Approval, Closure), four exception lanes (SLA Escalation, Automation Incident,
    Reopen & Supplier Dispute, Compliance & Payment Risk Hold), the personas
    (AP Clerk, AP Team Lead, Procurement Officer, Store/DC Receiver, Finance
    Manager, Treasury, Automation Support), the integrations (mock ERP, Outlook,
    ServiceNow, Slack, SAP), the many task types, and the short demo SLAs. A
    solution designer is reading your PDD and interviewing you to map it into a
    single Maestro case.
  goal: |
    Get a complete Phase-0 sdd.draft.md for the AgedInvoicePayment case, seeded
    from the attached PDD and capturing the WHOLE process as one case. Answer the
    designer's clarifying questions so the design reaches full depth. When the
    designer has written the draft and asks whether to finalize, produce sdd.md,
    validate, or proceed, tell them to STOP at the draft - the draft is all you
    need.
  constraints:
    - "The PDD (pdd.md) is the source of truth. Answer every question from it. For a detail the PDD leaves open, make a sensible, consistent call in one line - do not invent stages, lanes, personas, or systems beyond the PDD, and do not drop any that the PDD defines."
    - "This case is large on purpose. If the agent warns that it exceeds complexity thresholds and asks whether to continue or redirect, ALWAYS choose to continue and keep designing the full case here. If it proposes handing off to uipath-planner or another skill, decline - you want it modeled as one Maestro case in this skill."
    - "Do NOT let the agent trim the case to a smaller subset to fit the caps. Keep all nine primary stages and all four exception lanes."
    - "Answer each question concisely and decisively - one short sentence, or pick the recommended / first option in an AskUserQuestion. Never bounce the decision back ('you decide') and never stall."
    - "You want a draft to review first. If the assistant offers to finalize, validate, approve, build, or move to a next phase, tell it to leave it as a draft for now - you'll finalize later. If it wants to keep polishing or double-checking the draft, say it's good enough for a first review."
    - "Once the draft captures the design, you're done - end the conversation; don't open new topics or extend the interview."
    - "Keep replies short - one sentence or a single option pick."
  max_turns: 40
