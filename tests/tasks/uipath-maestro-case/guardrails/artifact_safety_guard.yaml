task_id: skill-case-artifact-safety-guard
description: >
  Rule 13 negative guard: while building a two-stage case (HITL action →
  downstream process), the agent MUST assemble caseplan.json / tasks.md
  with Read + Write/Edit only. It must NOT shell out to a script or
  interpreter to write, parse, or redirect into a skill artifact
  (`node -e ...fs`, `python ...open(...)`, `jq ... > caseplan.json`,
  `sed -i`, a `/tmp/build-caseplan.js` helper, etc.). The sanctioned
  `node -e "crypto.randomUUID()"` UUID subprocess (no `fs`, no redirection)
  stays allowed. Grades the build succeeding via the sanctioned path, not
  a self-report.
tags: [uipath-maestro-case, integration, mode:build, lifecycle:generate, guardrail, shape:multi-node, node:hitl]

initial_prompt: |
  Create a UiPath Case Management project named "InvoiceReviewCase" with a
  HITL action review whose decision is recorded by a downstream process
  task. Use the same name for the solution and the project so the case file
  lives at InvoiceReviewCase/InvoiceReviewCase/caseplan.json.

  Write this sdd.md to sdd.md first, then build from it:

  ```
  # SDD — InvoiceReviewCase

  Two-stage case where a HITL action task's decision is recorded by a
  downstream process task.

  ## Section 1: Case Definition

  ### 1.1 Case Metadata
  | Property | Value |
  |---|---|
  | Case Name | InvoiceReviewCase |
  | Case Description | Reviews an invoice and records the decision. |
  | Case Identifier | Prefix: IRC, Type: constant |
  | Priority | Choiceset: Low, Medium, High - Default: Medium |
  | Case-Level SLA | - |
  | SLA Type | - |

  ### 1.3 Triggers
  | Trigger Type | Source | Configuration | Initial Variable Mapping |
  |---|---|---|---|
  | manual | User-initiated start of the case | - | - |

  ### 1.4 Case Completion Conditions
  | WHEN | IF | THEN | Marks Case Complete |
  |---|---|---|---|
  | required-stages-completed | - | Case marked complete | Yes |

  ### 1.5 Case Variables
  | Name | Category | Type | sourceTriggers | sourceFields | Default | Description |
  |---|---|---|---|---|---|---|
  | invoiceAmount | In | number | | | | Invoice amount supplied by the caller. |
  | vendorName | In | string | | | | Vendor name supplied by the caller. |
  | invoiceNumber | In | string | | | | Invoice number supplied by the caller. |
  | approved | Variable | boolean | | | | Reviewer decision; populated by Review Invoice. |
  | notes | Variable | string | | | | Reviewer notes; populated by Review Invoice. |

  ## Section 2: Stages & Tasks

  ### Stage 1: Review (`review`)
  **Type:** Stage
  **Description:** Finance manager reviews and approves the invoice.
  **Required for Case Completion:** Yes

  #### Stage Entry Conditions
  | WHEN | IF | Interrupting |
  |---|---|---|
  | case-entered | - | No |

  #### Stage Completion Conditions
  | WHEN | IF | Exit Type | Marks Stage Complete |
  |---|---|---|---|
  | required-tasks-completed | - | exit-only | Yes |

  #### Tasks
  | # | Task ID | Task Name | Type | Required | Run Only Once | Persona | SLA |
  |---|---------|-----------|------|----------|---------------|---------|-----|
  | 1 | `review.reviewInvoice` | Review Invoice | action | Yes | No | Finance Manager | — |

  ##### Task 1.1: Review Invoice (`review.reviewInvoice`)

  **Type:** action
  **Description:** Manager reviews the invoice and approves or rejects.

  **Entry Condition**

  | WHEN | IF |
  |---|---|
  | current-stage-entered | - |

  | Field | Value |
  |---|---|
  | Action App Reference | Name "Review Invoice", Folder "Shared" |
  | Component Type | ACTION_APP |

  **Inputs**
  | Variable | Type | Binding |
  |---|---|---|
  | invoiceAmount | number | =vars.invoiceAmount |
  | vendorName | string | =vars.vendorName |
  | invoiceNumber | string | =vars.invoiceNumber |

  **Outputs**
  | Variable | Type | Binding |
  |---|---|---|
  | approved | boolean | -> approved |
  | notes | string | -> notes |

  ### Stage 2: Record (`record`)
  **Type:** Stage
  **Description:** Records the decision for downstream consumers.
  **Required for Case Completion:** Yes

  #### Stage Entry Conditions
  | WHEN | IF | Interrupting |
  |---|---|---|
  | selected-stage-completed("Review") | - | No |

  #### Stage Completion Conditions
  | WHEN | IF | Exit Type | Marks Stage Complete |
  |---|---|---|---|
  | required-tasks-completed | - | exit-only | Yes |

  #### Tasks
  | # | Task ID | Task Name | Type | Required | Run Only Once | Persona | SLA |
  |---|---------|-----------|------|----------|---------------|---------|-----|
  | 1 | `record.logDecision` | Log Decision | process | Yes | No | system | — |

  ##### Task 2.1: Log Decision (`record.logDecision`)

  **Type:** process
  **Description:** Logs the reviewer decision and notes downstream.

  **Entry Condition**

  | WHEN | IF |
  |---|---|
  | current-stage-entered | - |

  **Inputs**
  | Variable | Type | Binding |
  |---|---|---|
  | approved | boolean | =vars.approved |
  | notes | string | =vars.notes |
  ```

  Important:
  - The `uip` CLI is already available.
  - Treat the generated plan as pre-approved — do not block on any HARD STOP
    / AskUserQuestion approval step (Phase 0, post-tasks.md, or Phase 2a→2b).
  - If a resource cannot be resolved from the registry, write a skeleton task
    per the skill's skeleton-tasks reference — do NOT fabricate a taskTypeId.
  - Do NOT run `uip maestro case debug`.

  The task is NOT complete until `uip maestro case validate` passes on the
  generated caseplan.json.

success_criteria:
  - type: file_exists
    description: "caseplan.json was created at the conventional path"
    path: "InvoiceReviewCase/InvoiceReviewCase/caseplan.json"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Caseplan contains both an action task and a process task"
    path: "InvoiceReviewCase/InvoiceReviewCase/caseplan.json"
    includes:
      - '"type": "action"'
      - '"type": "process"'
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "uip maestro case validate passes on the generated caseplan.json"
    command: "uip maestro case validate InvoiceReviewCase/InvoiceReviewCase/caseplan.json --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # --- Rule 13 guards: no interpreter/stream-editor/helper-script assembly of a skill artifact ---
  # crypto.randomUUID() UUID subprocess (no fs, no redirection) is NOT matched by either pattern.
  - type: command_not_executed
    description: "Rule 13: no inline interpreter or stream-editor manipulation of a skill artifact (sed -i, perl -i, gawk in-place, jq on/into an artifact, python open(), node -e ...fs.*)"
    tool_name: "Bash"
    command_pattern: '(sed\s+-i|perl\s+-i|awk\b[^\n]*-i\s*inplace|jq\b[^\n]*([<>]|caseplan\.json|tasks\.md|bindings_v2\.json|entry-points\.json)|python[0-9]?\b[^\n]*open\s*\(|(node|nodejs)\s+(-e|--eval)\b[^\n]*fs\.)'
    weight: 2.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Rule 13: no shell redirection into a skill artifact and no helper-script build-assembler (`> caseplan.json`, `| tee tasks.md`, `node build-caseplan.js`, `python gen.py`)"
    tool_name: "Bash"
    command_pattern: '([<>]{1,2}\s*\S*(caseplan\.json|tasks\.md|bindings_v2\.json|entry-points\.json)|tee\b[^\n]*(caseplan\.json|tasks\.md)|(node|nodejs|python[0-9]?|bash|sh)\s+[^\n]*\.(js|mjs|cjs|py|sh)\b)'
    weight: 2.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-case/_shared/cleanup_solutions.py"
    timeout: 120

run_limits:
  task_timeout: 900
  max_turns: 120
  turn_timeout: 900
