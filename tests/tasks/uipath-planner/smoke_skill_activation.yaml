task_id: skill-planner-smoke-skill-activation
description: >
  Smoke test: a non-trivial UiPath planning prompt loads the uipath-planner
  skill body. Verifies activation only — no SDD analysis, no task generation,
  no AskUserQuestion. The agent echoes the three entry-guard paths the skill
  defines, which appear verbatim in SKILL.md and cannot be fabricated without
  loading the skill.
tags: [uipath-planner, smoke, lifecycle:plan]

run_limits:
  expected_turns: 4
  turn_timeout: 1800  # 30-min per-turn cap

initial_prompt: |
  Help me plan a UiPath solution from scratch — a multi-step process that
  spans several skills. Load the appropriate UiPath skill for this work.

  Do NOT analyze any document. Do NOT generate any plan or tasks file. Do
  NOT ask me clarifying questions. Do NOT call AskUserQuestion.

  After loading the skill, write to `paths.txt` the EXACT names of the three
  paths the entry guard routes to (one design phase plus two lanes), one per
  line. Use the names exactly as they appear in the skill body.

  Stop after writing `paths.txt`.

success_criteria:
  - type: file_exists
    description: "Agent produced paths.txt"
    path: "paths.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "paths.txt lists the three entry-guard paths (verbatim from SKILL.md)"
    path: "paths.txt"
    includes:
      - "Phase D"
      - "Lane A"
      - "PDD-driven"
      - "Lane B"
      - "Non-PDD"
    weight: 3.0
    pass_threshold: 1.0
