task_id: skill-planner-smoke-deferral-single-rpa
description: >
  Negative / boundary coverage: a single self-contained RPA process (one
  .xaml/.cs project) must route to ONE specialist (uipath-rpa), NOT fan out
  through the multi-project planner. Guards the SKILL.md single-project
  deferral rule — the #1 named mis-trigger — against planner over-triggering.
tags: [uipath-planner, smoke, mode:build, lifecycle:discover]

initial_prompt: |
  I want to build ONE UiPath RPA process: a Windows bot that reads invoices
  from a folder, extracts the vendor and amount, and types them into a SAP GUI
  form. It is one self-contained .xaml/.cs project — I am NOT orchestrating
  other, separately-built automations.

  Load the appropriate UiPath skill to decide how this work should be routed.
  Do NOT build anything. Do NOT generate a plan, an SDD, or a task list.

  Write exactly one line to `routing.txt`: the name of the single skill that
  should own this work end-to-end (for example `uipath-rpa`). Output only the
  skill name — no explanation, no punctuation, no quotes. Write
  `uipath-planner` ONLY if the work genuinely spans multiple separately-built
  projects that each need their own specialist.

success_criteria:
  - type: file_exists
    description: "Agent produced routing.txt"
    path: "routing.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Routed to the single owning specialist (uipath-rpa)"
    path: "routing.txt"
    includes:
      - "uipath-rpa"
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Did NOT route a single-project request to the multi-project planner"
    command: "! grep -qi planner routing.txt"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Did not over-plan — no planner plan/tasks/SDD artifact was produced"
    command: "! find . \\( -name '*-tasks.md' -o -name '*-plan.md' -o -name '*-sdd.md' \\) -not -path '*/.venv/*' -not -path '*/node_modules/*' | grep -q ."
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0
