task_id: skill-planner-smoke-single-project-deferral
description: >
  Negative / boundary coverage: a single self-contained Maestro Flow request
  (decision + HTTP + inline HITL nodes) must route to ONE specialist
  (uipath-maestro-flow), NOT fan out through the multi-project planner. Inline
  nodes are author sub-steps, not separate buildable projects — the SKILL.md
  "skip for single-project" rule and its most-common-mis-trigger warning. Guards
  against the planner over-triggering on single-project work.
tags: [uipath-planner, smoke, mode:build, lifecycle:discover]

initial_prompt: |
  I want to build ONE UiPath Maestro Flow. It has a decision node, two HTTP
  request nodes, and a single inline human-approval (HITL) step before the final
  node. It is one self-contained project — I am NOT orchestrating other,
  separately-built automations.

  Load the appropriate UiPath skill to decide how this work should be routed. Do
  NOT build anything. Do NOT generate a plan, an SDD, or a task list.

  Write exactly one line to `routing.txt`: the name of the single skill that
  should own this work end-to-end (for example `uipath-maestro-flow`). Output
  only the skill name — no explanation, no punctuation, no quotes. Write
  `uipath-planner` ONLY if the work genuinely spans multiple separately-built
  projects that each need their own specialist.

success_criteria:
  - type: file_exists
    description: "Agent produced routing.txt"
    path: "routing.txt"
    weight: 1.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Routed to the single owning specialist (uipath-maestro-flow)"
    path: "routing.txt"
    includes:
      - "uipath-maestro-flow"
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Did NOT route a single-project request to the multi-project planner"
    command: "! grep -qi planner routing.txt"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Did not over-plan — no planner plan/tasks/SDD artifact was produced"
    command: "! find . \\( -name '*-tasks.md' -o -name '*-plan.md' -o -name '*-sdd.md' \\) -not -path '*/.venv/*' -not -path '*/node_modules/*' | grep -q ."
    timeout: 10
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0
