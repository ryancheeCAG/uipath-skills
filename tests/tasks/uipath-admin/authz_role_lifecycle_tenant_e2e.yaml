task_id: skill-admin-authz-role-lifecycle-tenant-e2e
description: >
  End-to-end test: full CRUD lifecycle (create, update, get, delete) of a
  Tenant-scope custom role bound to one specific tenant (the login tenant) —
  carrying the "Administration Page" View permission
  (`CENTRALIZEDACCESS.ADMINISTRATIONPAGE.VIEW`, a Tenant-shape Centralized
  Access permission). Discovers the permission via `permissions list`,
  resolves the login tenant's UUID, creates with `--scope Tenant` AND
  `--tenant-id <UUID>`, updates the role, verifies via `roles get`, then
  deletes and confirms removal.

  Validates: `--scope Tenant` with `--tenant-id` binding to one tenant,
  tenant resolution before create, the `roles update` step, no
  `--scope TenantGlobal` (this role is bound to one tenant, not a template),
  no `--service centralizedaccess` (the CLI rejects it — Centralized Access
  is the no-`--service` umbrella), no `--scope Organization` (the permission
  is Tenant-shape, not org-wide).

  A post_run safety net (`cleanup_role.py`) deletes the role by id so an
  incomplete run leaves no orphan role on the tenant.
tags: [uipath-admin, e2e, mode:build, authz, role-lifecycle, scope:tenant]

run_limits:
  expected_turns: 18
  max_turns: 40
  turn_timeout: 600

initial_prompt: |
  Set up a read-only role called "AdminPageViewer_clie2e" that applies
  only to the tenant I'm currently logged into — not the whole
  organization, not other tenants. It should grant view-only access to
  the Administration page (read-only admin-page access, nothing else).

  Create it, then update its description to note it is read-only and
  confirm the change, and finally remove it and confirm it's gone.

  Important:
  - If the `uip admin` subcommand is unavailable or a command fails,
    that is acceptable — run each command exactly once and continue. Do
    NOT retry, do NOT attempt to login, do NOT try to install tools, do
    NOT troubleshoot errors.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent resolved the current login tenant's UUID before binding the role"
    tool_name: "Bash"
    command_pattern: 'uip\s+(?:login\s+status|admin\s+tenants\s+(?:list|get))'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed Tenant-shape permissions to discover the Administration Page permission"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+permissions\s+list\b'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created the role with --scope Tenant, --tenant-id <UUID>, and --name AdminPageViewer_clie2e"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+create\s+.*--scope\s+Tenant\b.*--tenant-id\s+[a-f0-9-]{8,}.*--name\s+\S*AdminPageViewer_clie2e.*--file\s+\S+'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent updated the role via `roles update <id>` re-passing the actions file"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+update\s+[a-f0-9-]{8,}.*--file\s+\S+'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified the updated role via `roles get <id>`"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+get\s+[a-f0-9-]{8,}'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent cleaned up by calling `roles delete <id>`"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+delete\s+[a-f0-9-]{8,}'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified the role was removed (second `roles get` or `roles list --filter`)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+(?:get\s+[a-f0-9-]{8,}|list\s+.*--filter\s+\S*AdminPageViewer_clie2e)'
    min_count: 2
    weight: 1.0
    pass_threshold: 1.0

  - type: command_not_executed
    description: "Agent must NOT use --scope TenantGlobal (this role is bound to one specific tenant, not a template)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+create\s+.*--scope\s+TenantGlobal\b'
    weight: 1.5

  - type: command_not_executed
    description: "Agent must NOT pass --service centralizedaccess (CLI rejects it; Centralized Access is the no---service umbrella)"
    tool_name: "Bash"
    command_pattern: '--service\s+centralizedaccess\b'
    weight: 1.5

  - type: command_not_executed
    description: "Agent must NOT create the role with --scope Organization (the Administration Page permission is Tenant-shape)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+authorization\s+roles\s+create\s+.*--scope\s+Organization\b'
    weight: 1.0

post_run:
  - command: 'CLEANUP_ROLE_NAME="AdminPageViewer_clie2e" python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-admin'',''cleanup_role.py''))"'
    timeout: 30
