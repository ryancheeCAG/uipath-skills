task_id: skill-admin-identity-create-external-app-smoke
description: >
  Smoke test: agent uses the uipath-admin skill to create an external
  OAuth2 app with scopes. Tests correct --app-scope flag usage
  (Critical Rule #6) and positional name argument.
tags: [uipath-admin, smoke, create]

sandbox:
  driver: docker
  python: {}

initial_prompt: |
  Create a new external app named "Smoke Test App" with application
  scopes for Folders and Jobs access in my UiPath organization.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent ran external-apps create with scopes"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+external-apps\s+create\s+.*--(app-)?scope\s+"?OR\.'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
