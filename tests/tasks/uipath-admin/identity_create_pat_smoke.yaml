task_id: skill-admin-identity-create-pat-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-admin skill to create
  a personal access token with scopes and expiration. Tests correct
  flag usage and token-shown-once awareness.

tags: [uipath-admin, smoke, create]

run_limits:
  expected_turns: 6

initial_prompt: |
  Create a personal access token for CI/CD with read access to Folders
  and Jobs, expiring January 15, 2027.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent ran pat create with --description, --expiration, and --scope"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+pat\s+create\s+.*--description'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included --scope with OR.* values"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+pat\s+create\s+.*--scope\s+"?OR\.'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent included --expiration"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+pat\s+create\s+.*--expiration'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
