task_id: skill-admin-identity-human-onboarding
description: >
  End-to-end test: agent performs a human user onboarding flow.
  Invites a user by email with name, then assigns them to a group.
  Validates the agent follows the onboarding workflow from the skill.
tags: [uipath-admin, e2e, mode:build, onboarding]

run_limits:
  expected_turns: 10
  max_turns: 40
  turn_timeout: 600

initial_prompt: |
  Onboard john.doe@example.com (John Doe) and add them to the
  "Automation Developer" group once provisioned. After inviting,
  list users to confirm the invite was processed.

  If this user already exists, remove them first, then re-invite.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent invited user with correct email and --name/--surname"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+users\s+invite\s+.*--email.*john\.doe@example\.com.*--name'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed groups"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added user to group with --user-ids"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+members\s+add\s+.*--user-ids'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified invite by listing users after invite"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+users\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

post_run:
  - command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-admin'',''cleanup_invited_user.py''))"'
    timeout: 30
