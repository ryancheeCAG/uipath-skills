task_id: skill-admin-identity-human-onboarding
description: >
  End-to-end test: agent performs a human user onboarding flow.
  Invites a user by email with name, then assigns them to a group.
  Validates the agent follows the onboarding workflow from the skill.
tags: [uipath-admin, e2e, onboarding]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  max_turns: 40
  turn_timeout: 600

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Onboard john.doe@example.com (John Doe) and add them to the
  "Automation Developer" group once provisioned.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent invited user with correct email and --name/--surname"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+users\s+invite\s+.*--email.*john\.doe@example\.com.*--name'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed groups"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added user to group with --user-ids"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+members\s+add\s+.*--user-ids'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent consistently used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+.*--output\s+json'
    min_count: 3
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Invite was processed — user found in list"
    command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''TASK_DIR''],''check_user_invited.py''))"'
    timeout: 30
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

post_run:
  - command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''TASK_DIR''],''cleanup_invited_user.py''))"'
    timeout: 30
