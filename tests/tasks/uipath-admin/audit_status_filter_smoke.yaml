task_id: skill-admin-audit-status-filter-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-admin skill to filter
  events by status (Failure-only). Validates that the agent uses
  `--status Failure` (the canonical label) rather than inventing
  alternate spellings or omitting the filter and post-filtering in jq.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable; what matters is correct
  command invocation with correct flags.
tags: [uipath-admin, smoke, mode:diagnose, audit, status]

sandbox: {}

initial_prompt: |
  Show me all FAILED audit events on the active tenant from the last
  7 days.

  Important:
  - The `uip` CLI is available but the `admin` subcommand may not be
    installed and/or the CLI is not connected to a live tenant.
    Commands WILL fail — that is expected and acceptable.
    Run each command exactly once regardless of errors.
    Do NOT retry, do NOT attempt to login, do NOT try to install tools,
    do NOT troubleshoot errors.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent passed --status Failure on the events call"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+events\b.*--status\s+(?i:Failure|1)'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent kept a bounded time window via --from-date/--to-date"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+events\b.*--from-date\s+\S+.*--to-date\s+\S+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+events\b.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
