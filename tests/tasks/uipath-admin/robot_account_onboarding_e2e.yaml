task_id: skill-admin-identity-robot-onboarding
description: >
  End-to-end test: agent performs a robot account onboarding flow.
  Creates a robot account, assigns it to a group for role-based access.
  Validates the agent follows the onboarding workflow from the skill.
tags: [uipath-admin, e2e, onboarding]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  max_turns: 40
  turn_timeout: 600

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Onboard an unattended invoice-processing robot ("smoke-e2e-bot" /
  "Smoke E2E Bot") and add it to the "Automation Users" group.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent listed existing robot accounts (discover before create)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created robot account with correct positional name"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+create\s+.*smoke-e2e-bot'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed groups to discover available roles"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+list'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added robot to a group"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+members\s+add'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent consistently used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+.*--output\s+json'
    min_count: 3
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Robot account 'smoke-e2e-bot' was created and exists"
    command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''TASK_DIR''],''check_robot_account.py''))"'
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

post_run:
  - command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''TASK_DIR''],''cleanup_robot_account.py''))"'
    timeout: 30
