task_id: skill-admin-apms-get-my-ip-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-admin skill to look up
  the caller's public IP as the platform sees it. Tests correct CLI
  namespace (`uip admin ip-restriction my-ip`) and --output json convention.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable; what matters is correct
  command invocation with correct flags.
tags: [uipath-admin, smoke, mode:diagnose, get, apms]

run_limits:
  expected_turns: 4

initial_prompt: |
  Look up my public IP address as seen by the UiPath admin IP restriction
  service on my UiPath organization.

  Important:
  - The `uip` CLI is available but is not connected to a live tenant.
    Commands WILL fail with auth errors — that is expected and acceptable.
    Run each command exactly once regardless of errors.
    Do NOT retry, do NOT attempt to login, do NOT troubleshoot errors.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:

  - type: skill_triggered
    description: "Agent activated the uipath-admin skill"
    skill_name: "uipath-admin"
    expected_skill: "uipath-admin"
    weight: 1.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent ran ip-restriction my-ip"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+ip-restriction\s+my-ip'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0
