task_id: skill-admin-federated-credentials-e2e
description: >
  End-to-end test: agent creates an external app and adds a federated
  credential for GitHub Actions OIDC. Verifies the app has the
  credential attached.
tags: [uipath-admin, e2e, mode:build, lifecycle:generate]

run_limits:
  expected_turns: 8
  max_turns: 40
  turn_timeout: 600

initial_prompt: |
  Create an external app named "e2e-federated-app" with app-level
  Folders scope, then set up GitHub Actions OIDC federation for
  repo myorg/myrepo on the main branch. After creating the federated
  credential, list the app's federated credentials to confirm it was
  attached.

  If an external app with this name already exists, delete it first,
  then create the new one.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent created the external app"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+external-apps\s+create\s+.*e2e-federated-app'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created federated credential with --issuer"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+external-apps\s+federated-credentials\s+create\s+.*--issuer'
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent verified federated credential by listing credentials on the app"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+external-apps\s+federated-credentials\s+list'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

post_run:
  - command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-admin'',''cleanup_federated_app.py''))"'
    timeout: 30
