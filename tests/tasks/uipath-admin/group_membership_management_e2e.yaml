task_id: skill-admin-identity-group-membership
description: >
  End-to-end test: agent manages group membership. Creates a custom
  group, discovers users, adds members, verifies membership, then
  removes a member. Tests full group lifecycle and the critical rule
  about using user IDs (not usernames) for membership operations.
tags: [uipath-admin, e2e, lifecycle:generate, lifecycle:edit]

run_limits:
  expected_turns: 12
  max_turns: 40
  turn_timeout: 600

initial_prompt: |
  Set up a new "Invoice Processing Team" group containing the first
  two users in the org, verify membership, then remove the second user.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent created the group with positional name"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+create\s+"?Invoice\s+Processing\s+Team'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent listed users to resolve IDs"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+users\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent added members with --user-ids"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+members\s+add\s+.*--user-ids'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent removed a member with members revoke"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+groups\s+members\s+revoke\s+.*--user-ids'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent consistently used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+.*--output\s+json'
    min_count: 4
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Group 'Invoice Processing Team' exists and has exactly one member"
    command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''TASK_DIR''],''check_group_membership.py''))"'
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

post_run:
  - command: 'python3 -c "import os,runpy;runpy.run_path(os.path.join(os.environ[''SKILLS_REPO_PATH''],''tests'',''tasks'',''uipath-admin'',''cleanup_group.py''))"'
    timeout: 30
