task_id: skill-admin-identity-create-robot-account-smoke
description: >
  Smoke test: agent uses the uipath-admin skill to create a robot
  account. Tests discover-before-create pattern (Critical Rule #3),
  correct positional arg for name, and --display-name flag.
tags: [uipath-admin, smoke, create]

sandbox:
  driver: docker
  python: {}

initial_prompt: |
  Create a new robot account named "smoke-test-bot" with display name
  "Smoke Test Bot" in my UiPath organization.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent listed robot accounts first (discover before create)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created robot account with correct positional name and --display-name"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+create\s+.*smoke-test-bot.*--display-name'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
