task_id: skill-admin-identity-create-robot-account-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-admin skill to create
  a robot account. Tests discover-before-create pattern (Critical
  Rule #3) and correct create command with --display-name flag.

  Platform note: runs without an authenticated tenant — commands will
  fail with auth errors. That is acceptable.
tags: [uipath-admin, smoke, create]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a new robot account named "invoice-bot" with display name
  "Invoice Processing Bot" in my UiPath organization.

  Important:
  - The `uip` CLI is available but the `admin` subcommand may not be
    installed and/or the CLI is not connected to a live tenant.
    Commands WILL fail — that is expected and acceptable.
    Run each command exactly once regardless of errors.
    Do NOT retry, do NOT attempt to login, do NOT try to install tools,
    do NOT troubleshoot errors.
  - Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:

  - type: command_executed
    description: "Agent listed robot accounts first (discover before create)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+list'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent created robot account with correct name and display name"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+robot-accounts\s+create\s+.*invoice-bot.*--display-name'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent used --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+.*--output\s+json'
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0
