task_id: skill-admin-audit-export-e2e
description: >
  End-to-end skill-guided evaluation: agent uses the uipath-admin skill
  to drive a complete investigation — discover sources, query events
  in a window, then export the same window to a ZIP. Validates the
  full sources → events → export chain plus the export's required
  --from-date / --to-date / --output-file flags.

  Platform note: commands fail with auth errors in this environment.
  E2e tests still validate the CLI invocation surface — the agent must
  produce the right command sequence with the right flags.
tags: [uipath-admin, e2e, mode:operate, audit, export]
max_iterations: 2

agent:
  type: claude-code
  permission_mode: acceptEdits
  max_turns: 40
  turn_timeout: 600
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  A security reviewer needs the full audit history for the last 7 days
  on the active tenant. They want to:

    1. See what audit event sources are visible (so they know what's
       being captured).
    2. Get a quick preview of the most recent events for context.
    3. Get the entire 7-day window as a ZIP for offline review.

  Output the ZIP to ./audit-last-7d.zip in the current working
  directory.

  Do NOT ask for approval, confirmation, or feedback.
  Do NOT pause between planning and implementation.

  Important:
  - The `uip` CLI is available but is NOT connected to a live tenant.
    Commands will fail with auth errors — that is expected. Run each
    command exactly once and continue. Do NOT retry or attempt to login.

success_criteria:
  # 1. sources discovery happened first
  - type: command_executed
    description: "Agent invoked `uip admin audit tenant sources` (discovery before query)"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+sources\b.*--output\s+json'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # 2. events query with a bounded window
  - type: command_executed
    description: "Agent invoked `uip admin audit tenant events` with --from-date and --to-date ISO bounds"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+events\b.*--from-date\s+\S+.*--to-date\s+\S+'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  # 3. export with both required bounds AND --output-file
  - type: command_executed
    description: "Agent invoked `uip admin audit tenant export` with --from-date, --to-date, AND --output-file"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+export\b.*--from-date\s+\S+.*--to-date\s+\S+.*--output-file\s+\S+'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  # 4. export written to the requested path
  - type: command_executed
    description: "Agent's export targeted ./audit-last-7d.zip"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+audit\s+tenant\s+export\b.*--output-file\s+\.?/?audit-last-7d\.zip'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0
