task_id: skill-admin-identity-scopes-list-smoke
description: >
  Skill-guided evaluation: agent uses the uipath-admin skill to
  list available OAuth2 scopes. Tests correct CLI namespace.

tags: [uipath-admin, smoke, list]

run_limits:
  expected_turns: 6

initial_prompt: |
  Show me all available OAuth2 scopes I can use for external apps
  and personal access tokens.

  Do NOT prompt the user for confirmation — this is an automated test.

success_criteria:
  - type: command_executed
    description: "Agent ran scopes list with --output json"
    tool_name: "Bash"
    command_pattern: 'uip\s+admin\s+scopes\s+list\s+.*--output\s+json'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0
