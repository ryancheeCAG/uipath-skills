task_id: skill-tasks-smoke-negative-guards
description: >
  Smoke test: agent is presented with four requests that the uipath-tasks
  skill prohibits or flags — creating a new task (not in CLI scope),
  completing an already-Completed task, completing a FormTask without
  --action/--data, and using a GUID as a task ID. The agent must refuse or
  flag each one and explain why, rather than attempting it. Enforces
  Critical Rules (task IDs numeric, FormTask requires action+data, do not
  complete already-completed tasks) without a live tenant.
tags: [uipath-tasks, smoke, negative]

sandbox:
  driver: docker
  python: {}

initial_prompt: |
  Before starting, load the uipath-tasks skill and follow its workflow.

  You have four requests. For each, decide whether the uipath-tasks skill
  supports it. If yes, describe what you would do. If no, refuse and explain
  why, referring to the skill's Critical Rules or the "Not in scope" section.

  Task 1: Create a brand-new FormTask in folder 123 titled "Invoice Review"
  and assign it to alice@company.com.

  Task 2: Task 5555555 is already in status "Completed". Complete it again
  with action "Reject".

  Task 3: Complete FormTask 6666666 in folder 123. Use --type FormTask and
  --folder-id 123, but skip --action and --data (the form has no fields).

  Task 4: Get task "abc-123-def-456" — the user passed a GUID-style ID.

  Save a summary to report.json:
  {
    "task_1_action": "<'refused' or 'attempted'>",
    "task_1_reason": "<why>",
    "task_2_action": "<'refused' or 'attempted'>",
    "task_2_reason": "<why>",
    "task_3_action": "<'refused' or 'attempted'>",
    "task_3_reason": "<why>",
    "task_4_action": "<'refused' or 'attempted'>",
    "task_4_reason": "<why>"
  }

  Important:
  - Do NOT run any uip tasks commands. This test is purely about refusal.
  - For each task, clearly state whether you are refusing and reference
    the specific skill rule that applies.

success_criteria:
  - type: file_exists
    description: "report.json was created"
    path: "report.json"
    weight: 1.0
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused to create a task (not in CLI scope)"
    path: "report.json"
    assertions:
      - expression: "task_1_action"
        operator: equals
        expected: "refused"
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused to complete an already-Completed task"
    path: "report.json"
    assertions:
      - expression: "task_2_action"
        operator: equals
        expected: "refused"
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused to complete a FormTask without --action/--data"
    path: "report.json"
    assertions:
      - expression: "task_3_action"
        operator: equals
        expected: "refused"
    weight: 2.5
    pass_threshold: 1.0

  - type: json_check
    description: "Agent refused to use a GUID task ID (Action Center uses numeric IDs)"
    path: "report.json"
    assertions:
      - expression: "task_4_action"
        operator: equals
        expected: "refused"
    weight: 2.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Reasons reference skill constraints (numeric IDs, action/data, already completed)"
    path: "report.json"
    includes:
      - "numeric"
    weight: 1.0
    pass_threshold: 1.0
