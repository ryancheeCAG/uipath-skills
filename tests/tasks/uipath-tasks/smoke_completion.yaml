task_id: skill-tasks-smoke-completion
description: >
  Smoke test: agent uses the uipath-tasks skill to complete three different
  task types with correct per-type requirements offline — ExternalTask with
  minimal flags, FormTask with both --action and --data, and AppTask with
  both --action and --data. Verifies that --type is always included, that
  --folder-id is present on every complete call, and that FormTask/AppTask
  carry --action and --data. Runs against fake IDs; auth errors expected.
tags: [uipath-tasks, smoke, completion]

run_limits:
  expected_turns: 6

initial_prompt: |
  Before starting, load the uipath-tasks skill and follow its workflow.

  Use --output json on every uip tasks command. Task IDs and folder IDs
  are numeric.

  Complete three tasks — one per type. Each task sits in folder 123.

  1. ExternalTask (ID 3000001). ExternalTask allows optional --action and
     --data. Do NOT include them — verify the minimal form works.

  2. FormTask (ID 3000002). FormTask requires BOTH --action and --data.
     - action: "Approve"
     - data: { "comments": "Looks good", "approved": true }

  3. AppTask (ID 3000003). AppTask also requires BOTH --action and --data.
     - action: "Complete"
     - data: { "result": "verified" }

  Every complete call must include:
    - --type <TaskType>
    - --folder-id 123

  Important:
  - The CLI is not connected to a live tenant. Auth errors are expected.
    Run each command once and move on. Do NOT retry or login.
  - Do NOT skip --type on any complete call. Do NOT skip --folder-id.

success_criteria:
  - type: command_executed
    description: "Agent completed an ExternalTask with --type and --folder-id (minimal form)"
    tool_name: "Bash"
    command_pattern: 'uip\s+tasks\s+complete\s+\d+\s+.*--type\s+ExternalTask.*--folder-id\s+\d+'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent completed a FormTask with --action and --data"
    tool_name: "Bash"
    command_pattern: 'uip\s+tasks\s+complete\s+\d+\s+.*--type\s+FormTask.*--action\s+.*--data\s+'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent completed an AppTask with --action and --data"
    tool_name: "Bash"
    command_pattern: 'uip\s+tasks\s+complete\s+\d+\s+.*--type\s+AppTask.*--action\s+.*--data\s+'
    min_count: 1
    weight: 2.5
    pass_threshold: 1.0

  - type: command_executed
    description: "Every complete call includes --folder-id"
    tool_name: "Bash"
    command_pattern: 'uip\s+tasks\s+complete\s+\d+\s+.*--folder-id\s+\d+'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Every complete call includes --type"
    tool_name: "Bash"
    command_pattern: 'uip\s+tasks\s+complete\s+\d+\s+.*--type\s+\w+'
    min_count: 3
    weight: 2.0
    pass_threshold: 1.0

