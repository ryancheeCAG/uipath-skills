task_id: skill-flow-hitl-quality-result-downstream
description: >
  Quality test: agent correctly references the HITL node's output via
  $vars.<nodeId>.output in a downstream node. Tests that the agent knows
  the output variable path and wires it into a decision or script node.
tags: [uipath-maestro-flow, integration, lifecycle:generate, shape:multi-node, node:hitl]

agent:
  type: claude-code
  permission_mode: acceptEdits

run_limits:
  max_turns: 47
  turn_timeout: 900

initial_prompt: |
  Build a UiPath Flow named "ExpenseApproval" that:

  1. Manual trigger starts the flow
  2. HITL node — expense review:
       - Reviewer sees: expense amount, requester name, category (all read-only)
       - Reviewer fills in: approved (boolean), comments (text, optional)
       - Outcomes: Approve (primary), Reject
  3. Script node — reads the reviewer's decision from the HITL output and
     logs: "Decision: <approved value>, Comments: <comments value>"
     The script must reference the HITL output via the correct runtime variable path.
  4. End node

  Wire: Trigger -> HITL ->|completed| Script -> End

  Use the inline quickform node (uipath.human-in-the-loop).
  Validate the flow after building.

success_criteria:
  - type: run_command
    description: "uip flow validate passes"
    command: "uip maestro flow validate ExpenseApproval/ExpenseApproval/ExpenseApproval.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow contains inline HITL node"
    path: "ExpenseApproval/ExpenseApproval/ExpenseApproval.flow"
    includes:
      - '"uipath.human-in-the-loop"'
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow references the HITL output variable"
    path: "ExpenseApproval/ExpenseApproval/ExpenseApproval.flow"
    includes:
      - "$vars."
      - ".output"
    weight: 3.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow has a boolean output field for approved"
    path: "ExpenseApproval/ExpenseApproval/ExpenseApproval.flow"
    includes:
      - '"boolean"'
    weight: 1.5
    pass_threshold: 1.0

