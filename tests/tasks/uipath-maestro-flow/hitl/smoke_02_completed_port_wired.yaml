task_id: skill-flow-hitl-smoke-completed-port
description: >
  Smoke test: agent wires the HITL node's `completed` output port (not the
  old `cancelled` or `timeout` ports). Verifies correct edge structure in
  a three-node approval flow.
tags: [uipath-maestro-flow, smoke, lifecycle:generate, shape:multi-node, node:hitl]

agent:
  type: claude-code
  permission_mode: acceptEdits

run_limits:
  max_turns: 105
  turn_timeout: 600

sandbox: {}

initial_prompt: |
  Build a UiPath Flow named "PurchaseApproval" with this structure:
    Manual Trigger -> HITL (manager approves purchase) -> Script (log approval) -> End

  Use the inline quickform HITL node (uipath.human-in-the-loop).
  The HITL node shows the reviewer: purchase amount and vendor name.
  Outcomes: Approve and Reject.

  Wire the HITL node's completed handle to the Script node.
  The Script node logs: "Approval recorded."

  Validate the flow after building.

success_criteria:
  - type: file_exists
    description: "Flow file was created"
    path: "PurchaseApproval/PurchaseApproval/PurchaseApproval.flow"
    weight: 1.5
    pass_threshold: 1.0

  - type: file_contains
    description: "Flow uses completed as the HITL output handle"
    path: "PurchaseApproval/PurchaseApproval/PurchaseApproval.flow"
    includes:
      - '"completed"'
    weight: 3.0
    pass_threshold: 1.0

  # Note: a prior "does not reference cancelled/timeout handles" excludes-only
  # check was removed. The HITL node's `definitions` entry is copied verbatim
  # from the registry (Critical Rule #7) and declares *all* handles (completed,
  # cancelled, timeout) — so a substring search against the flow JSON cannot
  # distinguish "handle declared in the manifest" from "handle wired on an
  # edge". The positive "completed" check above is the meaningful signal;
  # the validate step below catches genuinely malformed edges.

  - type: run_command
    description: "uip maestro flow validate passes"
    command: "uip maestro flow validate PurchaseApproval/PurchaseApproval/PurchaseApproval.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

