task_id: skill-flow-ixp-e2e-invoice-extraction-greenfield
description: >
  E2E (greenfield): SharePoint trigger → IxP extraction → HTTP POST. Tests
  end-to-end authoring of a real invoice-processing flow that monitors a
  SharePoint folder, extracts structured invoice fields, and forwards the
  result to a downstream system over HTTP.

  Validate-only: no `uip maestro flow debug`. IxP runtime + SharePoint
  connector both require a tenant deployment which CI does not have; e2e
  verifies offline structural correctness only (`uip maestro flow validate`
  exit 0 on the generated flow).

tags: [uipath-maestro-flow, e2e, lifecycle:generate, shape:multi-node, node:ixp, connector, feature:http]

task_timeout: 900

agent:
  type: claude-code
  permission_mode: acceptEdits
  max_turns: 80
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Build a UiPath Flow that monitors a SharePoint folder for new vendor PDF
  invoices, extracts the structured data (invoice number, vendor, invoice
  date, total amount, line items), and posts the result to SAP through an
  HTTP request.

  - SharePoint connector: configured (use a connector trigger node)
  - SharePoint folder: "New Vendor"
  - IxP model: "Invoice Model"
  - SAP: HTTP POST request to the configured endpoint, sending the extracted
    invoice fields as the request body

  Important:
  - The `uip` CLI is already available.
  - Use `--output json` on all uip commands.
  - Work inside the stated working directory — do NOT `cd` to a parent.
  - Do NOT run `uip maestro flow debug` or `uip maestro flow deploy`.
  - Run `uip maestro flow validate` at most ONCE. If it fails, stop.
  - Do NOT iterate on validation errors.

success_criteria:
  - type: skill_triggered
    expected: "yes"
    skill_name: "uipath:uipath-maestro-flow"
    description: "Agent invoked the uipath-maestro-flow Skill"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent searched the registry for IxP node types"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+(search|list|get)\b[^\n]*ixp'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent searched the registry for a SharePoint connector"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+(search|list|get)\b[^\n]*sharepoint'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "uip maestro flow validate passes on the generated flow file"
    command: 'f=$(find . -name "*.flow" -print -quit); [ -n "$f" ] && uip maestro flow validate "$f" --output json'
    timeout: 60
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Generated flow contains an IxP extraction node or core.logic.mock fallback"
    command: 'grep -rqE "\"type\"[[:space:]]*:[[:space:]]*\"(uipath\.ixp|core\.logic\.mock)" --include="*.flow" .'
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Generated flow contains a SharePoint trigger or connector node"
    command: 'grep -rqiE "sharepoint" --include="*.flow" .'
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Generated flow contains an HTTP action node (core.action.http)"
    command: 'grep -rqE "core\.action\.http|\"type\"[[:space:]]*:[[:space:]]*\"[^\"]*http[^\"]*\"" --include="*.flow" .'
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Generated flow references the IxP extraction output via $vars (downstream consumption)"
    command: 'grep -rqE "\$vars\." --include="*.flow" .'
    expected_exit_code: 0
    weight: 1.5
    pass_threshold: 1.0
