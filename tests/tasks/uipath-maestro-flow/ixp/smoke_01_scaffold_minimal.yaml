task_id: skill-flow-ixp-smoke-scaffold-minimal
description: >
  Smoke: minimal scaffold — manual trigger → IxP extract → script (logs "ok")
  → validate. Tests that the agent picks the IxP plugin, authors a single
  extraction node via Direct JSON, and produces a flow that passes
  `uip maestro flow validate`.

  Validate-only: no `uip maestro flow debug`. IxP runtime requires a tenant
  deployment which CI does not have; smoke verifies offline structural
  correctness only.

tags: [uipath-maestro-flow, smoke, lifecycle:generate, shape:single-node, node:ixp]

task_timeout: 600

agent:
  type: claude-code
  permission_mode: acceptEdits
  max_turns: 40
  turn_timeout: 600

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a new Maestro Flow project called "Smoke" with a manual trigger, an
  extract node, and a script node that just logs "ok". Wire the extracted
  handle to the script and validate the flow.

  Document is in the storage bucket named: InvoiceBucket
  Model used: Invoice Model
  Script node: contains a JavaScript that logs OK when it receives the
  extraction result.

  Important:
  - The `uip` CLI is already available.
  - Use `--output json` on all uip commands.
  - Work inside the stated working directory — do NOT `cd` to a parent.
  - Do NOT run `uip maestro flow debug` or `uip maestro flow deploy`.
  - Run `uip maestro flow validate` at most ONCE. If it fails, stop.
  - Do NOT iterate on validation errors.

success_criteria:
  - type: skill_triggered
    skill_name: "uipath-maestro-flow"
    expected_skill: "uipath-maestro-flow"
    description: "Agent invoked the uipath-maestro-flow Skill"
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent searched the registry for IxP node types"
    tool_name: "Bash"
    command_pattern: 'uip\s+maestro\s+flow\s+registry\s+(search|list|get)\b[^\n]*ixp'
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Agent validated the .flow file"
    tool_name: "Bash"
    command_pattern: 'uip\s+(maestro\s+)?flow\s+validate'
    min_count: 1
    weight: 1.5
    pass_threshold: 1.0

  - type: run_command
    description: "uip maestro flow validate passes on Smoke.flow"
    command: "uip maestro flow validate Smoke/Smoke/Smoke.flow --output json"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Generated flow contains an IxP extraction node or core.logic.mock fallback (per references/plugins/ixp/impl.md)"
    command: 'grep -rqE "\"type\"[[:space:]]*:[[:space:]]*\"(uipath\.ixp|core\.logic\.mock)" --include="*.flow" .'
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: file_contains
    description: "Script node consumes the extraction output via $vars expression"
    path: "Smoke/Smoke/Smoke.flow"
    includes:
      - "$vars."
    weight: 1.5
    pass_threshold: 1.0
