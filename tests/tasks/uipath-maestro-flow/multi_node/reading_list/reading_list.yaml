task_id: skill-flow-reading-list
description: >
  Create a UiPath Flow that curates a reading list from a catalog of math/ML/stats
  books using declarative transform operations (filter + map). Tests whether the
  agent selects transform nodes over script nodes for standard data wrangling,
  and correctly configures filter conditions and map transformations.
tags: [uipath-maestro-flow, e2e, lifecycle:generate, shape:multi-node, node:transform]

run_limits:
  expected_turns: 20
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath Flow project named "ReadingList" that curates a reading list
  from a catalog of math and data science books.

  The catalog is this JSON array. Hardcode it in the flow as static data; do not
  require the user to provide it as a runtime input.

  [
    {"title": "Linear Algebra Done Right", "author": "Axler", "field": "math", "difficulty": 6, "pages": 340},
    {"title": "Deep Learning", "author": "Goodfellow", "field": "ml", "difficulty": 9, "pages": 800},
    {"title": "Statistical Learning", "author": "James", "field": "data science", "difficulty": 4, "pages": 440},
    {"title": "Elements of Statistical Learning", "author": "Hastie", "field": "stats", "difficulty": 9, "pages": 745},
    {"title": "Bayesian Data Analysis", "author": "Gelman", "field": "stats", "difficulty": 8, "pages": 580},
    {"title": "Python for Data Analysis", "author": "McKinney", "field": "data science", "difficulty": 3, "pages": 550},
    {"title": "Probability Theory", "author": "Jaynes", "field": "math", "difficulty": 10, "pages": 753},
    {"title": "Information Theory", "author": "MacKay", "field": "ml", "difficulty": 7, "pages": 540}
  ]

  The flow should:
  1. Filter to books with difficulty greater than 5 AND under 600 pages
  2. Transform the results to show only the book title (uppercased) and author
  3. Output the curated reading list as a result variable

  Use transform nodes for the data operations, not script nodes. Transform
  collection inputs must reference a variable path (e.g. `$vars.catalog`), not
  an inline `=js:[...]` array or `=js:$vars.<path>` expression.

  Validate the flow.
  Do NOT ask for approval, confirmation, or feedback. Do NOT pause between planning and implementation. Build the complete flow end-to-end in a single pass.
  Before starting, load the uipath-maestro-flow skill. Read and follow its workflow steps exactly.

success_criteria:
  # ── Flow file validity ─────────────────────────────────────────────────
  - type: run_command
    description: "uip maestro flow validate passes on the flow file"
    command: "uip maestro flow validate ReadingList/ReadingList/ReadingList.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # ── Execution checks ──────────────────────────────────────────────────
  - type: run_command
    description: "Flow debug runs and transform output contains the 3 curated books"
    command: "python3 $TASK_DIR/check_reading_list.py"
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/_shared/cleanup_solutions.py"
    timeout: 120
