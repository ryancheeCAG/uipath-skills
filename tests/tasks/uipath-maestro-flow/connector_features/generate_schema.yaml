task_id: skill-flow-ipe-generate-schema
description: >
  Tests the GenerateSchema IS feature — configures the Atlassian Jira
  "Create Issue" connector node so that customFieldsRequestDetails captures
  the parent values (project key + issue type id) that drive the schema
  fetch, and bodyParameters carries the required fields.summary value.
tags: [uipath-maestro-flow, integration, lifecycle:generate, shape:multi-node, connector, uipath-atlassian-jira, ipe]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  task_timeout: 1500
  max_turns: 120
  turn_timeout: 1200

initial_prompt: |
  Create a new Flow project called "GenerateSchemaTest" with a manual trigger
  that runs the Atlassian Jira "Create Issue" connector activity
  Pick any Jira project + issue type combination and set a static summary
  string.
  Configure the node so:
    - bodyParameters carries fields.project.key, fields.issuetype.id, and
      fields.summary (all three are required by GenerateSchema).
    - customFieldsRequestDetails records BOTH parent-field tuples
      (encoded as fields_sub_project_sub_key and fields_sub_issuetype_sub_id)
      under the GenerateSchema objectActionName so the schema fetch can be
      replayed at design time.
  End the flow with a core.control.end node.
  Validate the final flow file.
  If the Atlassian Jira connector is not present in the registry, stop —
  this test exercises GenerateSchema, which has no managed-HTTP fallback.

  Test connections for this task live in Orchestrator folder "Shared/uipath-maestro-flow".
  Resolve its key with `uip or folders get "Shared/uipath-maestro-flow" -o json`
  and pass `--folder-key <key>` on every `uip is connections list` call.

success_criteria:
  - type: run_command
    description: "Flow is valid JSON with Jira Create Issue node, customFieldsRequestDetails has both parent-field tuples under GenerateSchema, and bodyParameters carries a non-empty fields.summary"
    command: "python3 $TASK_DIR/check_generate_schema.py"
    timeout: 30
    expected_exit_code: 0
    weight: 10.0
    pass_threshold: 1.0

  - type: command_executed
    description: "Parent-field-driven describe (Step 3a) was called to fetch GenerateSchema custom fields"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+is\\s+resources\\s+describe.+(-f|--field)[=\\s]+[\"']?fields\\.project\\.key"
    min_count: 1
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "uip maestro flow validate was called"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+(maestro\\s+)?flow\\s+validate"
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

