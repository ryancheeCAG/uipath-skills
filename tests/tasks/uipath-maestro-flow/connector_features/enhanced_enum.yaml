task_id: skill-flow-ipe-enhanced-enum
description: >
  Tests the enhanced enum IS feature — configures a connector node with an
  enhanced enum field with display labels on the WooCommerce connector.
tags: [uipath-maestro-flow, integration, lifecycle:generate, shape:multi-node, connector, uipath-automaticc-woocommerce, ipe, mode:build]

run_limits:
  expected_turns: 35
  task_timeout: 1500
  max_turns: 120
  turn_timeout: 1200

initial_prompt: |
  Create a new Flow project called "EnhancedEnumTest" with a manual trigger. 
  Build a flow that retrieves WooCommerce product reviews and lets the caller 
  choose whether they come back oldest-first or newest-first, picking from friendly 
  labels rather than raw codes. Discover the get-product-reviews operation and set 
  its sort-order field. Validate the final flow file.
  If the WooCommerce operation exists in the registry but the tenant has no
  live connection, keep the real WooCommerce operation node with its inputs left unset, 
  confirm that shape validates, and stop there.

success_criteria:
  - type: run_command
    description: "Flow file exists and is valid JSON"
    command: "python3 -c \"import json,glob; flows=glob.glob('**/EnhancedEnumTest*.flow',recursive=True); assert flows, 'No flow found'; f=json.load(open(flows[0])); assert 'nodes' in f and 'edges' in f; nn=len(f['nodes']); ne=len(f['edges']); print('OK: %d nodes, %d edges'%(nn,ne))\""
    timeout: 10
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow has a connector node referencing uipath-automattic-woocommerce"
    command: "python3 -c \"import json,glob; flows=glob.glob('**/EnhancedEnumTest*.flow',recursive=True); assert flows; content=open(flows[0]).read(); assert 'uipath-automattic-woocommerce' in content, 'Connector key not found'; print('OK: connector key present')\""
    timeout: 10
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: command_executed
    description: "uip maestro flow validate was called"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+(maestro\\s+)?flow\\s+validate"
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

