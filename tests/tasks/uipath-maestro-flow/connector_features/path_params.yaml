task_id: skill-flow-ipe-path-params
description: >
  Tests the path parameters IS feature — configures a connector node with a
  path parameter on the Jira "Get Issue" activity. Project + issue type are
  freely chosen by the agent; the issue key is deterministic so the test can
  verify the path-parameter wiring.
tags: [uipath-maestro-flow, integration, lifecycle:generate, shape:multi-node, connector, uipath-atlassian-jira, ipe, mode:build]

run_limits:
  expected_turns: 52
  task_timeout: 1500
  max_turns: 120
  turn_timeout: 1200

initial_prompt: |
  Create a new Flow project called "PathParamsTest" with a manual trigger.
  Build a flow that retrieves a single Jira issue using the Jira
  connector. Pick any Jira project and any issue type from what is
  available on the connection — those values are your choice. The issue key
  MUST be "ENGCE-00000".
  Validate the final flow file.
  If the Jira connector is not present in the registry, use a HTTP fallback for the 
  equivalent REST call and finish after validation. Do not keep searching for a connector 
  node that the registry does not expose.

success_criteria:
  - type: command_executed
    description: "Agent invoked `uip is connections list` to discover available connections"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+is\\s+connections\\s+list"
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Tenant has at least one Jira connection (precondition for `node configure`)"
    command: "python3 $TASK_DIR/check_connection_available.py uipath-atlassian-jira"
    timeout: 35
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow file exists and is valid JSON"
    command: "python3 -c \"import json,glob; flows=glob.glob('**/PathParamsTest*.flow',recursive=True); assert flows, 'No flow found'; f=json.load(open(flows[0])); assert 'nodes' in f and 'edges' in f; nn=len(f['nodes']); ne=len(f['edges']); print('OK: %d nodes, %d edges'%(nn,ne))\""
    timeout: 10
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow uses Jira connector or task-specific managed HTTP fallback"
    command: "python3 $TASK_DIR/check_managed_http_fallback.py '**/PathParamsTest*.flow' uipath-atlassian-jira path_params"
    timeout: 10
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow path parameters carry the issue key ENGCE-00000"
    command: "python3 $TASK_DIR/check_path_param_value.py '**/PathParamsTest*.flow' ENGCE-00000"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "uip maestro flow validate was called"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+(maestro\\s+)?flow\\s+validate"
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

