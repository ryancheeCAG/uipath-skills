task_id: skill-flow-ipe-path-params
description: >
  Tests the path parameters IS feature — configures a connector node with a
  path parameter on the Jira "Get Issue" activity. Project + issue type are
  freely chosen by the agent; the issue key is deterministic so the test can
  verify the path-parameter wiring.
tags: [uipath-maestro-flow, integration, lifecycle:generate, shape:multi-node, connector, uipath-atlassian-jira]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  task_timeout: 1500
  max_turns: 120
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}
  node: {}
initial_prompt: |
  Create a new Flow project called "PathParamsTest" with a manual trigger.
  Build a flow that retrieves a single Jira issue using the Jira "Get Issue"
  connector activity. Pick any Jira project and any issue type from what is
  available on the connection — those values are your choice. The issue key
  (the path parameter on the Get Issue endpoint) MUST be "ENGCE-00000".
  Add a Decision node to check whether the call succeeded.
  Route failure to a Terminate node with error message "PathParams test failed".
  Route success to a final action that logs "PathParams test passed".
  Validate the final flow file.
  If the Jira "Get Issue" connector operation is not present in the registry,
  use a managed HTTP fallback for the equivalent REST call (the URL must still
  carry "ENGCE-00000" as the issue identifier in the path) and finish after
  validation. Do not keep searching for a connector node that the registry
  does not expose.

success_criteria:
  - type: run_command
    description: "Flow file exists and is valid JSON"
    command: "python3 -c \"import json,glob; flows=glob.glob('**/PathParamsTest*.flow',recursive=True); assert flows, 'No flow found'; f=json.load(open(flows[0])); assert 'nodes' in f and 'edges' in f; nn=len(f['nodes']); ne=len(f['edges']); print('OK: %d nodes, %d edges'%(nn,ne))\""
    timeout: 10
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow uses Jira connector or task-specific managed HTTP fallback"
    command: "python3 $TASK_DIR/check_managed_http_fallback.py '**/PathParamsTest*.flow' uipath-atlassian-jira path_params"
    timeout: 10
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow path parameters carry the issue key ENGCE-00000"
    command: "python3 $TASK_DIR/check_path_param_value.py '**/PathParamsTest*.flow' ENGCE-00000"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow has Decision and Terminate nodes"
    command: "python3 -c \"import json,glob; flows=glob.glob('**/PathParamsTest*.flow',recursive=True); assert flows; f=json.load(open(flows[0])); types=[n.get('type','') for n in f['nodes']]; assert any('decision' in t.lower() for t in types), 'No Decision node'; assert any('terminate' in t.lower() for t in types), 'No Terminate node'; print('OK: Decision and Terminate nodes present')\""
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "uip maestro flow validate was called"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+(maestro\\s+)?flow\\s+validate"
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0

