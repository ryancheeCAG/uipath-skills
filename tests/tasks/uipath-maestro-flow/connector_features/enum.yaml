task_id: skill-flow-ipe-enum
description: >
  Tests the enum IS feature — configures a connector node with an enum
  importance field on the Gmail "Send Mail" activity. Recipient, subject, and
  body are fixed so the test can verify the enum value wiring.
tags: [uipath-maestro-flow, integration, lifecycle-generate, shape-multi-node, connector, uipath-google-gmail, ipe]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  task_timeout: 3600
  max_turns: 200
  turn_timeout: 1200

initial_prompt: |
  Create a new Flow project called "EnumTest" with a manual trigger.
  Build a flow that sends an email via the Gmail "Send Mail" connector
  activity. Use these exact values:
    - to:        "baishali13@gmail.com"
    - subject:   "weather today"
    - body:      "Weather update for today."
    - importance: "medium"   (this is the enum field under test)
  Add a Decision node to check whether the call succeeded.
  Route failure to a Terminate node with error message "Enum test failed".
  Route success to a final action that logs "Enum test passed".
  Validate the final flow file.

success_criteria:
  - type: command_executed
    description: "Agent invoked `uip is connections list` to discover available connections"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+is\\s+connections\\s+list"
    min_count: 1
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Tenant has at least one Gmail connection (precondition for `node configure`)"
    command: "python3 $TASK_DIR/check_connection_available.py uipath-google-gmail"
    timeout: 35
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow file exists and is valid JSON"
    command: "python3 $TASK_DIR/check_enum_flow.py '**/EnumTest*.flow' structure"
    timeout: 10
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow uses Gmail connector or task-specific managed HTTP fallback"
    command: "python3 $TASK_DIR/check_managed_http_fallback.py '**/EnumTest*.flow' uipath-google-gmail enum"
    timeout: 10
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  - type: run_command
    description: "Connector node has inputs.detail.bodyParameters with to and importance"
    command: "python3 $TASK_DIR/check_enum_flow.py '**/EnumTest*.flow' body_params"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: run_command
    description: "Flow has Decision and Terminate nodes"
    command: "python3 $TASK_DIR/check_enum_flow.py '**/EnumTest*.flow' control"
    timeout: 10
    expected_exit_code: 0
    weight: 2.0
    pass_threshold: 1.0

  - type: command_executed
    description: "uip maestro flow validate was called"
    tool_name: "Bash"
    command_pattern: "(uip|\\$UIP)\\s+(maestro\\s+)?flow\\s+validate"
    min_count: 1
    weight: 2.0
    pass_threshold: 1.0
