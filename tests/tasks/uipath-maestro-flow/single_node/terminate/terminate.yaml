task_id: skill-flow-terminate
description: >
  Create a UiPath Flow with two parallel branches from the trigger. One branch
  terminates immediately via a Terminate node. The other branch waits 10 seconds
  via a Delay node, then ends with an output. Because Terminate stops the entire
  workflow, the delay branch should be killed before it completes. Exercises
  Terminate as a hard-stop that kills parallel branches.
tags: [uipath-maestro-flow, e2e, lifecycle:generate, shape:single-node, node:terminate]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

initial_prompt: |
  Create a UiPath Flow project named "TerminateParallel" with two parallel
  branches from the trigger:

  - Branch A: immediately terminates the entire workflow.
  - Branch B: waits 10 seconds, then ends and outputs the message "done".

  Both branches should start at the same time from the trigger node.

  Validate the flow.
  Do NOT ask for approval, confirmation, or feedback. Do NOT pause between planning and implementation. Build the complete flow end-to-end in a single pass.
  Before starting, load the uipath-maestro-flow skill. Read and follow its workflow steps exactly.

success_criteria:
  # -- Flow file validity --
  - type: run_command
    description: "uip maestro flow validate passes on the flow file"
    command: "uip maestro flow validate TerminateParallel/TerminateParallel/TerminateParallel.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # -- Structural and execution checks --
  - type: run_command
    description: "Flow has Terminate + Delay nodes in parallel, terminates before delay completes"
    command: "python3 $TASK_DIR/check_terminate_flow.py"
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

post_run:
  - command: "python3 $SKILLS_REPO_PATH/tests/tasks/uipath-maestro-flow/_shared/cleanup_solutions.py"
    timeout: 120
