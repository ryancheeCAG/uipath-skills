task_id: skill-flow-subflow
description: >
  Create a UiPath Flow that uses a Subflow node to encapsulate string-reversal
  logic. The main flow takes a string input, passes it into a Subflow node that
  reverses the string, and returns the reversed result. Exercises Subflow node
  discovery, embedded subprocess construction, and variable passing between
  the parent flow and subflow.
tags: [uipath-maestro-flow, e2e, lifecycle:generate, shape:single-node, node:subflow]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath Flow project named "SubflowDemo" that takes a string input
  called "text" and reverses it. The string reversal logic should be
  encapsulated inside a subflow rather than done directly in the main flow.
  Return the reversed string as an output.

  Validate the flow.
  Do NOT ask for approval, confirmation, or feedback. Do NOT pause between planning and implementation. Build the complete flow end-to-end in a single pass.
  Before starting, load the uipath-maestro-flow skill. Read and follow its workflow steps exactly.

success_criteria:
  # -- Flow file validity --
  - type: run_command
    description: "uip maestro flow validate passes on the flow file"
    command: "uip maestro flow validate SubflowDemo/SubflowDemo/SubflowDemo.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # -- Structural and execution checks --
  - type: run_command
    description: "Flow has correct subflow structure and debug reverses 'hello' to 'olleh'"
    command: "python3 $TASK_DIR/check_subflow_flow.py"
    timeout: 120
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
