task_id: skill-flow-lowcode-agent
description: >
  Create a UiPath Flow that uses the CountLetters low-code agent to count the
  number of r's in 'arrow' and return the answer. Exercises agent resource
  node discovery and wiring.
tags: [uipath-maestro-flow, e2e, lifecycle:generate, shape:single-node, resource]

agent:
  type: claude-code
  permission_mode: acceptEdits
  allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]

run_limits:
  turn_timeout: 1200

sandbox:
  driver: tempdir
  python: {}

initial_prompt: |
  Create a UiPath Flow project named "CountLettersLowCode" that uses the
  CountLetters low-code agent to count the number of r's in 'arrow'
  and return the answer.

  Validate the flow.
  Do NOT ask for approval, confirmation, or feedback. Do NOT pause between planning and implementation. Build the complete flow end-to-end in a single pass.
  Before starting, load the uipath-maestro-flow skill. Read and follow its workflow steps exactly.

success_criteria:
  # ── Flow file validity ─────────────────────────────────────────────────
  - type: run_command
    description: "uip maestro flow validate passes on the flow file"
    command: "uip maestro flow validate CountLettersLowCode/CountLettersLowCode/CountLettersLowCode.flow"
    timeout: 30
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # ── Execution checks ──────────────────────────────────────────────────
  - type: run_command
    description: "Flow has an agent node and debug returns the letter count"
    command: "python3 $TASK_DIR/check_lowcode_agent_flow.py"
    timeout: 300
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0
