task_id: skill-flow-ixp-invoice-extraction-simulated
description: >
  Invoice-processing flow (SharePoint trigger → IxP extraction → HTTP POST to
  SAP), driven by a simulated non-technical AP clerk who describes the outcome
  but withholds the folder, fields, model, and destination until asked. Tests
  whether the agent elicits the IxP model / extraction fields / downstream
  endpoint before building. Validate-only — IxP + SharePoint need a live tenant.
tags: [uipath-maestro-flow, e2e, mode:build, lifecycle:generate, shape:multi-node, node:ixp, connector, feature:http, simulation]

run_limits:
  # max_turns = simulation rounds x ~5 (~4 build turns/round + headroom)
  max_turns: 80
  task_timeout: 2400
  turn_timeout: 1200

# No initial_prompt — the simulator generates turn 1 from its persona + goal.

simulation:
  enabled: true

  persona: |
    You are a non-technical accounts-payable clerk. You process vendor invoices
    all day and know your process well, but you have never built a flow and you
    speak in plain English, never in code. You are friendly but impatient: if the
    agent dithers, prod it to just build something. You cannot read or write
    code — if the agent shows you code, say "I trust you, just make it work."

  goal: |
    You ultimately want a UiPath Flow that automatically processes the vendor
    invoices that land in your SharePoint folder and pushes the data into SAP.
    You want it validated before you accept it.

    CRITICAL: do NOT volunteer these details up front. Reveal each fact ONLY if
    the agent explicitly asks about it:
      - The project name should be "InvoiceProcessing".
      - The flow should start automatically when a new PDF invoice arrives in a
        SharePoint folder.
      - The SharePoint folder is called "New Vendor".
      - It should pull the structured data out of each invoice: invoice number,
        vendor, invoice date, total amount, and line items.
      - If asked HOW to extract that data / which model: use the IxP (intelligent
        document processing) "Invoice Model".
      - After extraction, it should send the extracted invoice fields to SAP as
        an HTTP POST request to the configured endpoint.
      - You want the flow validated before you sign off.
      - You do not require the project to execute before signing off (there is no
        live SharePoint/SAP connection to test against).

    If the agent asks a clarifying question that covers several of these at
    once, answer only what they asked — do not pre-empt the rest.

  constraints:
    - "Never paste or read code. If shown code, say 'I trust you, just make it work.'"
    - "Do not mention 'IxP', 'SharePoint', 'HTTP', 'connector', 'trigger', 'model', 'node', or 'validate' unless the agent brings them up first."
    - "Do not reveal the folder name 'New Vendor' unless asked where the invoices come from."
    - "Do not reveal the IxP 'Invoice Model' unless asked how to read/extract the invoice data."
    - "Do not reveal the SAP HTTP destination unless asked where the results should go."
    - "Do not reveal the project name 'InvoiceProcessing' unless asked what to name it."
    - "You expect a UiPath Maestro Flow — i.e. a `.flow` file in the workspace. If the agent builds anything else (e.g. an API workflow), tell it you specifically want a Maestro Flow and are not satisfied until there is a `.flow` file."
    - "When you are satisfied that the flow is built and validated, reply with exactly <<<END>>> on its own line."

  max_turns: 16
  stop_token: "<<<END>>>"
  stop_on_criteria_pass: false
  check_criteria: end_of_dialog
  n_trials: 1
  parallel_trials: true

success_criteria:
  # Name-agnostic: any .flow the agent built must validate. The exact project
  # name is scored separately below so a working-but-misnamed flow still earns
  # most of the credit. (`**` skips dot-dirs, so .uipath/.skills flows are ignored.)
  - type: run_command
    description: "uip flow validate passes (any .flow)"
    command: "python3 -c \"import glob,subprocess,sys; flows=glob.glob('**/*.flow',recursive=True); sys.exit('no .flow file found') if not flows else sys.exit(subprocess.run(['uip','maestro','flow','validate',flows[0],'--output','json']).returncode)\""
    timeout: 60
    expected_exit_code: 0
    weight: 3.0
    pass_threshold: 1.0

  # Mirrors the skills-repo ixp greenfield grep checks: an IxP extraction node
  # (or core.logic.mock fallback), a SharePoint trigger/connector, an HTTP action
  # node, and a $vars. reference consuming the extraction output downstream.
  - type: run_command
    description: "Flow has IxP extraction + SharePoint + HTTP nodes and a $vars downstream reference"
    command: "python3 -c \"import json,glob; flows=glob.glob('**/*.flow',recursive=True); assert flows,'No flow file'; txt=open(flows[0]).read(); low=txt.lower(); f=json.loads(txt); types=[str(n.get('type','')).lower() for n in f.get('nodes',[])]; assert 'uipath.ixp' in low or 'core.logic.mock' in low,'no IxP extraction node (or mock fallback)'; assert 'sharepoint' in low,'no SharePoint trigger/connector'; assert any('http' in t for t in types),'no HTTP action node'; assert (chr(36)+'vars.') in txt,'no vars downstream reference to extraction output'; print('OK')\""
    timeout: 15
    expected_exit_code: 0
    weight: 6.0
    pass_threshold: 1.0

  # The project name is a WITHHELD, COSMETIC requirement (persona reveals it only
  # if asked what to name it) — the flow behaves identically whatever it's called.
  # Non-gating: reports whether the agent elicited the exact name (score 1/0), but
  # pass_threshold 0 keeps a cosmetic miss from failing the task and the low weight
  # keeps it from dominating the score.
  - type: run_command
    description: "Project/flow is named InvoiceProcessing (elicited from the user)"
    command: "python3 -c \"import glob,sys; sys.exit(0 if glob.glob('**/InvoiceProcessing.flow',recursive=True) else 'expected a flow named InvoiceProcessing.flow')\""
    timeout: 15
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 0
