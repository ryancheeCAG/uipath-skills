task_id: skill-flow-customer-escalation-simulated
description: >
  Multi-branch Outlook→classify→decision escalation flow, but driven by a
  simulated non-technical user who withholds requirements until asked. Tests the
  agent's ability to clarify a complex ambiguous ask before building.
  Validate-only — the sandbox has no live Outlook/Slack tenant.
tags: [uipath-maestro-flow, integration, mode:build, lifecycle:generate, shape:multi-node, node:decision, feature:trigger, connector, simulation]

run_limits:
  # max_turns = simulation rounds x ~5 (~4 build turns/round + headroom)
  max_turns: 90
  task_timeout: 2400
  turn_timeout: 1200

# No initial_prompt — the simulator generates turn 1 from its persona + goal.

simulation:
  enabled: true

  persona: |
    You are a non-technical customer-support team lead. You have heard of UiPath
    but have never built a flow yourself. You speak in plain English, never in
    code. You are friendly but impatient: if the agent dithers, prod it to just
    build something. You cannot read or write code — if the agent shows you code,
    say "I trust you, just make it work."

  goal: |
    You ultimately want a UiPath Flow that automatically triages incoming support
    emails so your best cases get a fast, personal response. You want it validated
    before you accept it.

    CRITICAL: do NOT volunteer these details up front. Reveal each fact ONLY if
    the agent explicitly asks about it:
      - The project name should be "CustomerEscalation".
      - It should start automatically whenever a new email arrives in your
        Outlook inbox.
      - Every email should be routed on TWO signals: whether it looks urgent,
        and whether the sender is a VIP customer.
      - You do NOT have a fixed urgency keyword list or VIP rule — you trust the
        agent to decide reasonable ones (e.g. urgent keywords, a VIP domain
        allow-list). Say "you decide, use your best judgment."
      - There are two outcomes:
          * If an email is BOTH urgent AND from a VIP: post a heads-up in Slack
            AND send a quick acknowledgment reply to the sender by email.
          * Otherwise: create a support ticket and reply to the sender by email
            with the ticket details.
      - You want the flow validated before you sign off.
      - You do not require the project to execute before signing off (there is no
        live mailbox to test against).

    If the agent asks a clarifying question that covers several of these at
    once, answer only what they asked — do not pre-empt the rest.

  constraints:
    - "Never paste or read code. If shown code, say 'I trust you, just make it work.'"
    - "Do not mention 'trigger', 'connector', 'decision', 'script', 'node', or 'validate' unless the agent brings them up first."
    - "Do not reveal the two routing signals (urgent + VIP) unless asked how emails should be prioritized or sorted."
    - "Do not reveal the two branch actions (Slack + reply vs ticket + reply) unless asked what should happen in each case."
    - "Do not reveal the project name 'CustomerEscalation' unless asked what to name it."
    - "You expect a UiPath Maestro Flow — i.e. a `.flow` file in the workspace. If the agent builds anything else (e.g. an API workflow), tell it you specifically want a Maestro Flow and are not satisfied until there is a `.flow` file."
    - "When you are satisfied that the flow is built and validated, reply with exactly <<<END>>> on its own line."

  max_turns: 18
  stop_token: "<<<END>>>"
  stop_on_criteria_pass: false
  check_criteria: end_of_dialog
  n_trials: 1
  parallel_trials: true

success_criteria:
  # Name-agnostic: any .flow the agent built must validate. The exact project
  # name is scored separately below so a working-but-misnamed flow still earns
  # most of the credit. (`**` skips dot-dirs, so .uipath/.skills flows are ignored.)
  - type: run_command
    description: "uip flow validate passes (any .flow)"
    command: "python3 -c \"import glob,subprocess,sys; flows=glob.glob('**/*.flow',recursive=True); sys.exit('no .flow file found') if not flows else sys.exit(subprocess.run(['uip','maestro','flow','validate',flows[0],'--output','json']).returncode)\""
    timeout: 60
    expected_exit_code: 0
    weight: 5.0
    pass_threshold: 1.0

  # Behavioural correctness — asserts the flow DOES the triage (trigger → route
  # on urgency+VIP → Slack notify / email reply / ticket) without pinning the
  # implementation SHAPE. Unlike a "'>='2 script nodes" check, this accepts a
  # flow that classifies with an agent node or routes with a switch, so it does
  # not penalise the agent for a detail the non-technical persona can never
  # provide. See check_escalation_behavior.py for the rationale.
  - type: run_command
    description: "Flow performs the triage: trigger, urgency+VIP routing, Slack notify, email reply, ticket creation"
    command: "python3 $TASK_DIR/check_escalation_behavior.py"
    timeout: 30
    expected_exit_code: 0
    weight: 10.0
    pass_threshold: 1.0

  # The project name is a WITHHELD, COSMETIC requirement (persona reveals it only
  # if asked what to name it) — the flow behaves identically whatever it's called.
  # Non-gating: reports whether the agent elicited the exact name (score 1/0), but
  # pass_threshold 0 keeps a cosmetic miss from failing the task and the low weight
  # keeps it from dominating the score.
  - type: run_command
    description: "Project/flow is named CustomerEscalation (elicited from the user)"
    command: "python3 -c \"import glob,sys; sys.exit(0 if glob.glob('**/CustomerEscalation.flow',recursive=True) else 'expected a flow named CustomerEscalation.flow')\""
    timeout: 15
    expected_exit_code: 0
    weight: 1.0
    pass_threshold: 0
