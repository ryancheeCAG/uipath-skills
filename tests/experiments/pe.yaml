experiment_id: skill-tests-pe
description: "P&E local-only run — tempdir, raised turn/task limits for data-heavy Test Manager tasks"

defaults:
  # Limits at the level ExperimentDefaults actually reads (the default.yaml
  # nests these under run_limits:, which the loader ignores → falls back to a
  # 300s turn cap that times out data-heavy discovery/diff tasks).
  task_timeout: 700
  turn_timeout: 450
  max_turns: 60

  sandbox:
    driver: tempdir

  agent:
    type: claude-code
    permission_mode: acceptEdits
    model: claude-sonnet-4-6
    allowed_tools: ["Skill", "Bash", "Read", "Write", "Edit", "Glob", "Grep"]
    system_prompt: |
      You are a coding agent. Do not access files in sibling runs/* directories. Everywhere else is permitted.
    plugins:
      - type: "local"
        path: "$SKILLS_REPO_PATH"
    ignore_patterns: []

  post_run:
    - command: "find . -maxdepth 5 -type d \\( -name node_modules -o -name .npm-prefix -o -name .venv \\) -prune -exec rm -rf {} +"
      timeout: 30

variants:
  - variant_id: default
